                { q: "Under what condition is a **Foreign Judgment** considered **conclusive** (binding) in India (S. 13 CPC)?", options: ["If it is passed by a court in a friendly country", "If it is **not founded on a breach of natural justice** and was delivered by a court of competent jurisdiction", "If the judgment is in favor of the Indian citizen", "Foreign judgments are never conclusive"], answer: "If it is **not founded on a breach of natural justice** and was delivered by a court of competent jurisdiction", explanation: "Section 13 CPC sets out six exceptions where a foreign judgment is **not** conclusive (e.g., if it was not on the merits, or was obtained by fraud). If none of these exceptions apply, the foreign judgment is conclusive." },
                { q: "What is the legal effect of a contract clause allowing **Termination by Notice**?", options: ["The contract is void from the start", "The contract is valid but can be **unilaterally terminated** by either party after giving the prescribed notice period", "The contract is automatically cancelled after a year", "The clause is always illegal"], answer: "The contract is valid but can be **unilaterally terminated** by either party after giving the prescribed notice period", explanation: "Termination by notice is a valid contractual right that allows parties to exit the contract after fulfilling the notice period requirements, without constituting a breach." },
                { q: "What is the general relevance of **Malice (bad motive)** in the tort of **Negligence**?", options: ["It is the main ingredient of the tort", "It is **irrelevant**; the focus is solely on the breach of duty and foreseeable harm", "It is only relevant if the defendant admits it", "It is only relevant if the damage is very high"], answer: "It is **irrelevant**; the focus is solely on the breach of duty and foreseeable harm", explanation: "In most torts, especially negligence, the bad motive (malice) of the defendant is irrelevant to determining liability. The key is the objective standard of a breach of a duty of care that caused foreseeable harm." }
            ]
        },
        hard: {
          1: [
            { q: "What is the legal remedy of 'specific performance'?", options: ["Monetary compensation for damages", "A court order to perform a specific act as per the contract", "A cancellation of the contract", "A penalty for breach of contract"], answer: "A court order to perform a specific act as per the contract", explanation: "Specific performance is an equitable remedy in the law of contract, whereby a court issues an order requiring a party to perform a specific act, such as to complete performance of the contract." },
            { q: "What is the difference between 'libel' and 'slander'?", options: ["Libel is accidental, slander is intentional", "Libel is written, slander is spoken defamation", "Libel is public, slander is private", "There is no difference"], answer: "Libel is written, slander is spoken defamation", explanation: "Both are forms of defamation. Libel is defamation in a permanent form, such as writing, printing, or images. Slander is defamation in a transient form, primarily through spoken words." },
            { q: "What is the 'doctrine of frustration' in contract law?", options: ["When one party gets frustrated with the other", "When a contract becomes impossible to perform due to unforeseen events", "When a contract is intentionally breached", "When a contract is not profitable"], answer: "When a contract becomes impossible to perform due to unforeseen events", explanation: "The doctrine of frustration applies when an unforeseen event makes performance of a contract impossible, illegal, or radically different from what was originally contemplated by the parties. This can discharge the parties from their obligations." },
            { q: "What is a 'lis pendens'?", options: ["A pending license", "A notice that a lawsuit concerning property is pending", "A type of legal fee", "A final judgment"], answer: "A notice that a lawsuit concerning property is pending", explanation: "'Lis pendens' is a Latin term for 'suit pending'. It is a written notice that a lawsuit has been filed which concerns the title to real property or some interest in that real property. It serves to warn all potential buyers that the property is subject to litigation." },
            { q: "What is the 'parol evidence rule'?", options: ["A rule about parole for prisoners", "A rule that prevents parties from using prior oral agreements to contradict a written contract", "A rule about evidence from parrots", "A rule about verbal testimony in court"], answer: "A rule that prevents parties from using prior oral agreements to contradict a written contract", explanation: "The parol evidence rule is a substantive common law rule in contract cases that prevents a party to a written contract from presenting extrinsic evidence that contradicts or adds to the written terms of the contract that appears to be whole." },
            { q: "What is 'subrogation'?", options: ["The act of submitting a case to a lower court", "The substitution of one person or group by another in respect of a debt or insurance claim", "A type of legal document", "The process of questioning a witness"], answer: "The substitution of one person or group by another in respect of a debt or insurance claim", explanation: "Subrogation is the assumption by a third party (such as an insurance company) of another party's legal right to collect a debt or damages. For example, an insurer may subrogate to the rights of the insured to sue a person who caused the loss." },
            { q: "What is the 'doctrine of privity of contract'?", options: ["Contracts must be kept private", "Only parties to a contract can sue to enforce it", "All contracts are public record", "Contracts can be enforced by anyone"], answer: "Only parties to a contract can sue to enforce it", explanation: "The doctrine of privity of contract is a common law principle which provides that a contract cannot confer rights or impose obligations upon any person who is not a party to the contract." },
            { q: "What is 'quantum meruit'?", options: ["A type of quantity measurement", "A legal claim for the reasonable value of services performed", "A quality control standard", "A contractual clause"], answer: "A legal claim for the reasonable value of services performed", explanation: "'Quantum meruit' is a Latin phrase meaning 'as much as he has deserved'. It is a legal action to recover reasonable compensation for services rendered when the amount due is not stipulated in a legally enforceable contract." },
            { q: "What is the difference between a 'void' and a 'voidable' contract?", options: ["There is no difference", "A void contract is unenforceable from the start; a voidable contract can be cancelled by one party", "A void contract is verbal; a voidable contract is written", "A void contract is for illegal acts; a voidable contract is for legal acts"], answer: "A void contract is unenforceable from the start; a voidable contract can be cancelled by one party", explanation: "A void contract is a nullity and cannot be enforced by either party. A voidable contract is a valid contract which may be either affirmed or rejected at the option of one of the parties." },
            { q: "What is 'estoppel'?", options: ["A type of legal stop sign", "A legal principle that prevents someone from arguing something contrary to a previous claim or action", "The final part of a legal argument", "A fee paid to the court"], answer: "A legal principle that prevents someone from arguing something contrary to a previous claim or action", explanation: "Estoppel is a judicial device whereby a court may prevent, or 'estop' a person from making assertions or from going back on his or her word; the person is precluded from arguing something contrary to a claim made or act done by that person." }
          ],
          2: [
            { q: "What is a 'standard form contract' and what are its risks?", options: ["A contract written on standard paper", "A 'take it or leave it' contract with no room for negotiation; risk of unfair terms", "A contract that is easy to understand", "A government-approved contract"], answer: "A 'take it or leave it' contract with no room for negotiation; risk of unfair terms", explanation: "Standard form contracts are prepared by one party and offered to the other on a non-negotiable basis. While efficient, they carry the risk of containing terms that are unfair or exploitative to the weaker party, who has little to no bargaining power." },
            { q: "What is the 'postal rule' or 'mailbox rule' in contract law?", options: ["A rule about sending contracts by post", "Acceptance of an offer is effective upon posting, not upon receipt", "A rule that contracts must be mailed", "A rule about the speed of postal services"], answer: "Acceptance of an offer is effective upon posting, not upon receipt", explanation: "The postal rule is an exception to the general rule that acceptance must be communicated. It states that an acceptance is effective as soon as it is posted, provided that post was the agreed or reasonable method of communication." },
            { q: "What is 'accord and satisfaction'?", options: ["A feeling of satisfaction with a contract", "An agreement to discharge a claim in which the parties agree to give and accept something in settlement of the claim", "A type of court order", "A clause in a contract"], answer: "An agreement to discharge a claim in which the parties agree to give and accept something in settlement of the claim", explanation: "Accord and satisfaction is a legal contract whereby two parties agree to discharge a tort claim, contract, or other liability for an amount based on terms that differ from the original amount of the contract or claim. The 'accord' is the agreement, and the 'satisfaction' is its execution." },
            { q: "What is the 'doctrine of economic duress'?", options: ["Being forced to sign a contract due to financial hardship", "Illegitimate economic pressure exerted by one party to coerce another into a contract", "A bad business deal", "A contract that leads to economic loss"], answer: "Illegitimate economic pressure exerted by one party to coerce another into a contract", explanation: "Economic duress occurs when one party uses illegitimate economic pressure to force another party to enter into a contract or to agree to a particular set of terms. If proven, the contract can be rendered voidable." },
            { q: "What is a 'letter of intent' (LOI)?", options: ["A binding contract", "A document outlining the understanding between two or more parties which they intend to formalize in a legally binding agreement", "A personal letter", "A final offer"], answer: "A document outlining the understanding between two or more parties which they intend to formalize in a legally binding agreement", explanation: "An LOI is a document that outlines the main points of a proposed deal. While typically not legally binding in its entirety, some provisions, like confidentiality, may be enforceable. It signals a serious intent to move forward with a transaction." },
            { q: "What is the 'battle of the forms'?", options: ["A physical fight over contract forms", "A dispute that arises when two businesses are negotiating a contract and each sends its own standard form contract", "A competition for the best contract form", "A legal debate in court"], answer: "A dispute that arises when two businesses are negotiating a contract and each sends its own standard form contract", explanation: "The 'battle of the forms' occurs when two companies' standard terms and conditions conflict. The legal question is which set of terms applies to the transaction. The 'last shot' rule often applies, where the last set of terms sent before performance of the contract prevails." },
            { q: "What is the difference between a 'condition' and a 'warranty' in a contract?", options: ["A condition is a minor term, a warranty is a major term", "A condition is a major term, a breach of which entitles the innocent party to terminate the contract; a warranty is a minor term", "They are the same", "A condition is a promise, a warranty is a guarantee"], answer: "A condition is a major term, a breach of which entitles the innocent party to terminate the contract; a warranty is a minor term", explanation: "A condition is a term that is fundamental to the contract. Its breach allows the aggrieved party to repudiate the contract and claim damages. A warranty is a less important term, and its breach only entitles the party to claim damages, not to end the contract." },
            { q: "What is 'unjust enrichment'?", options: ["Becoming rich through hard work", "A situation where one person is enriched at the expense of another in circumstances that the law sees as unjust", "A type of tax evasion", "A profitable business"], answer: "A situation where one person is enriched at the expense of another in circumstances that the law sees as unjust", explanation: "Unjust enrichment is a legal principle that no one should be allowed to profit at another's expense without making restitution for the reasonable value of any property, services, or other benefits that have been unfairly received and retained. It is the basis for quasi-contracts." },
            { q: "What is a 'force majeure' clause?", options: ["A clause that forces a party to perform", "A contract clause that relieves parties from liability for unforeseeable 'Act of God' events", "A clause about using force", "A clause that makes a contract stronger"], answer: "A contract clause that relieves parties from liability for unforeseeable 'Act of God' events", explanation: "'Force majeure' refers to a clause that is included in contracts to remove liability for unforeseeable and unavoidable catastrophes that interrupt the expected course of events and prevent participants from fulfilling obligations. Examples include wars, strikes, and natural disasters." },
            { q: "What is the 'interpretation contra proferentem' rule?", options: ["A rule to interpret contracts in favor of the party who drafted it", "A rule to interpret any ambiguity in a contract against the party who drafted it", "A rule to interpret contracts literally", "A rule for interpreting foreign contracts"], answer: "A rule to interpret any ambiguity in a contract against the party who drafted it", explanation: "The 'contra proferentem' rule is a doctrine of contractual interpretation which provides that an ambiguous term will be construed against the party that imposed its inclusion in the contract – or, more accurately, against the interests of the party who imposed the term." }
          ],
          3: [
            { q: "What is the 'Himalaya clause' in a bill of lading?", options: ["A clause related to shipping in the Himalayas", "A clause that extends liability limitations to a carrier's employees, agents, and subcontractors", "A clause about mountain climbing contracts", "A clause that is very long"], answer: "A clause that extends liability limitations to a carrier's employees, agents, and subcontractors", explanation: "A Himalaya clause is a contractual provision expressed to be for the benefit of a third party who is not a party to the contract. It is common in contracts of carriage, extending the carrier's liability limitations to its employees, agents, and independent contractors." },
            { q: "What is the 'entire agreement' clause?", options: ["A clause that makes the agreement very long", "A clause stating that the written contract is the complete and final agreement between the parties", "A clause that requires all parties to agree on everything", "A clause that is not important"], answer: "A clause stating that the written contract is the complete and final agreement between the parties", explanation: "An entire agreement clause (or merger clause) is a provision in a contract that declares that the contract represents the complete and final agreement between the parties and supersedes all prior oral or written agreements on the subject matter." },
            { q: "What is the difference between 'direct damages' and 'consequential damages'?", options: ["Direct damages are large, consequential are small", "Direct damages flow naturally from the breach; consequential damages are indirect but foreseeable", "Direct damages are for property, consequential for person", "There is no difference"], answer: "Direct damages flow naturally from the breach; consequential damages are indirect but foreseeable", explanation: "Direct (or general) damages are those that arise naturally and ordinarily from a breach of contract. Consequential (or special) damages are those that do not flow directly from the breach but are a foreseeable consequence of it, often due to special circumstances known to the parties at the time of the contract." },
            { q: "What is a 'condition precedent' in a contract?", options: ["A condition that must be met after the contract is signed", "An event or state of affairs that is required before something else will occur", "A condition that is not important", "A condition that is illegal"], answer: "An event or state of affairs that is required before something else will occur", explanation: "A condition precedent is an event which must take place before a party to a contract has a duty to perform. If the condition does not occur, the duty to perform is discharged. For example, a real estate contract might be conditional on the buyer obtaining financing." },
            { q: "What is a 'condition subsequent'?", options: ["A condition that must be met before the contract is signed", "An event or state of affairs that brings an end to something else", "A condition that is very important", "A condition that is easy to meet"], answer: "An event or state of affairs that brings an end to something else", explanation: "A condition subsequent is an event or state of affairs that, if it occurs, will terminate one party's obligation to the other. For example, a contract might state that if the goods are not delivered within 30 days, the contract is terminated." },
            { q: "What is the 'duty of good faith and fair dealing'?", options: ["A duty to be friendly", "An implied duty that parties to a contract will act in good faith and deal fairly with each other", "A duty that only applies to some contracts", "A duty that can be waived"], answer: "An implied duty that parties to a contract will act in good faith and deal fairly with each other", explanation: "This is an implied covenant in many legal systems that parties will not act in bad faith to destroy or injure the right of the other party to receive the benefits of the contract. It requires honesty in fact and the observance of reasonable commercial standards of fair dealing." },
            { q: "What is a 'third-party beneficiary' to a contract?", options: ["A person who benefits from a contract they are not a party to", "A person who interferes with a contract", "A lawyer who drafts a contract", "A witness to a contract"], answer: "A person who benefits from a contract they are not a party to", explanation: "A third-party beneficiary is a person who may have the right to sue on a contract, despite not having originally been an active party to the contract. This right arises when the third party is the intended beneficiary of the contract." },
            { q: "What is 'assignment' of a contract?", options: ["Giving a contract a grade", "The transfer of rights or benefits under a contract to a third party", "The cancellation of a contract", "The signing of a contract"], answer: "The transfer of rights or benefits under a contract to a third party", explanation: "Assignment is the process whereby a person, the assignor, transfers rights or benefits to another, the assignee. For example, a party to a contract (the assignor) may assign its right to receive the contract payments to a bank." },
            { q: "What is 'delegation' of duties under a contract?", options: ["The same as assignment", "The transfer of duties or obligations under a contract to a third party", "Refusing to perform duties", "A meeting of delegates"], answer: "The transfer of duties or obligations under a contract to a third party", explanation: "Delegation is the act of giving another person the responsibility of carrying out the performance of a duty. While duties can be delegated, the original party (the delegator) remains liable for performance if the third party (the delegatee) fails to perform." },
            { q: "What is the 'mirror image rule' in contract formation?", options: ["The offer and acceptance must be identical", "The contract must be a reflection of the parties' intentions", "The parties must look at each other when signing", "A rule about using mirrors in negotiations"], answer: "The offer and acceptance must be identical", explanation: "The mirror image rule states that an offer must be accepted exactly without modifications. An attempt to accept an offer on different terms is a rejection of the original offer and constitutes a counter-offer." }
          ]

          4: [
            { q: "What are the essential elements of a valid 'gift' under the Transfer of Property Act?", options: ["The gift must be expensive", "There must be a transfer of ownership, without consideration, and acceptance by the donee", "The gift must be given in public", "The gift must be registered, regardless of type"], answer: "There must be a transfer of ownership, without consideration, and acceptance by the donee", explanation: "A valid gift requires a transfer of existing property, made voluntarily and without consideration, by a donor to a donee, and it must be accepted by the donee during the lifetime of the donor." },
            { q: "What is the key difference between a 'lease' and a 'license'?", options: ["A lease is for a longer period than a license", "A lease creates an interest in the property, while a license is a mere permission to use it", "A lease is for commercial property, a license for residential", "A lease is written, a license is oral"], answer: "A lease creates an interest in the property, while a license is a mere permission to use it", explanation: "A lease grants the lessee exclusive possession of the property for a specific period. A license only gives the licensee the right to do something on the property which would otherwise be unlawful, without transferring any interest in the property itself." },
            { q: "What is the concept of 'easement rights'?", options: ["Rights that are easy to get", "A right which the owner of one property has to use the property of another for a specific purpose", "The right to own property easily", "A government scheme for property owners"], answer: "A right which the owner of one property has to use the property of another for a specific purpose", explanation: "An easement is a non-possessory right to use and/or enter onto the real property of another without possessing it. A common example is a 'right of way' to cross a neighbor's land to reach your own." },
            { q: "What is the difference between 'libel' and 'slander' in the law of torts?", options: ["Libel is a more serious crime", "Libel is defamation in a permanent form (e.g., written), while slander is in a transient form (e.g., spoken)", "Libel is always true, slander is false", "Libel is against a person, slander is against property"], answer: "Libel is defamation in a permanent form (e.g., written), while slander is in a transient form (e.g., spoken)", explanation: "Both are forms of defamation. Libel, being permanent, is generally considered more serious and is actionable per se (without proof of actual damage). Slander requires proof of special damages in most cases." },
            { q: "What is 'vicarious liability' in tort law?", options: ["Liability for one's own actions", "When one person is held liable for the wrongful acts of another", "A type of strict liability", "Liability shared by multiple wrongdoers"], answer: "When one person is held liable for the wrongful acts of another", explanation: "Vicarious liability arises from a special relationship between two parties, such as employer-employee or master-servant. The master can be held liable for the torts committed by the servant during the course of employment." },
            { q: "What are the grounds for 'divorce by mutual consent' under the Hindu Marriage Act?", options: ["The parties have been living separately for one year or more and have mutually agreed that the marriage should be dissolved", "One party has committed adultery", "The parties have had a major argument", "The parties' families agree to the divorce"], answer: "The parties have been living separately for one year or more and have mutually agreed that the marriage should be dissolved", explanation: "Section 13B of the Hindu Marriage Act allows for divorce by mutual consent. The key requirements are that the parties have been living separately for at least a year, are unable to live together, and have mutually agreed to dissolve the marriage." },
            { q: "What is 'coparcenary' property in Hindu law?", options: ["Any property owned by a Hindu family", "A specific type of ancestral property in which male and (since 2005) female descendants have an interest by birth", "Property acquired by a woman", "Property given as dowry"], answer: "A specific type of ancestral property in which male and (since 2005) female descendants have an interest by birth", explanation: "Coparcenary property is a narrower concept than joint family property. A coparcener acquires an interest in the property by birth. The 2005 amendment to the Hindu Succession Act made daughters coparceners in their own right, same as sons." },
            { q: "What is the procedure for registration of a sale deed for immovable property?", options: ["It is not mandatory", "It must be registered with the local police station", "It must be presented and registered at the office of the Sub-Registrar of Assurances within whose jurisdiction the property is situated", "It can be registered online from anywhere"], answer: "It must be presented and registered at the office of the Sub-Registrar of Assurances within whose jurisdiction the property is situated", explanation: "The Registration Act, 1908, mandates the registration of documents related to the transfer of immovable property worth more than Rs. 100. This provides a public record and legal validity to the transfer." },
            { q: "What is a 'Power of Attorney' (POA)?", options: ["A document giving someone political power", "A legal instrument authorizing one person to act as the agent or attorney for another person in specified matters", "The power of a lawyer in court", "A type of court order"], answer: "A legal instrument authorizing one person to act as the agent or attorney for another person in specified matters", explanation: "A POA can be 'general' (granting broad powers) or 'special' (limited to a specific act). It is a crucial document for authorizing someone to manage your affairs if you are unable to do so yourself." },
            { q: "What is the difference between a 'plaintiff' and a 'defendant'?", options: ["The plaintiff is the lawyer, the defendant is the client", "The plaintiff is the party who files the lawsuit; the defendant is the party who is being sued", "The plaintiff is the judge, the defendant is the witness", "They are interchangeable terms"], answer: "The plaintiff is the party who files the lawsuit; the defendant is the party who is being sued", explanation: "In a civil suit, the plaintiff initiates the legal action by filing a plaint, alleging that the defendant has committed a civil wrong or breach of contract that has caused them harm." }
          ],
          5: [
            { q: "What is the doctrine of 'lis pendens'?", options: ["A pending license", "A doctrine that prohibits the transfer of property that is the subject matter of a pending lawsuit", "A type of legal fee", "A final judgment"], answer: "A doctrine that prohibits the transfer of property that is the subject matter of a pending lawsuit", explanation: "'Lis pendens' means 'suit pending'. The doctrine, codified in Section 52 of the Transfer of Property Act, states that property under litigation cannot be transferred or otherwise dealt with by any party to the suit so as to affect the rights of any other party thereto under any decree which may be made therein." },
            { q: "What is the principle of 'res sub judice'?", options: ["The matter is under judgment", "A rule that prevents a court from trying a suit in which the matter in issue is also pending in a prior suit between the same parties", "A type of appeal", "A rule about evidence"], answer: "A rule that prevents a court from trying a suit in which the matter in issue is also pending in a prior suit between the same parties", explanation: "Section 10 of the CPC embodies this principle. Its purpose is to prevent courts of concurrent jurisdiction from simultaneously trying two parallel suits in respect of the same matter in issue, to avoid conflicting decisions." },
            { q: "What is the difference between 'review' and 'revision' in the CPC?", options: ["Review is by a higher court, revision by the same court", "Review is by the same court on limited grounds; revision is by a higher court on jurisdictional errors", "They are the same", "Review is for civil cases, revision for criminal"], answer: "Review is by the same court on limited grounds; revision is by a higher court on jurisdictional errors", explanation: "A review (Section 114) is a plea to the same court that passed the decree to reconsider it. A revision (Section 115) is the power of a High Court to examine the record of a subordinate court's case to correct a jurisdictional error." },
            { q: "What is the concept of 'adverse possession'?", options: ["Illegally occupying property for a short time", "A method of acquiring title to property by possessing it for a statutory period in a manner that is hostile, actual, open, and exclusive", "A type of rental agreement", "A dispute over property boundaries"], answer: "A method of acquiring title to property by possessing it for a statutory period in a manner that is hostile, actual, open, and exclusive", explanation: "Adverse possession is a controversial legal doctrine. If a person occupies another's land for a continuous period (usually 12 years in India) without the owner's permission, they can potentially acquire legal title to it, provided their possession meets specific legal criteria." },
            { q: "What is the 'parol evidence rule'?", options: ["A rule about parole for prisoners", "A rule that prevents parties from using prior oral or written statements to contradict the terms of a complete and final written contract", "A rule about evidence from parrots", "A rule about verbal testimony in court"], answer: "A rule that prevents parties from using prior oral or written statements to contradict the terms of a complete and final written contract", explanation: "Section 91 and 92 of the Indian Evidence Act contain this rule. It presumes that a written contract contains the entire agreement between the parties, and extrinsic evidence is generally not allowed to alter its terms." },
            { q: "What is the difference between a 'mortgage' and a 'charge'?", options: ["A mortgage is for a larger amount than a charge", "A mortgage is a transfer of an interest in property as security; a charge only makes the property a security without transferring any interest", "A mortgage is for immovable property, a charge for movable", "There is no difference"], answer: "A mortgage is a transfer of an interest in property as security; a charge only makes the property a security without transferring any interest", explanation: "A mortgage is created by the act of the parties, whereas a charge can be created either by an act of parties or by operation of law. A mortgage always involves a transfer of interest, which is not the case in a charge." },
            { q: "What is the role of a 'Lok Adalat'?", options: ["A traditional village court", "A forum where disputes are settled amicably through compromise, as an alternative dispute resolution (ADR) mechanism", "A special court for family matters", "A mobile court"], answer: "A forum where disputes are settled amicably through compromise, as an alternative dispute resolution (ADR) mechanism", explanation: "Lok Adalats have been given statutory status under the Legal Services Authorities Act, 1987. Their decision (award) is deemed to be a decree of a civil court and is final and binding on all parties with no appeal against it." },
            { q: "What is a 'representative suit' or 'class action suit'?", options: ["A suit filed by a legal representative", "A suit filed by one or more persons on behalf of a larger group with the same interest", "A suit against a government representative", "A private lawsuit"], answer: "A suit filed by one or more persons on behalf of a larger group with the same interest", explanation: "Order 1, Rule 8 of the CPC allows for representative suits. It enables a few individuals to sue or be sued on behalf of a numerous group of people who share a common interest, thus avoiding a multiplicity of suits." },
            { q: "What is the doctrine of 'subrogation'?", options: ["The act of submitting a case to a lower court", "The substitution of one person for another, giving the substitute the same legal rights as the original party", "A type of legal document", "The process of questioning a witness"], answer: "The substitution of one person for another, giving the substitute the same legal rights as the original party", explanation: "Subrogation is common in insurance. If an insurance company pays a policyholder for a loss caused by a third party, the company is subrogated to the policyholder's rights and can sue the third party to recover the amount it paid." },
            { q: "What is the difference between 'res judicata' and 'estoppel'?", options: ["Res judicata is a rule of procedure, estoppel is a rule of evidence", "Res judicata bars a suit, estoppel bars a party from saying something", "They are the same", "Res judicata is for civil cases, estoppel for criminal"], answer: "Res judicata bars a suit, estoppel bars a party from saying something", explanation: "Res judicata (a matter already decided) prevents the re-litigation of a decided issue between the same parties. Estoppel prevents a person from denying the truth of a statement they previously made, if another person has acted upon that statement to their detriment." }
          ]

        hard: {
          1: [
            { q: "What is the legal remedy of 'specific performance'?", options: ["Monetary compensation for damages", "A court order to perform a specific act as per the contract", "A cancellation of the contract", "A penalty for breach of contract"], answer: "A court order to perform a specific act as per the contract", explanation: "Specific performance is an equitable remedy in the law of contract, whereby a court issues an order requiring a party to perform a specific act, such as to complete performance of the contract." },
            { q: "What is the difference between 'libel' and 'slander'?", options: ["Libel is accidental, slander is intentional", "Libel is written, slander is spoken defamation", "Libel is public, slander is private", "There is no difference"], answer: "Libel is written, slander is spoken defamation", explanation: "Both are forms of defamation. Libel is defamation in a permanent form, such as writing, printing, or images. Slander is defamation in a transient form, primarily through spoken words." },
            { q: "What is the 'doctrine of frustration' in contract law?", options: ["When one party gets frustrated with the other", "When a contract becomes impossible to perform due to unforeseen events", "When a contract is intentionally breached", "When a contract is not profitable"], answer: "When a contract becomes impossible to perform due to unforeseen events", explanation: "The doctrine of frustration applies when an unforeseen event makes performance of a contract impossible, illegal, or radically different from what was originally contemplated by the parties. This can discharge the parties from their obligations." },
            { q: "What is a 'lis pendens'?", options: ["A pending license", "A notice that a lawsuit concerning property is pending", "A type of legal fee", "A final judgment"], answer: "A notice that a lawsuit concerning property is pending", explanation: "'Lis pendens' is a Latin term for 'suit pending'. It is a written notice that a lawsuit has been filed which concerns the title to real property or some interest in that real property. It serves to warn all potential buyers that the property is subject to litigation." },
            { q: "What is the 'parol evidence rule'?", options: ["A rule about parole for prisoners", "A rule that prevents parties from using prior oral agreements to contradict a written contract", "A rule about evidence from parrots", "A rule about verbal testimony in court"], answer: "A rule that prevents parties from using prior oral agreements to contradict a written contract", explanation: "The parol evidence rule is a substantive common law rule in contract cases that prevents a party to a written contract from presenting extrinsic evidence that contradicts or adds to the written terms of the contract that appears to be whole." },
            { q: "What is 'subrogation'?", options: ["The act of submitting a case to a lower court", "The substitution of one person or group by another in respect of a debt or insurance claim", "A type of legal document", "The process of questioning a witness"], answer: "The substitution of one person or group by another in respect of a debt or insurance claim", explanation: "Subrogation is the assumption by a third party (such as an insurance company) of another party's legal right to collect a debt or damages. For example, an insurer may subrogate to the rights of the insured to sue a person who caused the loss." },
            { q: "What is the 'doctrine of privity of contract'?", options: ["Contracts must be kept private", "Only parties to a contract can sue to enforce it", "All contracts are public record", "Contracts can be enforced by anyone"], answer: "Only parties to a contract can sue to enforce it", explanation: "The doctrine of privity of contract is a common law principle which provides that a contract cannot confer rights or impose obligations upon any person who is not a party to the contract." },
            { q: "What is 'quantum meruit'?", options: ["A type of quantity measurement", "A legal claim for the reasonable value of services performed", "A quality control standard", "A contractual clause"], answer: "A legal claim for the reasonable value of services performed", explanation: "'Quantum meruit' is a Latin phrase meaning 'as much as he has deserved'. It is a legal action to recover reasonable compensation for services rendered when the amount due is not stipulated in a legally enforceable contract." },
            { q: "What is the difference between a 'void' and a 'voidable' contract?", options: ["There is no difference", "A void contract is unenforceable from the start; a voidable contract can be cancelled by one party", "A void contract is verbal; a voidable contract is written", "A void contract is for illegal acts; a voidable contract is for legal acts"], answer: "A void contract is unenforceable from the start; a voidable contract can be cancelled by one party", explanation: "A void contract is a nullity and cannot be enforced by either party. A voidable contract is a valid contract which may be either affirmed or rejected at the option of one of the parties." },
            { q: "What is 'estoppel'?", options: ["A type of legal stop sign", "A legal principle that prevents someone from arguing something contrary to a previous claim or action", "The final part of a legal argument", "A fee paid to the court"], answer: "A legal principle that prevents someone from arguing something contrary to a previous claim or action", explanation: "Estoppel is a judicial device whereby a court may prevent, or 'estop' a person from making assertions or from going back on his or her word; the person is precluded from arguing something contrary to a claim made or act done by that person." }
          ],
          2: [
            { q: "What is a 'standard form contract' and what are its risks?", options: ["A contract written on standard paper", "A 'take it or leave it' contract with no room for negotiation; risk of unfair terms", "A contract that is easy to understand", "A government-approved contract"], answer: "A 'take it or leave it' contract with no room for negotiation; risk of unfair terms", explanation: "Standard form contracts are prepared by one party and offered to the other on a non-negotiable basis. While efficient, they carry the risk of containing terms that are unfair or exploitative to the weaker party, who has little to no bargaining power." },
            { q: "What is the 'postal rule' or 'mailbox rule' in contract law?", options: ["A rule about sending contracts by post", "Acceptance of an offer is effective upon posting, not upon receipt", "A rule that contracts must be mailed", "A rule about the speed of postal services"], answer: "Acceptance of an offer is effective upon posting, not upon receipt", explanation: "The postal rule is an exception to the general rule that acceptance must be communicated. It states that an acceptance is effective as soon as it is posted, provided that post was the agreed or reasonable method of communication." },
            { q: "What is 'accord and satisfaction'?", options: ["A feeling of satisfaction with a contract", "An agreement to discharge a claim in which the parties agree to give and accept something in settlement of the claim", "A type of court order", "A clause in a contract"], answer: "An agreement to discharge a claim in which the parties agree to give and accept something in settlement of the claim", explanation: "Accord and satisfaction is a legal contract whereby two parties agree to discharge a tort claim, contract, or other liability for an amount based on terms that differ from the original amount of the contract or claim. The 'accord' is the agreement, and the 'satisfaction' is its execution." },
            { q: "What is the 'doctrine of economic duress'?", options: ["Being forced to sign a contract due to financial hardship", "Illegitimate economic pressure exerted by one party to coerce another into a contract", "A bad business deal", "A contract that leads to economic loss"], answer: "Illegitimate economic pressure exerted by one party to coerce another into a contract", explanation: "Economic duress occurs when one party uses illegitimate economic pressure to force another party to enter into a contract or to agree to a particular set of terms. If proven, the contract can be rendered voidable." },
            { q: "What is a 'letter of intent' (LOI)?", options: ["A binding contract", "A document outlining the understanding between two or more parties which they intend to formalize in a legally binding agreement", "A personal letter", "A final offer"], answer: "A document outlining the understanding between two or more parties which they intend to formalize in a legally binding agreement", explanation: "An LOI is a document that outlines the main points of a proposed deal. While typically not legally binding in its entirety, some provisions, like confidentiality, may be enforceable. It signals a serious intent to move forward with a transaction." },
            { q: "What is the 'battle of the forms'?", options: ["A physical fight over contract forms", "A dispute that arises when two businesses are negotiating a contract and each sends its own standard form contract", "A competition for the best contract form", "A legal debate in court"], answer: "A dispute that arises when two businesses are negotiating a contract and each sends its own standard form contract", explanation: "The 'battle of the forms' occurs when two companies' standard terms and conditions conflict. The legal question is which set of terms applies to the transaction. The 'last shot' rule often applies, where the last set of terms sent before performance of the contract prevails." },
            { q: "What is the difference between a 'condition' and a 'warranty' in a contract?", options: ["A condition is a minor term, a warranty is a major term", "A condition is a major term, a breach of which entitles the innocent party to terminate the contract; a warranty is a minor term", "They are the same", "A condition is a promise, a warranty is a guarantee"], answer: "A condition is a major term, a breach of which entitles the innocent party to terminate the contract; a warranty is a minor term", explanation: "A condition is a term that is fundamental to the contract. Its breach allows the aggrieved party to repudiate the contract and claim damages. A warranty is a less important term, and its breach only entitles the party to claim damages, not to end the contract." },
            { q: "What is 'unjust enrichment'?", options: ["Becoming rich through hard work", "A situation where one person is enriched at the expense of another in circumstances that the law sees as unjust", "A type of tax evasion", "A profitable business"], answer: "A situation where one person is enriched at the expense of another in circumstances that the law sees as unjust", explanation: "Unjust enrichment is a legal principle that no one should be allowed to profit at another's expense without making restitution for the reasonable value of any property, services, or other benefits that have been unfairly received and retained. It is the basis for quasi-contracts." },
            { q: "What is a 'force majeure' clause?", options: ["A clause that forces a party to perform", "A contract clause that relieves parties from liability for unforeseeable 'Act of God' events", "A clause about using force", "A clause that makes a contract stronger"], answer: "A contract clause that relieves parties from liability for unforeseeable 'Act of God' events", explanation: "'Force majeure' refers to a clause that is included in contracts to remove liability for unforeseeable and unavoidable catastrophes that interrupt the expected course of events and prevent participants from fulfilling obligations. Examples include wars, strikes, and natural disasters." },
            { q: "What is the 'interpretation contra proferentem' rule?", options: ["A rule to interpret contracts in favor of the party who drafted it", "A rule to interpret any ambiguity in a contract against the party who drafted it", "A rule to interpret contracts literally", "A rule for interpreting foreign contracts"], answer: "A rule to interpret any ambiguity in a contract against the party who drafted it", explanation: "The 'contra proferentem' rule is a doctrine of contractual interpretation which provides that an ambiguous term will be construed against the party that imposed its inclusion in the contract – or, more accurately, against the interests of the party who imposed the term." }
          ],
          3: [
            { q: "What is the 'Himalaya clause' in a bill of lading?", options: ["A clause related to shipping in the Himalayas", "A clause that extends liability limitations to a carrier's employees, agents, and subcontractors", "A clause about mountain climbing contracts", "A clause that is very long"], answer: "A clause that extends liability limitations to a carrier's employees, agents, and subcontractors", explanation: "A Himalaya clause is a contractual provision expressed to be for the benefit of a third party who is not a party to the contract. It is common in contracts of carriage, extending the carrier's liability limitations to its employees, agents, and independent contractors." },
