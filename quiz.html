                { q: "What is the **Right to Constitutional Remedies** and which Article embodies it?", options: ["The right to appeal to the Supreme Court; Article 136", "The right to file a PIL; Article 38", "The right to move the Supreme Court for the enforcement of Fundamental Rights; **Article 32**", "The right to legal aid; Article 39A"], answer: "The right to move the Supreme Court for the enforcement of Fundamental Rights; **Article 32**", explanation: "Dr. B.R. Ambedkar called Article 32 the 'heart and soul of the Constitution'. It grants the right to approach the Supreme Court directly for the enforcement of any Fundamental Right, and the SC is bound to entertain such petitions." },
                { q: "What is the legal status of the **Official Language** of the Supreme Court and High Courts?", options: ["It must be Hindi", "It is **English** until Parliament provides otherwise", "It is the language of the state capital", "It is the language of the regional High Court"], answer: "It is **English** until Parliament provides otherwise", explanation: "Article 348 states that all proceedings in the Supreme Court and High Courts shall be in the English language, unless a law is passed by Parliament to change this. (States have power over regional language in High Courts, but not the SC)." },
                { q: "What is the rule regarding the **lapsing of bills** upon the **dissolution of the Lok Sabha**?", options: ["All bills lapse", "Bills pending in Lok Sabha or passed by Lok Sabha and pending in Rajya Sabha **lapse**; Bills pending in Rajya Sabha but not passed by Lok Sabha **do not lapse**", "Only Money Bills lapse", "No bills lapse, they carry over"], answer: "Bills pending in Lok Sabha or passed by Lok Sabha and pending in Rajya Sabha **lapse**; Bills pending in Rajya Sabha but not passed by Lok Sabha **do not lapse**", explanation: "The general rule is that dissolution of the Lok Sabha terminates all business pending before it. However, a bill originating and pending in the Rajya Sabha, which has not been transmitted to the Lok Sabha, does not lapse." },
                { q: "What is the constitutional requirement for the **Council of Ministers** regarding the Lok Sabha?", options: ["It is individually responsible to the President", "It is **collectively responsible** to the House of the People (Lok Sabha)", "It is collectively responsible to the Rajya Sabha", "It is individually responsible to the Prime Minister"], answer: "It is **collectively responsible** to the House of the People (Lok Sabha)", explanation: "Article 75(3) establishes the principle of collective responsibility: the entire Council of Ministers is responsible to the Lok Sabha for all its acts of omission and commission. A no-confidence motion against one minister is a motion against the whole council." },
                { q: "What is the constitutional position of the **Cabinet Committees**?", options: ["They are mandatory and mentioned in the Constitution", "They are **extra-constitutional** but **statutory** bodies", "They are **extra-constitutional** but **executive** bodies (rules of business)", "They are only advisory bodies"], answer: "They are **extra-constitutional** but **executive** bodies (rules of business)", explanation: "Cabinet Committees are not mentioned in the Constitution but are set up by the Prime Minister under the Government of India (Transaction of Business) Rules, 1961, based on the needs of the time. They are executive bodies." },
                { q: "The **Right to know** (about government affairs) is judicially interpreted as flowing from which Fundamental Right?", options: ["Article 21 (Right to Life)", "Article 20 (Protection in respect of Conviction)", "Article 19(1)(a) (**Freedom of Speech and Expression**)", "Article 14 (Equality)"], answer: "Article 19(1)(a) (**Freedom of Speech and Expression**)", explanation: "The Supreme Court has expanded Article 19(1)(a) to include the right to receive and impart information, making the right to know a fundamental right and the constitutional basis for the Right to Information Act (RTI)." },
                { q: "What is the legal status of the **Union Territories** (UTs)?", options: ["They are autonomous units like states", "They are **directly administered by the Central Government** (President) through an Administrator/Lt. Governor", "They are governed by the Parliament of the state they belong to", "They are independent republics"], answer: "They are **directly administered by the Central Government** (President) through an Administrator/Lt. Governor", explanation: "Article 239 provides that every Union Territory shall be administered by the President acting through an administrator appointed by him. They are an extension of the Union Government." },
                { q: "What are **Tribes Advisory Councils**?", options: ["Bodies to advise the President on central laws", "Bodies established in states with **Scheduled Areas** to advise the Governor on the welfare and advancement of Scheduled Tribes", "Committees of the Rajya Sabha", "International bodies for indigenous people"], answer: "Bodies established in states with **Scheduled Areas** to advise the Governor on the welfare and advancement of Scheduled Tribes", explanation: "These councils are a requirement of the **Fifth Schedule** of the Constitution. They advise the Governor on matters related to the welfare and advancement of the Scheduled Tribes in the state." }
            ],

          10: [
                { q: "What is the constitutional provision for the **abolition of Titles**?", options: ["Article 15", "Article 16", "Article 17", "Article 18"], answer: "Article 18", explanation: "Article 18, under the Right to Equality, prohibits the state from conferring titles (except military or academic distinctions) and prevents citizens from accepting foreign titles." },
                { q: "What is the **'Casting Vote'** power of the Speaker of the Lok Sabha?", options: ["A vote in all matters", "A vote only on Money Bills", "A vote exercised only **in the case of a tie** to break the deadlock", "A mandatory vote on all constitutional amendments"], answer: "A vote exercised only **in the case of a tie** to break the deadlock", explanation: "The Speaker does not vote in the first instance. Under Article 100(1), they can only exercise a 'casting vote' when there is an equality of votes on a matter, to maintain impartiality." },
                { q: "What is the purpose of the **'Financial Emergency'** provision?", options: ["To deal with a failure of constitutional machinery in a state", "To deal with a **threat to the financial stability or credit of India**", "To deal with war or external aggression", "To provide financial aid to states"], answer: "To deal with a **threat to the financial stability or credit of India**", explanation: "Article 360 allows the President to proclaim a Financial Emergency if the financial stability or credit of India or any part of its territory is threatened. It has never been imposed in India." },
                { q: "What is the principle of **'Freedom of Trade, Commerce, and Intercourse'**?", options: ["Trade is completely free of all restrictions", "Trade must be free throughout the territory of India, subject to certain reasonable restrictions imposed by law", "Trade is only free in the Concurrent List", "Trade is controlled by the States"], answer: "Trade must be free throughout the territory of India, subject to certain reasonable restrictions imposed by law", explanation: "Article 301 declares this freedom, ensuring a single economic unit. However, the Parliament and state legislatures can impose reasonable restrictions in the public interest (Art 302, 304)." },
                { q: "What is an **'Ex-Post Facto Law'** and how is it dealt with under the Constitution?", options: ["A law that cannot be implemented", "A law that **criminalizes an act retrospectively**; it is prohibited under Article 20(1)", "A law passed after an election", "A law that is constitutional"], answer: "A law that **criminalizes an act retrospectively**; it is prohibited under Article 20(1)", explanation: "Article 20(1) prohibits the enactment of ex-post facto criminal laws. No person can be convicted for an act that was not an offense at the time it was committed, nor can a penalty be imposed greater than that which might have been inflicted under the law in force at the time." },
                { q: "What is a **'Caretaker Government'** in India?", options: ["A government that looks after orphans", "A government that continues to hold office after a no-confidence motion or dissolution, only to manage routine affairs until a new government is formed", "A government with absolute powers", "A government that is unconstitutional"], answer: "A government that continues to hold office after a no-confidence motion or dissolution, only to manage routine affairs until a new government is formed", explanation: "This is a constitutional convention, not an explicit provision. It is a temporary government with restricted powers, whose function is primarily to manage day-to-day administration without taking major policy decisions." },
                { q: "What is the **legal status of the Preamble** of the Constitution?", options: ["It is a separate document and not part of the Constitution", "It is **part of the Constitution** and can be amended, but only without altering the Basic Structure", "It is only an introduction and cannot be amended", "It is the source of all legislative power"], answer: "It is **part of the Constitution** and can be amended, but only without altering the Basic Structure", explanation: "Established in the **Kesavananda Bharati** case, the Supreme Court ruled that the Preamble is a part of the Constitution and can be amended under Article 368, provided the amendment does not destroy its 'Basic Structure'." },
                { q: "What is the legal status of a **Joint Public Service Commission (JPSC)**?", options: ["A constitutional body for multiple states", "A **statutory body** created by an Act of Parliament on the request of the concerned State Legislatures", "A committee of the Rajya Sabha", "A voluntary association"], answer: "A **statutory body** created by an Act of Parliament on the request of the concerned State Legislatures", explanation: "A JPSC (for two or more states) is not directly created by the Constitution. It is established by an Act of Parliament (Art 315) if the legislatures of the states concerned pass resolutions to that effect, making it a statutory body." },
                { q: "What is the **'doctrine of pleasure'** as stated in Article 310?", options: ["It provides an absolute right to civil servants to hold office", "It states that every person in the civil service of the Union or a State holds office **during the pleasure of the President or the Governor** (respectively)", "A doctrine that applies only to judges", "A doctrine that limits the power of the President"], answer: "It states that every person in the civil service of the Union or a State holds office **during the pleasure of the President or the Governor** (respectively)", explanation: "Article 310 explicitly states the doctrine of pleasure, meaning the executive retains the power to remove employees at will. However, this is significantly curtailed by the procedural safeguards provided in Article 311." },
                { q: "What is the constitutional basis for the **Special Provisions for certain States** (like Maharashtra, Gujarat, Nagaland, etc.)?", options: ["The Fifth Schedule", "Article 371 and subsequent Articles (371A to J)", "The Ninth Schedule", "The Sixth Schedule"], answer: "Article 371 and subsequent Articles (371A to J)", explanation: "These Articles contain special provisions tailored to the specific historical, cultural, and socio-economic needs of particular states, allowing the President to issue orders for the effective governance of these regions." }
            ]

            { q: "What does IPC stand for?", options: ["Indian Penal Code", "Indian Police Code", "International Penal Code", "Indian Public Code"], answer: "Indian Penal Code", explanation: "The Indian Penal Code (IPC) is the official criminal code of India. It is a comprehensive code intended to cover all substantive aspects of criminal law." },
            { q: "What is an FIR?", options: ["Final Investigation Report", "First Information Report", "Formal Inquiry Record", "First Incident Report"], answer: "First Information Report", explanation: "An FIR is a written document prepared by the police when they receive information about the commission of a cognizable offense." },
            { q: "What is the primary difference between 'theft' and 'robbery'?", options: ["The value of the stolen item", "The time of day", "The use of force or fear", "The location of the crime"], answer: "The use of force or fear", explanation: "Robbery is an aggravated form of theft where the offender uses or threatens to use force or causes fear of instant harm to commit the theft." },
            { q: "What is a 'bailable offense'?", options: ["An offense where bail is a right", "An offense where bail is never granted", "A very serious offense", "An offense only punishable by fine"], answer: "An offense where bail is a right", explanation: "In a bailable offense, bail is granted as a matter of right to the accused person. The police have the power to grant bail in such cases." },
            { q: "What does 'acquittal' mean in a criminal case?", options: ["The accused is found guilty", "The case is postponed", "The accused is formally certified as innocent by the court", "The accused has appealed"], answer: "The accused is formally certified as innocent by the court", explanation: "An acquittal is a judgment that a person is not guilty of the crime with which they have been charged." },

            { q: "What is 'evidence' in a court of law?", options: ["Any opinion about the case", "Any information used to prove or disprove a fact", "Only written documents", "Only witness testimony"], answer: "Any information used to prove or disprove a fact", explanation: "Evidence is any type of proof presented at a trial which is intended to convince the judge or jury of alleged facts." },
            { q: "What is the purpose of a 'summons'?", options: ["To arrest a person", "To order a person to appear in court", "To search a property", "To seize assets"], answer: "To order a person to appear in court", explanation: "A summons is a legal document issued by a court that orders a person to appear at a particular place at a specified time to respond to a complaint or charge." },
            { q: "What is 'defamation'?", options: ["A physical assault", "Harming someone's reputation through false statements", "A breach of contract", "A type of theft"], answer: "Harming someone's reputation through false statements", explanation: "Defamation is the act of communicating false statements about a person that injure the reputation of that person." },
            { q: "What is the age of criminal responsibility in India?", options: ["Below 7 years, no responsibility", "Above 18 years only", "Above 12 years only", "Below 10 years, no responsibility"], answer: "Below 7 years, no responsibility", explanation: "Under Section 82 of the IPC, nothing is an offense which is done by a child under seven years of age." }

          2: [

            { q: "What is 'assault'?", options: ["Only physical hitting", "An act that creates an apprehension of imminent harmful contact", "Insulting someone", "Damaging property"], answer: "An act that creates an apprehension of imminent harmful contact", explanation: "In criminal law, assault is an intentional act that causes another person to apprehend immediate and personal violence. Actual physical contact is not necessary." },
            { q: "What is 'bail'?", options: ["A type of punishment", "The temporary release of an accused person awaiting trial", "A fee paid to the court", "The final verdict"], answer: "The temporary release of an accused person awaiting trial", explanation: "Bail is the conditional release of a defendant with the promise to appear in court when required. It is a security, usually a sum of money, exchanged for the release of an arrested person as a guarantee of their appearance in court." },
            { q: "What is the difference between 'motive' and 'intention'?", options: ["They are the same", "Motive is the reason for the crime, intention is the will to commit the act", "Motive is for civil cases, intention for criminal", "Intention is the reason, motive is the will"], answer: "Motive is the reason for the crime, intention is the will to commit the act", explanation: "Intention ('mens rea') is the mental element of the crime, the will to do the act. Motive is the underlying reason that prompts a person to do that act. While motive can be useful for evidence, intention is a necessary ingredient of the crime itself." },
            { q: "What is a 'confession'?", options: ["Any statement made to the police", "A statement admitting guilt of a crime", "A statement denying guilt", "A witness testimony"], answer: "A statement admitting guilt of a crime", explanation: "A confession is a statement made by an accused person which is sought to be proved against him in criminal proceedings to establish the commission of an offense by him." },
            { q: "What is 'perjury'?", options: ["Lying in a casual conversation", "Intentionally lying under oath in a court proceeding", "Forgetting details as a witness", "Refusing to testify"], answer: "Intentionally lying under oath in a court proceeding", explanation: "Perjury is the criminal offense of willfully telling an untruth in a court after having taken an oath or affirmation." },
            { q: "What is 'trespass'?", options: ["Walking on someone's lawn", "Entering someone's property without permission with intent to commit an offense", "A type of contract dispute", "A traffic violation"], answer: "Entering someone's property without permission with intent to commit an offense", explanation: "Criminal trespass, under Section 441 of the IPC, involves entering into or upon property in the possession of another with intent to commit an offense or to intimidate, insult or annoy any person in possession of such property." },
            { q: "What is 'grievous hurt'?", options: ["Any minor injury", "Serious injuries like fracture, permanent disfiguration, or endangerment of life", "An insult", "Emotional distress"], answer: "Serious injuries like fracture, permanent disfiguration, or endangerment of life", explanation: "Section 320 of the IPC defines 'grievous hurt' and lists specific types of severe injuries, such as emasculation, permanent privation of the sight of either eye, fracture or dislocation of a bone or tooth, etc." },

            { q: "What is 'wrongful confinement'?", options: ["The same as wrongful restraint", "Wrongfully restraining a person in a way that prevents them from proceeding beyond certain circumscribing limits", "A type of imprisonment", "A disagreement with someone"], answer: "Wrongfully restraining a person in a way that prevents them from proceeding beyond certain circumscribing limits", explanation: "Wrongful confinement (Section 340, IPC) is a more serious offense than wrongful restraint. It involves confining a person within certain boundaries, for example, locking them in a room." }

          3: [

            { q: "What is 'criminal intimidation'?", options: ["A simple threat", "Threatening another with injury to their person, reputation or property, to cause alarm", "An argument", "A warning"], answer: "Threatening another with injury to their person, reputation or property, to cause alarm", explanation: "Criminal intimidation (Section 503, IPC) involves threatening another with any injury to his person, reputation or property, with intent to cause alarm to that person, or to cause that person to do any act which he is not legally bound to do." },

            { q: "What is 'dacoity'?", options: ["Theft by one person", "Robbery committed by five or more persons", "A type of fraud", "A minor property crime"], answer: "Robbery committed by five or more persons", explanation: "Dacoity (Section 391, IPC) is an aggravated form of robbery. When five or more persons conjointly commit or attempt to commit a robbery, every person so committing, attempting or aiding, is said to commit 'dacoity'." },

            { q: "What is the difference between 'remand' and 'bail'?", options: ["They are the same", "Remand is sending an accused to custody; bail is their release from custody", "Remand is for serious crimes, bail is for minor ones", "Remand is by police, bail is by court"], answer: "Remand is sending an accused to custody; bail is their release from custody", explanation: "Judicial remand is the act of sending an accused person back into custody to await trial. Bail is the process of procuring the release of an accused person from legal custody by undertaking that they shall appear at the time and place designated and submit to the jurisdiction of the court." },

            { q: "What is 'criminal conspiracy'?", options: ["Thinking about a crime alone", "An agreement by two or more people to commit an illegal act", "Accidentally helping a criminal", "A group protest"], answer: "An agreement by two or more people to commit an illegal act", explanation: "Under Section 120A of the IPC, when two or more persons agree to commit a crime, the agreement itself is a criminal conspiracy." },
            { q: "What is the difference between 'assault' and 'battery'?", options: ["There is no difference", "Assault is the threat, battery is the actual physical contact", "Assault is verbal, battery is physical", "Assault is more serious than battery"], answer: "Assault is the threat, battery is the actual physical contact", explanation: "In many legal systems, assault is an act that creates an apprehension of imminent harmful contact, while battery is the actual harmful or offensive contact. The IPC combines these concepts." },

            { q: "What is 'mischief' in criminal law?", options: ["Playing a prank", "Intentionally causing wrongful loss or damage to property", "Accidentally damaging property", "A minor disagreement"], answer: "Intentionally causing wrongful loss or damage to property", explanation: "Section 425 of the IPC defines mischief as an act done with the intent to cause, or knowing that it is likely to cause, wrongful loss or damage to the public or to any person." },

            { q: "What is an 'unlawful assembly'?", options: ["Any large gathering", "An assembly of five or more persons with a common illegal object", "A political rally", "A family function"], answer: "An assembly of five or more persons with a common illegal object", explanation: "Section 141 of the IPC defines an unlawful assembly as an assembly of five or more persons if their common object is to commit an offense or resist the execution of any law." },

          5: [
            { q: "What is the first step in the criminal justice process after a cognizable crime is reported?", options: ["Arrest of the suspect", "Filing of an FIR", "Starting the trial", "Calling witnesses"], answer: "Filing of an FIR", explanation: "The criminal process is set into motion with the lodging of a First Information Report (FIR) at the police station. It is the first document prepared in a criminal proceeding." },
            { q: "What is a 'charge sheet'?", options: ["A list of court fees", "A final report by the police after an investigation", "The complaint filed by the victim", "The judgment of the court"], answer: "A final report by the police after an investigation", explanation: "A charge sheet is a formal document of accusation prepared by law enforcement agencies, which is filed in court after the investigation is complete." },
            { q: "What is 'evidence' given by a witness in court called?", options: ["An opinion", "A rumor", "Testimony", "An argument"], answer: "Testimony", explanation: "Testimony is a form of evidence that is obtained from a witness who makes a solemn statement or declaration of fact. Testimony may be oral or written." },
            { q: "What is 'cross-examination'?", options: ["A friendly chat with the witness", "Questioning of a witness by the opposing lawyer", "The judge questioning the witness", "The witness asking questions"], answer: "Questioning of a witness by the opposing lawyer", explanation: "Cross-examination is the questioning of a witness at a trial by the party opposed to the one who produced the witness, to test the truth of that testimony." },
            { q: "What is the principle 'innocent until proven guilty'?", options: ["The accused must prove their innocence", "The prosecution must prove guilt; the accused is presumed innocent", "The judge decides innocence at the start", "It is not a legal principle"], answer: "The prosecution must prove guilt; the accused is presumed innocent", explanation: "This is a fundamental principle of criminal law where the burden of proof is on the prosecution to prove the accused's guilt beyond a reasonable doubt." },
            { q: "What is a 'cognizable offense'?", options: ["A minor offense", "An offense where police can arrest without a warrant", "An offense that can be settled out of court", "An offense that is not serious"], answer: "An offense where police can arrest without a warrant", explanation: "Cognizable offenses are generally serious in nature. The police can start an investigation and arrest a suspect without a court's warrant." },
            { q: "What is a 'non-cognizable offense'?", options: ["A very serious offense", "An offense where police need a warrant from the court to arrest", "An offense that is always punished with imprisonment", "An offense against the state"], answer: "An offense where police need a warrant from the court to arrest", explanation: "In case of a non-cognizable offense, the police cannot arrest the accused without a warrant, nor can they start an investigation without the permission of the court." },
            { q: "What is the role of a 'defense lawyer'?", options: ["To prosecute the case", "To represent and defend the accused person in court", "To act as a neutral party", "To assist the judge"], answer: "To represent and defend the accused person in court", explanation: "A defense lawyer specializes in the defense of individuals and companies charged with criminal activity. Their primary role is to protect the rights of the accused." },
            { q: "What is a 'judgment' in a criminal case?", options: ["The start of the trial", "The final decision of the court stating whether the accused is guilty or acquitted", "The filing of the FIR", "The lawyer's closing argument"], answer: "The final decision of the court stating whether the accused is guilty or acquitted", explanation: "The judgment is the final decision by a court in a lawsuit, criminal prosecution, or appeal from a lower court's decision." },

          6: [
            { q: "What is the term for a person who sees a crime happen?", options: ["The Accused", "The Plaintiff", "The Witness", "The Judge"], answer: "The Witness", explanation: "A witness is a person who saw or heard the crime take place or may have important information about the crime or the defendant." },
            { q: "What is the legal term for stealing from a shop?", options: ["Robbery", "Burglary", "Shoplifting", "Extortion"], answer: "Shoplifting", explanation: "Shoplifting is a common term for the theft of goods from a retail establishment." },
            { q: "What is the act of setting fire to property illegally called?", options: ["Vandalism", "Arson", "Mischief", "Trespass"], answer: "Arson", explanation: "Arson is the crime of willfully and maliciously setting fire to or charring property." },
            { q: "What is the main purpose of the Indian Penal Code (IPC)?", options: ["To regulate civil disputes", "To define offenses and provide punishments", "To lay down police procedures", "To govern contracts"], answer: "To define offenses and provide punishments", explanation: "The IPC is the substantive criminal law of India, defining various crimes and prescribing the punishments for them." },
            { q: "What is the legal term for a false spoken statement that damages someone's reputation?", options: ["Libel", "Slander", "Gossip", "Insult"], answer: "Slander", explanation: "Slander is a form of defamation that is communicated orally." },
            { q: "What is the legal term for a false written statement that damages someone's reputation?", options: ["Slander", "Libel", "Graffiti", "Forgery"], answer: "Libel", explanation: "Libel is a form of defamation that is communicated in a permanent form, such as writing or printing." },
            { q: "What is the act of killing a large number of people called?", options: ["Homicide", "Assault", "Massacre", "Rioting"], answer: "Massacre", explanation: "A massacre is the indiscriminate and brutal slaughter of many people. In a legal context, it could fall under offenses like genocide or murder." },
            { q: "What is the term for a person who is under the age of 18?", options: ["An Adult", "A Senior Citizen", "A Minor", "A Toddler"], answer: "A Minor", explanation: "In Indian law, a person who has not completed 18 years of age is considered a minor or a juvenile." },
            { q: "What is the act of taking someone away illegally by force called?", options: ["Kidnapping", "Abduction", "Arrest", "Detention"], answer: "Abduction", explanation: "Abduction, under the IPC, is the act of compelling a person by force, or inducing them by deceit, to go from any place." },
            { q: "What is the legal term for a formal accusation of a crime?", options: ["A Complaint", "A Charge", "An Allegation", "A Statement"], answer: "A Charge", explanation: "A charge is a formal accusation made by a governmental authority asserting that somebody has committed a crime." }
          ],
          7: [
            { q: "What is the term for a person who is held in jail awaiting trial?", options: ["Convict", "Undertrial", "Suspect", "Inmate"], answer: "Undertrial", explanation: "An undertrial is a person who is being held in custody pending trial for a crime." },
            { q: "What is the act of betraying one's country called?", options: ["Sedition", "Treason", "Mutiny", "Rebellion"], answer: "Treason", explanation: "Treason is the crime of attacking a state authority to which one owes allegiance. In India, it is covered under 'Waging war against the Government of India' (Section 121, IPC)." },
            { q: "What is the legal term for a group of people who decide the verdict in some legal systems?", options: ["The Council", "The Bench", "The Jury", "The Committee"], answer: "The Jury", explanation: "A jury is a sworn body of people convened to render an impartial verdict. While jury trials have been abolished in India, the term is still widely known." },
            { q: "What is the act of illegally copying and distributing software, music, or movies called?", options: ["Sharing", "Borrowing", "Piracy", "Plagiarism"], answer: "Piracy", explanation: "Piracy, in this context, refers to copyright infringement of software, films, or music." },
            { q: "What is the term for a less serious crime, often punishable by a fine?", options: ["Felony", "Heinous crime", "Petty offense", "Capital offense"], answer: "Petty offense", explanation: "Petty offenses are minor crimes for which the punishment is generally a small fine or short term of imprisonment." },
            { q: "What is the term for a more serious crime, often punishable by imprisonment?", options: ["Misdemeanor", "Infraction", "Serious offense", "Civil wrong"], answer: "Serious offense", explanation: "Serious or grave offenses, like murder or robbery, carry severe punishments such as life imprisonment or the death penalty." },
            { q: "What is the act of threatening someone to get money called?", options: ["Begging", "Requesting", "Extortion", "Bargaining"], answer: "Extortion", explanation: "Extortion is the practice of obtaining something, especially money, through force or threats." },
            { q: "What is the legal term for the release of a prisoner before their sentence is complete?", options: ["Acquittal", "Discharge", "Parole", "Bail"], answer: "Parole", explanation: "Parole is the conditional release of a prisoner serving a sentence, who is then supervised in the community." },
            { q: "What is the act of driving a vehicle after drinking too much alcohol called?", options: ["Rash driving", "Negligent driving", "Drunk Driving", "Speeding"], answer: "Drunk Driving", explanation: "Driving under the influence (DUI) or drunk driving is the crime of operating a vehicle while impaired by alcohol or other drugs." },
            { q: "What is the term for a person who repeatedly commits crimes?", options: ["A suspect", "An accused", "A habitual offender", "A first-timer"], answer: "A habitual offender", explanation: "A habitual offender or repeat offender is a person convicted of a new crime who was previously convicted of crimes." }
          ],
          8: [
            { q: "What is the term for the place where a crime occurred?", options: ["The venue", "The location", "The crime scene", "The spot"], answer: "The crime scene", explanation: "A crime scene is any location that may be associated with a committed crime. It contains physical evidence that is pertinent to a criminal investigation." },
            { q: "What is the act of breaking into a building to steal something called?", options: ["Trespass", "Robbery", "Burglary", "Theft"], answer: "Burglary", explanation: "Burglary, often called house-breaking in India, involves illegally entering a building with the intent to commit a crime, especially theft." },
            { q: "What is the legal term for a person who helps a criminal after the crime?", options: ["An accomplice", "A partner", "An accessory after the fact", "A friend"], answer: "An accessory after the fact", explanation: "An accessory after the fact is someone who assists another person who has committed a crime, after the person has committed the crime, with knowledge that the person committed the crime, and with the intent to help the person avoid arrest or punishment." },
            { q: "What is the act of killing someone unlawfully but without premeditation called?", options: ["Murder", "Assault", "Manslaughter", "Accident"], answer: "Manslaughter", explanation: "Manslaughter is the unlawful killing of a human being without malice aforethought. It corresponds to 'culpable homicide not amounting to murder' in the IPC." },
            { q: "What is the term for the evidence given by an expert in a particular field?", options: ["Opinion evidence", "Direct evidence", "Expert testimony", "Hearsay"], answer: "Expert testimony", explanation: "Expert testimony is the evidence provided by a qualified expert, such as a doctor or a forensic scientist, to help the court understand complex technical or scientific issues." },
            { q: "What is the act of smuggling goods into a country illegally called?", options: ["Importing", "Trafficking", "Smuggling", "Exporting"], answer: "Smuggling", explanation: "Smuggling is the illegal transportation of objects, substances, information or people, such as out of a house or building, into a prison, or across an international border, in violation of applicable laws or other regulations." },
            { q: "What is the legal term for a court order to release a person who has been unlawfully detained?", options: ["Writ of Mandamus", "Writ of Certiorari", "Writ of Habeas Corpus", "Writ of Prohibition"], answer: "Writ of Habeas Corpus", explanation: "Habeas Corpus is a writ requiring a person under arrest to be brought before a judge or into court, especially to secure the person's release unless lawful grounds are shown for their detention." },
            { q: "What is the act of making fake money or documents called?", options: ["Forgery", "Printing", "Counterfeiting", "Duplication"], answer: "Counterfeiting", explanation: "Counterfeiting is the act of making an imitation of something valuable with the intention to deceive or defraud. This includes fake currency, documents, and branded goods." },
            { q: "What is the term for the questioning of a suspect by the police?", options: ["A conversation", "An interview", "An interrogation", "A discussion"], answer: "An interrogation", explanation: "An interrogation is a formal process of questioning a person who is a suspect in a crime, conducted by law enforcement officers." },
            { q: "What is the act of intentionally damaging public or private property called?", options: ["Mischief", "Vandalism", "Destruction", "Graffiti"], answer: "Vandalism", explanation: "Vandalism is the action involving deliberate destruction of or damage to public or private property. It is covered under 'mischief' in the IPC." }
          ]

          9: [
            { q: "What is the term for a person who files a criminal complaint with the police?", options: ["The Defendant", "The Complainant", "The Witness", "The Lawyer"], answer: "The Complainant", explanation: "The person who makes a formal complaint to the police, setting the criminal law in motion, is known as the complainant or the informant." },
            { q: "What is the main police document that officially starts a criminal investigation into a serious crime?", options: ["Charge Sheet", "Case Diary", "First Information Report (FIR)", "Summons"], answer: "First Information Report (FIR)", explanation: "An FIR is the first official document prepared by the police upon receiving information about a cognizable offense." },
            { q: "What is the act of giving false evidence under oath in court called?", options: ["Lying", "Deception", "Perjury", "Fraud"], answer: "Perjury", explanation: "Perjury is the criminal offense of making a false statement under oath during a judicial proceeding." },
            { q: "What is the term for a person released from prison on the condition of good behavior?", options: ["An undertrial", "A parolee", "An accused", "A suspect"], answer: "A parolee", explanation: "A parolee is a prisoner who has been granted parole, which is a conditional release from prison before their full sentence is served." },
            { q: "What is the legal term for a person who has suffered harm as a result of a crime?", options: ["The Witness", "The Accused", "The Victim", "The Bystander"], answer: "The Victim", explanation: "A victim is a person who has been physically, emotionally, or financially harmed as a direct result of a crime." },
            { q: "What is the act of illegally entering someone's property with an intent to commit a crime called?", options: ["Visiting", "Trespass", "Loitering", "Wandering"], answer: "Trespass", explanation: "Criminal trespass involves entering onto someone else's property without permission and with the intent to commit an offense." },
            { q: "What is the term for a person who is thought to have committed a crime but has not yet been charged?", options: ["A convict", "A witness", "A suspect", "A plaintiff"], answer: "A suspect", explanation: "A suspect is an individual who is believed by law enforcement to have been involved in a crime but has not yet been formally charged." },
            { q: "What is the act of taking property from a person by using force or the threat of force called?", options: ["Theft", "Burglary", "Robbery", "Cheating"], answer: "Robbery", explanation: "Robbery is an aggravated form of theft where force or fear is used to take property directly from a person." },
            { q: "What is the legal term for a person who has been found guilty of a crime by a court?", options: ["An accused", "A suspect", "A convict", "A defendant"], answer: "A convict", explanation: "A convict is a person who has been found guilty of a crime and is serving a sentence as a result." },
            { q: "What is the general legal term for the killing of one human being by another?", options: ["Assault", "Battery", "Homicide", "Accident"], answer: "Homicide", explanation: "Homicide is the act of a human being causing the death of another human being. It can be lawful (e.g., self-defense) or unlawful (e.g., murder)." }
          ],
          10: [
            { q: "What is the term for the money or property paid to a court to secure the release of a suspect from jail?", options: ["A fine", "A penalty", "Bail", "A fee"], answer: "Bail", explanation: "Bail is a security, such as cash or a bond, provided to the court to ensure that a suspect will appear for trial after being released from custody." },
            { q: "What is the act of deliberately destroying or hiding evidence of a crime called?", options: ["Misplacing", "Forgetting", "Spoliation of evidence", "Cleaning up"], answer: "Spoliation of evidence", explanation: "Spoliation of evidence is the intentional, reckless, or negligent withholding, hiding, altering, or destroying of evidence relevant to a legal proceeding." },
            { q: "What is the legal term for a person who is being held in police custody?", options: ["A guest", "An arrestee", "An intern", "A visitor"], answer: "An arrestee", explanation: "An arrestee is a person who has been arrested and is currently in the custody of law enforcement." },
            { q: "What is the act of encouraging or helping someone to commit a crime called?", options: ["Advising", "Suggesting", "Abetment", "Supporting"], answer: "Abetment", explanation: "Abetment is a crime that involves instigating, conspiring with, or intentionally aiding another person to commit an offense." },
            { q: "What is the term for a person who is called to court to provide information about a case?", options: ["An expert", "A witness", "A spectator", "A clerk"], answer: "A witness", explanation: "A witness is a person who has knowledge of an event or other matter of interest and is called upon to testify in court." },
            { q: "What is the act of killing someone with a pre-planned design called?", options: ["Accidental killing", "Sudden killing", "Premeditated murder", "Justifiable homicide"], answer: "Premeditated murder", explanation: "Premeditation means that the act was thought out beforehand. Premeditated murder is considered one of the most serious forms of homicide." },
            { q: "What is the legal term for a person who is not yet 18 years old in the context of criminal law?", options: ["A youth", "A teenager", "A juvenile", "A child"], answer: "A juvenile", explanation: "A juvenile, or a 'child in conflict with law', is a person under the age of 18 who is alleged to have committed an offense." },
            { q: "What is the act of taking goods from a store without paying for them called?", options: ["Borrowing", "Shoplifting", "Bargaining", "Exchanging"], answer: "Shoplifting", explanation: "Shoplifting is a common term for the theft of merchandise from a retail store." },
            { q: "What is the term for a group of five or more people using force for a common illegal purpose?", options: ["A crowd", "A protest", "Rioting", "A gathering"], answer: "Rioting", explanation: "Rioting is committed when an unlawful assembly of five or more people uses force or violence to achieve their common illegal object." },
            { q: "What is the legal term for a lawyer who represents the government in a criminal trial?", options: ["Defense Attorney", "Public Prosecutor", "Government Pleader", "Solicitor General"], answer: "Public Prosecutor", explanation: "The Public Prosecutor is the lawyer appointed by the state to conduct criminal prosecutions in court on behalf of the government." }
          ]
        },
        medium: {
          1: [
            { q: "What is the legal concept of 'mens rea'?", options: ["The physical act of the crime", "The guilty mind or criminal intent", "The evidence presented in court", "The final verdict"], answer: "The guilty mind or criminal intent", explanation: "'Mens rea' is a legal principle that for a person to be found guilty of most crimes, there must be a combination of a prohibited act ('actus reus') and a guilty state of mind ('mens rea')." },
            { q: "What is 'anticipatory bail'?", options: ["Bail granted after conviction", "Bail granted before a potential arrest", "Bail for a minor offense", "Bail granted by the police"], answer: "Bail granted before a potential arrest", explanation: "Anticipatory bail is a direction from a court to release a person on bail even before they are arrested. It is sought by a person who apprehends arrest for a non-bailable offense." },
            { q: "What is the difference between 'cognizable' and 'non-cognizable' offenses?", options: ["Cognizable offenses are more serious and police can arrest without a warrant", "Cognizable offenses are minor and require a warrant", "Cognizable offenses are related to property, non-cognizable to persons", "There is no difference"], answer: "Cognizable offenses are more serious and police can arrest without a warrant", explanation: "In cognizable offenses, the police can initiate an investigation and arrest a suspect without a warrant from the court. For non-cognizable offenses, police require a court order to do so." },
            { q: "What is a 'dying declaration'?", options: ["A will written by a dying person", "A statement by a person about the cause of their death", "A confession made before death", "A final prayer"], answer: "A statement by a person about the cause of their death", explanation: "A dying declaration is a statement made by a person who is conscious and knows that death is imminent concerning what he or she believes to be the cause or circumstances of death. It can be used as evidence in court." },
            { q: "What is 'extortion' under the IPC?", options: ["The same as theft", "Dishonestly inducing a person to deliver property by putting them in fear of injury", "Cheating someone in a business deal", "Taking property without consent"], answer: "Dishonestly inducing a person to deliver property by putting them in fear of injury", explanation: "Extortion involves intentionally putting a person in fear of some injury and thereby dishonestly inducing them to deliver any property or valuable security." },
            { q: "What is the purpose of the 'charge sheet'?", options: ["It is the final judgment", "It is a document filed by police after investigation, detailing the charges", "It is the complaint filed by the victim", "It is the bail application"], answer: "It is a document filed by police after investigation, detailing the charges", explanation: "A charge sheet is the final report prepared by the police or investigation agency after completing their investigation of a case. It contains the names of the accused, the charges against them, and the evidence." },
            { q: "What is 'criminal conspiracy'?", options: ["Thinking about committing a crime alone", "An agreement between two or more persons to commit an illegal act", "Accidentally helping a criminal", "Witnessing a crime and not reporting it"], answer: "An agreement between two or more persons to commit an illegal act", explanation: "Criminal conspiracy, under Section 120A of the IPC, occurs when two or more persons agree to do, or cause to be done, an illegal act, or a legal act by illegal means." },
            { q: "What is the difference between 'abduction' and 'kidnapping'?", options: ["They are the same", "Kidnapping is of a minor, abduction can be of any person", "Abduction involves force, kidnapping does not", "Kidnapping is for ransom, abduction is not"], answer: "Kidnapping is of a minor, abduction can be of any person", explanation: "Kidnapping is the taking away of a minor (under 16 for boys, 18 for girls) or a person of unsound mind without the consent of their lawful guardian. Abduction involves compelling a person of any age to go from any place by force or deceit." },
            { q: "What is a 'non-bailable offense'?", options: ["An offense where bail is never granted", "An offense where bail is not a right and is at the court's discretion", "A minor traffic violation", "An offense that can be settled out of court"], answer: "An offense where bail is not a right and is at the court's discretion", explanation: "In non-bailable offenses, which are generally more serious, the accused cannot claim bail as a matter of right. The grant of bail is at the discretion of the court." },
            { q: "What does 'alibi' mean as a defense?", options: ["The accused confesses to the crime", "The accused claims they were somewhere else when the crime was committed", "The accused claims self-defense", "The accused claims insanity"], answer: "The accused claims they were somewhere else when the crime was committed", explanation: "An alibi is a defense in which a defendant attempts to prove that they were in another place at the time the alleged offense was committed." }
          ],
          2: [
            { q: "What is the 'actus reus' of a crime?", options: ["The guilty mind", "The physical act or omission of a crime", "The motive", "The consequence of the crime"], answer: "The physical act or omission of a crime", explanation: "'Actus reus' is the Latin term for the 'guilty act'. It is the external element or the physical act of a crime that, when combined with 'mens rea' (guilty mind), constitutes a crime." },
            { q: "What is a 'summary trial'?", options: ["A trial that is summarized for the media", "A speedy trial for less serious offenses with a simplified procedure", "A trial conducted by a summary court", "The final arguments in a trial"], answer: "A speedy trial for less serious offenses with a simplified procedure", explanation: "A summary trial is a trial in a criminal court in which the proceedings are kept short and simple. It is applicable only to certain minor offenses, and the punishment that can be awarded is also limited." },
            { q: "What is the difference between 'parole' and 'furlough'?", options: ["They are the same", "Parole is for a specific reason, furlough is a matter of right for long-term prisoners", "Parole is granted by police, furlough by the court", "Furlough is for short-term prisoners, parole for long-term"], answer: "Parole is for a specific reason, furlough is a matter of right for long-term prisoners", explanation: "Parole is a conditional release for a specific purpose (e.g., attending a family wedding). Furlough is a matter of right, granted periodically to long-term prisoners to maintain family ties, and is not dependent on a specific reason." },
            { q: "What is 'vicarious liability' in criminal law?", options: ["A person is liable for their own actions only", "One person is held liable for the criminal act of another", "Liability shared by all accused", "Liability of a company for its employees' actions"], answer: "One person is held liable for the criminal act of another", explanation: "Generally, there is no vicarious liability in criminal law. However, there are exceptions where a person can be held liable for the acts of another, for example, an employer for the acts of an employee in certain statutory offenses." },
            { q: "What is a 'Test Identification Parade' (TIP)?", options: ["A parade of police officers", "A procedure to identify the accused by a witness", "A fashion parade in court", "A parade of evidence"], answer: "A procedure to identify the accused by a witness", explanation: "A TIP is an investigative procedure where a witness, who claims to have seen the offender, is asked to identify them from a group of individuals. It is used to test the veracity of the witness's claim." },
            { q: "What is 'criminal breach of trust by a public servant'?", options: ["The same as a normal breach of trust", "An aggravated form of breach of trust committed by a public servant", "A civil offense", "A minor offense"], answer: "An aggravated form of breach of trust committed by a public servant", explanation: "Section 409 of the IPC deals with criminal breach of trust by a public servant, or by a banker, merchant, or agent. It is a more serious offense and carries a higher punishment than a simple criminal breach of trust." },
            { q: "What is the significance of a 'panchnama'?", options: ["It is a confession", "It is a record of the police's personal opinion", "It is a document recording certain events in the presence of independent witnesses (panchas)", "It is the final judgment"], answer: "It is a document recording certain events in the presence of independent witnesses (panchas)", explanation: "A panchnama is a record of observation by five or more respectable persons (panchas) in the presence of whom the police conduct a search, seizure, or investigation. It is used to corroborate the evidence." },
            { q: "What is 'abetment'?", options: ["Committing a crime", "Instigating, conspiring, or intentionally aiding the commission of a crime", "Witnessing a crime", "Being a victim of a crime"], answer: "Instigating, conspiring, or intentionally aiding the commission of a crime", explanation: "Abetment, under Section 107 of the IPC, means to instigate any person to do a thing, engage in a conspiracy for the doing of that thing, or intentionally aid, by any act or illegal omission, the doing of that thing." },
            { q: "What is the difference between 'theft' and 'extortion'?", options: ["Theft is of movable property, extortion of immovable", "Theft is without consent; extortion involves obtaining consent by fear", "Theft is a minor crime, extortion is major", "They are the same offense"], answer: "Theft is without consent; extortion involves obtaining consent by fear", explanation: "In theft (S. 378), the property is taken without the owner's consent. In extortion (S. 383), the offender obtains the owner's consent to part with the property by putting them in fear of injury." },
            { q: "What is a 'proclaimed offender'?", options: ["A famous criminal", "An accused person who is absconding and has a proclamation issued against them", "A person who has been pardoned", "A person who has completed their sentence"], answer: "An accused person who is absconding and has a proclamation issued against them", explanation: "Under Section 82 of the CrPC, if a court has reason to believe that a person against whom a warrant has been issued is absconding, the court may publish a written proclamation requiring them to appear at a specified place and time." }
          ],
          3: [
            { q: "What is the 'Plea Bargaining' process?", options: ["Bargaining for a lesser punishment in court", "A pre-trial negotiation between the accused and the prosecution", "A method to appeal a sentence", "A system for out-of-court settlement"], answer: "A pre-trial negotiation between the accused and the prosecution", explanation: "Plea bargaining is a process where the defendant pleads guilty to a lesser charge in exchange for a more lenient sentence or an agreement to drop other charges. It was introduced in India by the Criminal Law (Amendment) Act, 2005." },
            { q: "What is the evidentiary value of a confession made to a police officer?", options: ["It is fully admissible as evidence", "It is not admissible as evidence against the accused", "It is admissible only if written", "It is admissible only with a lawyer present"], answer: "It is not admissible as evidence against the accused", explanation: "Section 25 of the Indian Evidence Act states that no confession made to a police officer shall be proved as against a person accused of any offense. This is to prevent coerced confessions." },
            { q: "What is the concept of 'actus non facit reum nisi mens sit rea'?", options: ["The act itself does not make a man guilty unless his intentions were so", "The guilty mind is more important than the act", "The act is all that matters", "A guilty act requires a guilty mind"], answer: "The act itself does not make a man guilty unless his intentions were so", explanation: "This is a fundamental principle of criminal law. It means that to constitute a crime, there must be a combination of a wrongful act (actus reus) and a guilty mind (mens rea)." },
            { q: "What is the difference between 'common intention' and 'common object'?", options: ["They are the same", "Common intention (S.34) requires a prior meeting of minds; common object (S.149) is for members of an unlawful assembly", "Common intention is for minor crimes, common object for major ones", "Common object requires active participation, common intention does not"], answer: "Common intention (S.34) requires a prior meeting of minds; common object (S.149) is for members of an unlawful assembly", explanation: "Common intention (S.34) implies a pre-arranged plan. Common object (S.149) applies to members of an unlawful assembly, where every member is held liable for an offense committed by any member in prosecution of the common object of that assembly, even without a prior plan for that specific offense." },
            { q: "What is the 'rape shield' law?", options: ["A law to protect rape victims from being questioned about their past sexual history", "A law providing physical shields to victims", "A law about the definition of rape", "A law for punishing rape offenders"], answer: "A law to protect rape victims from being questioned about their past sexual history", explanation: "Rape shield laws, like Section 146 of the Indian Evidence Act, limit a defendant's ability to introduce evidence or cross-examine rape complainants about their past sexual behavior. The aim is to prevent the victim from being put on trial." },
            { q: "What is a 'John Doe' order?", options: ["An order against a specific person named John Doe", "An order against unknown and anonymous defendants", "An order to protect witnesses", "A type of search warrant"], answer: "An order against unknown and anonymous defendants", explanation: "A John Doe order (or Ashok Kumar order) is a type of injunction sought against unknown persons who have committed or are likely to commit a breach of the plaintiff's rights, particularly in copyright infringement cases to prevent piracy." },
            { q: "What is the 'fruit of the poisonous tree' doctrine?", options: ["A doctrine about agricultural law", "Evidence obtained illegally is inadmissible in court", "A doctrine about evidence from trees", "A doctrine that is not followed in India"], answer: "Evidence obtained illegally is inadmissible in court", explanation: "This doctrine, primarily from US law, holds that evidence gathered with the help of illegally obtained information must be excluded from trial. While not strictly applied in India, the courts have discretion to reject evidence obtained improperly." },
            { q: "What is the difference between 'investigation', 'inquiry', and 'trial'?", options: ["They are all the same stage", "Investigation is by police, inquiry by magistrate, trial is the judicial proceeding", "Investigation is by court, inquiry by police, trial by jury", "Investigation is for evidence, inquiry for witnesses, trial for judgment"], answer: "Investigation is by police, inquiry by magistrate, trial is the judicial proceeding", explanation: "Investigation (conducted by police) is the collection of evidence. Inquiry (conducted by a magistrate) is a judicial proceeding to determine the truth or falsity of certain facts. Trial is the final judicial proceeding where the guilt or innocence of the accused is determined." },
            { q: "What is the legal status of narco-analysis and brain-mapping tests?", options: ["They are fully admissible as evidence", "They are unconstitutional and cannot be conducted", "They cannot be conducted without the consent of the accused and the results are not admissible as evidence", "They are mandatory in all serious cases"], answer: "They cannot be conducted without the consent of the accused and the results are not admissible as evidence", explanation: "In Selvi v. State of Karnataka, the Supreme Court held that involuntary administration of these tests is a violation of the 'right against self-incrimination' (Art. 20(3)) and 'right to life and personal liberty' (Art. 21). The results are not admissible as evidence, but any information discovered as a result of a voluntary test can be used." },
            { q: "What is the 'probation of offenders'?", options: ["A type of punishment", "A period of supervision over an offender as an alternative to prison", "A system for training police offenders", "A parole system"], answer: "A period of supervision over an offender as an alternative to prison", explanation: "The Probation of Offenders Act, 1958 allows courts to release certain offenders on probation of good conduct, especially first-time offenders and those convicted of minor crimes, as a rehabilitative measure instead of sending them to prison." }
          ]
