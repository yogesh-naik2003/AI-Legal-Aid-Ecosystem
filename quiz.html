          3: [
            { q: "What is 'quantum cryptography'?", options: ["A very small type of cryptography", "A method of secure communication which uses the principles of quantum mechanics", "A theoretical type of cryptography", "A type of encryption that is easy to break"], answer: "A method of secure communication which uses the principles of quantum mechanics", explanation: "Quantum cryptography uses quantum mechanics to produce a provably secure communication system. Its most well-known feature is that the act of observing a quantum state disturbs it, meaning any eavesdropper on the communication will inevitably be detected." },
            { q: "What is a 'zero-knowledge proof' (ZKP)?", options: ["A proof that you know nothing", "A method by which one party (the prover) can prove to another party (the verifier) that they know a value x, without conveying any information apart from the fact that they know the value x", "A proof that is not valid", "A type of mathematical puzzle"], answer: "A method by which one party (the prover) can prove to another party (the verifier) that they know a value x, without conveying any information apart from the fact that they know the value x", explanation: "ZKPs are a powerful cryptographic tool for enhancing privacy. For example, you could prove you are over 18 without revealing your actual birthdate, or prove you have sufficient funds in your bank account without revealing the balance." },
            { q: "What is the 'Byzantine Generals' Problem' in distributed computing?", options: ["A problem with Byzantine history", "A problem of achieving consensus in a distributed system with unreliable or malicious actors", "A military strategy problem", "A problem with computer generals"], answer: "A problem of achieving consensus in a distributed system with unreliable or malicious actors", explanation: "This problem illustrates the difficulty that distributed computer systems have in reaching consensus without relying on a trusted central party. Blockchains, like Bitcoin, are considered a solution to the Byzantine Generals' Problem, as they allow for a reliable and decentralized consensus mechanism (e.g., Proof-of-Work)." },
            { q: "What is a '51% attack' on a blockchain?", options: ["An attack that is 51% successful", "An attack on a blockchain by a group of miners who control more than 50% of the network's mining hash rate", "A type of social media attack", "An attack on a specific block"], answer: "An attack on a blockchain by a group of miners who control more than 50% of the network's mining hash rate", explanation: "Controlling more than 50% of the network's computing power would allow an attacker to prevent new transactions from gaining confirmations, and to reverse transactions that were completed while they were in control. This would effectively allow them to double-spend coins." },
            { q: "What is the 'Clipper chip' and why was it controversial?", options: ["A type of potato chip", "An encrypted chipset for phones proposed by the NSA in the 1990s with a built-in backdoor for law enforcement", "A secure computer chip", "A chip for sailing boats"], answer: "An encrypted chipset for phones proposed by the NSA in the 1990s with a built-in backdoor for law enforcement", explanation: "The Clipper chip was a highly controversial piece of technology. While it provided encryption for voice communications, it also had a 'key escrow' system, allowing the government to decrypt communications. It was heavily criticized by civil liberties advocates and cryptographers as a threat to privacy and was ultimately abandoned." },
            { q: "What is 'differential privacy'?", options: ["A system for keeping data private from different people", "A system for publicly sharing information about a dataset by describing the patterns of groups within the dataset while withholding information about individuals", "A type of privacy setting on social media", "A legal principle"], answer: "A system for publicly sharing information about a dataset by describing the patterns of groups within the dataset while withholding information about individuals", explanation: "Differential privacy is a strong, mathematical definition of privacy. It allows data analysts to learn useful information from large datasets (e.g., census data) while ensuring that it's impossible to learn anything about any single individual in the dataset." },
            { q: "What is the 'chilling effect' in the context of online speech?", options: ["The effect of cold weather on computers", "The inhibition or discouragement of the legitimate exercise of natural and legal rights by the threat of legal sanction", "A type of online debate", "A positive effect of online regulation"], answer: "The inhibition or discouragement of the legitimate exercise of natural and legal rights by the threat of legal sanction", explanation: "In the context of online speech, a vague or overly broad law (like the former Section 66A of the IT Act) can have a 'chilling effect', where people self-censor and refrain from engaging in legitimate expression for fear of legal repercussions." },
            { q: "What is a 'hash function' in cryptography?", options: ["A function that makes a hash of data", "A function that can map data of arbitrary size to a fixed-size value", "A function that is not reversible", "A function for cooking"], answer: "A function that can map data of arbitrary size to a fixed-size value", explanation: "A cryptographic hash function is a mathematical algorithm that maps data of arbitrary size to a bit string of a fixed size (a hash). It's a one-way function, meaning it's infeasible to invert. They are fundamental to blockchains, data integrity checks, and password storage." },
            { q: "What is the difference between 'symmetric' and 'asymmetric' encryption?", options: ["Symmetric is balanced, asymmetric is not", "Symmetric uses the same key for encryption and decryption; asymmetric uses a public key and a private key", "Symmetric is for text, asymmetric is for files", "Symmetric is old, asymmetric is new"], answer: "Symmetric uses the same key for encryption and decryption; asymmetric uses a public key and a private key", explanation: "In symmetric-key cryptography, the same key is used to both encrypt and decrypt a message. In asymmetric (or public-key) cryptography, there are two keys: a public key for encryption, and a private key for decryption. This allows for secure communication without having to share a secret key beforehand." },
            { q: "What is the 'Streisand effect'?", options: ["An effect named after Barbra Streisand", "A phenomenon whereby an attempt to hide, remove, or censor a piece of information has the unintended consequence of publicizing the information more widely", "A type of musical effect", "A legal doctrine"], answer: "A phenomenon whereby an attempt to hide, remove, or censor a piece of information has the unintended consequence of publicizing the information more widely", explanation: "The effect is named after American entertainer Barbra Streisand, whose 2003 attempt to suppress photographs of her residence in Malibu, California, inadvertently drew greater public attention to it." },
          ],
          4: [
                { q: "What is 'Critical Information Infrastructure' (CII) under the IT Act?", options: ["Any government website", "Computer resource whose incapacitation would have a debilitating impact on national security, economy, or public health", "All servers in a data center", "The backbone of the internet"], answer: "Computer resource whose incapacitation would have a debilitating impact on national security, economy, or public health", explanation: "Section 70 of the IT Act defines CII as any computer resource whose compromise could severely affect national interests. The government (via NCIIPC) is responsible for designating and protecting these resources." },
                { q: "What is the specific offense of 'Child Pornography' under the IT Act?", options: ["Publishing or transmitting of any obscene material", "Publishing or transmitting of any material depicting children in sexually explicit acts", "Only sharing such material with minors", "Downloading any explicit material"], answer: "Publishing or transmitting of any material depicting children in sexually explicit acts", explanation: "Section 67B of the IT Act specifically addresses the severe offense of child pornography, imposing stringent punishments for the creation, publication, transmission, or viewing of such material." },
                { q: "What is the penalty for a Body Corporate that fails to take 'reasonable security practices' to protect sensitive personal data or information (SPDI)?", options: ["A warning from the court", "Liability to pay compensation to the affected person(s)", "Imprisonment for 5 years", "Fine of only Rs. 50,000"], answer: "Liability to pay compensation to the affected person(s)", explanation: "Section 43A of the IT Act (pre-DPDP) states that if a body corporate is negligent in implementing and maintaining reasonable security practices, it shall be liable to pay damages by way of compensation to the person so affected." },
                { q: "What is the legal concept of 'Non-Repudiation' in electronic transactions?", options: ["The inability to replicate an electronic signature", "The inability of a party to deny the authenticity or source of an electronic communication or transaction after the fact", "The denial of service to a user", "A refusal to accept an electronic contract"], answer: "The inability of a party to deny the authenticity or source of an electronic communication or transaction after the fact", explanation: "Non-repudiation is a key legal feature of digital signatures and electronic records. It provides proof of the integrity and origin of the data, preventing the sender from falsely claiming they did not send the message." },
                { q: "What is a 'Vishing' attack?", options: ["A phishing attack using video", "A social engineering attack conducted via Voice over IP (VoIP) or telephone to steal personal information", "A malicious website link", "An attack on a vehicle's computer system"], answer: "A social engineering attack conducted via Voice over IP (VoIP) or telephone to steal personal information", explanation: "Vishing is a portmanteau of 'voice' and 'phishing'. The attacker uses voice calls, often spoofing caller IDs, to trick the victim into revealing sensitive data like credit card numbers or account passwords." },
                { q: "What is the legal challenge presented by 'Digital Rights Management' (DRM) technologies?", options: ["They are legally banned in India", "They can potentially restrict fair use/fair dealing rights of copyrighted material granted to consumers under copyright law", "They only apply to physical media", "They are a type of encryption that is easy to break"], answer: "They can potentially restrict fair use/fair dealing rights of copyrighted material granted to consumers under copyright law", explanation: "DRM technologies are designed to control access and use of digital content. Legally, the issue arises when these technical protections override or prevent a user from exercising their legal rights, such as making a private copy or using the material for educational purposes (fair use)." },
                { q: "What is the significance of the **hash value** in validating electronic evidence?", options: ["It determines the size of the file", "It acts as a digital fingerprint to ensure that the electronic record has not been altered since the time of collection", "It is only used for image files", "It determines the file's location on the disk"], answer: "It acts as a digital fingerprint to ensure that the electronic record has not been altered since the time of collection", explanation: "A cryptographic hash function generates a unique, fixed-length string (the hash value) from the electronic evidence. Even a single bit change in the original data will result in a different hash, making it a reliable way to prove data integrity in court." },
                { q: "What is the 'Right to Data Portability' as proposed in the DPDP Act?", options: ["The right to move your server to a new location", "The right to obtain personal data from the data fiduciary in a structured, commonly used, and machine-readable format to transmit it to another data fiduciary", "The right to transfer your website ownership", "The right to download any data from the internet"], answer: "The right to obtain personal data from the data fiduciary in a structured, commonly used, and machine-readable format to transmit it to another data fiduciary", explanation: "This right empowers the individual (Data Principal) to switch service providers easily by demanding their data from the current provider (Data Fiduciary) in a usable format." },
                { q: "What is 'Biometric Data' under India's privacy framework?", options: ["Only fingerprint scans", "Data relating to biological and physiological characteristics of an individual, which can be used to authenticate identity", "Only blood group information", "Any photo of a person"], answer: "Data relating to biological and physiological characteristics of an individual, which can be used to authenticate identity", explanation: "Biometric data (e.g., retina scans, voice patterns, fingerprints) is classified as a category of **Sensitive Personal Data or Information (SPDI)** under the IT Act rules and is subject to enhanced protection under the DPDP Act due to its unique and permanent nature." },
                { q: "What is the concept of 'Deemed Consent' under the DPDP Act?", options: ["Consent that is assumed by law in certain circumstances, such as when providing a service is necessary or for public interest", "Consent given through a voice message", "Consent that is never valid", "Consent given by a minor"], answer: "Consent that is assumed by law in certain circumstances, such as when providing a service is necessary or for public interest", explanation: "Deemed consent is an exception to the requirement for explicit consent. It allows a Data Fiduciary to process data without explicit permission if the processing is considered necessary for legitimate purposes like employment, public safety, or when the individual voluntarily provides the data for a specified purpose." }
            ],

          5: [
                { q: "What is the penalty for 'Breach of Confidentiality and Privacy' under Section 72 of the IT Act?", options: ["Only a warning", "Imprisonment up to two years, or fine up to one lakh rupees, or both", "Imprisonment for life", "A fine of Rs. 10 lakh"], answer: "Imprisonment up to two years, or fine up to one lakh rupees, or both", explanation: "Section 72 covers the disclosure of information in breach of a lawful contract. If a person secures access to any electronic record, book, or register and discloses it without the consent of the person concerned, they are liable for this punishment." },
                { q: "What does the IT Act mandate regarding the delivery of government services (E-Governance)?", options: ["All government services must be provided online", "Government agencies can accept and issue applications, sanctions, or payments in electronic form and must prescribe the manner and format for electronic records", "Only central government services must be electronic", "E-Governance is optional for all departments"], answer: "Government agencies can accept and issue applications, sanctions, or payments in electronic form and must prescribe the manner and format for electronic records", explanation: "Sections 6 and 7 of the IT Act provide the legal framework for E-Governance, empowering government bodies to use electronic means for official business and recognizing the legal validity of electronic forms, filings, and documents." },
                { q: "What is the primary legal concern with 'Web Scraping' or 'Web Spidering'?", options: ["It slows down the internet speed", "It can violate website **Terms of Service** (ToS), infringe **copyright** on the extracted data, or amount to **unauthorized access** (Section 43)", "It is a necessary practice for all business", "It is only legal if the scraper is a search engine"], answer: "It can violate website **Terms of Service** (ToS), infringe **copyright** on the extracted data, or amount to **unauthorized access** (Section 43)", explanation: "While scraping is technologically neutral, its legality depends on the intent and method. Automated, high-volume scraping can be penalized as 'unauthorized access' causing data loss or denial of service under the IT Act." },
                { q: "What is the legal framework that regulates India's **Aadhaar** system?", options: ["The IT Act, 2000", "The Aadhaar (Targeted Delivery of Financial and Other Subsidies, Benefits and Services) Act, 2016", "The Indian Contract Act, 1872", "The Foreign Exchange Management Act, 1999"], answer: "The Aadhaar (Targeted Delivery of Financial and Other Subsidies, Benefits and Services) Act, 2016", explanation: "The Aadhaar Act is the specific law governing the enrollment, security, and usage of biometric and demographic data collected by the UIDAI for the unique identity number." },
                { q: "What is the **Dark Web** and why is it a challenge for law enforcement?", options: ["The part of the internet that is not visible on a computer screen", "A small, encrypted part of the Deep Web that requires specific software (like Tor) to access, often used for illegal activities", "Any website that is not a social media site", "A simple public forum"], answer: "A small, encrypted part of the Deep Web that requires specific software (like Tor) to access, often used for illegal activities", explanation: "The Dark Web's highly anonymous nature (via encryption and distributed networks) makes it extremely difficult for law enforcement agencies to track and identify criminal actors and transactions." },
                { q: "In the context of civil liability, what is the legal position regarding an employer's liability for an employee's cybercrime?", options: ["The employee is solely liable", "The employer is **vicariously liable** if the employee committed the crime in the course of their employment and for the employer's benefit", "The employer is never liable for criminal acts", "The government is always liable"], answer: "The employer is **vicariously liable** if the employee committed the crime in the course of their employment and for the employer's benefit", explanation: "Under general principles of tort and civil law, the employer can be held vicariously liable for the actions of their employee if those actions were carried out during the ordinary course of business, even if they were illegal." },
                { q: "What is **'trolling'** in cyber law?", options: ["A type of video game", "A general term for using electronic means to post provocative, off-topic, or offensive messages online to annoy or harass a specific individual or group", "A method of fishing", "A form of ethical debate"], answer: "A general term for using electronic means to post provocative, off-topic, or offensive messages online to annoy or harass a specific individual or group", explanation: "While not specifically defined in the IT Act, trolling can be prosecuted under Sections dealing with cyber harassment, defamation, or the transmission of offensive messages (like the former Section 66A and current IPC provisions)." },
                { q: "What is the concept of **'Digital Rights Management' (DRM)**?", options: ["A law passed by the government", "A technology used by copyright holders to control the access, copying, and usage of their digital works", "A social media regulation", "A process for generating digital signatures"], answer: "A technology used by copyright holders to control the access, copying, and usage of their digital works", explanation: "DRM encompasses various technical methods (like encryption and licensing) to enforce limitations on the use of copyrighted material, often protected by specific anti-circumvention provisions in copyright laws globally (like the DMCA in the US)." },
                { q: "What legal provision mandates the provision of assistance to police for decryption of data in a cybercrime investigation?", options: ["The Indian Evidence Act", "Section 69 of the IT Act (Interception, Monitoring, and Decryption)", "The Code of Criminal Procedure", "The Anti-Terrorism Act"], answer: "Section 69 of the IT Act (Interception, Monitoring, and Decryption)", explanation: "Section 69, which also authorizes the government to order interception, also mandates that any intermediary or person in charge of a computer resource must provide all necessary assistance to the government or its agency to intercept or decrypt information." },
                { q: "What is **'Key Escrow'** in cryptography?", options: ["A key kept in a safe place", "A system where the private cryptographic keys of users are held by a trusted third party, who can release them to law enforcement under specific legal conditions", "A method of key management that is completely secure", "A process for generating public keys"], answer: "A system where the private cryptographic keys of users are held by a trusted third party, who can release them to law enforcement under specific legal conditions", explanation: "Key Escrow is a controversial concept that enables government access to encrypted communications for legitimate reasons like national security or crime prevention, but it raises serious concerns about privacy and potential misuse." }
            ],
        6: [
            { q: "What is the legal status of 'electronic signatures' in India?", options: ["They are not legally valid", "They are legally recognized and have the same status as handwritten signatures under the IT Act, 2000", "They are valid only for emails", "They require a special court order to be valid"], answer: "They are legally recognized and have the same status as handwritten signatures under the IT Act, 2000", explanation: "The IT Act, 2000 provides a legal framework for electronic signatures, giving them legal validity and making electronic documents as legally enforceable as paper documents." },
            { q: "What is 'cyber defamation'?", options: ["Defamation using a computer or the internet", "A type of computer virus", "A legal defense in cyber cases", "A social media trend"], answer: "Defamation using a computer or the internet", explanation: "Cyber defamation is the act of publishing false statements about someone online that harms their reputation. It can be in the form of text, images, or videos and is punishable under both the IPC and the IT Act." },
            { q: "What is the role of the 'Controller of Certifying Authorities' (CCA)?", options: ["To control all websites", "To license and regulate the working of Certifying Authorities who issue Digital Signature Certificates", "To control internet speeds", "To develop new encryption methods"], answer: "To license and regulate the working of Certifying Authorities who issue Digital Signature Certificates", explanation: "The CCA is a government body established under the IT Act to regulate the issuance and management of Digital Signature Certificates in India, ensuring the security and integrity of the digital signature ecosystem." },
            { q: "What is a 'phishing' attack?", options: ["A type of fishing", "An attempt to trick a user into revealing sensitive information like passwords or credit card numbers", "A software bug", "A hardware malfunction"], answer: "An attempt to trick a user into revealing sensitive information like passwords or credit card numbers", explanation: "Phishing attacks are a common form of social engineering where attackers send fraudulent emails or messages that appear to be from a legitimate source to deceive victims into giving up their private information." },
            { q: "What is the punishment for 'identity theft' under the IT Act?", options: ["A small fine", "Imprisonment up to three years and/or a fine", "A warning", "Community service"], answer: "Imprisonment up to three years and/or a fine", explanation: "Section 66C of the IT Act prescribes a punishment of imprisonment of either description for a term which may extend to three years and shall also be liable to a fine for the offense of identity theft." },
            { q: "What is a 'zombie computer' or 'bot'?", options: ["A very slow computer", "A computer connected to the internet that has been compromised by a hacker and can be used to perform malicious tasks", "A computer that is not connected to the internet", "A type of gaming computer"], answer: "A computer connected to the internet that has been compromised by a hacker and can be used to perform malicious tasks", explanation: "A zombie computer is part of a 'botnet', a network of infected computers that can be controlled remotely by an attacker to launch DDoS attacks, send spam, or perform other illicit activities." },
            { q: "What is 'salami slicing' in the context of cybercrime?", options: ["A method of slicing data", "A technique where small amounts of money are stolen from a large number of accounts, making the theft hard to notice", "A type of food-related crime", "A method of data encryption"], answer: "A technique where small amounts of money are stolen from a large number of accounts, making the theft hard to notice", explanation: "Salami slicing attacks involve the theft of tiny amounts of assets from a large number of sources. Because the amount stolen from any one source is so small, it often goes unnoticed." },
            { q: "What is the legal framework for 'data protection' in India?", options: ["The IT Act, 2000", "The Indian Contract Act", "The Digital Personal Data Protection Act, 2023", "There is no specific law"], answer: "The Digital Personal Data Protection Act, 2023", explanation: "The DPDP Act, 2023 is India's comprehensive legislation focused on the protection of personal digital data. It outlines the rights of individuals and the obligations of entities that collect and process data." },
            { q: "What is 'typosquatting'?", options: ["Squatting on a domain name", "A form of cybersquatting that relies on mistakes made by internet users when typing a website address", "A type of font", "A method of website design"], answer: "A form of cybersquatting that relies on mistakes made by internet users when typing a website address", explanation: "Typosquatting, also known as URL hijacking, involves registering domain names that are common misspellings of popular websites to capture traffic from users who make typing errors." },
            { q: "What is the purpose of the 'Indian Computer Emergency Response Team' (CERT-In)?", options: ["To develop computer software", "To serve as the national agency for responding to and mitigating cybersecurity incidents", "To regulate e-commerce", "To provide internet services"], answer: "To serve as the national agency for responding to and mitigating cybersecurity incidents", explanation: "CERT-In is the nodal agency responsible for collecting, analyzing, and disseminating information on cyber incidents, and taking emergency measures for handling cybersecurity incidents." }
          ],
          7: [
            { q: "What is the 'safe harbor' provision for intermediaries under the IT Act?", options: ["A rule that makes platforms always liable", "A legal principle that provides platforms immunity from liability for third-party content, provided they follow due diligence", "A safe place for servers", "A type of data encryption"], answer: "A legal principle that provides platforms immunity from liability for third-party content, provided they follow due diligence", explanation: "Section 79 of the IT Act grants 'safe harbor' to intermediaries (like social media sites), protecting them from liability for user-generated content, provided they adhere to government rules and takedown notices." },
            { q: "What is the offense of 'cyber terrorism' under Section 66F of the IT Act?", options: ["Sending threatening emails", "An act intended to threaten the unity, integrity, security or sovereignty of India by attacking critical information infrastructure", "Hacking a government website", "Spreading rumors online"], answer: "An act intended to threaten the unity, integrity,security or sovereignty of India by attacking critical information infrastructure", explanation: "Section 66F defines the serious offense of cyber terrorism. It involves acts like denying access to or contaminating critical infrastructure with the intent to strike terror or threaten the nation's security." },
            { q: "What is the legal status of 'cryptocurrency' in India?", options: ["It is legal tender", "It is completely banned", "It is unregulated but not illegal; transactions are subject to income tax and other laws", "It is recognized as a security"], answer: "It is unregulated but not illegal; transactions are subject to income tax and other laws", explanation: "As of now, India does not have a specific law regulating cryptocurrencies. They are not banned, but they are not recognized as legal tender. The government has introduced taxation on gains from crypto assets." },
            { q: "What is the difference between 'hacking' and 'cracking'?", options: ["There is no difference", "Hacking can be ethical, cracking is always malicious", "Hacking is for software, cracking is for hardware", "Hacking is legal, cracking is illegal"], answer: "Hacking can be ethical, cracking is always malicious", explanation: "While often used interchangeably, 'hacking' can refer to exploring and understanding computer systems (including for ethical security testing). 'Cracking' specifically refers to breaking into systems with malicious intent." },
            { q: "What is a 'Distributed Denial-of-Service' (DDoS) attack?", options: ["A DoS attack from one computer", "An attack where a target is flooded with traffic from multiple compromised computer systems (a botnet)", "A type of server maintenance", "A method to improve network speed"], answer: "An attack where a target is flooded with traffic from multiple compromised computer systems (a botnet)", explanation: "A DDoS attack is a malicious attempt to disrupt the normal traffic of a targeted server or network by overwhelming it with a flood of Internet traffic from many different sources." },
            { q: "What is the 'right to be forgotten' in the digital context?", options: ["An absolute right to delete all online information", "A right, emerging from the Right to Privacy, to have personal information removed from the public domain under certain conditions", "It is not recognized in India", "It only applies to celebrities"], answer: "A right, emerging from the Right to Privacy, to have personal information removed from the public domain under certain conditions", explanation: "While not an absolute right, Indian courts have recognized the 'right to be forgotten' as part of the Right to Privacy. It allows individuals to seek the removal of personal information from the internet, especially if it is irrelevant or outdated." },
            { q: "What is the legal significance of an 'IP address' in a cybercrime investigation?", options: ["It is not important", "It can be crucial evidence to trace the location and identity of the device used to commit the crime", "It is the same as a person's name", "It is always fake"], answer: "It can be crucial evidence to trace the location and identity of the device used to commit the crime", explanation: "An IP address is a unique identifier for a device on a network. Law enforcement agencies can use it to track down the source of a cybercrime, although attackers often use techniques like VPNs to hide their real IP address." },
            { q: "What is a 'man-in-the-middle' (MitM) attack?", options: ["An attack where the attacker secretly relays and possibly alters the communication between two parties", "A physical attack on a data center", "An attack that happens in the middle of the night", "A social media argument"], answer: "An attack where the attacker secretly relays and possibly alters the communication between two parties", explanation: "In a MitM attack, the attacker positions themselves between two communicating parties to intercept, read, and possibly alter the data being exchanged, without either party knowing their conversation is compromised." },
            { q: "What is the 'Digital Millennium Copyright Act' (DMCA)?", options: ["An Indian copyright law", "A United States copyright law that criminalizes the circumvention of anti-piracy measures", "A global treaty on copyright", "A software for detecting copyright infringement"], answer: "A United States copyright law that criminalizes the circumvention of anti-piracy measures", explanation: "The DMCA is a significant US law that has a global impact. It provides a 'takedown notice' system for online service providers to remove infringing content and criminalizes the production and dissemination of technology that circumvents copyright protection measures." },
            { q: "What is the legal challenge with 'cloud computing' and jurisdiction?", options: ["There are no challenges", "Determining which country's laws apply when data is stored on servers in multiple countries", "Cloud computing is illegal", "The cloud is a single jurisdiction"], answer: "Determining which country's laws apply when data is stored on servers in multiple countries", explanation: "Since cloud data can be stored and replicated across servers in different countries, it creates a complex jurisdictional issue. It can be difficult to determine which country's law enforcement has the right to access the data and which country's privacy laws apply." }
          ],
        8: [
            { q: "What is the key principle established by Section 4 of the Information Technology (IT) Act, 2000, regarding electronic records?", options: ["Electronic records must be printed to be valid", "Electronic records shall be deemed to satisfy any requirement for a document to be in writing or typewritten", "Electronic records are only valid for commercial use", "Electronic records must be secured with a quantum key"], answer: "Electronic records shall be deemed to satisfy any requirement for a document to be in writing or typewritten", explanation: "Section 4 provides legal recognition to electronic records, ensuring that where any law requires information to be in writing or in the form of a document, an electronic record fulfills that requirement." },
            { q: "Under the IT Act, who is empowered to be the Adjudicating Officer for imposing penalties for contraventions under the Act?", options: ["Any Magistrate of the first class", "A specially designated retired High Court Judge", "Any officer of the Central Government not below the rank of Director", "The Controller of Certifying Authorities"], answer: "Any officer of the Central Government not below the rank of Director", explanation: "Section 46 of the IT Act empowers the Central Government to appoint any officer not below the rank of Director to be an Adjudicating Officer to adjudicate cases where the compensation or penalty does not exceed a certain limit." },
            { q: "What is the offense and punishment for 'unauthorized access to a protected system' under Section 70 of the IT Act?", options: ["Up to 1 year imprisonment and fine", "Simple trespass fine only", "Life imprisonment and fine", "Imprisonment up to 10 years and also fine"], answer: "Imprisonment up to 10 years and also fine", explanation: "A 'protected system' is a computer resource designated by the Central Government. Unauthorized access to such a system is treated as a very serious offense, punishable with imprisonment which may extend to ten years and a fine." },
            { q: "What liability does a Certifying Authority (CA) face if it issues a Digital Signature Certificate (DSC) without exercising due diligence?", options: ["No liability, as it is a government function", "A fine of up to Rs. 25,000 only", "Imprisonment up to two years or fine up to one lakh rupees, or both", "Suspension of their license only"], answer: "Imprisonment up to two years or fine up to one lakh rupees, or both", explanation: "Section 30 of the IT Act imposes a responsibility of due diligence on a CA. Section 33 stipulates the penalty, ensuring CAs follow all regulations and procedures before issuing a DSC to maintain its trustworthiness." },
            { q: "What offense is covered by Section 67 of the IT Act?", options: ["Cyber trespass", "Publishing or transmitting of obscene material in electronic form", "Identity theft", "Hacking a government website"], answer: "Publishing or transmitting of obscene material in electronic form", explanation: "Section 67 deals with the publication, transmission, or causing to be published or transmitted, any material which is lascivious or appeals to the prurient interest, in any electronic form." },
            { q: "What is 'metadata' and why is it legally important?", options: ["Data that is irrelevant for a case", "Data about data; it is crucial for establishing timelines, authorship, and integrity of electronic evidence", "Data stored in the cloud; it is not admissible", "Data that can be easily changed"], answer: "Data about data; it is crucial for establishing timelines, authorship, and integrity of electronic evidence", explanation: "Metadata, such as 'creation date', 'last modified date', or 'geo-location tags', provides important context for electronic records and is vital in forensic analysis to authenticate the primary evidence." },
            { q: "Section 78 of the IT Act provides for what protection to Government officers?", options: ["Absolute immunity from all cyber offenses", "Protection for acts done in good faith under the Act, which is commonly referred to as sovereign function immunity", "Protection only from civil suits, not criminal", "Protection only for acts done in a private capacity"], answer: "Protection for acts done in good faith under the Act, which is commonly referred to as sovereign function immunity", explanation: "Section 78 (now omitted from the 2008 Amendment, but a principle of law) and the general principles of the Act provide protection to the Central/State Governments and their officers for anything done in good faith under the Act, safeguarding them against frivolous lawsuits for legitimate action." },
            { q: "What is the key challenge regarding 'cross-border data transfer' under the proposed DPDP Act?", options: ["It is completely banned", "It requires data to be encrypted at all times", "Determining which countries or territories are allowed to receive personal data, based on their own data protection standards", "Data must be stored on local servers before being transferred"], answer: "Determining which countries or territories are allowed to receive personal data, based on their own data protection standards", explanation: "The DPDP Act allows for the transfer of personal data outside India, but the government can restrict transfer to certain notified territories based on an assessment of their data protection laws and reciprocity." },
            { q: "What is the offense of 'tampering with computer source documents' under Section 65 of the IT Act?", options: ["Copying the source code", "Hiding the source code from the owner", "Intentionally concealing, destroying, or altering any computer source code used for a computer resource", "Sharing the source code with others"], answer: "Intentionally concealing, destroying, or altering any computer source code used for a computer resource", explanation: "Section 65 aims to protect the integrity of the source code, which is the intellectual property and functional blueprint of a software. Tampering with it is punishable with imprisonment up to three years, or with a fine which may extend to two lakh rupees, or both." },
            { q: "Under what conditions can the Government direct 'interception, monitoring, or decryption' of information under the IT Act?", options: ["Only with the consent of the user", "In the interest of the sovereignty or security of the nation, public order, or preventing incitement to a crime, with a valid order", "Only during a state of emergency", "Only after a final court judgment"], answer: "In the interest of the sovereignty or security of the nation, public order, or preventing incitement to a crime, with a valid order", explanation: "Section 69 of the IT Act allows the Central or State government to direct any agency to intercept, monitor, or decrypt information for specified reasons, but only after following a strict legal process and issuing a written order." }

          9: [
                { q: "What is the most immediate action an intermediary must take upon receiving a valid 'takedown notice' regarding illegal content, as per IT Rules?", options: ["Forward the notice to the user and wait 30 days", "Ignore the notice if the content is not in their jurisdiction", "Remove or disable access to the content within 24 to 36 hours, depending on the nature of the content", "Obtain a court order before taking any action"], answer: "Remove or disable access to the content within 24 to 36 hours, depending on the nature of the content", explanation: "The IT Rules mandate swift action. For content relating to nudity or sexual abuse, the intermediary must act within 24 hours. For other specific illegal content, the timeframe is typically 36 hours after receiving a court order or a government notification." },
                { q: "What is the primary difference between a 'Digital Signature' and an 'Electronic Signature' under the IT Act, 2000 (as amended in 2008)?", options: ["Digital Signature is only for banks; Electronic Signature is for all users", "Digital Signature must use asymmetric crypto system and hash function; Electronic Signature is a broader term encompassing various methods, including Digital Signature", "Digital Signature is only for PDFs; Electronic Signature is for all documents", "There is no legal difference, they are synonyms"], answer: "Digital Signature must use asymmetric crypto system and hash function; Electronic Signature is a broader term encompassing various methods, including Digital Signature", explanation: "The 2008 amendment broadened the term to 'Electronic Signature' to be technology-neutral (Section 3A). The earlier 'Digital Signature' (Section 3) is a specific, technically defined type of electronic signature that relies on cryptography and CAs." },
                { q: "What is the principle of 'extraterritoriality' as applied to cybercrime under the IT Act?", options: ["The Act is only applicable within India", "The Act applies to any person, regardless of nationality, if the offense involves a computer resource located in India", "The Act only applies to Indian citizens abroad", "The Act only applies if the crime is committed in a foreign country"], answer: "The Act applies to any person, regardless of nationality, if the offense involves a computer resource located in India", explanation: "Section 1(2) read with Section 75 of the IT Act extends its jurisdiction. If a crime is committed outside India by any person, but it targets a computer, network, or data located in India, the Indian courts have jurisdiction." },
                { q: "What is 'Cybersquatting'?", options: ["A type of hacking", "Registering a domain name of a famous brand or person in bad faith to sell it back at a higher price or harm their business", "Squatting in front of a computer", "A type of secure hosting"], answer: "Registering a domain name of a famous brand or person in bad faith to sell it back at a higher price or harm their business", explanation: "Cybersquatting is the practice of registering names, especially brand names, as domain names with the intention of profiting from the goodwill associated with the name, typically by holding it for ransom or selling it to the rightful owner for an exorbitant price." },
                { q: "What was the role of the 'Cyber Appellate Tribunal' (CAT) under the IT Act, 2000?", options: ["To try all cybercrime cases", "To hear appeals from the orders of the Adjudicating Officer and the Controller of Certifying Authorities", "To develop new cyber laws", "To provide cybersecurity training"], answer: "To hear appeals from the orders of the Adjudicating Officer and the Controller of Certifying Authorities", explanation: "The CAT was established to hear and dispose of appeals against orders passed by the Adjudicating Officer or the CCA. Its functions were later transferred to the Telecom Disputes Settlement and Appellate Tribunal (TDSAT)." },
                { q: "What is the concept of 'reasonable security practices' for a body corporate holding sensitive personal data or information (SPDI)?", options: ["The best security in the world", "The practices and procedures specified in the IT Act rules, aimed at protecting SPDI from unauthorized access, loss, or disclosure", "Any security that the company feels is adequate", "Security that is easy to implement"], answer: "The practices and procedures specified in the IT Act rules, aimed at protecting SPDI from unauthorized access, loss, or disclosure", explanation: "Section 43A of the IT Act (and the corresponding SPDI Rules) mandates that a body corporate handling SPDI must implement 'reasonable security practices and procedures' to protect the data, or be liable to pay compensation for negligence." },
                { q: "How does the law generally distinguish between 'ethical hacking' (penetration testing) and 'malicious hacking'?", options: ["Ethical hacking is done for free; malicious hacking is paid", "Ethical hacking is done with the express, written permission of the system owner and for the purpose of identifying and fixing vulnerabilities", "The law does not distinguish between the two", "Malicious hacking uses better tools"], answer: "Ethical hacking is done with the express, written permission of the system owner and for the purpose of identifying and fixing vulnerabilities", explanation: "The key legal distinction lies in **consent** and **intent**. Ethical hacking is legal because it is performed under contract, with explicit authorization, and its intent is to improve security, whereas malicious hacking is unauthorized and has the intent to cause wrongful loss or gain." },
                { q: "What is the legal standing of 'spamming' (sending unsolicited commercial electronic messages) in India?", options: ["It is a criminal offense punishable by imprisonment", "There is no specific law directly banning all commercial spamming; it is primarily addressed by TRAI regulations for mobile and telecom networks", "It is only illegal if it contains obscene material", "It is completely legal and unregulated"], answer: "There is no specific law directly banning all commercial spamming; it is primarily addressed by TRAI regulations for mobile and telecom networks", explanation: "The IT Act does not have a specific anti-spam provision, but TRAI (Telecom Regulatory Authority of India) rules govern unsolicited commercial communication on mobile and telecom networks. Spamming can be penalized if it violates privacy rules or constitutes harassment/cyber trespass." },
                { q: "Under the IT Act, when is a contract formed in an e-commerce transaction?", options: ["When the goods are physically delivered", "When the offer is made", "When the acceptance of the offer is received by the originator, typically via a successful electronic transmission", "When the payment is cleared by the bank"], answer: "When the acceptance of the offer is received by the originator, typically via a successful electronic transmission", explanation: "The IT Act's provisions generally follow the contract law principle that a contract is formed upon the communication of acceptance. In the electronic environment, this is usually deemed to occur when the electronic record of acceptance enters the originator's designated computer resource (Section 13)." },
                { q: "What does the term 'WAP' (Wireless Application Protocol) generally relate to in the context of cyber law jurisdiction?", options: ["The law of war and peace", "A specific technology that raises questions about the jurisdiction of mobile and wireless cybercrimes", "A type of secured password", "A law related to international trade"], answer: "A specific technology that raises questions about the jurisdiction of mobile and wireless cybercrimes", explanation: "WAP was a technical standard for accessing information over a mobile wireless network. Legal challenges often arise from WAP/mobile-based cybercrimes because the jurisdictional point (where the offense occurred) can be difficult to pinpoint when the transaction involves a mobile device moving across different territories." }

    const quizArea = document.getElementById("quiz-area");

    // --- Dynamic Quiz Data Generation ---
    // This function fills in the levels that don't have real questions yet.
    function populateQuizData() {
      const topics = ["constitution", "criminal", "civil", "cyber"];
      const difficulties = ["easy", "medium", "hard"];
      for (const topic of topics) {
        for (const difficulty of difficulties) {
            for (let level = 1; level <= 10; level++) {
                if (!masterQuestionBank[topic]?.[difficulty]?.[level]) {
                    if (!masterQuestionBank[topic][difficulty]) masterQuestionBank[topic][difficulty] = {};
                    masterQuestionBank[topic][difficulty][level] = Array.from({ length: 10 }, (_, i) => ({ q: `Placeholder Question ${i + 1} for Level ${level}`, options: ["Option A", "Option B", "Option C", "Option D"], answer: "Option A", explanation: "This is a placeholder question. More real questions are coming soon!" }));
                }
            }
        }
      }
    }
    populateQuizData(); // Run the function to fill out the data structure.
    const quizData = masterQuestionBank; // Use the populated bank as the main quiz data.

    // --- Audio Functions ---
    function initAudio() {
        if (!audioContext) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.error("Web Audio API is not supported in this browser");
            }
        }
    }

    function playSound(type) {
        if (!audioContext) return;

        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        if (type === 'select') {
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        } else if (type === 'submit') {
            oscillator.type = 'triangle';
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.2);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        } else if (type === 'gavel') {
            oscillator.type = 'square';
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.2);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
    }

    function deleteAllQuizHistory() {
        if (confirm("Are you sure you want to delete all your quiz history? This action cannot be undone.")) {
            localStorage.removeItem('quizHistory');
            showHistory(); // Re-render the history view to show it's empty
        }
    }

    function setActiveLink(activeLink) {
        document.querySelectorAll('.header-nav .nav-link').forEach(link => {
            link.classList.remove('active');
        });
        if (activeLink) {
            activeLink.classList.add('active');
        }
    }

    function showHistory() {
        quizArea.innerHTML = ""; // Clear the area
        const historyKey = 'quizHistory';
        const history = JSON.parse(localStorage.getItem(historyKey)) || [];

        const historyContainer = document.createElement('div');
        historyContainer.className = 'history-container';

        let content = '<h2>📜 Quiz History</h2>';

        if (history.length === 0) {
            content += '<p>You have not completed any quizzes yet. Select one from the sidebar to get started!</p>';
        } else {
            history.forEach(item => {
                const date = new Date(item.date);
                const formattedDate = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                content += `
                    <div class="history-card">
                        <div class="history-details">
                            <div class="topic">${item.topic}</div>
                            <div class="meta">Difficulty: ${item.difficulty} | Level: ${item.level}</div>
                        </div>
                        <div class="history-score">
                            <div class="score">${item.score}/${item.total} (${item.percentage}%)</div>
                            <div class="date">${formattedDate}</div>
                        </div>
                    </div>
                `;
            });
            // Add the "Clear All" button at the bottom of the history list
            content += `
                <div style="width: 100%; text-align: center; margin-top: 2rem;">
                    <button onclick="deleteAllQuizHistory()" style="background-color: #ef4444; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                        Clear All History
                    </button>
                </div>
            `;
        }
        historyContainer.innerHTML = content;
        quizArea.appendChild(historyContainer);
    }

      initAudio(); // Initialize audio on first user interaction
      selectedDifficulty = difficultySelect.value;
      selectedTopic = topicSelect.value;
      selectedLevel = levelSelect.value;

      renderQuiz();

    });

        e.preventDefault();
        setActiveLink(historyLink);
        showHistory();
    });

    // Make it globally accessible for the onclick attribute
    window.deleteAllQuizHistory = deleteAllQuizHistory;

    function getHighScoreKey(topic, difficulty, level) {
        if (!topic || !difficulty || !level) return null;
        return `highScore-${topic}-${difficulty}-${level}`;

    function displayHighScore() {
        const highScoreDisplay = document.getElementById('high-score-display');
        if (selectedTopic && selectedDifficulty && selectedLevel) {
            const key = getHighScoreKey(selectedTopic, selectedDifficulty, selectedLevel);
            const highScore = localStorage.getItem(key) || 'N/A';
            highScoreDisplay.innerHTML = `Your High Score: <strong>${highScore}</strong>`;
            highScoreDisplay.style.display = 'block';

    function renderQuiz() {
      // Only render the quiz if both filters have a valid selection.
      if (!selectedDifficulty || !selectedTopic || !selectedLevel) {
        // This will preserve the initial welcome message until both filters are chosen.
        return;
      }

      const questions = quizData[selectedTopic]?.[selectedDifficulty]?.[selectedLevel];
      if (!questions || questions.length === 0) {
        quizArea.innerHTML = "<h2>No questions available for this filter.</h2>";
        return;
      }

      quizArea.innerHTML = ""; // Clear previous quiz

      answeredQuestions.clear();

      const progressContainer = document.createElement('div');
      progressContainer.id = 'quiz-progress-container';
      progressContainer.innerHTML = `<div id="quiz-progress-bar"></div>`;
      quizArea.appendChild(progressContainer);

      questions.forEach((q, index) => {
        // Create card
        const card = document.createElement("div");
        card.className = "question-card";
        card.id = `question-card-${index}`;
        // Add staggered animation
        card.style.animation = `card-fade-in 0.5s ease-out ${index * 100}ms forwards`;
        card.style.opacity = 0; // Start hidden

        // Create question title
        const title = document.createElement("h4");
        title.textContent = `Q${index + 1}: ${q.q}`;
        card.appendChild(title);

        // Create options container
        const optionsDiv = document.createElement("div");
        optionsDiv.className = "options";
        q.options.forEach((opt, optIndex) => {
          const optionId = `q${index}-opt${optIndex}`;
          const label = document.createElement("label");
          label.htmlFor = optionId;
          label.className = "option-label";
          label.textContent = opt;

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q${index}`;
          radio.value = opt;
          radio.id = optionId;
          radio.onchange = () => {
            playSound('select');
            if (!answeredQuestions.has(index)) {
              answeredQuestions.add(index);
              updateProgressBar(questions.length);
            }
          };

          // Insert radio before label for the + selector to work
          optionsDiv.appendChild(radio);
          optionsDiv.appendChild(label);
        });
        card.appendChild(optionsDiv);

        quizArea.appendChild(card);
      });

      // Add a single submit button at the end
      const footer = document.createElement("div");
      footer.id = "quiz-footer";
      const submitButton = document.createElement("button");
      submitButton.textContent = "Submit Quiz";
      submitButton.onclick = submitQuiz;
      footer.appendChild(submitButton);
      quizArea.appendChild(footer);
    }

    function updateProgressBar(totalQuestions) {
        const progressBar = document.getElementById('quiz-progress-bar');
        if (progressBar) {
            const progress = (answeredQuestions.size / totalQuestions) * 100;
            progressBar.style.width = `${progress}%`;
        }
    }

    function getVerdict(score, total) {
        const percentage = (score / total) * 100;
        if (percentage < 50) return "Legal Rookie 🥉";
        if (percentage < 90) return "Rights Protector 🥈";
        return "Legal Expert 🥇";
    }

    function submitQuiz() {
      playSound('submit');
      const questions = quizData[selectedTopic]?.[selectedDifficulty]?.[selectedLevel];
      if (!questions) return;

      let score = 0; // ... (no changes to this function logic)
      questions.forEach((q, index) => {
        const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
        const options = document.querySelectorAll(`input[name="q${index}"]`);
        
        options.forEach(opt => {
          const label = opt.nextElementSibling;
          if (opt.value === q.answer) {
            label.classList.add("option-correct");
          }
          if (selectedOption && opt.value === selectedOption.value && selectedOption.value !== q.answer) {
            label.classList.add("option-incorrect");
          }

          opt.disabled = true;
        });

        if (selectedOption && selectedOption.value === q.answer) {
          score++;
        }

        // Add explanation after submission (once per card)
        if (q.explanation) {
            const card = document.getElementById(`question-card-${index}`);
            const explanationP = document.createElement('p');
            explanationP.className = 'explanation';
            explanationP.innerHTML = `💡 <strong>Explanation:</strong> ${q.explanation}`;
            card.appendChild(explanationP);
        }
      });

      const key = getHighScoreKey(selectedTopic, selectedDifficulty, selectedLevel);
      const currentHighScore = parseInt(localStorage.getItem(key) || '0');
      let isNewHighScore = false;

      if (score > currentHighScore) {
          localStorage.setItem(key, score);
          isNewHighScore = true;
      }

      // Save to history
      const historyKey = 'quizHistory';
      let history = JSON.parse(localStorage.getItem(historyKey)) || [];
      const newEntry = {
          topic: topicSelect.options[topicSelect.selectedIndex].text,
          difficulty: selectedDifficulty,
          level: selectedLevel,
          score: score,
          total: questions.length,
          percentage: Math.round((score / questions.length) * 100),
          date: new Date().toISOString()
      };
      history.unshift(newEntry); // Add to the beginning
      if (history.length > 20) history.pop(); // Keep history to a reasonable size
      localStorage.setItem(historyKey, JSON.stringify(history));

      // Check for a perfect score and trigger confetti
      if (score === questions.length) {
        confetti({
          particleCount: 200,
          spread: 100,
          origin: { y: 0.6 }
        });
      }

      // Hide the progress bar as it's no longer needed
      const progressContainer = document.getElementById('quiz-progress-container');
      if (progressContainer) {
          progressContainer.style.display = 'none';
      }

      // Create and display final results card
      const resultsCard = document.createElement("div");
      resultsCard.className = "results-card";
      const verdict = getVerdict(score, questions.length);
      const percentage = (score / questions.length) * 100;
      const finalHighScore = localStorage.getItem(key) || score;
      const resultColor = percentage >= 50 ? 'var(--correct)' : 'var(--incorrect)';

      const radius = 54;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (percentage / 100) * circumference;

        resultsCard.innerHTML = `
            <div class="score-circle-container">
                <svg class="score-circle-svg" width="140" height="140" viewBox="0 0 120 120">
                    <circle class="score-circle-bg" cx="60" cy="60" r="${radius}"></circle>
                    <circle class="score-circle-fg" cx="60" cy="60" r="${radius}" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"></circle>
                </svg>
                <div class="score-circle-text" style="color: ${resultColor}; font-size: 2.2rem;">${Math.round(percentage)}%</div>
            </div>
            <div class="score-details mt-4">
                <div class="verdict" style="color: ${resultColor};">${verdict}</div>
                <p class="text-lg text-slate-300 mt-2">You scored <strong>${score}</strong> out of <strong>${questions.length}</strong> correctly.</p>
                ${isNewHighScore ? `<p class="highscore-text mt-2 text-lg">🎉 New High Score!</p>` : `<p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">High Score: ${finalHighScore}</p>`}
            </div>
            <model-viewer id="gavel-model" class="results-model" src="models/gavel.glb" alt="Judge's Gavel" camera-controls disable-zoom shadow-intensity="1" interaction-prompt="none" environment-image="neutral" exposure="1.2"></model-viewer>
        `;
      // Animate the circle
      const circleFg = resultsCard.querySelector('.score-circle-fg');
      circleFg.style.stroke = resultColor; // Set the circle color based on score
      setTimeout(() => {
        circleFg.style.strokeDashoffset = offset;
      }, 100);

      // If it's a new high score, play the gavel animation!
      if (isNewHighScore) {
          const gavelModel = resultsCard.querySelector('#gavel-model');
          if (gavelModel) {
              // The model-viewer's play() method is smart and will wait for the model to load.
              // We'll add a small delay for dramatic effect and play a sound.
              setTimeout(() => {
                gavelModel.play({ repetitions: 1 });
                playSound('gavel');
              }, 500);
          }
      }

      quizArea.appendChild(resultsCard);
      // Add submitted class to quiz area and disable button
      quizArea.classList.add("submitted");
      const footer = document.getElementById("quiz-footer");
      footer.innerHTML = ''; // Clear the submit button
      const tryAgainButton = document.createElement('button');
      tryAgainButton.textContent = 'Choose Another Quiz';
      tryAgainButton.onclick = () => { // ... (no changes to this function logic)
        setActiveLink(quizPortalLink);
        resetQuiz();
      };
      tryAgainButton.style.background = 'var(--surface2)';
      tryAgainButton.style.color = 'var(--text-primary)'; // Set text color to be light
      footer.appendChild(tryAgainButton);
    }


    // Initial call on page load
    resetQuiz();
  </script>
</body>
</html>
