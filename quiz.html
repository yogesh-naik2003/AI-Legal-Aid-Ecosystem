                { q: "The **Writ of Habeas Corpus** can be issued against:", options: ["Only the Central Government", "Only the police authorities", "Public authorities as well as **private individuals** who illegally detain a person", "Only judicial officers"], answer: "Public authorities as well as **private individuals** who illegally detain a person", explanation: "Habeas Corpus is the only writ that can be issued against both public authorities and private persons involved in illegal detention, making it the most fundamental remedy for liberty." },
                { q: "Which body is the **highest executive non-constitutional** authority for planning and policy formulation in India?", options: ["Finance Commission", "National Development Council (NDC)", "NITI Aayog (National Institution for Transforming India)", "Union Public Service Commission (UPSC)"], answer: "NITI Aayog (National Institution for Transforming India)", explanation: "NITI Aayog, established via an executive resolution, serves as the government's premier policy 'think-tank', replacing the Planning Commission." },
                { q: "What is the key safeguard provided to Civil Servants under **Article 311** of the Constitution?", options: ["The right to strike and form associations", "The right to appeal directly to the Supreme Court for all service matters", "A right to an **inquiry and reasonable opportunity** to be heard before dismissal, removal, or reduction in rank", "Immunity from criminal prosecution for all official acts"], answer: "A right to an **inquiry and reasonable opportunity** to be heard before dismissal, removal, or reduction in rank", explanation: "Article 311(2) provides procedural safeguards against arbitrary punitive action (dismissal, removal, or reduction in rank) against civil servants." },
                { q: "Which of the following is **NOT** a provision in the **Second Schedule** of the Constitution?", options: ["Emoluments, allowances, and privileges of the President", "Emoluments and allowances of the Speaker of the Lok Sabha", "The **form of Oaths or Affirmations** for high functionaries", "Salaries of the Judges of the Supreme Court and High Courts"], answer: "The **form of Oaths or Affirmations** for high functionaries", explanation: "The form of Oaths or Affirmations for high functionaries is contained in the **Third Schedule** of the Constitution; the Second Schedule focuses on emoluments and privileges." }
            ],

           7: [
                { q: "The provision for appointing **Ad Hoc Judges** in the Supreme Court is covered by which Article of the Constitution?", options: ["Article 124", "Article 127", "Article 131", "Article 142"], answer: "Article 127", explanation: "Article 127 provides for the appointment of ad hoc judges by the Chief Justice of India with the prior consent of the President, when there is a lack of quorum to hold or continue a session of the Court." },
                { q: "The **Doctrine of Proportionality** is generally applied by the judiciary as a test of the validity of state action under which Article of the Constitution?", options: ["Article 32", "Article 15", "Article 21 (Right to Life and Personal Liberty)", "Article 265"], answer: "Article 21 (Right to Life and Personal Liberty)", explanation: "The Proportionality test is used to weigh the necessity of a state measure against its impact on an individual's fundamental rights, ensuring the action is 'just, fair, and reasonable' under Article 21." },
                { q: "What is the **maximum duration** for which an **Ordinance** issued by the President or a Governor can remain in force without being approved by the Legislature?", options: ["Six weeks from the reassembly of the Parliament/Legislature", "Six months from its promulgation", "Six months and six weeks", "One year, non-renewable"], answer: "Six months and six weeks", explanation: "This represents the maximum possible life of an Ordinance: six months (maximum gap between sessions) plus six weeks (mandatory period for approval after reassembly)." },
                { q: "The **Committee on Public Undertakings** primarily examines the reports and accounts of which entities?", options: ["Only the accounts of the Ministries of the Union Government", "Only defense-related government enterprises", "The **Central Public Sector Enterprises (CPSEs)** and the reports of the CAG relating to them", "Only private sector companies that have received government loans"], answer: "The **Central Public Sector Enterprises (CPSEs)** and the reports of the CAG relating to them", explanation: "The committee's mandate is specifically to examine the working and financial accountability of government-owned commercial organizations (CPSEs)." },
                { q: "Which **Directive Principle of State Policy** (DPSP) calls upon the State to secure a **Uniform Civil Code** for all citizens throughout the territory of India?", options: ["Article 39A", "Article 40", "Article 44", "Article 48"], answer: "Article 44", explanation: "Article 44 is the DPSP that directs the state to endeavor to secure a Uniform Civil Code for the citizens." },
                { q: "What is the legal status of an amendment to the Constitution (under Article 368) after the **Kesavananda Bharati** judgment?", options: ["It is considered a 'law' under Article 13 and can be invalidated entirely by the Supreme Court.", "It is **not** a 'law' under Article 13, but the Parliament cannot amend or alter the **Basic Structure** of the Constitution.", "It can be passed by a simple majority in Parliament.", "It is completely immune from judicial review."], answer: "It is **not** a 'law' under Article 13, but the Parliament cannot amend or alter the **Basic Structure** of the Constitution.", explanation: "This landmark ruling clarified the distinction between an ordinary law and a constitutional amendment, while simultaneously limiting the amending power via the Basic Structure Doctrine." },
                { q: "What is the **'Sunset Clause'** relating to the Parliamentary approval of a National Emergency?", options: ["The emergency must be revoked at sunset", "The emergency automatically expires after **one month** unless approved by a special majority in both Houses of Parliament", "The emergency must be approved by the Supreme Court within six months", "The emergency can only last for six months at a time"], answer: "The emergency automatically expires after **one month** unless approved by a special majority in both Houses of Parliament", explanation: "This time-bound provision (inserted by the 44th Amendment) ensures that the emergency ceases to operate if it is not ratified by Parliament within one month of its proclamation." },
                { q: "Which principle allows the Parliament to legislate on subjects outside the territory of India, provided there is a genuine link with India?", options: ["Doctrine of Pith and Substance", "Doctrine of Colourable Legislation", "Principle of **Extra-Territorial Operation** based on Territorial Nexus", "Doctrine of Waiver"], answer: "Principle of **Extra-Territorial Operation** based on Territorial Nexus", explanation: "Article 245 gives Parliament the power to make laws with extra-territorial application, provided there is a sufficient connection or nexus between the law and the object in India." },
                { q: "Which constitutional body was established by inserting a new Article $\\text{338A}$ through the **89th Amendment Act**?", options: ["National Commission for Scheduled Castes (NCSC)", "National Commission for Scheduled Tribes (NCST)", "National Commission for Backward Classes (NCBC)", "Election Commission of India (ECI)"], answer: "National Commission for Scheduled Tribes (NCST)", explanation: "The 89th Amendment Act of 2003 bifurcated the joint commission for SCs and STs, creating the separate National Commission for Scheduled Tribes (NCST) under Article 338A." },
                { q: "Which constitutional amendment introduced the **Goods and Services Tax (GST)** and established the **GST Council**?", options: ["97th Amendment Act", "100th Amendment Act", "101st Amendment Act", "103rd Amendment Act"], answer: "101st Amendment Act", explanation: "The 101st Amendment Act, 2016, introduced the Goods and Services Tax (GST) and inserted Article 279A to provide for the GST Council." }
            ],

            8: [
                { q: "What is the primary legal ground for challenging the action of a legislative or executive body under the **Doctrine of Colourable Legislation**?", options: ["The law violates a Fundamental Right", "The law is **not within the legislative competence** of the enacting body", "The law is retrospective in nature", "The law is arbitrary or discriminatory"], answer: "The law is **not within the legislative competence** of the enacting body", explanation: "The doctrine tests the legislative power of the enacting body, checking if it has indirectly made a law on a subject it is not empowered to legislate upon, masking the true nature of the law." },
                { q: "What is the constitutional purpose of the **Special Leave Petition (SLP)** under **Article 136** of the Constitution?", options: ["To grant the Supreme Court original jurisdiction over state disputes", "To **grant the Supreme Court residual power** to hear an appeal from any court or tribunal in India, at its discretion", "To allow a trial court to refer a constitutional question to the Supreme Court", "To provide the final remedy after a review petition has been dismissed"], answer: "To **grant the Supreme Court residual power** to hear an appeal from any court or tribunal in India, at its discretion", explanation: "Article 136 is the extraordinary, discretionary, and residuary power of the Supreme Court, allowing it to grant special leave to appeal from any judgment or order passed by any court or tribunal in the country." },
                { q: "The power of the High Court to punish for its **Contempt** is a power derived from which of the following?", options: ["A simple majority vote by the State Legislature", "The **Contempt of Courts Act, 1971**, and its status as a **Court of Record** (Article 215)", "An executive order by the State Governor", "A resolution passed by the State Cabinet"], answer: "The **Contempt of Courts Act, 1971**, and its status as a **Court of Record** (Article 215)", explanation: "Article 215 makes the High Court a Court of Record and explicitly grants it the power to punish for its own contempt, regulated by the 1971 Act." },
                { q: "What does the concept of **'Fraternity'** in the Preamble of the Constitution essentially seek to assure?", options: ["Economic equality for all citizens", "Only political unity among all states", "The **dignity of the individual** and the **unity and integrity of the Nation**", "Abolition of all forms of untouchability"], answer: "The **dignity of the individual** and the **unity and integrity of the Nation**", explanation: "The Preamble explicitly states that Fraternity is to assure the dignity of the individual and the unity and integrity of the Nation, encouraging a sense of common brotherhood." },
                { q: "The **Eighth Schedule** of the Constitution originally listed how many languages?", options: ["14", "18", "22", "29"], answer: "14", explanation: "The Eighth Schedule originally listed 14 languages at the commencement of the Constitution. The list was subsequently expanded by amendments." },
                { q: "The **Residuary Powers** of legislation in India are vested exclusively in the Union Parliament. This is provided for in which Article?", options: ["Article 245", "Article 246", "Article 248", "Article 254"], answer: "Article 248", explanation: "Article 248 grants the Parliament exclusive power to make any law with respect to any matter not enumerated in the Concurrent List or State List." },
                { q: "The **National Human Rights Commission (NHRC)** is what kind of body?", options: ["A constitutional body established under Article 338", "A **statutory body** established under the Protection of Human Rights Act, 1993", "An executive body established by a government resolution", "An independent body under the control of the Supreme Court"], answer: "A **statutory body** established under the Protection of Human Rights Act, 1993", explanation: "The NHRC was created by an Act of Parliament (Protection of Human Rights Act, 1993), not the Constitution, making it a statutory body." },
                { q: "Which of the following bills **cannot** be referred to a **Joint Sitting** of the Parliament?", options: ["An Ordinary Bill", "A Financial Bill (not a Money Bill)", "A Bill amending the **Constitution** (under Article 368)", "A Bill that has been rejected by one House"], answer: "A Bill amending the **Constitution** (under Article 368)", explanation: "Article 108 explicitly states that the provisions of a joint sitting do not apply to a Bill to amend the Constitution, as it requires separate special majorities in both Houses." },
                { q: "What is the key role of the **Delimitation Commission** (Article 82) in the context of the Election Commission?", options: ["To decide on the date of the general elections", "To register new political parties and allot symbols", "To **re-adjust the allocation of seats** in the Lok Sabha and State Assemblies based on population census", "To hold inquiries into allegations of election malpractice"], answer: "To **re-adjust the allocation of seats** in the Lok Sabha and State Assemblies based on population census", explanation: "The Commission is tasked with redrawing boundaries of constituencies to ensure that the ratio of the population to the number of seats remains the same, fulfilling the principle of 'one person, one vote, one value'." },
                { q: "Which of the following is **NOT** a Fundamental Right available only to **Citizens** of India?", options: ["Article 15 (Prohibition of discrimination on grounds of religion, race, caste, sex or place of birth)", "Article 16 (Equality of opportunity in matters of public employment)", "Article 21 (Protection of **Life and Personal Liberty**)", "Article 19 (Six rights regarding freedom of speech, assembly, association, movement, residence, and profession)"], answer: "Article 21 (Protection of **Life and Personal Liberty**)", explanation: "Article 21 is a fundamental right guaranteed to **every person**, including citizens and foreigners, residing in the territory of India." }
            ],

             9: [
                { q: "What is the **Constitutional Validity of Judicial Review** in India primarily derived from?", options: ["The Preamble to the Constitution", "Articles **13**, 32, 226, 131, and 132-136 of the Constitution", "A special Act of the Parliament passed in 1950", "The inherent powers of the Supreme Court as a Court of Record (Article 129)"], answer: "Articles **13**, 32, 226, 131, and 132-136 of the Constitution", explanation: "Judicial review is not explicitly named but is implicitly granted by these articles, particularly Article 13 which gives the power to strike down laws inconsistent with Fundamental Rights." },
                { q: "The **Pardoning Power** of the President/Governor is subject to which major limitation established by the Supreme Court?", options: ["It can only be exercised after the conclusion of the trial", "It can be exercised only on the advice of the Council of Ministers, and is **subject to judicial review** to check for arbitrariness", "It is an absolute power and cannot be questioned by any court", "It can only be exercised for civil offenses, not criminal offenses"], answer: "It can be exercised only on the advice of the Council of Ministers, and is **subject to judicial review** to check for arbitrariness", explanation: "The Supreme Court ruled that the pardoning power, though a high executive function, is not immune from judicial review on grounds that it was exercised arbitrarily or in bad faith." },
                { q: "What is the constitutional requirement for **taxation** in India?", options: ["Taxes can be levied by an executive order of the President", "Taxes can be levied by a simple resolution of the Parliament", "**No tax shall be levied or collected except by authority of law** (Article 265)", "Taxes must be approved by the Finance Commission"], answer: "**No tax shall be levied or collected except by authority of law** (Article 265)", explanation: "Article 265 is the constitutional provision for taxation, enshrining the principle of 'no taxation without representation' by requiring a validly enacted law for levying any tax." },
                { q: "What is the function of the **Business Advisory Committee (BAC)** in the Parliament?", options: ["To decide on the salaries and allowances of MPs", "To **recommend the allocation of time** for various stages of government business and legislative and other business", "To examine the rules and regulations made by the Executive", "To resolve disputes between the Speaker and the Chairman"], answer: "To **recommend the allocation of time** for various stages of government business and legislative and other business", explanation: "The BAC is essential for managing the legislative schedule and ensuring that business is completed efficiently by allocating time for discussions and debates." },
                { q: "A legislator is disqualified under **Article 102** for holding an **'Office of Profit'**. The list of offices exempted from this disqualification is determined by:", options: ["The Supreme Court, by passing a judgment", "The **Parliament**, by enacting the **Parliament (Prevention of Disqualification) Act**", "The President, via an executive order", "The Election Commission, via a notification"], answer: "The **Parliament**, by enacting the **Parliament (Prevention of Disqualification) Act**", explanation: "Article 102(1)(a) explicitly grants Parliament the power to define which office shall not disqualify its holder, which is done through a specific Act of Parliament." },
                { q: "What is the principle of **'Stare Decisis'** in the context of the Supreme Court (Article 141)?", options: ["The Supreme Court must follow its previous decisions unconditionally", "The Supreme Court's decisions are binding only on the lower courts", "The law declared by the Supreme Court is **binding on all courts and tribunals** in India", "Only the ratio decidendi of the Supreme Court is binding"], answer: "The law declared by the Supreme Court is **binding on all courts and tribunals** in India", explanation: "Article 141 mandates that the law declared by the Supreme Court shall be binding on all courts and tribunals throughout the territory of India, embodying the principle of judicial precedent." },
                { q: "What is the **97th Constitutional Amendment Act, 2011**, significant for?", options: ["Inserting the Right to Education", "Giving **constitutional status and protection to Co-operative Societies**", "Capping the size of the Council of Ministers", "Introducing the Goods and Services Tax (GST)"], answer: "Giving **constitutional status and protection to Co-operative Societies**", explanation: "The 97th Amendment inserted Article 43B (DPSP) and Part IX-B to promote and give constitutional recognition to cooperative societies." },
                { q: "The **Right to know** (about government affairs) is judicially interpreted as flowing from which Fundamental Right?", options: ["Article 21 (Right to Life)", "Article 19(1)(a) (**Freedom of Speech and Expression**)", "Article 14 (Equality)", "Article 32 (Right to Constitutional Remedies)"], answer: "Article 19(1)(a) (**Freedom of Speech and Expression**)", explanation: "The Supreme Court has expanded Article 19(1)(a) to include the right to receive and impart information, making the right to know a fundamental right." },
                { q: "What is the constitutional basis for the **Official Language of the Union** of India?", options: ["The Eighth Schedule (all 22 languages)", "**Hindi in Devanagari script** and **English** (Article 343)", "Only Hindi in the Devanagari script", "The language of the state with the largest population"], answer: "**Hindi in Devanagari script** and **English** (Article 343)", explanation: "Article 343(1) declares Hindi in Devanagari script as the official language, and the continued use of English is provided for by the Official Languages Act, 1963." },
                { q: "What is the key role of the **Public Undertakings Committee**?", options: ["To oversee the administration of all private sector companies", "To examine the reports and accounts of all **Central Public Sector Enterprises (CPSEs)**", "To scrutinize the accounts of the Union Government generally", "To recommend the establishment of new public sector enterprises"], answer: "To examine the reports and accounts of all **Central Public Sector Enterprises (CPSEs)**", explanation: "The committee's mandate is specifically to examine the financial accountability and efficiency of government-owned businesses (CPSEs)." }
            ],

             10: [
                { q: "Which of the following bodies is **NOT** classified as an **'Extra-Constitutional'** body?", options: ["National Development Council (NDC)", "NITI Aayog", "National Human Rights Commission (NHRC)", "The **Election Commission of India (ECI)**"], answer: "The **Election Commission of India (ECI)**", explanation: "The ECI is a constitutional body established under Article 324, whereas the others were established by executive resolution or statute." },
                { q: "The **Principle of Separation of Powers** is followed in India, but it is **not absolute** because of which feature?", options: ["The lack of Fundamental Rights", "The adoption of a **Parliamentary System of Government** (fusion of Executive and Legislature)", "The power of the President to dissolve the Lok Sabha", "The power of the Election Commission to decide on defection cases"], answer: "The adoption of a **Parliamentary System of Government** (fusion of Executive and Legislature)", explanation: "In a parliamentary system, the Executive (Council of Ministers) is drawn from and responsible to the Legislature, causing a functional overlap rather than a strict separation." },
                { q: "The **Governor** is generally appointed on the advice of the Union Cabinet. Which major Commission recommended that the Chief Minister of the State should be consulted by the President before appointing the Governor?", options: ["Rajamannar Committee", "**Sarkaria Commission**", "Punchhi Commission", "Kothari Commission"], answer: "**Sarkaria Commission**", explanation: "The Sarkaria Commission (1983) extensively reviewed Centre-State relations and specifically recommended that the Chief Minister's views be sought before appointing the Governor." },
                { q: "The Constitution specifies the subject matter of laws made by Parliament and State Legislatures by consolidating them into three lists. This is provided for in which Article?", options: ["Article 245", "Article 246", "Article 248", "Article 249"], answer: "Article 246", explanation: "Article 246 specifically lists the powers of Parliament and State Legislatures with respect to the Union List, State List, and Concurrent List (Seventh Schedule)." },
                { q: "The **Official Language Committee** (Article 344) is constituted after the expiration of how many years from the commencement of the Constitution?", options: ["5 years and then 10 years", "5 years and then **10 years**", "10 years only", "15 years only"], answer: "5 years and then **10 years**", explanation: "The committee is constituted by the President after five years and subsequently after ten years to recommend measures for the progressive use of the Hindi language for official purposes." },
                { q: "What is the key distinction between a **Censure Motion** and an **Adjournment Motion**?", options: ["A Censure Motion is against an individual minister; an Adjournment Motion is only against the entire council", "Censure Motion is to **express disapproval** of a policy; Adjournment Motion is to **draw attention** to an urgent matter by setting aside normal business", "Adjournment Motion is binding on the government; Censure Motion is not", "Censure Motion can be moved in Rajya Sabha; Adjournment Motion only in Lok Sabha"], answer: "Censure Motion is to **express disapproval** of a policy; Adjournment Motion is to **draw attention** to an urgent matter by setting aside normal business", explanation: "An Adjournment Motion is a procedural device to discuss a matter of urgent public importance, while a Censure Motion is a formal judgment of disapproval against the Council of Ministers or a specific policy." },
                { q: "What is the legal implication of the **'Substantive Due Process'** interpretation of Article 21, as adopted in the Maneka Gandhi case?", options: ["Only the written procedure must be followed strictly", "The law must be **fair, just, and reasonable**, in addition to being duly enacted", "All laws are subject to the death penalty", "Only the Supreme Court can interpret Article 21"], answer: "The law must be **fair, just, and reasonable**, in addition to being duly enacted", explanation: "This broader interpretation requires the procedure (law) to not be arbitrary, thus checking the reasonableness and substantive fairness of the law itself, merging with the concept of 'due process'." },
                { q: "What is the purpose of the **Second Schedule** of the Constitution?", options: ["Listing the subjects of the Concurrent List", "Listing the **emoluments, allowances, and privileges** of high-ranking constitutional officials", "Listing the official languages of India", "Listing the powers of the Panchayats"], answer: "Listing the **emoluments, allowances, and privileges** of high-ranking constitutional officials", explanation: "The Second Schedule contains the provisions relating to the salaries, allowances, and privileges of the President, Governors, Speaker, Judges, and the CAG." },
                { q: "The **Right to Property** ceased to be a Fundamental Right by which constitutional amendment and is now placed under which Article?", options: ["42nd Amendment, Article 300A", "44th Amendment, Article 300A", "86th Amendment, Article 21A", "91st Amendment, Article 164"], answer: "44th Amendment, Article 300A", explanation: "The 44th Amendment Act, 1978, repealed Article 19(1)(f) and Article 31, making the right to property a legal right under Article 300A." },
                { q: "What is the **Doctrine of Repugnancy** (Article 254) applied to?", options: ["Conflicts between a Fundamental Right and a DPSP", "Conflicts between two laws made by the same state legislature", "Conflicts between a **Union law and a State law** on a subject in the **Concurrent List**", "Conflicts between two laws made by the Union Parliament"], answer: "Conflicts between a **Union law and a State law** on a subject in the **Concurrent List**", explanation: "Article 254(1) states that if a State law on the Concurrent List is repugnant to a Union law, the Union law shall prevail, resolving the conflict in favor of the Centre." }
            ]
        },
        hard: {
          1: [
            { q: "Which amendment is known as the 'Mini-Constitution'?", options: ["42nd Amendment", "44th Amendment", "73rd Amendment", "86th Amendment"], answer: "42nd Amendment", explanation: "The 42nd Amendment, enacted during the Emergency in 1976, made widespread changes to the Constitution, which is why it's often called the 'Mini-Constitution'." },
            { q: "The 'Basic Structure Doctrine' was established by the Supreme Court in which landmark case?", options: ["Golaknath v. State of Punjab", "Maneka Gandhi v. Union of India", "Kesavananda Bharati v. State of Kerala", "Indira Sawhney v. Union of India"], answer: "Kesavananda Bharati v. State of Kerala", explanation: "In this 1973 case, the Supreme Court ruled that the Parliament's power to amend the Constitution is not unlimited and it cannot alter the 'basic structure' or framework of the Constitution." },
            { q: "What is the concept of 'Judicial Review'?", options: ["The power of courts to review their own judgments", "The power of Parliament to review court decisions", "The power of the judiciary to examine the constitutionality of legislative and executive actions", "The power of the President to review laws"], answer: "The power of the judiciary to examine the constitutionality of legislative and executive actions", explanation: "Judicial review is the power of a country's courts to determine whether the actions of the legislative, executive, and administrative arms of the government are consistent with the constitution." },
            { q: "What is the difference between a 'Proclamation of Emergency' under Article 352 and 'President's Rule' under Article 356?", options: ["352 is for financial crisis, 356 is for war", "352 is for the whole country, 356 is for a specific state", "352 is for failure of law, 356 is for external aggression", "There is no difference"], answer: "352 is for the whole country, 356 is for a specific state", explanation: "Article 352 (National Emergency) is declared on grounds of war, external aggression, or armed rebellion affecting the whole country. Article 356 (President's Rule) is imposed in a state due to the failure of its constitutional machinery." },
            { q: "What does the 'Doctrine of Pith and Substance' signify?", options: ["A law must be substantial to be valid", "The true nature of a legislation determines which list it falls under", "The substance of a case is more important than procedure", "A doctrine related to evidence law"], answer: "The true nature of a legislation determines which list it falls under", explanation: "This doctrine is used to determine under which head of power a given piece of legislation falls. It looks at the 'true nature and character' of the law to ascertain which legislative body has the power to enact it." },
            { q: "What is the 'Doctrine of Colourable Legislation'?", options: ["Laws must be written in color", "Legislature cannot do indirectly what it cannot do directly", "Laws must be clear and not colorful", "A doctrine about tax laws"], answer: "Legislature cannot do indirectly what it cannot do directly", explanation: "This doctrine is based on the maxim that 'what cannot be done directly, cannot also be done indirectly'. It is used to test the competence of a legislature to enact a particular law." },
            { q: "What is the 'Contingency Fund of India'?", options: ["A fund for all government salaries", "A fund for state governments", "A fund placed at the disposal of the President for unforeseen expenditure", "The main budget of the government"], answer: "A fund placed at the disposal of the President for unforeseen expenditure", explanation: "The Contingency Fund of India is an imprest (a fund maintained for a specific purpose) placed at the disposal of the President to enable him/her to make advances to meet unforeseen expenditure pending authorization by Parliament." },
            { q: "What is the procedure for amending the Fundamental Rights?", options: ["Simple majority in Parliament", "Special majority in Parliament", "Special majority in Parliament plus ratification by half of the states", "It cannot be amended"], answer: "Special majority in Parliament", explanation: "Most provisions of the Fundamental Rights can be amended by a special majority of the Parliament, that is, a majority of the total membership of each house and a majority of not less than two-thirds of the members present and voting." },
            { q: "What is the 'collegium system' used for?", options: ["Electing the Prime Minister", "Appointing and transferring judges in higher judiciary", "Passing the budget", "Conducting elections"], answer: "Appointing and transferring judges in higher judiciary", explanation: "The collegium system is the system by which judges of the Supreme Court and High Courts are appointed and transferred. It is not rooted in the Constitution but has evolved through Supreme Court judgments." },
            { q: "What does the 'Doctrine of Severability' imply?", options: ["If a part of a law is unconstitutional, the whole law is void", "If a part of a law is unconstitutional, only that part is void, if it can be separated", "A law can be severed into multiple smaller laws", "A doctrine related to contract law"], answer: "If a part of a law is unconstitutional, only that part is void, if it can be separated", explanation: "This doctrine states that if an offending provision can be separated from the rest of a statute, only the offending provision will be declared void by the Court and not the entire statute." }
          ],
          2: [
            { q: "Discuss the evolution of the Right to Privacy as a fundamental right.", options: ["It was always a right", "Established in the Maneka Gandhi case", "Established in the K.S. Puttaswamy case", "It is not a fundamental right"], answer: "Established in the K.S. Puttaswamy case", explanation: "In the landmark K.S. Puttaswamy v. Union of India case (2017), a nine-judge bench of the Supreme Court unanimously held that the Right to Privacy is a fundamental right protected under Article 21 of the Constitution." },
            { q: "Explain the 'Doctrine of Eclipse' with a relevant case law.", options: ["A doctrine about solar eclipses", "A pre-constitutional law inconsistent with Fundamental Rights becomes dormant", "A doctrine that eclipses parliamentary power", "A doctrine about presidential powers"], answer: "A pre-constitutional law inconsistent with Fundamental Rights becomes dormant", explanation: "The Doctrine of Eclipse states that a pre-constitutional law which is inconsistent with a fundamental right is not entirely void, but is 'eclipsed' or becomes dormant. It can become operative again if the fundamental right is amended to remove the inconsistency. A key case is Bhikaji Narain Dhakras v. State of M.P." },
            { q: "What is the significance of the 9th Schedule of the Constitution?", options: ["It lists the official languages", "It provides judicial immunity to the laws placed within it", "It deals with Panchayats", "It allocates seats in the Rajya Sabha"], answer: "It provides judicial immunity to the laws placed within it", explanation: "The 9th Schedule was added by the 1st Amendment to protect land reform laws from being challenged in court on the grounds that they violated fundamental rights. However, the Supreme Court in I.R. Coelho v. State of Tamil Nadu ruled that laws placed in the 9th Schedule after April 24, 1973, are open to judicial review if they violate the basic structure of the Constitution." },
            { q: "Differentiate between the powers of the President and the Governor regarding the pardon of sentences.", options: ["They have identical powers", "Only the President can pardon a death sentence", "Only the Governor can pardon a state law conviction", "The President's power is broader in all respects"], answer: "Only the President can pardon a death sentence", explanation: "Both the President (Art. 72) and the Governor (Art. 161) have pardoning powers. However, the President's power is wider. The President can pardon sentences inflicted by court-martial and can pardon a death sentence, which the Governor cannot." },
            { q: "Analyze the constitutional validity of the office of 'Parliamentary Secretary'.", options: ["It is a constitutional post", "It is an office of profit, potentially disqualifying an MP/MLA", "It is equivalent to a Cabinet Minister", "It is a judicial office"], answer: "It is an office of profit, potentially disqualifying an MP/MLA", explanation: "The office of Parliamentary Secretary is often considered an 'office of profit' under the government. Appointing MPs or MLAs to such posts can lead to their disqualification under Articles 102 and 191 of the Constitution, as it can compromise their independence from the executive." },
            { q: "What is the 'curative petition'?", options: ["A petition to cure a disease", "The final legal remedy available to a person after dismissal of a review plea", "A petition filed at the start of a case", "A petition to the President"], answer: "The final legal remedy available to a person after dismissal of a review plea", explanation: "A curative petition is the last judicial resort available for redressal of grievances in court. It is a concept that evolved by the Supreme Court in the Rupa Ashok Hurra v. Ashok Hurra case to prevent abuse of its process and to cure gross miscarriage of justice." },
            { q: "What is the 'creamy layer' principle in the context of reservations?", options: ["A principle to include everyone in reservations", "A principle to exclude the affluent members of a backward class from reservation benefits", "A principle related to dairy products", "A principle for promoting economic growth"], answer: "A principle to exclude the affluent members of a backward class from reservation benefits", explanation: "The 'creamy layer' is a concept that sets a threshold to exclude the more advanced or affluent members of a backward class, so that the benefits of reservation are targeted at the most disadvantaged sections. This was upheld in the Indira Sawhney case." },
            { q: "What is the 'Office of the Whip' in Parliament?", options: ["A security officer", "An official responsible for ensuring party discipline and attendance", "The person who records proceedings", "A judicial officer"], answer: "An official responsible for ensuring party discipline and attendance", explanation: "A whip is an official of a political party whose task is to ensure party discipline in a legislature. They are the party's 'enforcers', who ensure that their fellow legislators attend voting sessions and vote according to the official party policy." },
            { q: "What is the 'lame-duck session' of Parliament?", options: ["A session where no work is done", "The last session of an existing legislature before a new one is elected", "The first session of a new legislature", "A secret session"], answer: "The last session of an existing legislature before a new one is elected", explanation: "A lame-duck session is one that takes place after the election for the next parliament has been held, but before the new parliament has been sworn in. The 'lame ducks' are the members of the outgoing parliament who have not been re-elected." },
            { q: "What is the 'Consolidated Fund of the State'?", options: ["A fund controlled by the central government", "The main account of a state government, similar to the Consolidated Fund of India", "A private fund for the Governor", "A fund for inter-state projects"], answer: "The main account of a state government, similar to the Consolidated Fund of India", explanation: "Similar to the Union's fund, the Consolidated Fund of a State (Article 266) is the account into which all revenues received by the state government, all loans raised by it, and all money received by it in repayment of loans are credited." }
          ],
          3: [
            { q: "What is the 'Doctrine of Prospective Overruling'?", options: ["A doctrine to overrule future laws", "A principle where a new court decision applies only to future cases, not retrospectively", "A doctrine that allows overruling the President", "A doctrine about property law"], answer: "A principle where a new court decision applies only to future cases, not retrospectively", explanation: "This doctrine, first applied in the Golaknath case, allows the Supreme Court to declare that a particular decision will apply only to future cases and will not affect past transactions or decisions. It is a tool to limit the disruptive effect of overruling precedent." },
            { q: "Explain the concept of 'due process of law' vs. 'procedure established by law'.", options: ["They are the same", "'Due process' is broader and includes principles of fairness; 'procedure' is about following the letter of the law", "'Due process' is for criminal cases, 'procedure' is for civil cases", "'Procedure' is an American concept, 'due process' is British"], answer: "'Due process' is broader and includes principles of fairness; 'procedure' is about following the letter of the law", explanation: "Initially, the Indian Constitution adopted 'procedure established by law' (Art. 21), meaning a law duly enacted is valid even if it's contrary to principles of justice. However, in the Maneka Gandhi case, the Supreme Court interpreted it to include the principles of natural justice, effectively moving closer to the American concept of 'due process of law' which checks for fairness and reasonableness of the law itself." },
            { q: "What is the 'power of superintendence' of a High Court?", options: ["The power to supervise the government", "The power to supervise all courts and tribunals within its jurisdiction", "The power to supervise the Supreme Court", "The power to supervise the state legislature"], answer: "The power to supervise all courts and tribunals within its jurisdiction", explanation: "Under Article 227, every High Court has the power of superintendence over all courts and tribunals throughout the territories in relation to which it exercises jurisdiction. This is a very wide power to ensure judicial and administrative control." },
            { q: "What is the 'NCT of Delhi' and how is its governance unique?", options: ["It is a full-fledged state", "It is a Union Territory with a legislature, but with limited powers compared to states", "It is directly governed by the Prime Minister", "It has no legislature"], answer: "It is a Union Territory with a legislature, but with limited powers compared to states", explanation: "The National Capital Territory (NCT) of Delhi has a unique constitutional status under Article 239AA. It is a Union Territory with a Legislative Assembly, but its powers are limited, especially concerning public order, police, and land, which remain with the Union Government." },
            { q: "What is the 'Eleventh Schedule' of the Constitution?", options: ["It lists the powers and responsibilities of Municipalities", "It lists the powers and responsibilities of Panchayats", "It lists the official languages", "It deals with tribal areas"], answer: "It lists the powers and responsibilities of Panchayats", explanation: "The Eleventh Schedule was added by the 73rd Amendment Act in 1992. It contains 29 functional items placed within the purview of Panchayats, such as agriculture, rural housing, drinking water, etc." },
            { q: "What is the 'Twelfth Schedule' of the Constitution?", options: ["It lists the powers and responsibilities of Panchayats", "It lists the powers and responsibilities of Municipalities", "It deals with land reforms", "It allocates seats in the Rajya Sabha"], answer: "It lists the powers and responsibilities of Municipalities", explanation: "The Twelfth Schedule was added by the 74th Amendment Act in 1992. It contains 18 functional items placed within the purview of Municipalities, such as urban planning, roads and bridges, public health, etc." },
            { q: "What is the 'National Green Tribunal' (NGT)?", options: ["An NGO for environmental protection", "A specialized judicial body for environmental cases", "A government department for forests", "A committee of the Parliament"], answer: "A specialized judicial body for environmental cases", explanation: "The NGT is a specialized body established under the NGT Act, 2010 for effective and expeditious disposal of cases relating to environmental protection and conservation of forests and other natural resources." },
            { q: "What is the 'Law Commission of India'?", options: ["A constitutional body that makes laws", "An executive body that advises the government on legal reform", "A parliamentary committee", "A judicial body"], answer: "An executive body that advises the government on legal reform", explanation: "The Law Commission of India is a non-statutory, executive body constituted by the Government of India. Its major function is to work for legal reform and it makes recommendations to the Government in the form of reports." },
            { q: "What is the 'National Human Rights Commission' (NHRC)?", options: ["A court for human rights cases", "A statutory body for the protection and promotion of human rights", "An international human rights organization", "A political party"], answer: "A statutory body for the protection and promotion of human rights", explanation: "The NHRC is a statutory public body constituted under the Protection of Human Rights Act, 1993. It is responsible for the protection and promotion of human rights, defined by the Act as 'rights relating to life, liberty, equality and dignity of the individual guaranteed by the Constitution or embodied in the International Covenants'." },
            { q: "What is the 'Official Secrets Act' and why is it controversial?", options: ["A law to promote transparency", "A colonial-era law dealing with espionage and secrecy, often criticized for conflicting with RTI", "A law about government officials' salaries", "A law for protecting historical monuments"], answer: "A colonial-era law dealing with espionage and secrecy, often criticized for conflicting with RTI", explanation: "The Official Secrets Act, 1923 is India's anti-espionage act. It is controversial because its broad provisions are often seen as a relic of the British colonial era and are considered to be in direct conflict with the principles of transparency and the Right to Information Act." }
          ]
          ,
          4: [
            { q: "What is the 'doctrine of pleasure' in the context of civil servants?", options: ["Civil servants can be dismissed at any time without reason", "Civil servants hold office during the pleasure of the President/Governor, but this is subject to Article 311 protections", "A doctrine about the perks of civil servants", "A doctrine that applies only to political appointees"], answer: "Civil servants hold office during the pleasure of the President/Governor, but this is subject to Article 311 protections", explanation: "While civil servants hold office during the 'pleasure' of the executive, Article 311 provides crucial safeguards, such as the right to an inquiry and the rule that they cannot be dismissed by an authority subordinate to the one that appointed them." },
            { q: "What is the key difference between a Censure Motion and a No-Confidence Motion?", options: ["There is no difference", "Censure motion needs a reason, No-Confidence does not", "Censure can be against an individual minister or a group; No-Confidence is against the entire Council of Ministers", "Censure is in Rajya Sabha, No-Confidence in Lok Sabha"], answer: "Censure can be against an individual minister or a group; No-Confidence is against the entire Council of Ministers", explanation: "A Censure Motion can be moved against an individual minister, a group of ministers, or the entire council for specific policies. A No-Confidence Motion is a test of the government's majority in the Lok Sabha, and its passage requires the government to resign." },
            { q: "What is the procedure for the removal of the Vice-President of India?", options: ["Impeachment by both Houses", "A resolution passed by an effective majority in Rajya Sabha and agreed to by a simple majority in Lok Sabha", "An order from the President", "A decision by the Supreme Court"], answer: "A resolution passed by an effective majority in Rajya Sabha and agreed to by a simple majority in Lok Sabha", explanation: "The procedure for removing the Vice-President is unique. It must be initiated in the Rajya Sabha with a resolution passed by a majority of all the then members (effective majority) and then agreed to by the Lok Sabha with a simple majority." },
            { q: "What is the 'locus standi' principle and how has it been relaxed in PILs?", options: ["A standing position in court", "The right to appear in court; it has been relaxed in PILs to allow public-spirited citizens to file cases", "A legal document", "A rule that only the victim can file a case"], answer: "The right to appear in court; it has been relaxed in PILs to allow public-spirited citizens to file cases", explanation: "Traditionally, 'locus standi' meant only a person whose own rights were violated could approach the court. For Public Interest Litigations (PILs), the Supreme Court relaxed this rule, allowing any person acting in good faith to file a petition for the redressal of a public wrong." },
            { q: "What is the legal status of the recommendations of the Finance Commission?", options: ["They are binding on the government", "They are only advisory in nature and not binding", "They are binding if approved by Parliament", "They are binding on states but not the Centre"], answer: "They are only advisory in nature and not binding", explanation: "The recommendations made by the Finance Commission are of an advisory nature only and hence, not binding on the Government. However, they are generally accepted by the government as a matter of convention." },
            { q: "What is the 'doctrine of pith and substance' primarily used for?", options: ["To find the main substance of a case", "To determine the true nature of a law to assign it to a legislative list (Union, State, or Concurrent)", "To analyze the substance of evidence", "A rule of contract interpretation"], answer: "To determine the true nature of a law to assign it to a legislative list (Union, State, or Concurrent)", explanation: "This doctrine is applied when a legislature's law is challenged on the ground that it encroaches upon the legislative field of another legislature. The court looks at the 'true nature and character' of the law to determine which list it falls under." },
            { q: "What is the composition and role of the National Commission for Backward Classes (NCBC)?", options: ["A political body for OBCs", "A constitutional body under Article 338B to safeguard the interests of backward classes", "An NGO working for social justice", "A parliamentary committee"], answer: "A constitutional body under Article 338B to safeguard the interests of backward classes", explanation: "The 102nd Amendment Act of 2018 granted constitutional status to the NCBC. It has the authority to examine complaints and welfare measures regarding socially and educationally backward classes." },
            { q: "What is the key distinction between the pardoning power of the President and the Governor regarding court-martial sentences?", options: ["The Governor has more power", "Only the President can pardon sentences passed by a court-martial", "The Governor can pardon death sentences from court-martials", "There is no difference"], answer: "Only the President can pardon sentences passed by a court-martial", explanation: "The President's pardoning power under Article 72 is wider than the Governor's under Article 161. The President has the exclusive power to grant pardon to sentences by a court-martial." },
            { q: "What is the 'doctrine of implied powers' in constitutional interpretation?", options: ["Powers that are not written but implied", "The principle that powers conferred on a government body should be construed to include all necessary and proper powers to carry out its duties", "Powers that are secret", "Powers that are rarely used"], answer: "The principle that powers conferred on a government body should be construed to include all necessary and proper powers to carry out its duties", explanation: "This doctrine holds that if a constitution grants a power to a legislative body, it also implicitly grants all the auxiliary or incidental powers that are necessary to exercise that express power." },
            { q: "What is the 'doctrine of constitutional morality'?", options: ["A moral code for citizens", "Adherence to the core principles and values of the constitution, even if not explicitly written", "A religious interpretation of the constitution", "A political ideology"], answer: "Adherence to the core principles and values of the constitution, even if not explicitly written", explanation: "Constitutional morality means adhering to the foundational principles of the constitutional democracy, such as commitment to liberty, equality, fraternity, and procedural justice. It acts as a check on the powers of the state." }
          ],
          5: [
            { q: "What was the core principle laid down in the S.R. Bommai v. Union of India case?", options: ["Secularism is not part of the basic structure", "The proclamation of President's Rule under Article 356 is subject to judicial review", "The President has absolute power to dismiss a state government", "The Governor's report is final and cannot be questioned"], answer: "The proclamation of President's Rule under Article 356 is subject to judicial review", explanation: "This landmark 1994 judgment significantly curtailed the arbitrary use of Article 356. The Supreme Court held that the President's power to dismiss a state government is not absolute and can be reviewed by the courts to check for mala fides." },
            { q: "What is the significance of the I.R. Coelho v. State of Tamil Nadu judgment regarding the 9th Schedule?", options: ["It made the 9th Schedule more powerful", "It ruled that laws in the 9th Schedule are not immune from judicial review if they violate the Basic Structure", "It abolished the 9th Schedule", "It allowed all laws to be placed in the 9th Schedule"], answer: "It ruled that laws in the 9th Schedule are not immune from judicial review if they violate the Basic Structure", explanation: "This 2007 judgment established that while the 9th Schedule provides protection, it is not a blanket immunity. Any law placed in the schedule after April 24, 1973 (the date of the Kesavananda Bharati judgment) can be struck down if it violates the basic structure of the Constitution." },
            { q: "What is the difference between the writ of 'prohibition' and 'certiorari'?", options: ["Prohibition is for criminal cases, Certiorari for civil", "Prohibition is issued to prevent a lower court from exceeding its jurisdiction; Certiorari is issued to quash an order already passed", "Prohibition is issued by the High Court, Certiorari by the Supreme Court", "They are the same"], answer: "Prohibition is issued to prevent a lower court from exceeding its jurisdiction; Certiorari is issued to quash an order already passed", explanation: "Both writs are issued against judicial or quasi-judicial bodies. The key difference is the stage at which they are issued. Prohibition is a preventive remedy, issued when proceedings are pending. Certiorari is a curative remedy, issued after the order has been passed." },
            { q: "What is the 'doctrine of legitimate expectation'?", options: ["A doctrine about expecting to win a case", "A principle of administrative law that a public body's decision can be challenged if it frustrates a person's legitimate expectation based on past practice or a promise", "A doctrine about contract law", "A political promise"], answer: "A principle of administrative law that a public body's decision can be challenged if it frustrates a person's legitimate expectation based on past practice or a promise", explanation: "This doctrine provides a ground for judicial review of administrative action. If a public authority has made a representation or followed a consistent practice, a person may have a legitimate expectation that it will continue, and a departure from it without a rational reason can be challenged." },
            { q: "What is the 'second judges case' (Supreme Court Advocates-on-Record Association vs Union of India) significant for?", options: ["It gave the government primacy in judicial appointments", "It established the Collegium system, giving primacy to the judiciary in appointments and transfers", "It increased the retirement age of judges", "It dealt with judges' salaries"], answer: "It established the Collegium system, giving primacy to the judiciary in appointments and transfers", explanation: "The 1993 Second Judges Case was pivotal in establishing the Collegium system. It re-interpreted the word 'consultation' in Article 124 to mean 'concurrence', thereby giving the opinion of the Chief Justice of India primacy in judicial appointments." },
            { q: "How does the Constitution provide for the financial autonomy of the judiciary?", options: ["Judges can set their own salaries", "Salaries and allowances of judges are charged on the Consolidated Fund of India and are not subject to the vote of Parliament", "The judiciary has its own separate budget", "There is no financial autonomy"], answer: "Salaries and allowances of judges are charged on the Consolidated Fund of India and are not subject to the vote of Parliament", explanation: "To ensure the independence of the judiciary, the salaries of Supreme Court and High Court judges are 'charged upon' the Consolidated Fund. This means they are paid out without needing parliamentary approval, insulating them from political pressure." },
            { q: "What is the concept of 'per-incuriam' in the context of judicial precedent?", options: ["A very important decision", "A decision of a court which is mistaken because it disregarded a binding statute or precedent", "A unanimous decision", "A decision that is pending review"], answer: "A decision of a court which is mistaken because it disregarded a binding statute or precedent", explanation: "'Per incuriam' literally means 'through lack of care'. A court decision is said to be per incuriam if it is made in ignorance of a relevant statutory provision or a binding precedent. Such a decision does not have the same binding force as a regular precedent." },
            { q: "What is the 'doctrine of waiver' and can a citizen waive their Fundamental Rights?", options: ["A citizen can waive any right", "A citizen cannot waive their Fundamental Rights as they are for public benefit", "Waiver applies only to contractual rights", "Waiver is a type of legal document"], answer: "A citizen cannot waive their Fundamental Rights as they are for public benefit", explanation: "The Supreme Court has held that Fundamental Rights were included in the Constitution not just for individual benefit but as a matter of public policy. Therefore, a citizen cannot voluntarily waive or give up their Fundamental Rights." },
            { q: "What is the role and jurisdiction of the Lokpal under the Lokpal and Lokayuktas Act, 2013?", options: ["To supervise all government departments", "An anti-corruption ombudsman to inquire into allegations of corruption against public functionaries, including the Prime Minister", "A special police force for corruption", "A court for trying corruption cases"], answer: "An anti-corruption ombudsman to inquire into allegations of corruption against public functionaries, including the Prime Minister", explanation: "The Lokpal is a statutory body designed to be an independent watchdog against corruption. Its jurisdiction covers a wide range of public servants, including the Prime Minister, ministers, and MPs, with certain exceptions and specific procedures." },
            { q: "What is the 'doctrine of incidental or ancillary powers'?", options: ["Powers that are not important", "The principle that the power to legislate on a subject includes the power to legislate on ancillary matters connected to it", "Powers that are used accidentally", "Powers that are shared between Centre and State"], answer: "The principle that the power to legislate on a subject includes the power to legislate on ancillary matters connected to it", explanation: "This doctrine is an addition to the doctrine of Pith and Substance. It means that the power to make a law on a particular subject in a legislative list also includes the power to make laws on matters that are reasonably connected to that subject, even if they incidentally touch upon a matter in another list." }
          ],
          6: [
            { q: "What is the 'doctrine of basic structure'?", options: ["A doctrine about building construction", "A principle that Parliament cannot amend the core features of the Constitution", "A doctrine about the basic laws of physics", "A rule for drafting new laws"], answer: "A principle that Parliament cannot amend the core features of the Constitution", explanation: "Evolved in the Kesavananda Bharati case, this doctrine holds that while Parliament can amend the Constitution, it cannot alter its 'basic structure', which includes principles like democracy, secularism, and judicial review." },
            { q: "Who appoints the Attorney General of India?", options: ["The Prime Minister", "The Chief Justice of India", "The Parliament", "The President of India"], answer: "The President of India", explanation: "The Attorney General, the chief legal advisor to the government, is appointed by the President under Article 76 of the Constitution and holds office during the pleasure of the President." },
            { q: "What is the significance of the 44th Amendment Act, 1978?", options: ["It introduced the Fundamental Duties", "It removed the Right to Property from Fundamental Rights", "It lowered the voting age to 18", "It created the Panchayati Raj system"], answer: "It removed the Right to Property from Fundamental Rights", explanation: "The 44th Amendment made significant changes, including removing the Right to Property from the list of Fundamental Rights and making it a legal right under Article 300-A. It also reversed many provisions of the 42nd Amendment." },
            { q: "What is the 'Contingency Fund of India'?", options: ["A fund for regular government expenses", "A fund placed at the disposal of the President to meet unforeseen expenditure", "A fund for state governments", "A fund for MPs' salaries"], answer: "A fund placed at the disposal of the President to meet unforeseen expenditure", explanation: "The Contingency Fund (Article 267) is an imprest held by the President to meet urgent and unforeseen expenditure, pending authorization from the Parliament." },
            { q: "What is the difference between a 'vote-on-account' and an 'interim budget'?", options: ["They are the same", "A vote-on-account deals only with expenditure; an interim budget includes both receipts and expenditure", "A vote-on-account is for a full year", "An interim budget is passed without discussion"], answer: "A vote-on-account deals only with expenditure; an interim budget includes both receipts and expenditure", explanation: "A vote-on-account is a grant to the government to meet essential expenditure for a limited period until the budget is passed. An interim budget is a complete set of accounts, including both expenditure and receipts, presented in an election year." },
            { q: "Who presides over a joint sitting of the Parliament?", options: ["The President", "The Prime Minister", "The Speaker of the Lok Sabha", "The Vice-President"], answer: "The Speaker of the Lok Sabha", explanation: "A joint sitting of both Houses is presided over by the Speaker of the Lok Sabha. In their absence, the Deputy Speaker of the Lok Sabha presides." },
            { q: "What is 'Public Interest Litigation' (PIL)?", options: ["A lawsuit for personal gain", "Litigation filed in a court of law for the protection of 'public interest'", "A lawsuit against the government only", "A type of criminal case"], answer: "Litigation filed in a court of law for the protection of 'public interest'", explanation: "PIL is a powerful tool for social justice, allowing any person to approach the court to redress a public wrong or injury, relaxing the traditional rule of 'locus standi'." },
            { q: "What is the role of the National Development Council (NDC)?", options: ["It is the highest body to approve Five-Year Plans", "It is a constitutional body for finance", "It is a parliamentary committee", "It regulates stock markets"], answer: "It is the highest body to approve Five-Year Plans", explanation: "The NDC, an extra-constitutional body, was the apex body for decision making and deliberations on development matters in India, presided over by the Prime Minister. It had the final say on the Five-Year Plans." },
            { q: "What is the 'doctrine of eclipse'?", options: ["A doctrine about solar eclipses", "A pre-constitutional law inconsistent with Fundamental Rights becomes dormant but not dead", "A doctrine that eclipses parliamentary power", "A doctrine about presidential powers"], answer: "A pre-constitutional law inconsistent with Fundamental Rights becomes dormant but not dead", explanation: "This doctrine states that a law existing before the Constitution, if it violates Fundamental Rights, is not entirely void. It is 'eclipsed' and becomes unenforceable, but can be revived if the constitutional limitation is removed." },
            { q: "Who has the power to create or abolish Legislative Councils (Vidhan Parishad) in states?", options: ["The Governor", "The State Legislature alone", "The Parliament, on the recommendation of the State Legislative Assembly", "The President"], answer: "The Parliament, on the recommendation of the State Legislative Assembly", explanation: "Under Article 169, the Parliament can create or abolish a Legislative Council in a state if the state's Legislative Assembly passes a resolution to that effect by a special majority." }
          ],
          7: [
            { q: "What is the 'collegium system' for judicial appointments?", options: ["A system mentioned in the Constitution", "A system where judges are appointed by a body of senior Supreme Court judges", "A system where the government appoints judges", "A system based on an examination"], answer: "A system where judges are appointed by a body of senior Supreme Court judges", explanation: "The collegium system is the system of appointment and transfer of judges that has evolved through judgments of the Supreme Court, and not by an Act of Parliament or by a provision of the Constitution." },
            { q: "What is the 'doctrine of severability'?", options: ["A doctrine to sever relations between states", "If a part of a law is unconstitutional, only that part is void, if it can be separated", "A doctrine that the entire law must be struck down if one part is bad", "A doctrine about contract law"], answer: "If a part of a law is unconstitutional, only that part is void, if it can be separated", explanation: "This doctrine states that if an offending provision can be separated from the rest of a statute without affecting the core purpose, only that provision will be declared void by the Court and not the entire statute." },
            { q: "What is the 'doctrine of pith and substance'?", options: ["A law must be substantial to be valid", "The true nature of a legislation determines which legislative list (Union/State) it falls under", "The substance of a case is more important than procedure", "A doctrine related to evidence law"], answer: "The true nature of a legislation determines which legislative list (Union/State) it falls under", explanation: "This doctrine is used to determine the legislative competence of a legislature with regard to a particular enactment. It looks at the 'true nature and character' of the law to ascertain which list it falls into." },
            { q: "What is the difference between a 'Censure Motion' and a 'No-Confidence Motion'?", options: ["There is no difference", "Censure can be against an individual minister; No-Confidence is against the entire Council of Ministers", "Censure is in Rajya Sabha, No-Confidence in Lok Sabha", "Censure requires a special majority"], answer: "Censure can be against an individual minister; No-Confidence is against the entire Council of Ministers", explanation: "A Censure Motion can be moved against an individual minister or the entire council for specific policies. A No-Confidence Motion is a test of the government's majority in the Lok Sabha, and its passage requires the government to resign." },
            { q: "What is the 'Office of Profit' and why is it a disqualification for MPs/MLAs?", options: ["Any profitable private job", "An office under the government that could compromise a legislator's independence", "The office of the Prime Minister", "A position in a political party"], answer: "An office under the government that could compromise a legislator's independence", explanation: "The Constitution prohibits legislators from holding an 'office of profit' to prevent a conflict of interest and maintain the separation of powers between the legislature and the executive." },
            { q: "What is the role of the 'Estimates Committee' in Parliament?", options: ["It examines the CAG report", "It examines the estimates included in the budget and suggests 'economies' in public expenditure", "It allocates funds to ministries", "It is a joint committee of both houses"], answer: "It examines the estimates included in the budget and suggests 'economies' in public expenditure", explanation: "The Estimates Committee is a Lok Sabha committee that scrutinizes the functioning of government ministries and departments in terms of their expenditure and utilization of funds." },
            { q: "What is the 'doctrine of harmonious construction'?", options: ["A rule for constructing buildings", "A principle of interpretation to avoid conflict between two provisions of a law or the Constitution", "A doctrine about music copyrights", "A rule for international treaties"], answer: "A principle of interpretation to avoid conflict between two provisions of a law or the Constitution", explanation: "When there is a conflict between two or more provisions, this rule is adopted. It states that the interpretation should be such that it gives effect to both provisions, harmonizing them." },
            { q: "What is the 'Advisory Jurisdiction' of the Supreme Court under Article 143?", options: ["The power to advise citizens", "The power of the President to seek the opinion of the Supreme Court on a question of law or fact", "The power to advise Parliament", "The power to advise lower courts"], answer: "The power of the President to seek the opinion of the Supreme Court on a question of law or fact", explanation: "Under Article 143, the President can refer a question of law or fact of public importance to the Supreme Court for its advisory opinion. However, this opinion is not binding on the President." },
            { q: "What is the 'National Commission for Scheduled Castes'?", options: ["An NGO", "A constitutional body to safeguard the interests of Scheduled Castes", "A political party", "A parliamentary committee"], answer: "A constitutional body to safeguard the interests of Scheduled Castes", explanation: "The NCSC is a constitutional body established under Article 338 to investigate and monitor all matters relating to the safeguards provided for the Scheduled Castes under the Constitution." },
            { q: "What is the process for the removal of a Supreme Court judge?", options: ["The President can remove them", "A simple majority vote in Parliament", "An order by the President after an address by Parliament supported by a special majority of both Houses", "The Chief Justice can remove them"], answer: "An order by the President after an address by Parliament supported by a special majority of both Houses", explanation: "A judge can be removed on grounds of proved misbehaviour or incapacity. The motion must be supported by a special majority (a majority of the total membership and a majority of not less than two-thirds of members present and voting) in both the Lok Sabha and the Rajya Sabha." }
          ],

          8: [
                { q: "What is the primary objective of the **Fundamental Duties** (Article 51A)?", options: ["To make all citizens patriotic", "To make citizens aware of their duties, though they are not legally enforceable", "To impose a legal penalty for non-performance", "To make the Executive accountable to the people"], answer: "To make citizens aware of their duties, though they are not legally enforceable", explanation: "Inserted by the 42nd Amendment, Fundamental Duties are moral obligations intended to promote a sense of disciplined commitment to the nation, but there is no direct legal enforcement or penalty for their breach." },
                { q: "What is the key provision of the **Anti-defection Law** (Tenth Schedule)?", options: ["It bans all political defections", "It disqualifies a legislator who voluntarily gives up membership of their party or votes against the party whip", "It encourages cross-voting in elections", "It bans politicians from holding multiple offices"], answer: "It disqualifies a legislator who voluntarily gives up membership of their party or votes against the party whip", explanation: "Added by the 52nd Amendment, the Anti-defection Law is designed to prevent political defections. The key disqualifying actions are voluntarily giving up party membership or disobeying the party whip on a vote." },
                { q: "What is the difference between the writ of **'Mandamus'** and **'Habeas Corpus'**?", options: ["Mandamus is for lower courts, Habeas Corpus is for the police", "Mandamus commands a public authority to act; Habeas Corpus is to produce an unlawfully detained person before the court", "They are the same", "Mandamus is for private bodies, Habeas Corpus for public bodies"], answer: "Mandamus commands a public authority to act; Habeas Corpus is to produce an unlawfully detained person before the court", explanation: "Habeas Corpus ('to have the body of') is issued against illegal detention (preventive). Mandamus ('we command') is issued to compel a public official to perform a duty (compulsive)." },
                { q: "How is the **President of India** sworn in (Art 60)?", options: ["To preserve, protect and defend the Constitution and the law", "To be faithful to the Constitution of India", "To uphold the sovereignty and integrity of India", "To serve the people"], answer: "To preserve, protect and defend the Constitution and the law", explanation: "The specific oath taken by the President (and prescribed in Article 60) requires them to solemnly affirm that they will 'preserve, protect and defend the Constitution and the law' and devote themselves to the service and well-being of the people." },
                { q: "What is the meaning of the Fundamental Right to **'Silence'** (Article 20(3))?", options: ["The right to not speak in public", "The right not to be compelled to be a witness against himself", "The right to remain silent during a parliamentary debate", "The right to not answer any official question"], answer: "The right not to be compelled to be a witness against himself", explanation: "Article 20(3) provides protection against self-incrimination, stating that no person accused of any offense shall be compelled to be a witness against himself. This is the constitutional basis for the right to silence." },
                { q: "The power of the **Governor to act in his discretion** is mentioned in which Article?", options: ["Article 153", "Article 163", "Article 174", "Article 161"], answer: "Article 163", explanation: "Article 163 states that there shall be a Council of Ministers to aid and advise the Governor, *except* in so far as he is by or under the Constitution required to exercise his functions or any of them in his **discretion**. This grants the Governor specific discretionary powers." },
                { q: "Which provision of the Constitution provides for the establishment of an **Inter-State Council**?", options: ["Article 262", "Article 263", "Article 280", "Article 307"], answer: "Article 263", explanation: "Article 263 provides for the establishment of an Inter-State Council by the President to inquire into and advise upon disputes between states, and to coordinate policy and action on subjects of common interest." },
                { q: "Which of the following matters can be amended by a **simple majority of Parliament** (not Article 368)?", options: ["Creation of new states", "Amendment of Fundamental Rights", "Amendment of the Preamble", "Amendment of the Directive Principles"], answer: "Creation of new states", explanation: "The power to create new states or alter their names/boundaries (Art. 3) is done by a law passed by a simple majority, and such a law is not deemed to be an amendment of the Constitution for the purposes of Article 368." },
                { q: "What are **Zonal Councils**?", options: ["Constitutional bodies under Article 263", "**Statutory bodies** created under the States Reorganisation Act, 1956", "Committees of the Parliament", "Bodies for municipal administration"], answer: "**Statutory bodies** created under the States Reorganisation Act, 1956", explanation: "Zonal Councils are not constitutional. They were created by an Act of Parliament (States Reorganisation Act, 1956) to foster cooperation among States and Union Territories in five geographical zones." },
                { q: "What is the 'special majority' requirement for amending the Constitution when it affects **federal relations**?", options: ["Majority of total membership plus 2/3rd present and voting in both Houses", "Simple majority of both Houses", "Special majority plus **ratification by at least half of the state legislatures**", "Unanimous vote by all states"], answer: "Special majority plus **ratification by at least half of the state legislatures**", explanation: "Article 368 mandates this stricter procedure for amendments to specific provisions, such as the election of the President, the extent of the executive power of the Union and States, and the distribution of legislative powers." }
            ],

          9: [
                { q: "How is the **President of India** elected?", options: ["By direct universal suffrage", "By a simple majority in Parliament", "By the system of **Proportional Representation by means of the Single Transferable Vote**", "By the Electoral College of the United States"], answer: "By the system of **Proportional Representation by means of the Single Transferable Vote**", explanation: "Article 55 of the Constitution mandates the use of this complex system to ensure that the electoral process is representative, giving value to the votes of both Parliament and State Assemblies." },
                { q: "What is the **'Residuary Powers'** of legislation in India?", options: ["Powers given to the states", "The power to legislate on any matter not enumerated in any of the three lists (Union, State, Concurrent)", "The power to legislate on the Concurrent List", "The power to legislate on finance"], answer: "The power to legislate on any matter not enumerated in any of the three lists (Union, State, Concurrent)", explanation: "Article 248 vests the power to make laws on any subject not enumerated in the Concurrent List or State List **exclusively in the Union Parliament**. This centralises ultimate legislative authority." },
