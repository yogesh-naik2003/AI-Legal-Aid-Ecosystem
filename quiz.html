          4: [
            { q: "What are 'inchoate offenses'?", options: ["Completed offenses", "Offenses that are incomplete or at a preparatory stage, like attempt or conspiracy", "Offenses that are not serious", "Offenses committed by a group"], answer: "Offenses that are incomplete or at a preparatory stage, like attempt or conspiracy", explanation: "Inchoate offenses are crimes that have not been fully completed. The main examples are attempt, conspiracy, and abetment. They are punished to prevent the commission of the final crime." },
            { q: "What is the 'right of private defense'?", options: ["The right to attack anyone", "The right to use reasonable and proportionate force to protect one's body and property", "A right only available to the police", "The right to hire private guards"], answer: "The right to use reasonable and proportionate force to protect one's body and property", explanation: "Sections 96 to 106 of the IPC grant the right to use force against an aggressor for self-defense. However, the force used must not be more than necessary and the right is subject to several restrictions." },
            { q: "What is the offense of 'dowry death' under Section 304B of the IPC?", options: ["Any death of a married woman", "The death of a woman caused by burns or bodily injury within seven years of marriage, where she was subjected to cruelty for dowry", "A demand for dowry", "A suicide by a married woman"], answer: "The death of a woman caused by burns or bodily injury within seven years of marriage, where she was subjected to cruelty for dowry", explanation: "Section 304B was introduced to combat the menace of dowry-related deaths. It creates a presumption of guilt against the husband and his relatives if the conditions are met." },
            { q: "What is the difference between 'theft' and 'criminal misappropriation'?", options: ["Theft is of movable property, misappropriation is of immovable", "In theft, property is taken without consent; in misappropriation, the property comes into possession innocently first", "Theft is more serious", "There is no difference"], answer: "In theft, property is taken without consent; in misappropriation, the property comes into possession innocently first", explanation: "In theft, the initial taking of the property is dishonest. In criminal misappropriation, the offender comes across the property innocently (e.g., finding a lost wallet) and then dishonestly decides to keep it." },
            { q: "What is the role of a Magistrate in recording a confession under Section 164 of the CrPC?", options: ["To force the accused to confess", "To record the confession after ensuring it is voluntary and informing the accused that it can be used against them", "To record the confession as dictated by the police", "To immediately convict the accused based on the confession"], answer: "To record the confession after ensuring it is voluntary and informing the accused that it can be used against them", explanation: "A confession recorded under Section 164 CrPC has high evidentiary value. The Magistrate must follow a strict procedure to ensure the confession is not coerced and is made voluntarily by the accused." },
            { q: "What is the concept of 'compounding of offenses'?", options: ["Making an offense more complex", "A legal procedure where the victim and accused settle the case, with the court's permission for certain offenses", "Combining multiple offenses into one", "A type of plea bargaining"], answer: "A legal procedure where the victim and accused settle the case, with the court's permission for certain offenses", explanation: "Section 320 of the CrPC lists certain offenses, mostly of a private nature, that can be 'compounded' or settled between the parties. This leads to the acquittal of the accused." },
            { q: "What are the essential elements of 'criminal trespass'?", options: ["Entering someone's property by accident", "Entering property in possession of another with the intent to commit an offense or to intimidate, insult or annoy", "Any entry onto private property", "Damaging someone's property"], answer: "Entering property in possession of another with the intent to commit an offense or to intimidate, insult or annoy", explanation: "Criminal trespass under Section 441 of the IPC requires not just an unauthorized entry, but also a specific criminal intent (mens rea) behind that entry." },
            { q: "What is the offense of 'cheating by personation'?", options: ["Cheating a person", "Cheating by pretending to be some other person", "Cheating in an exam", "A type of online fraud"], answer: "Cheating by pretending to be some other person", explanation: "Section 416 of the IPC defines this aggravated form of cheating. It occurs when a person cheats by pretending to be some other person, or by knowingly substituting one person for another, or representing that he or any other person is a person other than he or such other person really is." },
            { q: "What is the general exception of 'mistake of fact' in the IPC?", options: ["Mistake of law is an excuse", "An act done under a mistake of fact, in good faith, believing oneself to be justified by law, is not an offense", "Any mistake is an excuse", "This exception does not exist"], answer: "An act done under a mistake of fact, in good faith, believing oneself to be justified by law, is not an offense", explanation: "Section 76 and 79 of the IPC provide a defense for a person who commits a prohibited act under a mistaken belief of facts, provided the mistake is reasonable and made in good faith. However, a mistake of law is no excuse." },
            { q: "What is the difference between 'culpable homicide' and 'murder'?", options: ["The weapon used", "The number of victims", "The degree of intention or knowledge, with murder being a more aggravated form", "The location of the crime"], answer: "The degree of intention or knowledge, with murder being a more aggravated form", explanation: "All murders are culpable homicides, but not all culpable homicides are murders. Murder (S. 300) requires a higher degree of intention or knowledge of the likelihood of causing death compared to culpable homicide (S. 299). Section 300 also lists exceptions where a culpable homicide is not considered murder." }
          ],
          5: [
            { q: "What is the key difference between 'joint liability' under Section 34 and Section 149 of the IPC?", options: ["Section 34 is for groups, Section 149 is for individuals", "Section 34 requires active participation, Section 149 does not", "Section 34 requires a prior meeting of minds ('common intention'), while Section 149 applies to any member of an 'unlawful assembly'", "Section 149 is for minor crimes, Section 34 for major ones"], answer: "Section 34 requires a prior meeting of minds ('common intention'), while Section 149 applies to any member of an 'unlawful assembly'", explanation: "Section 34 (common intention) requires a pre-arranged plan. Section 149 (common object) creates constructive liability for members of an unlawful assembly (5 or more people), making them liable for any offense committed by any member in prosecution of the common object." },
            { q: "What are the rights of an arrested person in India?", options: ["The right to remain silent only", "The right to be informed of the grounds of arrest, the right to consult a lawyer, and the right to be produced before a magistrate within 24 hours", "The right to make one phone call", "There are no specific rights"], answer: "The right to be informed of the grounds of arrest, the right to consult a lawyer, and the right to be produced before a magistrate within 24 hours", explanation: "These rights are guaranteed under Article 22 of the Constitution and are detailed in the Code of Criminal Procedure (CrPC). They are fundamental safeguards against arbitrary arrest and detention." },
            { q: "What is the legal framework for dealing with 'acid attacks' in the IPC?", options: ["It is treated as simple hurt", "Specific sections (326A and 326B) were added to deal with causing grievous hurt by acid and attempting to do so", "It is covered under dowry laws", "There is no specific law"], answer: "Specific sections (326A and 326B) were added to deal with causing grievous hurt by acid and attempting to do so", explanation: "Following the Criminal Law (Amendment) Act, 2013, Sections 326A and 326B were introduced to provide for stringent punishment for acid attacks, including a minimum imprisonment of 10 years." },
            { q: "What is the difference between 'parole' and 'furlough'?", options: ["They are the same", "Parole is for a specific reason and is discretionary; furlough is a matter of right for long-term prisoners to maintain family ties", "Parole is granted by police, furlough by the court", "Furlough is for short-term prisoners, parole for long-term"], answer: "Parole is for a specific reason and is discretionary; furlough is a matter of right for long-term prisoners to maintain family ties", explanation: "Parole is a conditional release for a specific purpose (e.g., attending a family wedding). Furlough is seen as a matter of right for long-term prisoners to be granted periodically, irrespective of any particular reason, to maintain social and family ties." },
            { q: "What is the legal status of a 'Juvenile' or 'Child in Conflict with Law'?", options: ["They are tried as adults", "They are dealt with under a separate Juvenile Justice Act with a focus on rehabilitation", "They cannot be arrested", "They are given a warning and released"], answer: "They are dealt with under a separate Juvenile Justice Act with a focus on rehabilitation", explanation: "The Juvenile Justice (Care and Protection of Children) Act provides a separate system for children who have committed offenses. The focus is on reformation and rehabilitation rather than punishment. However, for heinous crimes, children in the 16-18 age group can be tried as adults under certain circumstances." },
            { q: "What is the offense of 'stalking' under Section 354D of the IPC?", options: ["Following someone in public", "Following a person and contacting them repeatedly despite clear indication of disinterest", "Liking all of someone's social media posts", "Sending a friend request"], answer: "Following a person and contacting them repeatedly despite clear indication of disinterest", explanation: "Stalking involves repeated and unwanted following, contacting, or monitoring of a person (physically or online) that causes them fear, alarm, or distress. It was made a specific offense by the 2013 amendment." },
            { q: "When can the police conduct a search without a warrant?", options: ["Never", "In certain emergency situations, such as when there is a risk of evidence being destroyed", "Only in terrorism cases", "Whenever they suspect a crime"], answer: "In certain emergency situations, such as when there is a risk of evidence being destroyed", explanation: "While the general rule is that a search requires a warrant, the CrPC allows for warrantless searches in specific situations, for example, during the investigation of a cognizable offense if the officer believes that a search is necessary and a delay in obtaining a warrant could lead to the concealment or destruction of evidence." },
            { q: "What is the 'presumption of innocence'?", options: ["The accused is presumed innocent only if they have a good lawyer", "A fundamental principle that an accused is considered innocent until proven guilty by the prosecution beyond a reasonable doubt", "A principle that applies only in civil cases", "A principle that the police must follow, but not the court"], answer: "A fundamental principle that an accused is considered innocent until proven guilty by the prosecution beyond a reasonable doubt", explanation: "This is the bedrock of criminal jurisprudence. The burden of proof is entirely on the prosecution to establish the guilt of the accused, who does not have to prove their innocence." },
            { q: "What is the evidentiary value of a 'Test Identification Parade' (TIP)?", options: ["It is conclusive proof of guilt", "It is not evidence, but a corroborative piece of information to test the witness's memory", "It is a type of confession", "It is illegal"], answer: "It is not evidence, but a corroborative piece of information to test the witness's memory", explanation: "A TIP is part of the investigation process, not substantive evidence. Its purpose is to test the memory and veracity of a witness. The evidence of identification in court is the primary evidence, and the TIP can be used to support or contradict it." },
            { q: "What is the legal debate surrounding 'sedition' (Section 124A IPC)?", options: ["It is a necessary law to protect the nation", "It is a colonial-era law that is often misused to suppress dissent and free speech, and its constitutional validity is challenged", "It is a new law to stop terrorism", "There is no debate about it"], answer: "It is a colonial-era law that is often misused to suppress dissent and free speech, and its constitutional validity is challenged", explanation: "Critics argue that Section 124A is vaguely worded and has a 'chilling effect' on free speech, violating Article 19(1)(a) of the Constitution. The Supreme Court is currently re-examining its constitutional validity." }
          ],
           6: [
                { q: "What is the defense of **Necessity** under Section 81 of the IPC?", options: ["Doing a minor harm to prevent a greater imminent harm", "Doing an act under a mistake of fact", "Doing an act under fear of immediate death", "Doing an act to save property only"], answer: "Doing a minor harm to prevent a greater imminent harm", explanation: "Section 81 exempts an act from criminality if it is done in good faith, without a criminal intention, and for the purpose of preventing or avoiding other harm to person or property, which would otherwise be unavoidable or imminent." },
                { q: "What is the legal test for **Insanity** as a defense under Section 84 of the IPC?", options: ["Medical insanity only", "The accused must prove they were of unsound mind and **incapable of knowing the nature of the act or that it was wrong or contrary to law**", "The accused must prove they were angry", "The accused must prove they suffered from mental illness for a long time"], answer: "The accused must prove they were of unsound mind and **incapable of knowing the nature of the act or that it was wrong or contrary to law**", explanation: "Section 84 is based on the M'Naghten rules. It is not mere medical insanity but legal insanity—the inability to know the nature and quality of the act or that it was wrong—that provides a complete defense." },
                { q: "What is the statutory right to bail in a **Bailable Offense**?", options: ["Bail is at the court's discretion", "Bail must be granted by the police or the court as a matter of right", "Bail is only granted after the charge sheet is filed", "Bail is for a maximum of 60 days"], answer: "Bail must be granted by the police or the court as a matter of right", explanation: "Under Section 436 of the CrPC, any person accused of a bailable offense shall be released on bail, either by the police officer in charge of the station or by the court, as a matter of absolute right." },
                { q: "The Indian Evidence Act provides a legal **presumption as to Dowry Death** in which circumstances?", options: ["Any death of a woman within 5 years of marriage", "If the woman commits suicide within 7 years of marriage and was subjected to cruelty soon before death", "If the woman is murdered after 7 years of marriage", "If the woman dies in a road accident"], answer: "If the woman commits suicide within 7 years of marriage and was subjected to cruelty soon before death", explanation: "Section 113B IEA creates a legal presumption that the husband or his relatives caused the death of the woman if it is shown that soon before her death, she was subjected to cruelty or harassment in connection with any demand for dowry." },
                { q: "What is the difference between **Rioting** and **Affray** under the IPC?", options: ["Rioting is in public, Affray is in private", "Rioting requires an unlawful assembly (five or more persons); Affray requires a fight between two or more persons in a public place causing a disturbance", "Affray is more serious", "Rioting is for civil disputes"], answer: "Rioting requires an unlawful assembly (five or more persons); Affray requires a fight between two or more persons in a public place causing a disturbance", explanation: "Rioting (S. 146) is the use of force or violence by an unlawful assembly (minimum five persons). Affray (S. 159) is a less serious offense involving two or more persons fighting in a public place to the terror of the public." },
                { q: "What is the primary purpose of the **Maintenance** provision under Section 125 of the CrPC?", options: ["To punish the husband", "To provide a speedy and summary remedy for securing food, clothing, and shelter to deserted wives, children, and parents", "To resolve property disputes", "To grant divorce"], answer: "To provide a speedy and summary remedy for securing food, clothing, and shelter to deserted wives, children, and parents", explanation: "Section 125 CrPC is a social justice legislation designed to prevent destitution and vagrancy by compelling a person who has sufficient means to provide maintenance to dependent family members." },
                { q: "What is the defense available to a Judge acting **judicially** under Section 77 of the IPC?", options: ["The Judge can commit any offense", "Nothing is an offense which is done by a Judge when acting judicially, in the exercise of any power which he honestly believes to be given to him by law", "The Judge is only liable for civil wrongs", "The defense applies only to the High Court"], answer: "Nothing is an offense which is done by a Judge when acting judicially, in the exercise of any power which he honestly believes to be given to him by law", explanation: "Section 77 grants immunity to a Judge from criminal liability for acts done while acting judicially, provided the act falls within the scope of their power or they honestly believe it does." },
                { q: "What is the offense of **Receiving Stolen Property** (S. 411 IPC)?", options: ["Finding a lost item", "Dishonestly receiving or retaining any stolen property, knowing or having reason to believe the same to be stolen", "Stealing a property", "Buying property from a stranger"], answer: "Dishonestly receiving or retaining any stolen property, knowing or having reason to believe the same to be stolen", explanation: "This offense penalizes a person who comes into possession of stolen property after the theft is complete, with the guilty knowledge or belief that the property was stolen." },
                { q: "What is the distinction between a **Summons Case** and a **Warrant Case** based on trial procedure in CrPC?", options: ["Warrant Case has a simplified procedure; Summons Case has a detailed procedure", "Warrant Case has a detailed procedure including the framing of charge; Summons Case has a simpler procedure without formal framing of charge", "Summons Case is for serious offenses", "Warrant Case is for offenses punishable with only fine"], answer: "Warrant Case has a detailed procedure including the framing of charge; Summons Case has a simpler procedure without formal framing of charge", explanation: "The procedure for a Warrant Case (punishment over 2 years) is more elaborate, involving pre-charge evidence and formal framing of charge, while a Summons Case (punishment up to 2 years) has a simpler, summary procedure." },
                { q: "Which type of injury is generally classified as **Grievous Hurt** under Section 320 of the IPC?", options: ["A simple scratch or cut", "Any hurt which **endangers life, causes fracture, or results in permanent loss of a limb or sense**", "Any injury that requires a doctor's visit", "An injury that causes temporary pain"], answer: "Any hurt which **endangers life, causes fracture, or results in permanent loss of a limb or sense**", explanation: "Grievous hurt is an aggravated form of simple hurt, defined by a specific, exhaustive list of eight types of injuries that are permanent or dangerous to life." }
            ],
            7: [
                { q: "What is the key difference between a **Bailable** and **Non-Bailable Offense**?", options: ["Bailable offense is always a civil wrong", "Bailable offense grants bail as a matter of right; Non-Bailable offense makes bail a matter of judicial discretion", "Non-Bailable offense is less serious", "Bailable offense is decided by the police"], answer: "Bailable offense grants bail as a matter of right; Non-Bailable offense makes bail a matter of judicial discretion", explanation: "The distinction, primarily based on the First Schedule of the CrPC, is crucial: in bailable offenses, the accused has a statutory right to bail; in non-bailable offenses, the court has the discretion to grant or refuse bail." },
                { q: "When are **Leading Questions** generally allowed in a criminal trial (S. 141 IEA)?", options: ["Always allowed in examination-in-chief", "Not allowed in examination-in-chief, but **allowed in cross-examination**", "Only allowed if the judge agrees", "Never allowed"], answer: "Not allowed in examination-in-chief, but **allowed in cross-examination**", explanation: "A leading question suggests the answer. It is prohibited in examination-in-chief to prevent the witness from being prompted, but it is permitted in cross-examination to test the credibility and veracity of the witness." },
                { q: "What is the legal status of the testimony of an **Accomplice** (S. 133 IEA)?", options: ["It is a complete defense", "It is **admissible** and a conviction can be based solely upon it, but prudence dictates corroboration", "It is entirely inadmissible", "It is only admissible if a relative of the accused"], answer: "It is **admissible** and a conviction can be based solely upon it, but prudence dictates corroboration", explanation: "Section 133 states an accomplice is a competent witness and a conviction is not illegal merely because it proceeds upon the uncorroborated testimony of an accomplice, but courts exercise a self-imposed rule of prudence requiring corroboration." },
                { q: "What is the offense of **Bigamy** under Section 494 of the IPC?", options: ["Marrying a foreigner", "Marrying again during the lifetime of the husband or wife, when the former marriage is still in force", "Marrying a second time after divorce", "Marrying a close relative"], answer: "Marrying again during the lifetime of the husband or wife, when the former marriage is still in force", explanation: "Bigamy is a specific offense committed by a person who marries another person while their existing marriage is still legally valid and in force." },
                { q: "The Supreme Court has restricted the application of **Sedition** (S. 124A IPC) to acts that have the **effect** of:", options: ["Strongly criticizing the government's policy", "**Incitement to violence** or the creation of public disorder", "Expressing disaffection toward the state", "Holding a public protest"], answer: "**Incitement to violence** or the creation of public disorder", explanation: "In the Kedar Nath Singh case, the Supreme Court ruled that a mere expression of disaffection is not sedition. The offense is only attracted if the words or acts have a clear tendency to incite violence or cause public disorder." },
                { q: "What is the maximum limit for **Police Custody** during investigation (S. 167 CrPC)?", options: ["30 days", "**15 days** from the date of production before the magistrate", "60 days", "90 days"], answer: "**15 days** from the date of production before the magistrate", explanation: "The maximum period for which an accused can be kept in Police Custody is 15 days in total. After that, the accused must be remanded to Judicial Custody (jail)." },
                { q: "What is the difference between **Riot** and **Unlawful Assembly**?", options: ["Riot is less serious", "Unlawful Assembly is an assembly of five or more persons with a common object; Riot is the use of force by that assembly", "They are two names for the same crime", "Unlawful Assembly is a crime against property"], answer: "Unlawful Assembly is an assembly of five or more persons with a common object; Riot is the use of force by that assembly", explanation: "Unlawful Assembly (S. 141) is the preliminary stage where five or more persons assemble with a specific common object. Riot (S. 146) is committed when force or violence is used by that assembly in prosecution of the common object." },
                { q: "For a conviction based solely on **Circumstantial Evidence**, what condition must be satisfied?", options: ["There must be at least 10 witnesses", "The circumstances relied upon must be **inconsistent with the innocence of the accused** and lead to no other conclusion but guilt", "The victim must identify the accused", "The accused must have a bad reputation"], answer: "The circumstances relied upon must be **inconsistent with the innocence of the accused** and lead to no other conclusion but guilt", explanation: "The 'Panchsheel' (five golden principles) laid down by the Supreme Court requires that the chain of circumstances must be so complete as not to leave any reasonable ground for the conclusion consistent with the innocence of the accused." },
                { q: "What is the purpose of a **Summary Trial** under the CrPC?", options: ["To hold a very detailed trial", "To provide a **speedy and simplified** procedure for minor offenses punishable with imprisonment not exceeding two years", "To allow the judge to decide based only on documents", "To try serious offenses like murder"], answer: "To provide a **speedy and simplified** procedure for minor offenses punishable with imprisonment not exceeding two years", explanation: "Summary trials are designed for quick disposal of petty cases by simplifying the recording of evidence and judgment, where the maximum punishment that can be awarded is three months of imprisonment." },
                { q: "What is the **Rule of Res Gestae** in evidence law?", options: ["Statements made by the accused only", "Statements made spontaneously during or immediately after a transaction, which are admissible as an **exception to the Hearsay Rule**", "Statements made under duress", "Statements that are written down"], answer: "Statements made spontaneously during or immediately after a transaction, which are admissible as an **exception to the Hearsay Rule**", explanation: "The Res Gestae rule (Section 6 IEA) admits statements that are so closely connected with the fact in issue as to form part of the same transaction, making them reliable due to their spontaneity." }
            ],

              8: [
                { q: "What is the key element required to prove the offense of **Rioting** (S. 147 IPC)?", options: ["A fight between two people", "A fight between five or more persons (unlawful assembly) with the **use of force or violence**", "A peaceful protest by a large crowd", "Any assembly of people in a public place"], answer: "A fight between five or more persons (unlawful assembly) with the **use of force or violence**", explanation: "Rioting is a specific crime that requires the prior existence of an unlawful assembly (minimum five persons) and the subsequent use of force or violence by any member of that assembly." },
                { q: "Under what condition is **Intoxication** considered a complete defense in criminal law (S. 85 IPC)?", options: ["If the accused voluntarily consumed alcohol", "If the accused was intoxicated **without his knowledge or against his will** (involuntary intoxication)", "If the accused was only slightly intoxicated", "If the accused was intoxicated but acted with mens rea"], answer: "If the accused was intoxicated **without his knowledge or against his will** (involuntary intoxication)", explanation: "Section 85 provides a defense only when the intoxication is involuntary to the extent that it renders the accused incapable of knowing the nature of the act or that he was doing what was wrong or illegal." },
                { q: "What is the offense of **Counterfeiting Coin** (S. 231 IPC)?", options: ["Making a cheap copy of a coin", "The act of **making or attempting to make a false coin** resembling the current coin of the government, with the intent to cheat", "Using a counterfeit coin to buy something", "Refusing to accept a coin"], answer: "The act of **making or attempting to make a false coin** resembling the current coin of the government, with the intent to cheat", explanation: "Counterfeiting is a grave offense against the state's financial system. It penalizes the act of making a false coin with the specific intent that it shall pass as genuine." },
                { q: "What is the **maximum period** for which a magistrate can authorize **Police Custody** (S. 167 CrPC)?", options: ["24 hours", "7 days", "**15 days** in total from the date of arrest", "60 days"], answer: "**15 days** in total from the date of arrest", explanation: "Section 167 CrPC limits the total period of police custody to 15 days. After this, any further detention must be in judicial custody." },
                { q: "What is the difference between **Primary Evidence** and **Secondary Evidence** (IEA S. 62/63)?", options: ["Primary is oral, Secondary is documentary", "Primary is the **original document**; Secondary is a copy or oral account of the original", "Secondary is always inadmissible", "Primary is more important"], answer: "Primary is the **original document**; Secondary is a copy or oral account of the original", explanation: "The IEA requires the best evidence to be produced (Primary Evidence). Secondary evidence is only admissible when the primary evidence (the original document) is shown to be lost, destroyed, or otherwise unavailable." },
                { q: "What is the **Doctrine of Res Sub Judice** in a criminal law context (CrPC)?", options: ["A case is under judgment", "A rule that **prevents two parallel trials** on the same facts in courts of concurrent jurisdiction", "A rule that prevents a retrial after acquittal", "A rule about evidence from a third party"], answer: "A rule that **prevents two parallel trials** on the same facts in courts of concurrent jurisdiction", explanation: "Res sub judice means 'a matter under judgment'. While primarily a civil concept, it prevents the simultaneous trial of two cases on the same facts to avoid multiplicity of proceedings and conflicting decisions." },
                { q: "What is the offense of **Aggravated Hurt** (S. 326 IPC)?", options: ["Causing any hurt to a person", "Voluntarily causing grievous hurt by means of a dangerous weapon or means (e.g., acid, fire, firearms)", "Causing grievous hurt to a public servant", "Causing hurt in a sudden quarrel"], answer: "Voluntarily causing grievous hurt by means of a dangerous weapon or means (e.g., acid, fire, firearms)", explanation: "Section 326 is a more serious offense than S. 325 (voluntarily causing grievous hurt) because it involves the use of specific, dangerous objects, increasing the severity of the punishment." },
                { q: "What is the **Hearsay Rule** exception for **Statements made in the course of business** (S. 32(2) IEA)?", options: ["All business statements are admissible", "Statements made by a deceased person in the ordinary course of business, recording documents, are admissible", "Only business statements on tax are admissible", "Statements made after a business deal"], answer: "Statements made by a deceased person in the ordinary course of business, recording documents, are admissible", explanation: "Section 32(2) is an exception to the Hearsay Rule, allowing statements made by a person who is dead or cannot be found to be used as evidence if they were made in the ordinary course of business (e.g., a book-keeper's entries)." },
                { q: "What is the difference between **Commutation** and **Remission** of a sentence?", options: ["Commutation reduces the period of sentence; Remission alters the nature of the sentence", "Commutation alters the **nature** of the sentence; Remission reduces the **period** of the sentence without changing its nature", "Commutation is for the President, Remission is for the Governor", "They are the same"], answer: "Commutation alters the **nature** of the sentence; Remission reduces the **period** of the sentence without changing its nature", explanation: "Commutation changes the punishment to one of a less severe kind (e.g., death to life imprisonment). Remission reduces the duration of the sentence (e.g., two years to one year) without altering the kind of punishment." },
                { q: "What is the key element that distinguishes **House Trespass** from **House Breaking** (S. 442/445 IPC)?", options: ["House Trespass involves simple entry; House Breaking involves entering in a specific, surreptitious, or forcible way", "House Trespass is a civil wrong", "House Breaking is only committed at night", "House Trespass is only committed during the day"], answer: "House Trespass involves simple entry; House Breaking involves entering in a specific, surreptitious, or forcible way", explanation: "House Trespass (S. 442) is entry with criminal intent. House Breaking (S. 445) is an aggravated form of house trespass, which requires the offender to enter the house by one of six specific means, usually involving force, breaking a structure, or unauthorized use of entry/exit points." }
            ],

            9: [
                { q: "What is the effect of **Compounding of Offences** (S. 320 CrPC)?", options: ["The accused is released on bail", "The compounding of an offense operates as an **acquittal** of the accused", "The trial is suspended indefinitely", "The sentence is reduced"], answer: "The compounding of an offense operates as an **acquittal** of the accused", explanation: "For compoundable offenses, the compromise between the victim and the accused, when approved by the court (for non-compoundable ones), effectively terminates the criminal proceedings and results in the acquittal of the accused." },
                { q: "When is the **Right to Free Legal Aid** mandatory in a criminal trial (S. 304 CrPC)?", options: ["Only in the Supreme Court", "In all cases where the accused faces life imprisonment", "In a **trial before a Court of Session** if the accused is not represented by a pleader and has no sufficient means to engage one", "Only if the accused is a minor"], answer: "In a **trial before a Court of Session** if the accused is not represented by a pleader and has no sufficient means to engage one", explanation: "Section 304 of the CrPC and Article 39A of the Constitution mandate that if an accused is facing a sessions trial and cannot afford a lawyer, the court must provide one at the expense of the state." },
                { q: "What is the general rule for the punishment for **Attempt to commit an offense** (S. 511 IPC)?", options: ["Always the same punishment as the main offense", "Imprisonment for **half of the longest term** prescribed for the offense, or with fine, or with both", "A warning only", "Imprisonment for one year"], answer: "Imprisonment for **half of the longest term** prescribed for the offense, or with fine, or with both", explanation: "Section 511 provides the general provision for attempt where no specific punishment is provided elsewhere, prescribing a maximum of half the longest term of imprisonment or half the maximum fine prescribed for the actual offense." },
                { q: "What is the key element required to prove the offense of **Abetment of Suicide** (S. 306 IPC)?", options: ["Mere encouragement is enough", "The accused must have **instigated, engaged in a conspiracy, or intentionally aided** the commission of the suicide", "The accused must hate the victim", "The accused must have been present at the time of suicide"], answer: "The accused must have **instigated, engaged in a conspiracy, or intentionally aided** the commission of the suicide", explanation: "To prove abetment, the prosecution must show the accused had the necessary mens rea—an active suggestion or intentional aid—to push the deceased into committing suicide." },
                { q: "The **Burden of proving a general exception (defense)** in the IPC lies on whom (S. 105 IEA)?", options: ["The police", "The **accused** (though only on a balance of probability)", "The victim", "The judge"], answer: "The **accused** (though only on a balance of probability)", explanation: "Section 105 IEA places the burden of proving the existence of circumstances bringing the case within any of the General Exceptions of the IPC upon the accused. The standard of proof for the accused is the 'balance of probability', not 'beyond a reasonable doubt'." },
                { q: "What is a major stage in the **Warrant Case Trial on Police Report** (CrPC)?", options: ["Plea bargaining only", "Examination-in-chief only", "The court must first **frame a formal charge** after hearing the prosecution and the accused and being satisfied of a prima facie case", "The court must record the dying declaration"], answer: "The court must first **frame a formal charge** after hearing the prosecution and the accused and being satisfied of a prima facie case", explanation: "Framing of the charge is a distinctive and essential stage in a warrant case trial. It formally communicates the precise accusation to the accused before the main trial begins." },
                { q: "What is the offense of **Criminal Misappropriation of Lost Property** (S. 403 IPC)?", options: ["Stealing a lost item", "Dishonestly **misappropriating or converting to one's own use** property that was found and was not entrusted to the accused", "Cheating a finder of property", "Using someone else's property"], answer: "Dishonestly **misappropriating or converting to one's own use** property that was found and was not entrusted to the accused", explanation: "This section covers the scenario where the property comes into the accused's possession innocently (e.g., finding a lost item) and the dishonest intention to misappropriate develops later." },
                { q: "What is the effect of **'Novus Actus Interveniens'** (New Intervening Act) on criminal liability?", options: ["It makes the crime more severe", "It can **break the chain of causation** between the accused's act and the final harm, negating liability for the consequence", "It makes the accused more liable", "It is irrelevant in criminal law"], answer: "It can **break the chain of causation** between the accused's act and the final harm, negating liability for the consequence", explanation: "This doctrine applies where an unforeseen, independent, and sufficient act intervenes after the accused's original act, becoming the direct cause of the harm, thereby relieving the accused of liability for that ultimate consequence." },
                { q: "What is the difference between **Bail** and **Surety**?", options: ["They are the same", "Bail is the **release of the accused** from custody; Surety is the **person who promises** to ensure the accused's appearance in court", "Surety is paid to the court", "Bail is only for bailable offenses"], answer: "Bail is the **release of the accused** from custody; Surety is the **person who promises** to ensure the accused's appearance in court", explanation: "Bail is the mechanism for temporary release, secured by a bond. A surety is the person who executes the bail bond, taking financial and legal responsibility for the accused's compliance with the bail conditions." },
                { q: "What is the legal validity of a **confession made to a Magistrate** under Section 164 CrPC?", options: ["It is inadmissible", "It is **admissible** and can be the sole basis of conviction if the court finds it to be voluntary and true", "It is only a general piece of evidence", "It must be corroborated by a police officer"], answer: "It is **admissible** and can be the sole basis of conviction if the court finds it to be voluntary and true", explanation: "Unlike a confession to a police officer (inadmissible), a confession made before a Magistrate following the strict procedure of Section 164 is admissible and can be a crucial piece of evidence, even leading to conviction if found reliable." }
            ],

             10: [
                { q: "What is the core principle of the **Retributive Theory of Punishment**?", options: ["To reform the criminal", "To **make the offender pay** for the crime committed (eye for an eye), focusing on justice and vindication for the state", "To deter others from committing the crime", "To compensate the victim"], answer: "To **make the offender pay** for the crime committed (eye for an eye), focusing on justice and vindication for the state", explanation: "The retributive theory is based on the idea that punishment is justified because the offender deserves it, serving as a moral balance or vindication for the state and the victim." },
                { q: "What is the general rule regarding the **Relevancy of Character** (S. 52 IEA) in a criminal trial?", options: ["The bad character of the accused is always admissible", "The **bad character of the accused is generally irrelevant**, unless evidence has been given that he has a good character", "The good character of the accused is irrelevant", "Only the victim's character is relevant"], answer: "The **bad character of the accused is generally irrelevant**, unless evidence has been given that he has a good character", explanation: "Section 52 is designed to protect the accused. The general rule is that in criminal proceedings, the fact that the accused has a bad character is irrelevant, except when the accused makes their good character an issue." },
                { q: "What is the **Presumption of Legitimacy** under Section 112 of the Indian Evidence Act?", options: ["A child born during the continuance of a valid marriage is **conclusive proof of legitimacy** (unless proved no access)", "All children are legitimate", "Children are illegitimate unless the parents were married", "Only children born in the first year of marriage are legitimate"], answer: "A child born during the continuance of a valid marriage is **conclusive proof of legitimacy** (unless proved no access)", explanation: "Section 112 is one of the strongest presumptions in law. It holds that a child born during a lawful marriage, or within 280 days after its dissolution, is conclusive proof of legitimacy, unless it can be proved that the parties had no access to each other." },
                { q: "What is the offense of **House-breaking by Night** (S. 446 IPC)?", options: ["Any house-breaking after 6 PM", "House-breaking committed between **sunset and sunrise**", "House-breaking where only one person is involved", "House-breaking only of a government building"], answer: "House-breaking committed between **sunset and sunrise**", explanation: "Section 446 defines house-breaking by night as an aggravated form of house-breaking (S. 445) committed between sunset and sunrise, carrying a higher punishment." },
                { q: "What is the purpose of requiring **Sanction for Prosecution** (S. 197 CrPC) of public servants?", options: ["To ensure the police are always right", "To **protect honest public servants** from harassment of vexatious prosecution for acts done in the discharge of their official duty", "To make all trials public", "To reduce the number of trials"], answer: "To **protect honest public servants** from harassment of vexatious prosecution for acts done in the discharge of their official duty", explanation: "Section 197 mandates that no court shall take cognizance of an offense alleged to have been committed by a public servant while acting or purporting to act in the discharge of his official duty, except with the prior sanction of the appropriate government." },
                { q: "What does the **Right against Self-incrimination** (Art. 20(3)) protect the accused from?", options: ["Being asked any question by the police", "Being **compelled to be a witness against himself**", "Having to hire a lawyer", "Being arrested for a crime"], answer: "Being **compelled to be a witness against himself**", explanation: "Article 20(3) is a fundamental safeguard in criminal law. It protects a person from being compelled to give evidence or information that could incriminate them in a criminal trial." },
                { q: "What is the constitutional basis for the **Right to Speedy Trial** in India?", options: ["It is a statutory right under the IPC", "It is an **implied fundamental right** under Article 21 (Right to Life and Personal Liberty)", "It is a Directive Principle of State Policy", "It is only a matter of judicial convention"], answer: "It is an **implied fundamental right** under Article 21 (Right to Life and Personal Liberty)", explanation: "The Supreme Court has consistently held that the right to a speedy trial is an integral part of the right to life and personal liberty, reading it into Article 21 of the Constitution." },
                { q: "What is the **first stage** of the trial in a **Summons Case** (CrPC S. 251)?", options: ["Framing of the charge", "Recording of the entire evidence", "The particulars of the offense are stated to the accused, and they are asked whether they plead guilty", "The judge reads the judgment"], answer: "The particulars of the offense are stated to the accused, and they are asked whether they plead guilty", explanation: "In a summons case (for minor offenses), the trial procedure is simpler. The first stage after the court takes cognizance is to simply state the particulars of the offense to the accused, without formally framing a charge." },
                { q: "How is **Mens Rea** applied to **Statutory Offenses** (Strict Liability)?", options: ["Mens rea is always required", "Mens rea is **presumed to be excluded** by the statute, making the offense one of strict liability", "Mens rea is replaced by a physical act", "The court must prove mens rea beyond a reasonable doubt"], answer: "Mens rea is **presumed to be excluded** by the statute, making the offense one of strict liability", explanation: "While mens rea is generally essential, some statutory offenses (e.g., public welfare laws) are of strict liability, meaning the legislature intends to punish the act regardless of the offender's intent or knowledge." },
                { q: "What is the legal status of a **Withdrawn Complaint** in a criminal case?", options: ["The case must proceed to trial", "The case is **acquitted** if the court grants permission to withdraw (if the case is compoundable or otherwise permitted)", "The accused is convicted", "The police must re-investigate"], answer: "The case is **acquitted** if the court grants permission to withdraw (if the case is compoundable or otherwise permitted)", explanation: "In certain situations, the complainant can, with the leave of the court, withdraw their complaint, which then operates as an acquittal of the accused, effectively ending the proceedings." }
            ]

        hard: {
          1: [
            { q: "What is the key difference between 'culpable homicide' and 'murder'?", options: ["The weapon used", "The number of victims", "The degree of intention or knowledge", "The location of the crime"], answer: "The degree of intention or knowledge", explanation: "All murders are culpable homicides, but not all culpable homicides are murders. The key distinction lies in the degree of intent or knowledge of the offender regarding the likelihood of causing death." },
            { q: "What does the legal doctrine 'autrefois acquit' mean?", options: ["The accused is guilty", "The case is dismissed", "Previously acquitted (Double Jeopardy)", "The evidence is insufficient"], answer: "Previously acquitted (Double Jeopardy)", explanation: "'Autrefois acquit' is a plea made by a defendant stating that they have already been tried and acquitted for the same offense, thus invoking the principle against double jeopardy." },
            { q: "What is the 'burden of proof' in a criminal trial in India?", options: ["It is always on the accused", "It is always on the prosecution", "It is shared equally", "It depends on the judge"], answer: "It is always on the prosecution", explanation: "In criminal law, the general principle is that the burden of proof lies on the prosecution to prove the guilt of the accused 'beyond a reasonable doubt'. The accused is presumed innocent until proven guilty." },
            { q: "What is an 'inquest report'?", options: ["A report on the company's finances", "A report by a magistrate or police officer on the apparent cause of an unnatural death", "A medical examination report", "A report on court proceedings"], answer: "A report by a magistrate or police officer on the apparent cause of an unnatural death", explanation: "An inquest, under Section 174 of the CrPC, is an inquiry conducted by the police or a magistrate into the cause of death of a person who has died under suspicious or unnatural circumstances." },
            { q: "What is the concept of 'common intention' under Section 34 of the IPC?", options: ["Each person is liable only for their own act", "All persons are liable for the act done by one, in furtherance of a shared intention", "Only the leader of the group is liable", "The intention is not relevant"], answer: "All persons are liable for the act done by one, in furtherance of a shared intention", explanation: "Section 34 deals with constructive liability. When a criminal act is done by several persons in furtherance of the common intention of all, each of such persons is liable for that act in the same manner as if it were done by him alone." },
            { q: "What is the maximum period for which an undertrial prisoner can be detained?", options: ["For the entire duration of the trial", "For a maximum of one year", "For half the maximum period of imprisonment specified for that offense", "For a maximum of three years"], answer: "For half the maximum period of imprisonment specified for that offense", explanation: "Section 436A of the CrPC provides that an undertrial prisoner, other than one accused of an offense punishable with death, shall be released on personal bond if they have been detained for a period extending up to one-half of the maximum period of imprisonment." },
            { q: "What is a 'hostile witness'?", options: ["A witness who is angry", "A witness who gives evidence against the party that called them", "A witness for the opposing side", "A witness who refuses to speak"], answer: "A witness who gives evidence against the party that called them", explanation: "A hostile witness is one who, from the manner in which they give evidence, shows that they are not desirous of telling the truth to the court or is deliberately giving evidence adverse to the party who called them." },
            { q: "What is the 'right of private defense'?", options: ["The right to attack anyone you dislike", "The right to use reasonable force to protect one's person or property", "The right to hire private security", "The right to own weapons without a license"], answer: "The right to use reasonable force to protect one's person or property", explanation: "Sections 96 to 106 of the IPC grant the right of private defense of person and property. However, this right is subject to restrictions and the force used must be proportionate to the threat." },
            { q: "What is the difference between 'cheating' and 'criminal breach of trust'?", options: ["They are identical", "Cheating involves deception from the start; breach of trust involves a later dishonest act", "Cheating is a civil wrong, breach of trust is criminal", "Cheating involves property, breach of trust does not"], answer: "Cheating involves deception from the start; breach of trust involves a later dishonest act", explanation: "In cheating (S. 415 IPC), the dishonest intention exists at the very beginning of the transaction. In criminal breach of trust (S. 405 IPC), the property is entrusted honestly, and the dishonest intention develops later." },
            { q: "What is a 'pardon' and who can grant it?", options: ["A reduction of sentence by the court", "A release from prison on good behavior", "A complete absolution from punishment, granted by the President or Governor", "A stay on the execution of a sentence"], answer: "A complete absolution from punishment, granted by the President or Governor", explanation: "Under Articles 72 and 161, the President and Governors have the power to grant pardons, reprieves, respites, or remissions of punishment or to suspend, remit or commute the sentence of any person convicted of any offense." }
          ],
          2: [
            { q: "What is 'strict liability' in criminal law?", options: ["Liability that is very strict", "Liability without the need to prove 'mens rea' (guilty mind)", "Liability only for serious crimes", "Liability of the state"], answer: "Liability without the need to prove 'mens rea' (guilty mind)", explanation: "Strict liability offenses are crimes for which a person can be found guilty simply by committing the act, regardless of their intention or mental state. These are usually public welfare offenses like food adulteration or environmental pollution." },
            { q: "What is the difference between 'evidence' and 'proof'?", options: ["They are the same", "Evidence is the means to an end; proof is the end result", "Evidence is oral, proof is documentary", "Evidence is for civil cases, proof for criminal"], answer: "Evidence is the means to an end; proof is the end result", explanation: "Evidence is the information or material submitted to a court to establish a fact. Proof is the effect of that evidence; it is the establishment of a fact in the mind of the court. Not all evidence leads to proof." },
            { q: "What is a 'retracted confession'?", options: ["A confession that is repeated", "A confession that is later taken back by the accused", "A confession made to a friend", "An invalid confession"], answer: "A confession that is later taken back by the accused", explanation: "A retracted confession is a statement made by an accused person before a trial begins, by which he or she admits to have committed the offense, but which he or she repudiates at the trial. It is generally considered weak evidence." },
            { q: "What is the 'hearsay evidence' rule?", options: ["Evidence heard in a public place", "A statement made by a witness who is not testifying in court is generally inadmissible", "Evidence that is hard to hear", "Evidence that is not relevant"], answer: "A statement made by a witness who is not testifying in court is generally inadmissible", explanation: "Hearsay is an out-of-court statement offered to prove the truth of the matter asserted. The general rule is that hearsay evidence is inadmissible because it is not taken under oath and is not subject to cross-examination." },
            { q: "What is 'circumstantial evidence'?", options: ["Evidence about the circumstances of the accused", "Indirect evidence that implies a fact but does not directly prove it", "Evidence that is not important", "Evidence collected from the crime scene"], answer: "Indirect evidence that implies a fact but does not directly prove it", explanation: "Circumstantial evidence is evidence that relies on an inference to connect it to a conclusion of-fact—like a fingerprint at the scene of a crime. A conviction can be based solely on circumstantial evidence, but the chain of evidence must be complete and conclusive." },
            { q: "What is the purpose of 'cross-examination'?", options: ["To confuse the witness", "To test the truthfulness and accuracy of the evidence given by a witness", "To ask friendly questions", "To summarize the evidence"], answer: "To test the truthfulness and accuracy of the evidence given by a witness", explanation: "Cross-examination is the questioning of a witness at a trial or hearing by the party opposed to the party who produced the witness. Its purpose is to elicit favorable facts from the witness, or to impeach the credibility of the testifying witness." },
            { q: "What is the 'last seen' theory in criminal law?", options: ["The last person to see the accused is guilty", "If the victim was last seen with the accused, the burden shifts to the accused to explain what happened", "The last witness is the most important", "A theory about the last moments of a crime"], answer: "If the victim was last seen with the accused, the burden shifts to the accused to explain what happened", explanation: "The 'last seen' theory is a principle of circumstantial evidence. When a victim is last seen alive in the company of the accused, a presumption arises that the accused is responsible for the victim's death, and the burden of proof shifts to the accused to provide an explanation." },
            { q: "What is the difference between 'mischief' and 'theft'?", options: ["Mischief involves damage to property; theft involves taking property", "Mischief is accidental, theft is intentional", "Mischief is a civil wrong, theft is criminal", "They are the same"], answer: "Mischief involves damage to property; theft involves taking property", explanation: "Theft (S. 378 IPC) is the dishonest taking of movable property out of the possession of any person without that person's consent. Mischief (S. 425 IPC) is the act of causing wrongful loss or damage to the property of another." },
            { q: "What is 'criminal force'?", options: ["Any use of force", "Intentionally using force on a person without their consent to commit an offense or cause injury", "The force of a criminal organization", "The force used by police"], answer: "Intentionally using force on a person without their consent to commit an offense or cause injury", explanation: "Criminal force (S. 350 IPC) involves the intentional use of force against a person without their consent, in order to commit any offense, or intending to cause, or knowing it to be likely that he will cause injury, fear or annoyance to the person." },
            { q: "What is the 'juvenile justice' system?", options: ["A system for judging young adults", "A separate legal system for dealing with minors who commit crimes", "A system for minor crimes", "A system for educating young lawyers"], answer: "A separate legal system for dealing with minors who commit crimes", explanation: "The juvenile justice system is a specialized branch of the criminal justice system that deals with persons below a certain age (generally 18). Its primary focus is on rehabilitation rather than punishment." }
          ],
          3: [
            { q: "What is the 'res gestae' doctrine?", options: ["A doctrine about gestures in court", "Statements made spontaneously during or immediately after an event are admissible as evidence", "A doctrine about property disputes", "A doctrine of criminal intent"], answer: "Statements made spontaneously during or immediately after an event are admissible as evidence", explanation: "Res gestae, Latin for 'things done,' refers to statements that are so closely connected to an event that they are considered part of the event itself. Such statements are an exception to the hearsay rule and are admissible in court because their spontaneity makes them reliable." },
            { q: "What is the difference between 'culpable homicide not amounting to murder' and 'causing death by negligence'?", options: ["The intention of the accused", "The weapon used", "The location of the death", "There is no difference"], answer: "The intention of the accused", explanation: "Culpable homicide (S. 299 IPC) requires an intention to cause death or knowledge that the act is likely to cause death. Causing death by negligence (S. 304A IPC) involves a rash or negligent act without any intention or knowledge that it would cause death." },
            { q: "What is the 'extra-judicial confession'?", options: ["A confession made outside a court or not before a magistrate", "A confession that is not legal", "A confession made by a judge", "A confession made after the trial"], answer: "A confession made outside a court or not before a magistrate", explanation: "An extra-judicial confession is one made by the accused elsewhere than before a magistrate or in court. It is not a formal confession. It is generally considered weak evidence and requires strong corroboration." },
            { q: "What is the 'actus reus interveniens' or 'novus actus interveniens'?", options: ["The intervention of the accused", "An intervening act that breaks the chain of causation", "The final act of a crime", "The first act of a crime"], answer: "An intervening act that breaks the chain of causation", explanation: "This is a new intervening act which breaks the chain of causation between the original wrongful act and the consequence. If such an act occurs, the defendant may not be held liable for the consequence. For example, if A injures B, and B dies because of a doctor's gross negligence, the doctor's act is a 'novus actus interveniens'." },
            { q: "What is the 'theory of deterrence' in punishment?", options: ["To deter the victim from reporting", "To punish an offender to deter others from committing the same crime", "To deter the judge from giving a harsh sentence", "To reform the criminal"], answer: "To punish an offender to deter others from committing the same crime", explanation: "The deterrence theory of punishment holds that the primary purpose of punishment is to prevent or deter others in society from committing similar offenses by making an example of the offender." },
            { q: "What is the difference between 'wrongful gain' and 'wrongful loss'?", options: ["Gain is for the accused, loss is for the victim", "Gain is by unlawful means of property which the person gaining is not legally entitled to; loss is the loss by unlawful means of property which the person losing is legally entitled to", "Gain is monetary, loss is non-monetary", "They are the same concept"], answer: "Gain is by unlawful means of property which the person gaining is not legally entitled to; loss is the loss by unlawful means of property which the person losing is legally entitled to", explanation: "These terms are defined in Section 23 of the IPC. 'Wrongful gain' is a gain by unlawful means of property to which the person gaining is not legally entitled. 'Wrongful loss' is the loss by unlawful means of property to which the person losing it is legally entitled. Both are key to offenses like theft and extortion." },
            { q: "What is the 'beyond a reasonable doubt' standard?", options: ["The standard of proof in civil cases", "The highest standard of proof, required to convict a defendant in a criminal case", "A standard that means there are no doubts at all", "A standard set by the defendant"], answer: "The highest standard of proof, required to convict a defendant in a criminal case", explanation: "This is the standard of evidence required to validate a criminal conviction. It means that the prosecution must convince the jury or judge that there is no other reasonable explanation that can come from the evidence presented at trial." },
            { q: "What is the difference between 'framing of charge' and 'conviction'?", options: ["Framing of charge is the final judgment, conviction is the start", "Framing of charge is the formal accusation by the court; conviction is the final judgment of guilt", "Framing of charge is by police, conviction by the court", "They are the same stage"], answer: "Framing of charge is the formal accusation by the court; conviction is the final judgment of guilt", explanation: "Framing of charge is a crucial stage where the court, after considering the police report and documents, applies its mind to the question of whether a prima facie case is made out against the accused. Conviction is the final outcome of the trial where the accused is found guilty." },
            { q: "What is the 'rape trauma syndrome'?", options: ["A legal defense for rape", "A psychological condition experienced by rape victims, sometimes used as evidence", "A law against rape", "A type of therapy for victims"], answer: "A psychological condition experienced by rape victims, sometimes used as evidence", explanation: "Rape Trauma Syndrome (RTS) is a form of post-traumatic stress disorder (PTSD) that can affect rape victims. Evidence of RTS is sometimes introduced in court to help explain the post-incident behavior of the victim, such as a delay in reporting the crime." },
            { q: "What is the 'principle of legality' in criminal law?", options: ["All laws are legal", "There can be no crime or punishment without a pre-existing law (nullum crimen sine lege)", "The law must be logical", "The police must act legally"], answer: "There can be no crime or punishment without a pre-existing law (nullum crimen sine lege)", explanation: "This is a fundamental principle which states that one cannot be punished for doing something that is not prohibited by law. It is enshrined in Article 20(1) of the Indian Constitution, which prohibits ex-post facto criminal laws." }
          ]
