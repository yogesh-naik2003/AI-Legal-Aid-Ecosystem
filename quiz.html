          4: [
            { q: "What is the key difference between 'criminal misappropriation' and 'criminal breach of trust'?", options: ["The value of the property", "In misappropriation, property comes innocently; in breach of trust, the accused was entrusted with the property", "Misappropriation is of movable property, breach of trust is of immovable", "Misappropriation is by a private person, breach of trust by a public servant"], answer: "In misappropriation, property comes innocently; in breach of trust, the accused was entrusted with the property", explanation: "The crucial distinction is 'entrustment'. In criminal breach of trust (S. 405), there is a legal entrustment of property which is then dishonestly converted. In criminal misappropriation (S. 403), the property comes into the offender's hands by chance, and they then decide to dishonestly keep it." },
            { q: "What is the legal principle of 'doli incapax'?", options: ["Incapable of telling a lie", "A child below a certain age is incapable of forming criminal intent", "A person who is mentally ill", "A defense for intoxicated persons"], answer: "A child below a certain age is incapable of forming criminal intent", explanation: "'Doli incapax' means 'incapable of evil'. Under Section 82 of the IPC, a child under 7 years is absolutely immune from criminal liability. Under Section 83, a child between 7 and 12 is also immune if they have not attained sufficient maturity of understanding to judge the nature and consequences of their conduct." },
            { q: "What is the significance of Section 27 of the Indian Evidence Act?", options: ["It makes all confessions to police admissible", "It allows a part of a confession to police to be admissible if it leads to the discovery of a new fact", "It deals with expert evidence", "It defines what a confession is"], answer: "It allows a part of a confession to police to be admissible if it leads to the discovery of a new fact", explanation: "Section 27 is an exception to the rule that confessions to police are inadmissible. It allows so much of the information given by an accused in custody to be proved if it distinctly relates to a fact thereby discovered." },
            { q: "What is the offense of 'voyeurism' under Section 354C of the IPC?", options: ["Staring at someone in public", "Watching or capturing the image of a woman engaged in a private act where she has an expectation of privacy", "Taking pictures in a public place", "Distributing private images"], answer: "Watching or capturing the image of a woman engaged in a private act where she has an expectation of privacy", explanation: "Voyeurism was made a specific offense to protect a woman's privacy. It penalizes the act of watching or capturing images of a woman in a private act, such as using a changing room, without her consent." },
            { q: "What is the legal presumption under Section 113A of the Evidence Act?", options: ["Presumption of innocence", "Presumption as to abetment of suicide by a married woman if certain conditions are met", "Presumption of guilt in all cases", "Presumption about the validity of a will"], answer: "Presumption as to abetment of suicide by a married woman if certain conditions are met", explanation: "This section creates a legal presumption against the husband or his relatives. If a woman commits suicide within 7 years of marriage and it is shown she was subjected to cruelty, the court may presume that such husband or relative had abetted the suicide." },
            { q: "What is the difference between a 'summons case' and a 'warrant case' in CrPC?", options: ["Summons is for civil, warrant for criminal", "Warrant cases relate to offenses punishable with death, life imprisonment, or imprisonment for more than two years", "Summons cases are tried faster", "Warrant cases require an arrest warrant, summons cases do not"], answer: "Warrant cases relate to offenses punishable with death, life imprisonment, or imprisonment for more than two years", explanation: "The distinction is based on the gravity of the punishment. A 'warrant case' follows a more detailed trial procedure compared to a 'summons case', which is for less serious offenses." },
            { q: "What is the 'Victim Compensation Scheme' under the CrPC?", options: ["A scheme run by NGOs", "A scheme under Section 357A for every state government to provide funds for compensating victims of crime", "A scheme where the accused pays the victim directly", "A type of insurance for victims"], answer: "A scheme under Section 357A for every state government to provide funds for compensating victims of crime", explanation: "This scheme was introduced to provide financial relief to victims or their dependents who have suffered loss or injury as a result of the crime, and who require rehabilitation." },
            { q: "What is the offense of 'organized crime' under state laws like MCOCA?", options: ["Any crime committed by a group", "Continuing unlawful activity by a group, acting in concert, for pecuniary benefits or other advantages", "A single serious crime by a gang", "A crime that is well-planned"], answer: "Continuing unlawful activity by a group, acting in concert, for pecuniary benefits or other advantages", explanation: "Special state laws like the Maharashtra Control of Organised Crime Act (MCOCA) were enacted to tackle organized crime syndicates. They have stricter provisions for bail, admissibility of evidence (like confessions to police), and punishment than the general IPC." },
            { q: "What is the 'right to a speedy trial'?", options: ["A right to have the trial finished in one day", "A fundamental right implied under Article 21 of the Constitution", "A right that can be waived by the accused", "A statutory right under CrPC only"], answer: "A fundamental right implied under Article 21 of the Constitution", explanation: "The Supreme Court has held that the 'right to a speedy trial' is an essential part of the right to life and personal liberty under Article 21. Undue delay in trial can be a ground for quashing the conviction." },
            { q: "What is the difference between 'remand to police custody' and 'remand to judicial custody'?", options: ["They are the same", "In police custody, the accused is with the police for investigation; in judicial custody, they are in the custody of the court (in jail)", "Police custody is longer than judicial custody", "Judicial custody is for interrogation"], answer: "In police custody, the accused is with the police for investigation; in judicial custody, they are in the custody of the court (in jail)", explanation: "An accused is remanded to police custody for the purpose of interrogation and investigation. After the initial period (maximum 15 days), they are remanded to judicial custody, where they are under the supervision of the magistrate." }
          ],
          5: [
            { q: "What is the 'res ipsa loquitur' principle and its applicability in criminal law?", options: ["'The thing speaks for itself'; it is a primary rule of evidence in criminal law", "'The thing speaks for itself'; it is generally not applicable in criminal law as the burden of proof is on the prosecution", "A rule of sentencing", "A defense for the accused"], answer: "'The thing speaks for itself'; it is generally not applicable in criminal law as the burden of proof is on the prosecution", explanation: "Res ipsa loquitur is a rule of evidence in tort law where negligence is presumed from the mere fact of an accident. It is rarely applied in criminal cases because the accused is presumed innocent and the prosecution must prove guilt beyond a reasonable doubt." },
            { q: "What are the Supreme Court's guidelines regarding the admissibility of a 'dying declaration'?", options: ["It is always admissible", "It is never admissible without corroboration", "It can be the sole basis for conviction if it is trustworthy and inspires confidence", "It must be recorded by a magistrate"], answer: "It can be the sole basis for conviction if it is trustworthy and inspires confidence", explanation: "A dying declaration is an exception to the hearsay rule. The Supreme Court has held that if the court is satisfied that the declaration is true and voluntary, it can base a conviction on it without any further corroboration. The person recording it must be satisfied the declarant is in a fit state of mind." },
            { q: "What is the legal status of DNA evidence in Indian courts?", options: ["It is considered conclusive proof of guilt", "It is considered strong corroborative evidence but its admissibility depends on procedural safeguards", "It is not admissible in Indian courts", "It is only used for identifying victims"], answer: "It is considered strong corroborative evidence but its admissibility depends on procedural safeguards", explanation: "DNA evidence is considered expert opinion under the Indian Evidence Act. While it has high scientific accuracy, courts treat it as strong corroborative evidence that must be supported by other evidence. The integrity of the collection, preservation, and testing process (chain of custody) is crucial for its admissibility." },
            { q: "What is the 'double jeopardy' principle under Article 20(2) of the Constitution?", options: ["A person cannot be tried twice for the same offense", "A person cannot be punished twice for the same offense", "A person cannot be arrested twice for the same offense", "A person cannot be investigated twice for the same offense"], answer: "A person cannot be punished twice for the same offense", explanation: "Article 20(2) provides that 'no person shall be prosecuted and punished for the same offence more than once'. This is a narrower protection than in some other countries, as it requires a prior conviction and punishment, not just a prior trial (acquittal)." },
            { q: "What are the key provisions of the Protection of Children from Sexual Offences (POCSO) Act, 2012?", options: ["It only deals with child trafficking", "It provides for gender-neutral protection, child-friendly procedures, and mandatory reporting", "It is the same as the IPC provisions for rape", "It only applies to children below 12"], answer: "It provides for gender-neutral protection, child-friendly procedures, and mandatory reporting", explanation: "The POCSO Act is a special law that protects both boys and girls from sexual offenses. It mandates child-friendly court procedures (like in-camera trials), does not put the burden of proof on the child, and makes it mandatory for persons in authority to report offenses." },
            { q: "What is the legal framework and controversy surrounding 'encounter killings' in India?", options: ["They are a legally sanctioned method of policing", "They are alleged extra-judicial killings, subject to strict guidelines laid down by the Supreme Court for independent investigation", "They are treated as acts of self-defense by police", "There is no legal framework for them"], answer: "They are alleged extra-judicial killings, subject to strict guidelines laid down by the Supreme Court for independent investigation", explanation: "So-called 'encounter killings' are highly controversial. The Supreme Court, in cases like PUCL v. State of Maharashtra, has laid down a mandatory 16-point procedure, including a mandatory magisterial inquiry and independent investigation, to be followed in all cases of death caused in police encounters." },
            { q: "What is the 'theory of reformation' as a purpose of punishment?", options: ["To create fear in society", "The objective is to reform the offender and reintegrate them into society as a law-abiding citizen", "To give the victim a sense of revenge", "To remove the offender from society permanently"], answer: "The objective is to reform the offender and reintegrate them into society as a law-abiding citizen", explanation: "The reformative theory of punishment emphasizes the rehabilitation of the offender. It is based on the humanistic principle that even if an offender commits a crime, they do not cease to be a human being. Probation and parole are examples of this theory in practice." },
            { q: "What is the difference between 'substantive' and 'procedural' law?", options: ["Substantive law is more important", "Substantive law defines rights and duties; procedural law prescribes the method for enforcing them", "Substantive law is for civil cases, procedural for criminal", "Substantive law is made by Parliament, procedural by courts"], answer: "Substantive law defines rights and duties; procedural law prescribes the method for enforcing them", explanation: "Substantive law is the body of law that creates, defines, and regulates the rights and obligations of parties (e.g., the Indian Penal Code). Procedural law establishes the rules and procedures for conducting a lawsuit (e.g., the Code of Criminal Procedure)." },
            { q: "What is the 'presumption of constitutionality' of a penal statute?", options: ["A law is presumed to be unconstitutional until proven otherwise", "A law enacted by the legislature is presumed to be constitutional, and the burden is on the challenger to prove its unconstitutionality", "A law can never be challenged", "A law is constitutional only if the President approves it"], answer: "A law enacted by the legislature is presumed to be constitutional, and the burden is on the challenger to prove its unconstitutionality", explanation: "Courts start with the presumption that the legislature understands the needs of the people and has enacted a law that is valid. Therefore, the person who challenges the constitutionality of a law, including a penal law, has a heavy burden to prove that it violates the Constitution." },
            { q: "What is the legal concept of 'malice in law' vs 'malice in fact'?", options: ["Malice in law is legal, malice in fact is illegal", "Malice in law is a wrongful act done intentionally without just cause; malice in fact is ill-will or a personal grudge", "Malice in law is for civil cases, malice in fact for criminal", "They are the same"], answer: "Malice in law is a wrongful act done intentionally without just cause; malice in fact is ill-will or a personal grudge", explanation: "Malice in law (or legal malice) means a wrongful act done intentionally without just cause or excuse. Malice in fact (or express malice) means an actual malicious intention towards a particular person. For many offenses, only malice in law is required." }
          ],

          6: [
                { q: "What is the key legal distinction between **Kidnapping** and **Abduction**?", options: ["Kidnapping is only for minors, Abduction is for adults", "Kidnapping is against the victim's will; Abduction involves force/deception and is always illegal", "Kidnapping is from lawful guardianship; Abduction is by force or deceit to compel a person to go", "Kidnapping is a civil wrong, Abduction is a crime"], answer: "Kidnapping is from lawful guardianship; Abduction is by force or deceit to compel a person to go", explanation: "Kidnapping (S. 359-360 IPC) is a narrower offense involving a minor or a person of unsound mind taken from lawful guardianship. Abduction (S. 362 IPC) involves compulsion by force or deceit to move any person from one place to another, regardless of age." },
                { q: "What is the distinction between **Robbery** and **Dacoity** under the IPC?", options: ["Robbery is by force, Dacoity is by fraud", "Dacoity is a graver form of Robbery, distinguished by the number of persons committing the act (five or more)", "Robbery is of movable property, Dacoity is of immovable property", "Dacoity requires use of a weapon, Robbery does not"], answer: "Dacoity is a graver form of Robbery, distinguished by the number of persons committing the act (five or more)", explanation: "Robbery (S. 390 IPC) occurs when theft or extortion involves violence or fear of immediate hurt. Dacoity (S. 391 IPC) is essentially robbery committed by five or more persons acting conjointly." },
                { q: "What is the procedural purpose and legal value of a **Test Identification Parade (TIP)**?", options: ["To record the accused's statement", "To record the victim's statement", "To test the memory and ability of a witness to identify the accused who is unknown to them", "To determine the cause of death"], answer: "To test the memory and ability of a witness to identify the accused who is unknown to them", explanation: "A TIP is conducted during investigation to test the evidence of the prosecution witnesses by having them identify the accused from a group of persons. It is not substantive evidence itself but corroborates the witness's testimony in court." },
                { q: "What is the difference between **Wrongful Restraint** and **Wrongful Confinement**?", options: ["Wrongful Restraint prevents a person from proceeding in one direction; Wrongful Confinement prevents a person from proceeding in all directions", "Wrongful Restraint is a civil wrong, Confinement is a crime", "Confinement is for a shorter period", "Restraint is by a police officer"], answer: "Wrongful Restraint prevents a person from proceeding in one direction; Wrongful Confinement prevents a person from proceeding in all directions", explanation: "Wrongful Restraint (S. 339 IPC) is the lesser offense where a person is prevented from proceeding only in the direction they have a right to go. Wrongful Confinement (S. 340 IPC) is the more serious offense where the person is prevented from proceeding beyond certain circumscribing limits." },
                { q: "What is the primary distinction between **Abetment by Conspiracy** and **Criminal Conspiracy**?", options: ["Abetment requires an agreement to commit a crime; Criminal Conspiracy is merely an agreement", "Abetment requires an **act or illegal omission** to be committed; Criminal Conspiracy is complete with the **mere agreement** to commit an offense punishable with imprisonment for a term of two years or more", "Criminal Conspiracy is a civil wrong", "There is no distinction"], answer: "Abetment requires an **act or illegal omission** to be committed; Criminal Conspiracy is complete with the **mere agreement** to commit an offense punishable with imprisonment for a term of two years or more", explanation: "For abetment by conspiracy (S. 107), an act or illegal omission must take place in pursuance of the conspiracy. For the separate offense of criminal conspiracy (S. 120A), the mere agreement (if the offense is grave) is sufficient for liability." },
                { q: "Under the CrPC, what is the effect of the **Compounding of Offences** (S. 320)?", options: ["The accused is released on bail", "The accused is released with a warning", "The compounding of an offense operates as an acquittal of the accused", "The trial is suspended indefinitely"], answer: "The compounding of an offense operates as an acquittal of the accused", explanation: "Compounding is a compromise between the parties where the victim agrees to drop the charges. For compoundable offenses, this compromise results in the acquittal of the accused, effectively ending the trial." },
                { q: "What is the purpose and main challenge of **Plea Bargaining** (CrPC S. 265A-L)?", options: ["To speed up trials by allowing the accused to plead guilty in exchange for a lesser charge or reduced sentence", "To negotiate a settlement in civil cases", "To allow the judge to decide the guilt beforehand", "To challenge the jurisdiction of the court"], answer: "To speed up trials by allowing the accused to plead guilty in exchange for a lesser charge or reduced sentence", explanation: "Plea bargaining is a process introduced to reduce judicial backlog. It is applicable to offenses with a maximum punishment of up to seven years, provided the offense does not affect the socio-economic conditions of the country." },
                { q: "What is the difference between a **Concurrent Sentence** and a **Consecutive Sentence**?", options: ["Concurrent sentences are served one after the other; Consecutive sentences are served at the same time", "Concurrent sentences are served at the same time; Consecutive sentences are served one after the other", "Concurrent sentences are for civil cases, Consecutive for criminal", "There is no legal difference"], answer: "Concurrent sentences are served at the same time; Consecutive sentences are served one after the other", explanation: "When a person is convicted of multiple offenses, concurrent sentences (S. 31 CrPC) run at the same time, reducing the total time served. Consecutive sentences run sequentially, increasing the total time served." },
                { q: "When is **'Hurt'** (S. 319 IPC) classified as **'Grievous Hurt'** (S. 320 IPC)?", options: ["When the injury is simple", "When the injury endangers life, causes fracture, or results in permanent loss of a limb or sense", "When the injury is caused by a weapon", "When the injury is minor"], answer: "When the injury endangers life, causes fracture, or results in permanent loss of a limb or sense", explanation: "Grievous hurt is a specific, aggravated form of hurt. It includes a closed list of injuries, such as permanent privation of sight or hearing, fracture or dislocation of a bone, or any hurt which endangers life." },
                { q: "What is the primary consideration for a court's **discretion** in granting bail in a **non-bailable offense**?", options: ["The financial status of the accused", "The length of the trial", "The gravity of the offense, the nature of the evidence, and the risk of absconding or tampering with evidence", "The popularity of the accused"], answer: "The gravity of the offense, the nature of the evidence, and the risk of absconding or tampering with evidence", explanation: "In non-bailable offenses, bail is a judicial discretion rather than a right. The court must balance the right to liberty with the need to ensure a fair trial and the safety of the public." }
            ],
 
          7: [
                { q: "What is the crucial element for the **admissibility of a Dying Declaration** in evidence?", options: ["It must be in writing", "The statement must be made under the expectation of impending death and the declarant must be in a **fit state of mind**", "It must be corroborated by a doctor", "It must be recorded by a police officer"], answer: "The statement must be made under the expectation of impending death and the declarant must be in a **fit state of mind**", explanation: "The underlying principle is that a person about to die is presumed not to lie. For a dying declaration to be admissible (S. 32 IEA), the most crucial requirement is that the declarant was mentally competent to give the statement." },
                { q: "What is the nature of the defense of **Alibi** and on whom does the burden of proving it lie?", options: ["A defense of self-defense; prosecution must prove it is false", "A defense that the accused was **elsewhere** at the time of the crime; the **accused** must prove it", "A defense of mistake of fact; the court must prove it", "A defense of necessity; the victim must prove it"], answer: "A defense that the accused was **elsewhere** at the time of the crime; the **accused** must prove it", explanation: "The plea of alibi (Latin for 'elsewhere') is a special defense. While the general burden of proof is on the prosecution, the burden of proving a specific defense like alibi lies on the accused (S. 103 IEA), though the prosecution still has the primary burden of proving guilt." },
                { q: "What is **Criminal Intimidation** (S. 503 IPC)?", options: ["Telling someone you dislike them", "Threatening another person with injury to their person, reputation, or property to cause alarm", "A type of self-defense", "A form of legal notice"], answer: "Threatening another person with injury to their person, reputation, or property to cause alarm", explanation: "Criminal Intimidation is the threat to injure a person's body, reputation, or property with the intent to cause alarm to that person, or to cause that person to do any act which they are not legally bound to do." },
                { q: "What is the purpose of **Anticipatory Bail** (CrPC S. 438)?", options: ["To prevent detention after arrest", "A direction to release a person on bail even **before** they have been arrested", "A direction to arrest a person immediately", "A form of punishment"], answer: "A direction to release a person on bail even **before** they have been arrested", explanation: "Anticipatory bail is a pre-arrest legal remedy that can be granted by the Court of Session or the High Court to a person apprehending arrest on a non-bailable offense. It offers protection from being taken into police custody." },
                { q: "What is the significance of the distinction between **Motive** and **Intention** in criminal law?", options: ["Motive is essential for conviction; Intention is not", "Intention is essential for almost all crimes; Motive is merely a reason or desire, which is **not** essential for conviction", "They are legally the same concept", "Motive is only required for murder"], answer: "Intention is essential for almost all crimes; Motive is merely a reason or desire, which is **not** essential for conviction", explanation: "Intention is the immediate mental state required by the definition of the crime (mens rea). Motive is the ultimate underlying reason for committing the crime, and while highly relevant, it is not an essential element to be proved for conviction." },
                { q: "What is the core element of constructive liability under **Section 149 IPC** (Unlawful Assembly)?", options: ["Only the person who committed the act is liable", "Every member of the unlawful assembly is liable for the offense committed by any one member in **prosecution of the common object** of that assembly", "Only the leader is liable", "Liability is limited to a fine"], answer: "Every member of the unlawful assembly is liable for the offense committed by any one member in **prosecution of the common object** of that assembly", explanation: "Section 149 establishes collective liability. If an offense is committed by any member of an unlawful assembly in furtherance of the common object, every person who was a member of the assembly at the time is deemed guilty of that offense." },
                { q: "What is the purpose of recording statements/confessions under **Section 164 of the CrPC**?", options: ["To record statements of police officers", "To record a confession or statement made by a person during the investigation before a magistrate", "To record the final judgment", "To record the evidence of expert witnesses"], answer: "To record a confession or statement made by a person during the investigation before a magistrate", explanation: "Section 164 provides the legal safeguard for recording confessions or statements by a judicial magistrate, ensuring that the statement is voluntary and admissible in court, unlike a statement recorded by a police officer." },
                { q: "What is the **Probation of Offenders Act, 1958** designed for?", options: ["To ensure all offenders go to prison", "To release certain first-time offenders on probation (good behaviour) instead of sentencing them to imprisonment", "To increase the length of sentences", "To abolish all prisons"], answer: "To release certain first-time offenders on probation (good behaviour) instead of sentencing them to imprisonment", explanation: "This Act embodies the reformative theory of punishment, allowing courts to release first-time or young offenders on bond and supervision, instead of jail, to promote their rehabilitation." },
                { q: "What is the difference between **Forgery** and **Making a False Document**?", options: ["Forgery is always for cheating; Making a False Document is not", "Making a False Document is the physical act; Forgery requires that act to be done with the **intent to cause damage or fraud**", "Forgery is a civil offense", "Making a False Document requires the use of a computer"], answer: "Making a False Document is the physical act; Forgery requires that act to be done with the **intent to cause damage or fraud**", explanation: "Making a False Document (S. 464 IPC) is the preliminary act. Forgery (S. 463 IPC) is the act of making a false document (as defined in S. 464) with the specific **intent** to cause damage or injury to the public or to any person, or to support any claim or title." },
                { q: "What is the difference between **Exemplary Damages** and **Compensatory Damages** in a criminal trial context?", options: ["Exemplary damages are paid to the court; Compensatory to the victim", "Compensatory Damages are to **reimburse the victim for actual loss**; Exemplary Damages are **punitive** (rarely awarded) to deter the accused", "Exemplary damages are always mandatory", "They are both purely civil remedies"], answer: "Compensatory Damages are to **reimburse the victim for actual loss**; Exemplary Damages are **punitive** (rarely awarded) to deter the accused", explanation: "While typically part of civil law, courts in criminal trials (S. 357 CrPC) can award compensatory damages. Exemplary damages, aimed at punishing the offender, are typically only awarded in civil proceedings but embody the deterrent function of criminal punishment." }
            ],

             8: [
                { q: "What is the difference in defense application between **Mistake of Fact** and **Mistake of Law**?", options: ["Mistake of Law is a complete defense; Mistake of Fact is not", "Mistake of Fact (S. 76, 79 IPC) is a valid defense; Mistake of Law is **not a defense** ('Ignorantia juris non excusat')", "They are both defenses for all crimes", "Mistake of Fact applies only to murder"], answer: "Mistake of Fact (S. 76, 79 IPC) is a valid defense; Mistake of Law is **not a defense** ('Ignorantia juris non excusat')", explanation: "A genuine mistake of fact that leads a person to believe they are justified in their act is a valid defense in criminal law. However, ignorance of the law is not an excuse for committing a crime." },
                { q: "What is the **standard of care** required to prove **Criminal Negligence** (S. 304A IPC)?", options: ["Failure to take any care", "A degree of negligence so **gross and reckless** as to be criminal and beyond a mere civil wrong", "A slight deviation from the norm", "Any failure that causes death"], answer: "A degree of negligence so **gross and reckless** as to be criminal and beyond a mere civil wrong", explanation: "Criminal negligence requires a much higher degree of rashness or negligence than is sufficient to support a claim for damages in civil law. It must demonstrate a callous disregard for the safety of others." },
                { q: "Why is **Corroboration** particularly desirable for the testimony of an **Accomplice**?", options: ["Accomplices are always truthful", "Accomplices have a **motive to lie or shift blame**, making their evidence inherently weak and requiring independent confirmation", "Accomplices are always reliable witnesses", "Their evidence is too strong"], answer: "Accomplices have a **motive to lie or shift blame**, making their evidence inherently weak and requiring independent confirmation", explanation: "An accomplice is a person who has participated in the crime. Since they are themselves criminals, their testimony is viewed with suspicion (S. 133 IEA), and prudence dictates that it should be corroborated by independent material particulars before conviction." },
                { q: "What is the key element required to prove the offense of **Sedition** (S. 124A IPC)?", options: ["Any criticism of the government", "Acts/words that cause **incitement to violence** or create public disorder", "Mere strong disapproval of government policy", "A difference of opinion"], answer: "Acts/words that cause **incitement to violence** or create public disorder", explanation: "As per the Supreme Court's interpretation (Kedar Nath Singh case), the core element of sedition is not merely exciting disaffection but exciting it in a manner that **incites violence** or creates a tendency to public disorder, restricting the scope of the offense." },
                { q: "What is the role of **Expert Opinion** (S. 45 IEA) in a criminal trial?", options: ["It is conclusive proof of the facts stated", "It is **admissible evidence**, but is only an opinion that assists the court and is not binding", "It is inadmissible unless the expert is a judge", "It replaces the need for factual witnesses"], answer: "It is **admissible evidence**, but is only an opinion that assists the court and is not binding", explanation: "Expert evidence (e.g., forensic, medical) is admissible because the court requires specialized assistance. However, the court is the final judge of fact, and the expert's opinion is only a piece of evidence, which the court may accept or reject after due consideration." },
                { q: "What is the purpose of a **Writ of Prohibition** in a criminal law context?", options: ["To quash an order already passed", "To **forbid a lower court or tribunal** from proceeding further in a trial that is outside its jurisdiction", "To command a public official to act", "To free an illegally detained person"], answer: "To **forbid a lower court or tribunal** from proceeding further in a trial that is outside its jurisdiction", explanation: "Prohibition is a preventive writ issued by a higher court (High Court or Supreme Court) to stop an inferior judicial or quasi-judicial body from exercising powers that it does not legally possess." },
                { q: "What is the significance of obtaining **Sanction for Prosecution** (e.g., S. 197 CrPC) in certain cases?", options: ["It is a mandatory step in all cases", "It is a **pre-requisite** to prosecute public servants for acts done in the discharge of their official duty", "It is a suggestion for the police", "It is only required for civil suits"], answer: "It is a **pre-requisite** to prosecute public servants for acts done in the discharge of their official duty", explanation: "Sanction is a safeguard for public servants. It protects them from being harassed by frivolous prosecution for acts done in their official capacity, ensuring that the government is satisfied that there is a genuine need for the trial." },
                { q: "What is the offense of **'Sexual Harassment'** (S. 354A IPC)?", options: ["Only inappropriate touching", "Any act of unwelcome physical contact, a demand for sexual favours, or showing pornography against a woman's will", "Only verbal abuse of a woman", "All forms of harassment"], answer: "Any act of unwelcome physical contact, a demand for sexual favours, or showing pornography against a woman's will", explanation: "Section 354A defines specific acts that constitute sexual harassment, including physical advances, explicit demands, and the use of explicit materials, making it a non-bailable offense." },
                { q: "What is the **joint trial** rule in CrPC?", options: ["Two or more persons can only be tried separately", "Two or more persons can be tried together if they are **accused of the same offense** committed in the same transaction", "Joint trials are mandatory for all accused", "Joint trials are only for minor offenses"], answer: "Two or more persons can be tried together if they are **accused of the same offense** committed in the same transaction", explanation: "Section 223 CrPC allows for a joint trial of multiple accused to save time and prevent multiplicity of proceedings, provided the offenses are related and form part of the same transaction." },
                { q: "What is the distinction between **Treason (Waging War)** and **Sedition**?", options: ["Treason is a threat to the state's security; Sedition is a threat to the government's policy", "Treason (S. 121 IPC) is a direct, overt attack on the existence of the state itself, carrying the death penalty; Sedition (S. 124A IPC) is about incitement to disaffection", "Sedition is a graver crime", "Treason is a civil wrong"], answer: "Treason (S. 121 IPC) is a direct, overt attack on the existence of the state itself, carrying the death penalty; Sedition (S. 124A IPC) is about incitement to disaffection", explanation: "Waging war against the Government of India (Treason) is the highest crime in the IPC and involves direct action, while Sedition is an offense involving speech or writing that attempts to bring disaffection or contempt." }
            ],

          9: [
                { q: "What is the **Proximity Rule** in the offense of **Attempt** (S. 511 IPC)?", options: ["The accused must be near the victim", "The act done must be **proximate to the commission of the complete offense**, falling short only by an accidental factor", "The attempt must be far from the intended crime", "The attempt must be complete"], answer: "The act done must be **proximate to the commission of the complete offense**, falling short only by an accidental factor", explanation: "The Proximity Rule is a test to distinguish mere preparation from a criminal attempt. The accused's act must be very close to the actual commission of the offense and must be of such a nature that it can logically lead to the completion of the crime." },
                { q: "What is the crucial element of the defense of **Grave and Sudden Provocation** (Exception 1 to Murder)?", options: ["The provocation must be planned", "The accused must lose **self-control** as a direct consequence of the provocation, and the act must be done while the loss of control continues", "The provocation must be very slight", "The provocation must be caused by a third party"], answer: "The accused must lose **self-control** as a direct consequence of the provocation, and the act must be done while the loss of control continues", explanation: "This exception reduces murder to culpable homicide not amounting to murder. The test is whether a reasonable man belonging to the same society as the accused would have lost self-control under the circumstances." },
                { q: "What is **Cruelty** against a woman (S. 498A IPC)?", options: ["Only physical violence", "Any willful conduct that is likely to drive the woman to commit suicide or cause grave injury or danger to life or health", "A minor quarrel in the marriage", "Only verbal abuse"], answer: "Any willful conduct that is likely to drive the woman to commit suicide or cause grave injury or danger to life or health", explanation: "Section 498A, dealing with domestic violence, defines cruelty broadly to include willful conduct that causes mental or physical harm, or harassment with a view to coercing the woman for property demands." },
                { q: "What is the general rule regarding the **Admissibility of Evidence obtained by Unlawful Means**?", options: ["It is always inadmissible", "It is **admissible** in India, provided the evidence itself is relevant and its authenticity is established", "It is only admissible if a magistrate obtained it", "It is only admissible if the accused consents"], answer: "It is **admissible** in India, provided the evidence itself is relevant and its authenticity is established", explanation: "Unlike the 'fruit of the poisonous tree' doctrine in some jurisdictions, Indian law focuses primarily on the **relevance** of the evidence (S. 5 IEA). Even if evidence was obtained illegally (e.g., through an illegal search), it is generally admissible if it is otherwise relevant." },
                { q: "What is the difference between **Abetment by Instigation** and **Abetment by Aid**?", options: ["Instigation is by words, Aid is by action", "Instigation is actively prompting or inciting the commission of an offense; Aid is doing an act to facilitate the commission of the offense", "They are the same", "Instigation requires planning, Aid is spontaneous"], answer: "Instigation is actively prompting or inciting the commission of an offense; Aid is doing an act to facilitate the commission of the offense", explanation: "Instigation (S. 107 First) is a mental process of putting someone up to commit the crime. Aid (S. 107 Third) is a physical act of assistance that facilitates the commission of the crime." },
                { q: "What is the key purpose of the **Restorative Theory of Punishment**?", options: ["To ensure the death penalty is used often", "To focus on the harm done to the victim and the community, emphasizing **reparation and reconciliation**", "To incapacitate the offender permanently", "To use punishment to reform the offender"], answer: "To focus on the harm done to the victim and the community, emphasizing **reparation and reconciliation**", explanation: "Restorative justice moves beyond the offender-state relationship. It seeks to repair the harm caused by crime by bringing the victims, offenders, and community members together for a dialogue." },
                { q: "What is the consequence for the accused of entering a **Plea of Guilty** (CrPC S. 241, 252)?", options: ["The court must still hold a full trial", "The court may **convict the accused forthwith** based on the plea, though it is discretionary", "The accused is immediately released", "The trial is converted into a civil suit"], answer: "The court may **convict the accused forthwith** based on the plea, though it is discretionary", explanation: "When an accused pleads guilty, the magistrate is generally required to record the plea and may convict the accused. This dispenses with the need for further evidence. However, the court must ensure the plea is voluntary and unequivocal." },
                { q: "What is the **Doctrine of Merger** in the context of criminal law?", options: ["A concept where a minor offense merges into a major one, precluding punishment for both", "A doctrine that merges all criminal cases into one court", "A doctrine that merges civil and criminal law", "A doctrine that allows the accused to merge multiple sentences"], answer: "A concept where a minor offense merges into a major one, precluding punishment for both", explanation: "This doctrine prevents the punishment of a lesser offense when it is an integral and inseparable part of a greater offense. For example, if hurt is committed in the course of murder, the conviction is only for murder, not hurt." },
                { q: "What is **Custodial Torture** and what is the legal remedy?", options: ["Torture committed by private citizens", "Torture or violence committed by police or other state agents on a person in custody, which is strictly prohibited and subject to legal action (e.g., writ of Habeas Corpus)", "A form of legal interrogation", "A minor offense"], answer: "Torture or violence committed by police or other state agents on a person in custody, which is strictly prohibited and subject to legal action (e.g., writ of Habeas Corpus)", explanation: "Custodial torture violates the fundamental rights under Article 21 and is condemned by the Supreme Court. The police or jail authorities are held strictly liable, and the victim is entitled to compensation." },
                { q: "What is the key procedural difference between a **Police Report Trial** and a **Private Complaint Trial** in a Warrant Case (CrPC)?", options: ["They are identical in procedure", "In a Police Report Trial, the prosecution begins immediately; in a Private Complaint Trial, the magistrate must first examine the complainant and witnesses", "Private Complaint Trials are always in the High Court", "Police Report Trials are faster"], answer: "In a Police Report Trial, the prosecution begins immediately; in a Private Complaint Trial, the magistrate must first examine the complainant and witnesses", explanation: "The procedure for a Warrant Case on a police report (S. 238-243) is slightly simpler. The trial on a private complaint (S. 244-247) requires the magistrate to follow an additional step of recording the evidence of the complainant and their witnesses before deciding whether to frame a charge." }
            ],

             10: [
                { q: "What are **Leading Questions** and when can they be asked in court (S. 141-142 IEA)?", options: ["Questions that suggest the answer; they can be asked only in **cross-examination**", "Questions that suggest the answer; they can be asked only in examination-in-chief", "Questions that are very confusing; they can be asked at any time", "Questions about the leader of the party; they are always admissible"], answer: "Questions that suggest the answer; they can be asked only in **cross-examination**", explanation: "A leading question suggests the answer the questioner expects. It is generally not allowed during the Examination-in-chief but is permissible during cross-examination to impeach the credibility of the witness." },
                { q: "What is the key difference between **Theft** and **Extortion**?", options: ["Theft is a civil wrong; Extortion is a crime", "Theft is committed **without the consent** of the owner (movable property is taken); Extortion involves **consent obtained by putting the person in fear** of injury", "Theft is only for small amounts", "They are the same"], answer: "Theft is committed **without the consent** of the owner (movable property is taken); Extortion involves **consent obtained by putting the person in fear** of injury", explanation: "The crucial difference lies in the *consent* and *movement* of the property. Theft (S. 378) is taking without consent. Extortion (S. 383) is compelling the victim to give consent to deliver property through fear." },
                { q: "What is the **exception to the burden of proof** in a criminal trial (S. 105 IEA)?", options: ["The burden is always on the prosecution", "The burden of proving a **general exception/defense** (e.g., Insanity, Private Defense) lies on the accused", "The burden shifts to the judge", "The burden is always on the victim"], answer: "The burden of proving a **general exception/defense** (e.g., Insanity, Private Defense) lies on the accused", explanation: "While the prosecution must prove the main ingredients of the crime, the burden of proving that the case falls within a General Exception of the IPC (S. 76-106) lies on the accused, though only on a balance of probability, not beyond reasonable doubt." },
                { q: "What is **Criminal Defamation** (S. 499 IPC)?", options: ["A lawsuit for money damages", "The making or publishing of an imputation concerning any person intending to harm, or knowing that it will harm, the **reputation** of that person", "A form of simple verbal abuse", "A statement of fact that is true"], answer: "The making or publishing of an imputation concerning any person intending to harm, or knowing that it will harm, the **reputation** of that person", explanation: "Criminal defamation is a non-cognizable, bailable, and compoundable offense. It penalizes the act of harming a person's reputation, subject to ten well-defined exceptions like truth for public good, public conduct of public servants, etc." },
                { q: "What is **Preventive Detention** and what is its legal basis?", options: ["Detention after conviction", "Detention of a person **without trial** on suspicion that they are likely to commit an offense, under specific laws (e.g., National Security Act, 1980)", "Detention for a day", "Detention for a minor offense"], answer: "Detention of a person **without trial** on suspicion that they are likely to commit an offense, under specific laws (e.g., National Security Act, 1980)", explanation: "Preventive Detention is an extraordinary constitutional measure (Article 22). It is not punishment for an offense, but a precautionary measure to prevent a person from committing a future offense." },
                { q: "What is the **Right to Legal Aid** and when is it mandatory?", options: ["The right to hire any lawyer", "A **fundamental right** (Art. 39A/Art. 21) that mandates free legal services to the poor and needy, particularly when the accused faces imprisonment", "A right only for civil cases", "A right that can be waived"], answer: "A **fundamental right** (Art. 39A/Art. 21) that mandates free legal services to the poor and needy, particularly when the accused faces imprisonment", explanation: "The Supreme Court has made it clear that free legal aid is a fundamental right. Section 304 CrPC specifically makes it mandatory for the state to provide legal aid in sessions trials if the accused has no means to engage a lawyer." },
                { q: "What is the power of **Commutation of Sentence**?", options: ["The power to postpone a sentence", "The power to **substitute a sentence** with one of a lighter nature (e.g., death to life imprisonment)", "The power to reduce the period of a sentence", "The power to grant a complete pardon"], answer: "The power to **substitute a sentence** with one of a lighter nature (e.g., death to life imprisonment)", explanation: "Commutation is a power held by the President/Governor (Art. 72, 161) and the appropriate government (S. 433 CrPC). It involves changing the nature of the punishment to a less severe one." },
                { q: "What is the primary ground for a court to **Cancel Bail**?", options: ["The accused is too quiet", "If the accused **misuses the liberty** granted (e.g., absconds, tampers with evidence, or threatens witnesses)", "The police requests it", "The victim requests it"], answer: "If the accused **misuses the liberty** granted (e.g., absconds, tampers with evidence, or threatens witnesses)", explanation: "Bail cancellation is a serious judicial action taken when the conduct of the accused after being released on bail jeopardizes the fairness of the trial or the safety of the public." },
                { q: "What is the *mens rea* requirement for **Homicide by Rash and Negligent Act** (S. 304A IPC)?", options: ["Intention to kill", "**No intention to cause death**, but the act was done with criminal rashness or gross negligence", "Knowledge that the act is likely to cause death", "Malice aforethought"], answer: "**No intention to cause death**, but the act was done with criminal rashness or gross negligence", explanation: "This section is unique because it specifically applies when death is caused by a person's rash or negligent act, but without any positive intention or knowledge that the act would result in death, making the offense less severe than culpable homicide." },
                { q: "What are the essential safeguards during a **Search and Seizure** (CrPC S. 100)?", options: ["The police must inform the accused's lawyer", "The police must record the search in a diary", "The search must be conducted in the presence of **two independent and respectable inhabitants** of the locality and a detailed **memorandum of search** must be prepared", "The search can be conducted by one police officer alone"], answer: "The search must be conducted in the presence of **two independent and respectable inhabitants** of the locality and a detailed **memorandum of search** must be prepared", explanation: "Section 100 CrPC provides these procedural safeguards to ensure the fairness and credibility of the search process against allegations of planting or fabrication of evidence." }
            ]
        }

      civil: {
        easy: {
          1: [
            { q: "What is a legally binding agreement between two or more parties called?", options: ["A promise", "A contract", "A negotiation", "A memorandum"], answer: "A contract", explanation: "A contract is a legally enforceable agreement that creates, defines, and governs mutual rights and obligations among its parties." },
            { q: "In a civil lawsuit, who is the person or entity initiating the lawsuit?", options: ["The defendant", "The judge", "The plaintiff", "The witness"], answer: "The plaintiff", explanation: "The plaintiff is the party who brings a legal action or in whose name it is brought, as opposed to the defendant, the party who is being sued." },
            { q: "What is the main purpose of civil law?", options: ["To punish wrongdoers", "To resolve disputes between individuals or organizations", "To regulate the government", "To prosecute criminals"], answer: "To resolve disputes between individuals or organizations", explanation: "Civil law deals with disputes between individuals, organizations, or between the two, in which compensation is awarded to the victim. Its primary purpose is to provide a legal remedy to resolve disputes." },
            { q: "What is a 'lease'?", options: ["The sale of a property", "A contract for the temporary use of a property in exchange for rent", "A gift of property", "A mortgage on a property"], answer: "A contract for the temporary use of a property in exchange for rent", explanation: "A lease is a contractual arrangement calling for the lessee (user) to pay the lessor (owner) for use of an asset." },
            { q: "What is a 'will'?", options: ["A list of wishes", "A legal document declaring a person's wishes regarding the disposal of their property after death", "A type of contract", "A court order"], answer: "A legal document declaring a person's wishes regarding the disposal of their property after death", explanation: "A will or testament is a legal document that expresses a person's (the testator's) wishes as to how their property is to be distributed after their death." },
            { q: "What does 'inheritance' mean?", options: ["Buying a property", "Receiving property from someone upon their death", "Renting a property", "Building a property"], answer: "Receiving property from someone upon their death", explanation: "Inheritance is the practice of passing on property, titles, debts, rights, and obligations upon the death of an individual." },
            { q: "What is a 'Power of Attorney'?", options: ["A document giving someone legal authority to act on another's behalf", "A court's power", "The strength of a lawyer's argument", "A political position"], answer: "A document giving someone legal authority to act on another's behalf", explanation: "A Power of Attorney (POA) is a legal document giving one person (the agent or attorney-in-fact) the power to act for another person (the principal)." },
            { q: "What is the role of a 'notary public'?", options: ["To act as a lawyer", "To serve as an official witness to the signing of documents", "To decide civil cases", "To draft contracts"], answer: "To serve as an official witness to the signing of documents", explanation: "A notary public is a public officer constituted by law to serve the public in non-contentious matters usually concerned with estates, deeds, powers-of-attorney, and foreign and international business." },
            { q: "What is a 'breach of contract'?", options: ["Fulfilling a contract", "Cancelling a contract by mutual agreement", "Failing to perform any term of a contract without a legitimate legal excuse", "Negotiating a contract"], answer: "Failing to perform any term of a-contract without a legitimate legal excuse", explanation: "A breach of contract is a violation of any of the agreed-upon terms and conditions of a binding contract." },
            { q: "What is 'property' in a legal sense?", options: ["Only land and buildings", "Only money", "Anything that a person or a business has legal title over", "Only personal belongings"], answer: "Anything that a person or a business has legal title over", explanation: "Legally, property is anything that is owned by a person or entity. It is divided into two types: 'real property' (land and buildings) and 'personal property' (movable possessions)." }
          ],
          2: [
            { q: "What is a 'plaint' in a civil suit?", options: ["A complaint against a neighbor", "The first document filed by the plaintiff to state their claim", "A type of evidence", "The defendant's reply"], answer: "The first document filed by the plaintiff to state their claim", explanation: "A plaint is the legal document which contains the written statement of the plaintiff's claim. A civil suit is initiated by the presentation of a plaint." },
            { q: "What is a 'written statement' in a civil suit?", options: ["A witness statement", "The defendant's reply to the plaint", "The final judgment", "A lawyer's notes"], answer: "The defendant's reply to the plaint", explanation: "A written statement is the pleading of the defendant in a civil suit, in which they deal with every material fact alleged by the plaintiff in the plaint and also state any new facts in their favor." },
            { q: "What is the 'cause of action'?", options: ["The reason for the court's decision", "The set of facts that gives a person the right to sue", "The final outcome of a case", "The legal fees"], answer: "The set of facts that gives a person the right to sue", explanation: "A cause of action is the bundle of essential facts which it is necessary for the plaintiff to prove before he can succeed in the suit. It is the foundation of a lawsuit." },
            { q: "What is a 'summons' in a civil case?", options: ["A request for money", "An official notice from the court informing the defendant about the suit", "A type of punishment", "A negotiation tool"], answer: "An official notice from the court informing the defendant about the suit", explanation: "When a plaintiff files a suit, the court issues a summons to the defendant to appear and answer the claim and to file the written statement." },
            { q: "What is an 'ex-parte' decree?", options: ["A decree passed after hearing both parties", "A decree passed in the absence of the defendant", "A decree that is not final", "A decree in a criminal case"], answer: "A decree passed in the absence of the defendant", explanation: "An ex-parte decree is a decree passed by the court when the defendant has not appeared in court after the summons has been duly served on them." },
            { q: "What is the purpose of 'framing of issues' in a civil suit?", options: ["To create problems in the case", "To identify the points of dispute between the parties", "To decide the case immediately", "To list the witnesses"], answer: "To identify the points of dispute between the parties", explanation: "Issues are framed by the court to pinpoint the questions of fact or law that are in dispute between the plaintiff and the defendant. The trial then proceeds on the basis of these issues." },
            { q: "What is an 'affidavit'?", options: ["A lawyer's argument", "A written statement confirmed by oath or affirmation, for use as evidence in court", "A type of contract", "A police report"], answer: "A written statement confirmed by oath or affirmation, for use as evidence in court", explanation: "An affidavit is a written sworn statement of fact voluntarily made by an affiant or deponent under an oath or affirmation administered by a person authorized to do so by law." },
            { q: "What is the 'burden of proof' in a civil case?", options: ["It is always on the defendant", "It is on the party who asserts a fact (usually the plaintiff)", "It is on the judge", "It is shared equally"], answer: "It is on the party who asserts a fact (usually the plaintiff)", explanation: "In civil cases, the burden of proof is on the plaintiff to prove their case by a 'preponderance of the evidence', which means it is more likely than not that their claim is true." },
            { q: "What is 'damages' in civil law?", options: ["Physical damage to property", "Monetary compensation awarded for loss or injury", "A penalty or fine", "The cost of the lawsuit"], answer: "Monetary compensation awarded for loss or injury", explanation: "Damages are an award, typically of money, to be paid to a person as compensation for loss or injury. The rules for damages can vary based on the type of claim which is presented (e.g., breach of contract or a tort)." },
            { q: "What is an 'appeal'?", options: ["A request to start a new case", "A process where a higher court reviews the decision of a lower court", "A complaint to the police", "A settlement between parties"], answer: "A process where a higher court reviews the decision of a lower court", explanation: "An appeal is a proceeding undertaken to have a decision of a lower court reviewed and reconsidered by a higher court. The person who appeals is called the appellant." }
          ],
          3: [
            { q: "What is a 'review' of a judgment?", options: ["The same as an appeal", "A request to the same court to reconsider its own judgment", "A media review of a case", "A review by the government"], answer: "A request to the same court to reconsider its own judgment", explanation: "A review is a judicial re-examination of a case by the same court and the same judge. It is a discretionary right and is allowed only on specific grounds, such as the discovery of new evidence or an error apparent on the face of the record." },
            { q: "What is a 'revision' in civil procedure?", options: ["Revising the facts of the case", "The power of a higher court to examine the decision of a subordinate court to ensure it acted within its jurisdiction", "A type of appeal", "A request to change the judge"], answer: "The power of a higher court to examine the decision of a subordinate court to ensure it acted within its jurisdiction", explanation: "Revision is the power of the High Court to call for the record of any case decided by a subordinate court in which no appeal lies, to satisfy itself as to the legality, regularity, or propriety of the proceedings." },
            { q: "What is an 'interlocutory order'?", options: ["The final order in a case", "A temporary order made during the course of a lawsuit before a final determination", "An order that cannot be appealed", "An order to start the trial"], answer: "A temporary order made during the course of a lawsuit before a final determination", explanation: "Interlocutory or interim orders are provisional orders made by a court pending a final hearing. They are intended to provide temporary relief or preserve the subject matter of the suit. An example is a temporary injunction." },
            { q: "What is a 'caveat'?", options: ["A type of warning or caution", "A notice given to a court that the opposing party should not be heard without notifying the caveator", "A final argument", "A type of evidence"], answer: "A notice given to a court that the opposing party should not be heard without notifying the caveator", explanation: "A caveat is a notice filed by a person with a court, requesting that they be given a hearing before the court passes any order on an application expected to be made by an opponent. It is a precautionary measure." },
            { q: "What is the 'Code of Civil Procedure, 1908' (CPC)?", options: ["A law that defines civil rights", "The procedural law that governs the functioning of civil courts", "A law about contracts", "A law for criminal cases"], answer: "The procedural law that governs the functioning of civil courts", explanation: "The CPC is the primary procedural law relating to the administration of civil proceedings in India. It consolidates and amends the laws relating to the procedure of the Courts of Civil Judicature." },
            { q: "What is 'mesne profits'?", options: ["The main profits from a business", "The profits which a person in wrongful possession of property actually received or might have received", "The net profit after taxes", "A type of legal fee"], answer: "The profits which a person in wrongful possession of property actually received or might have received", explanation: "Mesne profits are the profits to which a person is entitled but from which he has been kept out by the defendant. A court may award mesne profits to the rightful owner of a property from a person who was in wrongful possession of it." },
            { q: "What is a 'pauper suit' or 'indigent person's suit'?", options: ["A lawsuit that is very poor in evidence", "A suit filed by a person who does not have sufficient means to pay the court fees", "A lawsuit against a poor person", "A small claims case"], answer: "A suit filed by a person who does not have sufficient means to pay the court fees", explanation: "Order 33 of the CPC allows a person who is an 'indigent person' (a pauper) to file a suit without paying the requisite court fees at the initial stage. This ensures access to justice for the poor." },
            { q: "What is an 'interpleader suit'?", options: ["A suit between two people", "A suit where the real dispute is not between the plaintiff and defendant but between the defendants themselves", "A suit filed on the internet", "A suit against the government"], answer: "A suit where the real dispute is not between the plaintiff and defendant but between the defendants themselves", explanation: "An interpleader suit is one in which the plaintiff has no claim to the subject matter in dispute, other than for charges or costs, and is ready to pay or deliver it to the rightful claimant. The plaintiff sues to compel the rival claimants (the defendants) to litigate the matter amongst themselves." },
            { q: "What is the difference between 'judgment', 'decree', and 'order'?", options: ["They are all the same", "Judgment is the reason, decree is the final decision, order is any other decision", "Judgment is by a lower court, decree by a higher court", "Order is verbal, judgment and decree are written"], answer: "Judgment is the reason, decree is the final decision, order is any other decision", explanation: "A 'judgment' is the statement given by the Judge on the grounds of a decree or order. A 'decree' is the formal expression of an adjudication which conclusively determines the rights of the parties. An 'order' is the formal expression of any decision of a Civil Court which is not a decree." },
            { q: "What is 'attachment' of property in a civil suit?", options: ["Physically attaching documents to the plaint", "A court order to take custody of a defendant's property to secure a claim", "A type of mortgage", "Donating property to the court"], answer: "A court order to take custody of a defendant's property to secure a claim", explanation: "Attachment is a legal process by which a court of law, at the request of a creditor, designates specific property owned by the debtor to be transferred to the creditor, or sold for the benefit of the creditor. It is a way to secure the execution of a decree." }
          ]
          ,
          4: [
            { q: "What is a 'Hindu Undivided Family' (HUF)?", options: ["Any family living in India", "A family unit consisting of all persons lineally descended from a common ancestor", "A type of business partnership", "A family that has not been divided by a court"], answer: "A family unit consisting of all persons lineally descended from a common ancestor", explanation: "An HUF is a unique family structure recognized by law in India, which includes all male descendants from a common ancestor, their wives, and unmarried daughters. It has special status in matters of tax and inheritance." },
            { q: "What is 'divorce'?", options: ["A temporary separation", "The legal dissolution of a marriage", "An argument between spouses", "A pre-wedding ceremony"], answer: "The legal dissolution of a marriage", explanation: "Divorce is the legal process of terminating a marriage or marital union. It formally ends the legal duties and responsibilities of marriage." },
            { q: "What is 'alimony' or 'maintenance'?", options: ["A penalty for divorce", "Financial support paid by one spouse to another after divorce", "The cost of the wedding", "Child's pocket money"], answer: "Financial support paid by one spouse to another after divorce", explanation: "Alimony, also known as spousal support or maintenance, is a legal obligation on a person to provide financial support to their spouse before or after marital separation or divorce." },
            { q: "What is a 'mortgage'?", options: ["Selling a property", "Using property as security for a loan", "Renting a property", "Gifting a property"], answer: "Using property as security for a loan", explanation: "A mortgage is a legal agreement by which a bank or other creditor lends money at interest in exchange for taking title of the debtor's property, with the condition that the conveyance of title becomes void upon the payment of the debt." },
            { q: "What is a 'gift deed'?", options: ["A thank you card", "A legal document to transfer property as a gift without payment", "A will", "A sales receipt"], answer: "A legal document to transfer property as a gift without payment", explanation: "A gift deed is a document that is used to legally transfer property from one person to another as a gift, without any exchange of money." },
            { q: "Who is a 'landlord'?", options: ["A person who owns a lot of land", "The owner of a property who rents it out to another person", "A government official", "A farmer"], answer: "The owner of a property who rents it out to another person", explanation: "A landlord is the owner of a house, apartment, condominium, land, or real estate which is rented or leased to an individual or business, who is called a tenant." },
            { q: "Who is a 'tenant'?", options: ["The owner of a property", "A person who pays rent to use a property owned by someone else", "A guest in a house", "A property manager"], answer: "A person who pays rent to use a property owned by someone else", explanation: "A tenant is a person who occupies land or property rented from a landlord." },
            { q: "What is a 'sale deed'?", options: ["An agreement to sell in the future", "A legal document that transfers ownership of a property from a seller to a buyer", "A rental agreement", "A list of items for sale"], answer: "A legal document that transfers ownership of a property from a seller to a buyer", explanation: "A sale deed is the primary legal document that acts as proof of sale and transfer of ownership of a property from the seller to the buyer." },
            { q: "What is a 'tort'?", options: ["A type of cake", "A civil wrong that causes harm to someone, leading to legal liability", "A criminal offense", "A breach of contract"], answer: "A civil wrong that causes harm to someone, leading to legal liability", explanation: "A tort is an act or omission that gives rise to injury or harm to another and amounts to a civil wrong for which courts impose liability. Examples include negligence, defamation, and trespass." },
            { q: "What is 'negligence' in civil law?", options: ["Intentionally harming someone", "Failure to take proper care, resulting in damage or injury to another", "Ignoring someone", "A criminal act"], answer: "Failure to take proper care, resulting in damage or injury to another", explanation: "Negligence is a failure to exercise the care that a reasonably prudent person would exercise in like circumstances. It is a common basis for a tort lawsuit." }
          ],
          5: [
            { q: "What is an 'injunction'?", options: ["A suggestion from a lawyer", "A court order to stop someone from doing a specific act", "A type of fine", "A request for evidence"], answer: "A court order to stop someone from doing a specific act", explanation: "An injunction is a judicial remedy issued by a court that either compels a party to do a particular act (mandatory injunction) or refrains a party from doing a particular act (prohibitory injunction)." },
            { q: "What is the 'execution of a decree'?", options: ["Cancelling a court's decision", "The process of enforcing a court's final decision", "The writing of the judgment", "Appealing a decision"], answer: "The process of enforcing a court's final decision", explanation: "Execution is the process by which a decree-holder (the winner of the lawsuit) compels the judgment-debtor (the loser) to carry out the mandate of the decree or order." },
            { q: "What is a 'legal notice'?", options: ["A newspaper advertisement", "A formal communication to a person, informing them of an intention to undertake legal proceedings", "A court summons", "A friendly letter"], answer: "A formal communication to a person, informing them of an intention to undertake legal proceedings", explanation: "A legal notice is a formal intimation sent from one party to another before legal action is taken, to inform the other party of a grievance and an intention to sue if the matter is not resolved." },
            { q: "What is 'arbitration'?", options: ["A court trial", "A method of resolving disputes outside of court with a neutral third party (arbitrator)", "A public debate", "A negotiation between lawyers"], answer: "A method of resolving disputes outside of court with a neutral third party (arbitrator)", explanation: "Arbitration is a form of alternative dispute resolution (ADR) where the dispute is submitted to one or more arbitrators whose decision (the 'award') is legally binding on both parties." },
            { q: "What is 'mediation'?", options: ["The same as arbitration", "A process where a neutral third party helps disputing parties reach a mutual agreement", "A judge giving a decision", "A formal court hearing"], answer: "A process where a neutral third party helps disputing parties reach a mutual agreement", explanation: "In mediation, a neutral mediator facilitates communication between the parties to help them reach a voluntary and mutually acceptable resolution. The mediator does not impose a decision." },
            { q: "What is the 'limitation period'?", options: ["The duration of a trial", "The time limit within which a lawsuit must be filed", "The length of a prison sentence", "The time a contract is valid for"], answer: "The time limit within which a lawsuit must be filed", explanation: "The Limitation Act sets a specific time period for filing different types of lawsuits. If a suit is filed after the limitation period has expired, it will be dismissed by the court." },
            { q: "What is a 'civil suit'?", options: ["A polite lawsuit", "A lawsuit between two private parties over a dispute", "A lawsuit against the government", "A criminal case"], answer: "A lawsuit between two private parties over a dispute", explanation: "A civil suit is a non-criminal lawsuit that begins with a plaintiff filing a complaint against a defendant, typically to resolve a dispute or recover damages." },
            { q: "What does 'adjournment' mean in court?", options: ["The final decision", "Postponing the hearing of a case to a later date", "Cancelling a case", "A short break"], answer: "Postponing the hearing of a case to a later date", explanation: "An adjournment is the postponement of a court session or hearing until another time or place." },
            { q: "What is a 'decree holder'?", options: ["The person who lost the case", "The person in whose favor a court decree has been passed", "The judge who passed the decree", "The lawyer for the winning side"], answer: "The person in whose favor a court decree has been passed", explanation: "The decree holder is the party that has won the lawsuit and is entitled to the relief granted by the court's decree." },
            { q: "What is a 'judgment debtor'?", options: ["The person who won the case", "The person against whom a court decree has been passed", "A person in debt to the court", "The lawyer for the losing side"], answer: "The person against whom a court decree has been passed", explanation: "The judgment debtor is the party that has lost the lawsuit and is obligated to satisfy the terms of the court's decree, such as paying damages." }
          ],
          6: [
            { q: "What is the legal term for a person who owns property?", options: ["The Tenant", "The Occupant", "The Owner", "The Caretaker"], answer: "The Owner", explanation: "An owner is a person who has the legal right or title to something. In property law, they have the right to possess, use, and dispose of the property." },
            { q: "What is the document that proves ownership of a property called?", options: ["A Rental Agreement", "A Title Deed", "A Mortgage Paper", "An Affidavit"], answer: "A Title Deed", explanation: "A title deed is a legal document that serves as evidence of a person's right of ownership over a property." },
            { q: "What is the process of dividing a deceased person's property among their heirs called?", options: ["Distribution", "Allocation", "Succession", "Donation"], answer: "Succession", explanation: "Succession is the process by which property, rights, and obligations are passed on from a deceased person to their legal heirs." },
            { q: "What is the legal term for a person who owes money to another?", options: ["The Lender", "The Creditor", "The Debtor", "The Payer"], answer: "The Debtor", explanation: "A debtor is an individual or entity that owes a debt to another individual or entity." },
            { q: "What is the legal term for a person to whom money is owed?", options: ["The Borrower", "The Debtor", "The Creditor", "The Receiver"], answer: "The Creditor", explanation: "A creditor is a person, bank, or other enterprise that has lent money or extended credit to another party." },
            { q: "What is a 'consumer' in the context of law?", options: ["A person who sells goods", "A person who manufactures goods", "A person who buys goods or services for personal use", "A person who advertises products"], answer: "A person who buys goods or services for personal use", explanation: "A consumer is an individual who purchases goods or avails services for their own use and not for manufacturing or resale." },
            { q: "What is the legal term for a formal disagreement between two parties?", options: ["An Argument", "A Debate", "A Dispute", "A Conflict"], answer: "A Dispute", explanation: "A dispute is a disagreement, argument, or controversy, often one that leads to a legal proceeding." },
            { q: "What is the act of resolving a dispute outside of court called?", options: ["Litigation", "Trial", "Alternative Dispute Resolution (ADR)", "Prosecution"], answer: "Alternative Dispute Resolution (ADR)", explanation: "ADR includes methods like arbitration, mediation, and negotiation to resolve disputes without going to court." },
            { q: "What is the legal term for the money paid by a tenant to a landlord?", options: ["A Fee", "A Deposit", "A Rent", "A Premium"], answer: "A Rent", explanation: "Rent is a payment made periodically by a tenant to a landlord in return for the use of land or property." },
            { q: "What is a 'family settlement'?", options: ["A family vacation", "An agreement between family members to settle property disputes", "A type of family court", "A family tradition"], answer: "An agreement between family members to settle property disputes", explanation: "A family settlement is a mutual agreement among family members to divide family property and resolve disputes amicably." }
          ],
          7: [
