            { q: "What is the legal term for a person who inherits property?", options: ["The Donor", "The Testator", "The Heir", "The Executor"], answer: "The Heir", explanation: "An heir is a person legally entitled to the property or rank of another on that person's death." },
            { q: "What is the 'Consumer Protection Act' for?", options: ["To protect businesses", "To protect the rights of consumers", "To regulate prices", "To promote advertising"], answer: "To protect the rights of consumers", explanation: "The Consumer Protection Act provides for the protection of the interests of consumers and establishes authorities for the settlement of consumers' disputes." },
            { q: "What is a 'partnership' in business?", options: ["A friendship", "A business owned and run by two or more people", "A solo-owned business", "A large corporation"], answer: "A business owned and run by two or more people", explanation: "A partnership is a formal arrangement by two or more parties to manage and operate a business and share its profits." },
            { q: "What is the legal term for the official proving of a will?", options: ["Certification", "Validation", "Probate", "Execution"], answer: "Probate", explanation: "Probate is the judicial process whereby a will is 'proved' in a court and accepted as a valid public document that is the true last testament of the deceased." },
            { q: "What is a 'trust'?", options: ["A belief in someone", "A legal arrangement where one person holds property for the benefit of another", "A type of company", "A bank account"], answer: "A legal arrangement where one person holds property for the benefit of another", explanation: "A trust is a three-party fiduciary relationship in which the first party, the trustor or settlor, transfers a property upon the second party, the trustee, for the benefit of the third party, the beneficiary." },
            { q: "What is the legal term for a person who creates a trust?", options: ["The Beneficiary", "The Trustee", "The Settlor", "The Agent"], answer: "The Settlor", explanation: "The settlor, also known as the trustor or grantor, is the person who creates the trust and transfers assets into it." },
            { q: "What is the legal term for a person who manages a trust?", options: ["The Settlor", "The Beneficiary", "The Trustee", "The Guardian"], answer: "The Trustee", explanation: "The trustee is the person or entity appointed to manage the assets of a trust according to the terms set by the settlor." },
            { q: "What is the legal term for a person who benefits from a trust?", options: ["The Trustee", "The Settlor", "The Beneficiary", "The Owner"], answer: "The Beneficiary", explanation: "The beneficiary is the person or group of people for whose benefit the trust is created." },
            { q: "What is the act of transferring property from one person to another called?", options: ["A Transaction", "A Deal", "A Conveyance", "A Handover"], answer: "A Conveyance", explanation: "Conveyance is the legal process of transferring property from one owner to another." },
            { q: "What is a 'defective product'?", options: ["A product that is out of stock", "A product with a minor scratch", "A product that is unsafe or does not work as intended", "An old product"], answer: "A product that is unsafe or does not work as intended", explanation: "A defective product has a flaw or fault in its design, manufacture, or marketing which makes it dangerous for consumers to use." }
          ],
          8: [
            { q: "What is the legal term for the right to use someone else's land for a specific purpose?", options: ["A Lease", "A License", "An Easement", "A Mortgage"], answer: "An Easement", explanation: "An easement gives someone the right to use the property of another for a specific purpose, such as a right of way to cross a neighbor's land." },
            { q: "What is a 'public interest litigation' (PIL)?", options: ["A lawsuit for personal gain", "A lawsuit filed for the protection of public interest", "A lawsuit against the government only", "A type of criminal case"], answer: "A lawsuit filed for the protection of public interest", explanation: "PIL is litigation for the protection of the public interest. It is not a lawsuit for private gain but is intended to advance the rights of the public or a significant section of it." },
            { q: "What is the legal term for a person who is appointed to care for a minor or an incapacitated person?", options: ["A Parent", "A Guardian", "A Trustee", "A Friend"], answer: "A Guardian", explanation: "A legal guardian is a person who has the legal authority to care for the personal and property interests of another person, called a ward." },
            { q: "What is 'intellectual property'?", options: ["Physical property", "Property of intellectuals", "Creations of the mind, like inventions, literary works, and designs", "Government property"], answer: "Creations of the mind, like inventions, literary works, and designs", explanation: "Intellectual property refers to intangible creations of the human intellect. The most well-known types are copyrights, patents, trademarks, and trade secrets." },
            { q: "What is a 'copyright'?", options: ["The right to copy anything", "The exclusive legal right to print, publish, or sell a literary or artistic work", "A type of patent", "A government document"], answer: "The exclusive legal right to print, publish, or sell a literary or artistic work", explanation: "Copyright is a legal right that grants the creator of an original work exclusive rights for its use and distribution." },
            { q: "What is a 'trademark'?", options: ["A mark used in trading", "A symbol or name used to identify a company's products", "A quality certification", "A company's logo only"], answer: "A symbol or name used to identify a company's products", explanation: "A trademark is a recognizable sign, design, or expression which identifies products or services of a particular source from those of others." },
            { q: "What is a 'patent'?", options: ["A patient's record", "An exclusive right granted for an invention", "A type of copyright", "A business plan"], answer: "An exclusive right granted for an invention", explanation: "A patent is an exclusive right granted by a government to an inventor for a limited period of time in exchange for public disclosure of the invention." },
            { q: "What is the legal term for the failure to act with reasonable care?", options: ["Recklessness", "Carelessness", "Negligence", "Mistake"], answer: "Negligence", explanation: "Negligence is a failure to behave with the level of care that someone of ordinary prudence would have exercised under the same circumstances. It is a key concept in tort law." },
            { q: "What is the act of a landlord removing a tenant from a property called?", options: ["A Dismissal", "An Eviction", "A Rejection", "A Removal"], answer: "An Eviction", explanation: "Eviction is the legal process by which a landlord removes a tenant from a rental property." },
            { q: "What is a 'cheque bounce'?", options: ["A cheque that is physically bounced", "When a cheque cannot be processed because the account holder has insufficient funds", "A cancelled cheque", "A lost cheque"], answer: "When a cheque cannot be processed because the account holder has insufficient funds", explanation: "A cheque bounce is a criminal offense in India under the Negotiable Instruments Act, 1881, if the cheque was issued for the discharge of a debt or other liability." }
          ]
          ,
          9: [
            { q: "What is the legal term for a person who files a civil lawsuit?", options: ["The Defendant", "The Plaintiff", "The Judge", "The Witness"], answer: "The Plaintiff", explanation: "The plaintiff is the party who initiates a lawsuit by filing a complaint with a court against the defendant." },
            { q: "What is the legal term for a person against whom a civil lawsuit is filed?", options: ["The Plaintiff", "The Accused", "The Defendant", "The Respondent"], answer: "The Defendant", explanation: "The defendant is the person or entity that is being sued in a civil lawsuit." },
            { q: "What is the act of failing to fulfill a duty under a contract called?", options: ["A mistake", "A disagreement", "A breach of contract", "A negotiation"], answer: "A breach of contract", explanation: "A breach of contract occurs when one party fails to perform their obligations as laid out in a legally binding agreement." },
            { q: "What is the legal term for a person who rents a property from a landlord?", options: ["An Owner", "A Buyer", "A Tenant", "A Guest"], answer: "A Tenant", explanation: "A tenant is a person who occupies land or property rented from a landlord under a lease or rental agreement." },
            { q: "What is the legal term for a person who owns a property and rents it out?", options: ["A Manager", "A Landlord", "A Broker", "A Caretaker"], answer: "A Landlord", explanation: "A landlord is the owner of a property who grants a lease to another person, known as the tenant." },
            { q: "What is the act of making a false statement that harms a person's reputation?", options: ["An insult", "Gossip", "Defamation", "An opinion"], answer: "Defamation", explanation: "Defamation is a false statement presented as a fact that causes injury or damage to the character of the person it is about." },
            { q: "What is the legal term for a person or company to whom a debt is owed?", options: ["A Debtor", "A Borrower", "A Creditor", "A Sponsor"], answer: "A Creditor", explanation: "A creditor is an entity (person or institution) that extends credit by giving another entity permission to borrow money intended to be repaid in the future." },
            { q: "What is the legal term for a person or company that owes a debt?", options: ["A Creditor", "A Lender", "A Debtor", "A Funder"], answer: "A Debtor", explanation: "A debtor is a person or enterprise that owes money to another party." },
            { q: "What is the act of giving property to someone in a will called?", options: ["A gift", "A donation", "A bequest", "A sale"], answer: "A bequest", explanation: "A bequest is the act of giving personal property, such as money or assets, to an individual or organization through the provisions of a will." },
            { q: "What is the legal term for a person who has made a will?", options: ["The Beneficiary", "The Executor", "The Testator", "The Heir"], answer: "The Testator", explanation: "A testator is a person who has written and executed a last will and testament that is in effect at the time of their death." }
          ],
          10: [
            { q: "What is the legal term for a person who receives property from a will?", options: ["The Giver", "The Executor", "The Beneficiary", "The Trustee"], answer: "The Beneficiary", explanation: "A beneficiary is a person who is named in a will to receive property from the deceased person's estate." },
            { q: "What is the act of a court ordering someone to stop a particular action?", options: ["A Request", "A Suggestion", "An Injunction", "A Notice"], answer: "An Injunction", explanation: "An injunction is a court order that requires a person to do or cease doing a specific action." },
            { q: "What is the legal term for the monetary compensation paid to a victim in a civil case?", options: ["A Fine", "A Penalty", "Damages", "A Fee"], answer: "Damages", explanation: "Damages refer to the sum of money the law imposes for a breach of some duty or violation of some right." },
            { q: "What is the act of two parties resolving a dispute with the help of a neutral third person called?", options: ["An Argument", "A Trial", "Mediation", "A Lawsuit"], answer: "Mediation", explanation: "Mediation is a form of alternative dispute resolution (ADR) where a neutral third party helps the disputing parties to reach a mutually acceptable settlement." },
            { q: "What is the legal term for a person appointed by a court to manage the affairs of a child?", options: ["A Mentor", "A Guardian", "A Sponsor", "A Relative"], answer: "A Guardian", explanation: "A legal guardian is a person who has the legal authority to care for the personal and property interests of a minor." },
            { q: "What is the act of buying and selling goods and services called?", options: ["A Hobby", "Manufacturing", "Commerce", "Marketing"], answer: "Commerce", explanation: "Commerce is the activity of buying and selling, especially on a large scale." },
            { q: "What is the legal term for a business owned and run by just one person?", options: ["A Partnership", "A Corporation", "A Sole Proprietorship", "A Cooperative"], answer: "A Sole Proprietorship", explanation: "A sole proprietorship is a type of enterprise that is owned and run by one person and in which there is no legal distinction between the owner and the business entity." },
            { q: "What is the act of using someone's patented invention without permission called?", options: ["Borrowing", "Copying", "Patent Infringement", "Inspiration"], answer: "Patent Infringement", explanation: "Patent infringement is the commission of a prohibited act with respect to a patented invention without permission from the patent holder." },
            { q: "What is the legal term for a company's unique name or logo?", options: ["A Copyright", "A Patent", "A Trademark", "A Design"], answer: "A Trademark", explanation: "A trademark is a recognizable sign, design, or expression which identifies products or services of a particular source from those of others." },
            { q: "What is the act of illegally copying someone's book, music, or movie called?", options: ["Sharing", "Plagiarism", "Copyright Infringement", "Distribution"], answer: "Copyright Infringement", explanation: "Copyright infringement is the use of works protected by copyright law without permission for a usage where such permission is required." }
          ]
        },
        medium: {
          1: [
            { q: "What is the 'Statute of Limitations'?", options: ["A law limiting the number of statues in a city", "A law setting a time limit for filing a lawsuit", "A law defining the powers of a court", "A law about historical monuments"], answer: "A law setting a time limit for filing a lawsuit", explanation: "A statute of limitations is a law that sets the maximum amount of time that parties involved in a dispute have to initiate legal proceedings from the date of an alleged offense." },
            { q: "What is a 'tort' in civil law?", options: ["A type of contract", "A criminal offense", "A civil wrong that causes harm or loss", "A type of property"], answer: "A civil wrong that causes harm or loss", explanation: "A tort is an act or omission that gives rise to injury or harm to another and amounts to a civil wrong for which courts impose liability. Examples include negligence, defamation, and trespass." },
            { q: "What is the difference between 'movable' and 'immovable' property?", options: ["Movable can be sold, immovable cannot", "Movable is personal, immovable is commercial", "Movable can be physically moved, immovable cannot (e.g., land)", "There is no legal difference"], answer: "Movable can be physically moved, immovable cannot (e.g., land)", explanation: "Immovable property includes land, buildings, and rights attached to them. Movable property is everything else, such as cars, furniture, and money." },
            { q: "What does 'res judicata' mean?", options: ["The case is new", "The matter has already been decided by a court", "The evidence is pending", "The judge is biased"], answer: "The matter has already been decided by a court", explanation: "The doctrine of res judicata prevents the same parties from re-litigating the same cause of action that has already been finally determined by a competent court." },
            { q: "What is a 'decree' in a civil suit?", options: ["An interim order", "The formal expression of the final decision of the court", "A request for information", "The initial complaint"], answer: "The formal expression of the final decision of the court", explanation: "A decree is the final part of a judgment and it specifies the relief granted to the parties. It is the formal expression of an adjudication which conclusively determines the rights of the parties." },
            { q: "What is 'adverse possession'?", options: ["Illegally occupying property", "A method of gaining legal title to property by possessing it for a statutory period", "A type of rental agreement", "A dispute over property boundaries"], answer: "A method of gaining legal title to property by possessing it for a statutory period", explanation: "Adverse possession is a legal doctrine under which a person in possession of land owned by someone else may acquire valid title to it, so long as certain common law requirements are met, and the adverse possessor is in possession for a sufficient period of time." },
            { q: "What is the purpose of an 'injunction'?", options: ["To award monetary damages", "A court order compelling or preventing a specific action", "To transfer property ownership", "To start a lawsuit"], answer: "A court order compelling or preventing a specific action", explanation: "An injunction is a judicial remedy issued in order to prohibit a party from doing or continuing to do a certain activity, or to compel them to carry out a certain act." },
            { q: "What is a 'class action' lawsuit?", options: ["A lawsuit filed by a class of students", "A lawsuit where one person sues on behalf of a large group with similar claims", "A lawsuit about classroom conditions", "A private lawsuit"], answer: "A lawsuit where one person sues on behalf of a large group with similar claims", explanation: "A class action is a type of lawsuit where one of the parties is a group of people who are represented collectively by a member of that group." },
            { q: "What is 'consideration' in a contract?", options: ["Being polite during negotiations", "The time taken to write the contract", "Something of value exchanged between the parties", "The signature on the contract"], answer: "Something of value exchanged between the parties", explanation: "In contract law, consideration is something of value that is given by both parties to a contract that induces them to enter into the agreement to exchange mutual performances. It is a necessary element for a valid contract." },
            { q: "What is 'defamation per se'?", options: ["Defamation that is not serious", "A statement that is so harmful that it is presumed to cause damage", "Defamation against a celebrity", "Defamation that is true"], answer: "A statement that is so harmful that it is presumed to cause damage", explanation: "Defamation per se refers to statements that are considered so inherently damaging that the plaintiff does not need to prove actual financial loss. Examples include accusing someone of a serious crime or having a loathsome disease." }
          ],
          2: [
            { q: "What is the 'Indian Contract Act, 1872'?", options: ["A law for all civil disputes", "The primary law that governs contracts in India", "A law about property", "A law for criminal agreements"], answer: "The primary law that governs contracts in India", explanation: "The Indian Contract Act, 1872 prescribes the law relating to contracts in India and is the key act regulating Indian contract law." },
            { q: "What is a 'contingent contract'?", options: ["A contract that is not valid", "A contract to do or not to do something if some event, collateral to such contract, does or does not happen", "A contract made in a contingency", "A verbal contract"], answer: "A contract to do or not to do something if some event, collateral to such contract, does or does not happen", explanation: "A contingent contract (Section 31, ICA) is a contract whose performance depends upon the happening or non-happening of a future uncertain event. For example, an insurance contract." },
            { q: "What is 'undue influence'?", options: ["Influencing someone with good arguments", "Where one party dominates the will of the other to obtain an unfair advantage", "A type of business negotiation", "Persuading someone to sign a contract"], answer: "Where one party dominates the will of the other to obtain an unfair advantage", explanation: "Undue influence (Section 16, ICA) is where the relations subsisting between the parties are such that one of the parties is in a position to dominate the will of the other and uses that position to obtain an unfair advantage. Such a contract is voidable." },
            { q: "What is 'fraud' in the context of a contract?", options: ["A simple mistake", "An intentional misrepresentation of a material fact to induce another to enter into a contract", "A breach of contract", "A misunderstanding"], answer: "An intentional misrepresentation of a material fact to induce another to enter into a contract", explanation: "Fraud (Section 17, ICA) includes certain acts which are committed with intent to deceive another party or to induce him to enter into a contract. It makes the contract voidable." },
            { q: "What is 'misrepresentation'?", options: ["The same as fraud", "An innocent false statement of a material fact", "A difference of opinion", "A lie told after the contract is signed"], answer: "An innocent false statement of a material fact", explanation: "Misrepresentation (Section 18, ICA) is a false statement of fact made by one party to another, which, while not being a term of the contract, induces the other party to enter the contract. Unlike fraud, it is innocent and not intended to deceive." },
            { q: "What is 'liquidated damages'?", options: ["Damages paid in liquid cash", "A pre-estimated amount of damages to be paid in case of a breach of contract", "The actual damages suffered", "A penalty imposed by the court"], answer: "A pre-estimated amount of damages to be paid in case of a breach of contract", explanation: "Liquidated damages (Section 74, ICA) are a sum of money which the parties to a contract agree upon in advance to be paid as compensation for a breach. The court will award this amount if it is a genuine pre-estimate of the loss." },
            { q: "What is a 'quasi-contract'?", options: ["A contract that is almost valid", "An obligation imposed by law to prevent unjust enrichment", "A verbal contract", "A contract with a government entity"], answer: "An obligation imposed by law to prevent unjust enrichment", explanation: "A quasi-contract is not a real contract but an obligation created by law in the absence of an agreement. It is based on the principle of equity that a person shall not be allowed to enrich himself unjustly at the expense of another." },
            { q: "What is the 'doctrine of restitution'?", options: ["Resting during a case", "The principle of restoring the benefit received from a void or voidable contract", "A type of punishment", "A method of calculating damages"], answer: "The principle of restoring the benefit received from a void or voidable contract", explanation: "When a contract becomes void, any person who has received any advantage under such agreement is bound to restore it, or to make compensation for it to the person from whom he received it. This is the principle of restitution." },
            { q: "What is a 'bailment'?", options: ["The same as bail in criminal law", "The delivery of goods by one person to another for some purpose, upon a contract that they shall be returned when the purpose is accomplished", "A type of sale", "A gift of goods"], answer: "The delivery of goods by one person to another for some purpose, upon a contract that they shall be returned when the purpose is accomplished", explanation: "Bailment (Section 148, ICA) involves a change of possession but not ownership. Examples include giving a car for repair or depositing luggage in a cloakroom." },
            { q: "What is a 'pledge'?", options: ["A simple promise", "A bailment of goods as security for payment of a debt or performance of a promise", "A type of mortgage", "A donation"], answer: "A bailment of goods as security for payment of a debt or performance of a promise", explanation: "A pledge (or pawn) is a special kind of bailment where goods are delivered as security for a loan or a promise. The person who pledges is the 'pawnor' and the person to whom the goods are pledged is the 'pawnee'." }
          ],
          3: [
            { q: "What is the 'doctrine of promissory estoppel'?", options: ["A promise made by an elected official", "A principle that prevents a person from going back on a promise even if a contract does not exist", "A type of estoppel in criminal law", "A promise that is not legally binding"], answer: "A principle that prevents a person from going back on a promise even if a contract does not exist", explanation: "Promissory estoppel is an equitable doctrine that prevents one party from withdrawing a promise made to a second party if the latter has reasonably relied on that promise and acted upon it to their detriment." },
            { q: "What is a 'novation' of a contract?", options: ["A minor change in a contract", "The substitution of a new contract in place of an existing one", "The cancellation of a contract", "A breach of contract"], answer: "The substitution of a new contract in place of an existing one", explanation: "Novation (Section 62, ICA) is the act of replacing an obligation to perform with another obligation, or adding an obligation to perform, or replacing a party to an agreement with a new party." },
            { q: "What is an 'indemnity' contract?", options: ["A contract to protect against all risks", "A contract where one party promises to save the other from loss caused by the conduct of the promisor or any other person", "A type of insurance contract only", "A contract that is not valid"], answer: "A contract where one party promises to save the other from loss caused by the conduct of the promisor or any other person", explanation: "A contract of indemnity (Section 124, ICA) is a contract to make good the loss. For example, an insurance contract is a contract of indemnity." },
            { q: "What is a 'contract of guarantee'?", options: ["A product warranty", "A contract to perform the promise or discharge the liability of a third person in case of their default", "A guarantee of good behavior", "A type of loan agreement"], answer: "A contract to perform the promise or discharge the liability of a third person in case of their default", explanation: "A contract of guarantee (Section 126, ICA) involves three parties: the principal debtor, the creditor, and the surety. The surety promises the creditor to fulfill the debtor's obligation if the debtor fails to do so." },
            { q: "What is the difference between 'coercion' and 'undue influence'?", options: ["Coercion is physical, undue influence is mental", "Coercion involves committing or threatening to commit an act forbidden by the IPC; undue influence involves moral or mental pressure", "They are the same", "Coercion is legal, undue influence is not"], answer: "Coercion involves committing or threatening to commit an act forbidden by the IPC; undue influence involves moral or mental pressure", explanation: "Coercion (S. 15) involves the threat of an offense. Undue influence (S. 16) involves the use of a position of power to dominate the will of the other person. Both make a contract voidable." },
            { q: "What is an 'agent' in contract law?", options: ["A secret agent", "A person employed to do any act for another or to represent another in dealings with third persons", "A middleman in a deal", "A type of employee"], answer: "A person employed to do any act for another or to represent another in dealings with third persons", explanation: "An agent (Section 182, ICA) acts on behalf of another person, called the principal, to create a legal relationship with a third party. The contract is between the principal and the third party." },
            { q: "What is the 'supervening impossibility'?", options: ["A very difficult task", "When performance of a contract becomes impossible or unlawful after it has been made", "When a party refuses to perform", "A minor inconvenience"], answer: "When performance of a contract becomes impossible or unlawful after it has been made", explanation: "Also known as the doctrine of frustration (Section 56, ICA), it applies when an event that is not the fault of either party makes the contract physically or commercially impossible to perform. This discharges the contract." },
            { q: "What is a 'wagering agreement'?", options: ["A valid contract", "An agreement based on an uncertain event where parties have opposite views and mutual chances of gain or loss", "A type of sports betting contract", "A contract with a wager"], answer: "An agreement based on an uncertain event where parties have opposite views and mutual chances of gain or loss", explanation: "A wagering agreement (Section 30, ICA) is one whose outcome is dependent on an uncertain event. The parties have no other interest in the contract than the stake they will win or lose. Such agreements are void." },
            { q: "What is 'anticipatory breach' of contract?", options: ["A breach that is expected", "When a party repudiates the contract before the time of performance is due", "A minor breach", "A breach that is forgiven"], answer: "When a party repudiates the contract before the time of performance is due", explanation: "Anticipatory breach occurs when one party to a contract declares to the other party, before the time for performance has arrived, that they will not perform their side of the bargain. The innocent party can sue for damages immediately." },
            { q: "What is the 'duty to mitigate' damages?", options: ["The duty of the breaching party to reduce the damages", "The duty of the innocent party to take reasonable steps to reduce the loss suffered from a breach", "The court's duty to lower the damages", "A duty to avoid all contracts"], answer: "The duty of the innocent party to take reasonable steps to reduce the loss suffered from a breach", explanation: "A person who has suffered loss from a breach of contract must take all reasonable steps to mitigate, or reduce, the extent of their loss. They cannot claim compensation for any loss that could have been reasonably avoided." }
          ],

           4: [
                { q: "What is the key difference in remedy between **Quantum Meruit** and a claim for **Damages** in contract law?", options: ["Quantum Meruit is for profit, Damages are for loss", "Quantum Meruit is payment for the **reasonable value of work done**; Damages are compensation for **loss suffered** due to the breach", "Quantum Meruit is a legal remedy, Damages is an equitable remedy", "They are identical and interchangeable"], answer: "Quantum Meruit is payment for the **reasonable value of work done**; Damages are compensation for **loss suffered** due to the breach", explanation: "Quantum Meruit is a quasi-contractual remedy for the value of service performed when the contract is discharged. Damages is the monetary award to place the injured party in the position they would have been in if the contract had been performed." },
                { q: "What is the key element that makes **Public Nuisance** different from **Private Nuisance**?", options: ["Public Nuisance is only a crime; Private Nuisance is only a tort", "Public Nuisance affects the public at large (e.g., obstructing a highway); Private Nuisance affects a **specific individual's enjoyment of their land**", "Private Nuisance requires special damage to be actionable", "Public Nuisance is always a graver offense"], answer: "Public Nuisance affects the public at large (e.g., obstructing a highway); Private Nuisance affects a **specific individual's enjoyment of their land**", explanation: "Private Nuisance is a tort actionable by the affected person. Public Nuisance affects the community and is typically an offense, requiring an individual to prove special damage for a civil remedy." },
                { q: "What is **Ratification** in the context of the Law of Agency?", options: ["The agent is fired", "The **principal subsequently accepts and adopts** an act done by the agent without prior authority, as if it had been done with authority", "The agent pays a fee", "A contract is cancelled by the principal"], answer: "The **principal subsequently accepts and adopts** an act done by the agent without prior authority, as if it had been done with authority", explanation: "Ratification is the process by which a principal accepts responsibility for an unauthorized act done by someone acting or purporting to act as his agent, thereby giving the act the same effect as if it were originally authorized." },
                { q: "What is the core aim of the **Rule Against Perpetuity** in property law (TPA)?", options: ["To ensure property can be tied up indefinitely", "To ensure that the **vesting of property interest is not delayed beyond the life of a person in existence plus the minority of the ultimate beneficiary**", "To prevent all forms of property transfer", "To ensure that all property is sold after 50 years"], answer: "To ensure that the **vesting of property interest is not delayed beyond the life of a person in existence plus the minority of the ultimate beneficiary**", explanation: "The Rule Against Perpetuity (S. 14 TPA) aims to prevent the indefinite tying up of property (alienability) by ensuring that a future interest must vest within the permissible period of a life in being plus 18 years (minority)." },
                { q: "The defense of **Volenti non fit injuria** in tort law requires the plaintiff to have consented to what?", options: ["Only the injury caused", "The **risk of harm and the legal risk** of no compensation for the harm suffered", "Only the negligence of the defendant", "The defendant's action, not the resulting harm"], answer: "The **risk of harm and the legal risk** of no compensation for the harm suffered", explanation: "This defense is more than just consent to the risk; it requires the plaintiff to have voluntarily assumed the risk of injury and to have agreed, either expressly or impliedly, to waive their legal right to claim damages." },
                { q: "What is the difference in effect between **Misrepresentation** and **Fraud** on the validity of a contract?", options: ["They are the same, the contract is always void", "In both, the contract is **voidable** at the option of the aggrieved party, but fraud also allows for an action for damages in tort", "Misrepresentation makes the contract void, Fraud makes it voidable", "Misrepresentation is only for written contracts"], answer: "In both, the contract is **voidable** at the option of the aggrieved party, but fraud also allows for an action for damages in tort", explanation: "Both allow the innocent party to avoid the contract. However, fraud involves the intent to deceive (S. 17 ICA) and can lead to a tort claim for deceit, whereas misrepresentation (S. 18 ICA) is an innocent mistake." },
                { q: "What are the essential elements required to establish the tort of **Malicious Prosecution**?", options: ["Any unsuccessful criminal case", "Prosecution by the defendant with **malice, without reasonable cause, and termination in the plaintiff's favor**", "Prosecution by the police only", "A successful criminal case against the plaintiff"], answer: "Prosecution by the defendant with **malice, without reasonable cause, and termination in the plaintiff's favor**", explanation: "Malicious prosecution is committed when a person maliciously and without reasonable and probable cause institutes legal proceedings against another, which terminate in the latter's favor, causing damage." },
                { q: "What is the scope of **Order XXXVII of the CPC** (Summary Procedure)?", options: ["It applies to all civil suits", "It applies only to suits based on **bills of exchange, promissory notes, or contracts where a liquidated amount is owed**", "It applies only to land disputes", "It applies only to family disputes"], answer: "It applies only to suits based on **bills of exchange, promissory notes, or contracts where a liquidated amount is owed**", explanation: "The summary procedure is a special, faster procedure applicable to commercial suits where the claim is for a liquidated amount, allowing the plaintiff to obtain a decree without a full-fledged trial if the defendant fails to obtain leave to defend." },
                { q: "The **Doctrine of Lis Pendens** (S. 52 TPA) is based on the principle that:", options: ["Litigation is permanent", "A suit concerning property is pending and **no party can transfer the property** so as to affect the rights of any other party under any decree that may be passed", "Property cannot be transferred without court permission", "The buyer is always safe"], answer: "A suit concerning property is pending and **no party can transfer the property** so as to affect the rights of any other party under any decree that may be passed", explanation: "Lis pendens means 'suit pending'. The doctrine ensures that the final decision of the court in a property dispute is not defeated by intermediate transfers of the property by any of the parties to the suit." },
                { q: "What is the key exception to the **Doctrine of Privity of Contract** in India?", options: ["Only the parties can sue, always", "A **beneficiary** under a contract (e.g., in a trust, family settlement, or marriage contract) can sue to enforce the contract", "A third party can always sue for damages", "The law does not recognize any exception"], answer: "A **beneficiary** under a contract (e.g., in a trust, family settlement, or marriage contract) can sue to enforce the contract", explanation: "While the doctrine of privity of contract (only parties can sue) is accepted in India, the doctrine of **privity of consideration** is not. Furthermore, several exceptions, like beneficiaries under a trust or charge, allow third parties to sue." }
            ],

              5: [
                { q: "What is the **primary distinction** in the number of parties between a contract of **Indemnity** and a contract of **Guarantee**?", options: ["Indemnity involves three parties; Guarantee involves two", "Indemnity involves **two** parties (indemnifier/indemnified); Guarantee involves **three** (creditor/principal debtor/surety)", "They both involve two parties", "The distinction is not based on the number of parties"], answer: "Indemnity involves **two** parties (indemnifier/indemnified); Guarantee involves **three** (creditor/principal debtor/surety)", explanation: "A contract of indemnity is a promise to save another from loss. A contract of guarantee is a three-party promise to discharge the liability of a third person in case of their default." },
                { q: "The liability of a master for the torts committed by a servant in the course of employment is called:", options: ["Strict Liability", "Absolute Liability", "Vicarious Liability", "No Liability"], answer: "Vicarious Liability", explanation: "Vicarious liability is the principle where one person is held responsible for the tortious acts of another person, even though the former did not directly participate in the wrong. The maxim is *respondeat superior* (let the master answer)." },
                { q: "What is the purpose of an **Interpleader Suit** (Order XXXV CPC)?", options: ["To allow a party to appeal a decree", "To allow a person holding property (the plaintiff) to compel **two or more rival claimants** to that property to litigate the title between themselves", "To allow multiple plaintiffs to join one suit", "To compel a witness to give evidence"], answer: "To allow a person holding property (the plaintiff) to compel **two or more rival claimants** to that property to litigate the title between themselves", explanation: "An interpleader suit is filed by a neutral party who holds property subject to conflicting claims, asking the court to decide who the property belongs to so the neutral party can safely deliver it." },
                { q: "In a **Usufructuary Mortgage**, what is the key right given to the mortgagee (lender)?", options: ["The right to sell the property on default", "The right to **possess the property and enjoy the rents and profits** in lieu of interest or principal", "The right to sue the mortgagor for the debt", "The right to transfer the property to a third party"], answer: "The right to **possess the property and enjoy the rents and profits** in lieu of interest or principal", explanation: "In a usufructuary mortgage (S. 58(d) TPA), the mortgagor delivers possession of the property to the mortgagee, who can appropriate the rents and profits instead of claiming interest on the loan amount." },
                { q: "What is **Accord and Satisfaction** as a method of discharging a contract?", options: ["Replacing a party to the contract", "An agreement (**Accord**) to **discharge a previous obligation** where the agreement is fully performed (**Satisfaction**)", "A breach of contract by one party", "The same as novation"], answer: "An agreement (**Accord**) to **discharge a previous obligation** where the agreement is fully performed (**Satisfaction**)", explanation: "Accord is the agreement between two parties to take some action (often a payment of a lesser amount) in full settlement of a claim; satisfaction is the completion of that agreed-upon action, discharging the original contract." },
                { q: "The **Rule in Hadley v. Baxendale** in contract law deals with which concept?", options: ["Specific performance of contracts", "The **Remoteness of Damages** (whether the damage was foreseeable and naturally arose from the breach)", "The validity of a contract", "The impossibility of performance"], answer: "The **Remoteness of Damages** (whether the damage was foreseeable and naturally arose from the breach)", explanation: "This rule, central to the award of damages (S. 73 ICA), distinguishes between general damages (naturally arising) and special/consequential damages (foreseeable only if the special circumstances were communicated to the breaching party)." },
                { q: "What is the key standard of **Burden of Proof** in a typical civil suit in India?", options: ["Beyond a reasonable doubt", "Clear and convincing evidence", "**Preponderance of probability** (more likely than not)", "Absolute certainty"], answer: "**Preponderance of probability** (more likely than not)", explanation: "In civil cases, the standard is lower than in criminal cases. The plaintiff must show that their version of events is more likely to be true (a balance of probability or preponderance of evidence) than the defendant's." },
                { q: "What is the contractual term **Consensus ad idem**?", options: ["Agreement on the price only", "Agreement on the time of performance", "A **meeting of the minds**; agreement by the parties on the **same thing in the same sense**", "A condition that must be met before the contract is valid"], answer: "A **meeting of the minds**; agreement by the parties on the **same thing in the same sense**", explanation: "This is a fundamental requirement for a valid contract. It means that the parties must have a mutual understanding of the essential terms and subject matter of the agreement." },
                { q: "The tort of **False Imprisonment** is actionable **per se**. What does this imply?", options: ["It is a very serious offense", "The plaintiff must prove actual financial loss to succeed", "The plaintiff **does not need to prove actual damage** (monetary loss)", "It only applies to public servants"], answer: "The plaintiff **does not need to prove actual damage** (monetary loss)", explanation: "Actionable per se means the mere violation of the right (unlawful restraint or detention) is sufficient for a cause of action, and the court can award nominal damages even without proof of actual financial harm." },
                { q: "What is the purpose of a **Caveat** in the Code of Civil Procedure (CPC)?", options: ["To prevent the filing of a suit", "A **notice given to a court** by a person that no order or injunction should be passed against them in a specific matter without being heard", "A type of interim injunction", "A final judgment"], answer: "A **notice given to a court** by a person that no order or injunction should be passed against them in a specific matter without being heard", explanation: "A caveat (S. 148A CPC) is a formal warning that ensures the caveator (the person filing it) is given notice and an opportunity to be heard before any ex parte order is passed against them in an anticipated proceeding." }
            ],

             6: [
                { q: "What is the **Doctrine of Constructive Res Judicata**?", options: ["A matter that was actually decided by the court", "A matter that **might and ought to have been made a ground of attack or defense** in the former suit, but was not", "A final decision that is subject to appeal", "A matter decided without jurisdiction"], answer: "A matter that **might and ought to have been made a ground of attack or defense** in the former suit, but was not", explanation: "Constructive Res Judicata (Explanation IV to S. 11 CPC) prevents a party from raising in a subsequent suit issues that should have been raised in the former suit, even if they were not explicitly raised or decided." },
                { q: "The **Doctrine of Feeding the Grant by Estoppel** (S. 43 TPA) applies when the transferor:", options: ["Has a good title but does not disclose it", "Has **no title** but transfers the property, and **subsequently acquires the title**", "Acquires the property after the death of the transferee", "Transfers the property by a registered deed"], answer: "Has **no title** but transfers the property, and **subsequently acquires the title**", explanation: "This equitable doctrine prevents a person from going back on their word. If a person fraudulently or erroneously transfers property they don't own, and later acquires ownership, the transfer automatically becomes valid in favor of the original transferee." },
                { q: "What is the difference between a **Temporary Injunction** and a **Perpetual Injunction**?", options: ["Temporary is for a small amount, Perpetual is for a large amount", "Temporary is for a **specified period** or until further orders; Perpetual is granted by a decree **after a full trial** and remains in force forever", "Perpetual Injunction is granted by the High Court only", "Temporary Injunction is only for property disputes"], answer: "Temporary is for a **specified period** or until further orders; Perpetual is granted by a decree **after a full trial** and remains in force forever", explanation: "Temporary Injunctions (O. 39 CPC) are interlocutory orders to maintain the status quo. Perpetual Injunctions (S. 37 Specific Relief Act) are final reliefs granted after the merits of the case are decided." },
                { q: "What is the **Doctrine of Clog on Redemption** in mortgage law?", options: ["A legal obstacle to creating a mortgage", "A principle that prevents the mortgagee (lender) from **imposing any condition that restricts the mortgagor's right to redeem** the property upon repayment", "A rule that prevents a loan from being repaid", "A rule about property taxes"], answer: "A principle that prevents the mortgagee (lender) from **imposing any condition that restricts the mortgagor's right to redeem** the property upon repayment", explanation: "The right of the mortgagor to redeem the property upon payment of the debt is a core right. The doctrine ensures that any collateral stipulation that prevents or makes redemption excessively difficult is void, upholding the maxim: 'Once a mortgage, always a mortgage'." },
                { q: "What is the key distinction between **Review** and **Revision** of a decree in CPC?", options: ["Review is by a higher court, Revision by the same court", "Review is by the **same court** on limited grounds (e.g., discovery of new evidence); Revision is by a **higher court** (High Court) on jurisdictional error", "Review is for civil cases, Revision for criminal", "They are the same"], answer: "Review is by the **same court** on limited grounds (e.g., discovery of new evidence); Revision is by a **higher court** (High Court) on jurisdictional error", explanation: "Review (S. 114 CPC) is a reconsideration by the court itself. Revision (S. 115 CPC) is the High Court's power to check if a subordinate court exercised jurisdiction illegally or failed to exercise jurisdiction." },
                { q: "What is the key difference between a **Gift** and a **Will** in property transfer?", options: ["A Gift is a transfer of immovable property; a Will is for movable property", "A Gift is an **inter vivos** (living) transfer that takes effect immediately; a Will is a **testamentary** transfer that takes effect **only upon the death** of the executor", "A Will requires a special majority of the legislature", "A Gift is always revocable"], answer: "A Gift is an **inter vivos** (living) transfer that takes effect immediately; a Will is a **testamentary** transfer that takes effect **only upon the death** of the executor", explanation: "The timing of the transfer is the essential difference. A Gift (S. 122 TPA) is a gratuitous transfer during the donor's lifetime. A Will transfers property after the death of the testator." },
                { q: "What must a **Summons** contain in a civil suit (CPC)?", options: ["A warrant of arrest for the defendant", "The **name of the defendant, signature of the judge, and the date** by which the defendant is required to appear and answer the claim", "The final judgment", "Only a list of evidence"], answer: "The **name of the defendant, signature of the judge, and the date** by which the defendant is required to appear and answer the claim", explanation: "A summons is the official document that notifies the defendant of the suit and compels them to appear in court on a specific date to answer the claims made against them." },
                { q: "What is the **Doctrine of Merger** in mortgage law?", options: ["A rule that all mortgages must be merged into one", "When a **mortgagee acquires the equity of redemption** (ownership), the mortgage is discharged, as the lesser right merges into the greater right", "A doctrine that merges all property documents", "A rule that merges the debt and the interest"], answer: "When a **mortgagee acquires the equity of redemption** (ownership), the mortgage is discharged, as the lesser right merges into the greater right", explanation: "The doctrine applies when a greater and a lesser estate in the same property vest in the same person at the same time and in the same right, extinguishing the lesser estate (the mortgage merges into the fee simple)." },
                { q: "What is the purpose of **Reference** to the High Court in the CPC?", options: ["To allow a party to appeal a lower court decision", "To enable a **subordinate court to seek the opinion of the High Court** on a point of law when it entertains a reasonable doubt", "To compel a witness to attend court", "To start a new trial"], answer: "To enable a **subordinate court to seek the opinion of the High Court** on a point of law when it entertains a reasonable doubt", explanation: "Reference (S. 113 CPC) is a means by which a subordinate court can obtain the authoritative opinion of the High Court on a question of law before deciding the case, ensuring judicial uniformity." },
                { q: "What is the **Doctrine of Election** (S. 35 TPA)?", options: ["A doctrine about voting rights", "A principle that compels a person to **choose between two inconsistent rights**, either accepting or rejecting a transfer/instrument in its entirety", "A doctrine about property choice", "A choice between two legal remedies"], answer: "A principle that compels a person to **choose between two inconsistent rights**, either accepting or rejecting a transfer/instrument in its entirety", explanation: "If a person receives a benefit under an instrument (like a will or deed) that also purports to transfer property they already own to a third party, they must elect to either accept the benefit and affirm the transfer or reject the benefit and keep their property." }
            ],

             7: [
                { q: "What is the distinction between **Novation** and **Alteration** of a contract (S. 62 ICA)?", options: ["Novation changes only the terms; Alteration changes the parties", "Novation **substitutes a new contract or party**; Alteration **changes only the terms** of the existing contract between the same parties", "Novation is only for written contracts", "Alteration is a breach"], answer: "Novation **substitutes a new contract or party**; Alteration **changes only the terms** of the existing contract between the same parties", explanation: "Novation requires the extinguishment of the old contract and creation of a new one, often with new parties. Alteration is merely a change in one or more terms of the same contract." },
                { q: "What is the function of a **Garnishee Order** in the execution of a decree (O. XXI, Rule 46 CPC)?", options: ["An order to seize property", "An order directing a **third party (debtor of the judgment-debtor) to pay the money directly to the decree-holder**", "An order to arrest the judgment-debtor", "An order for a final auction"], answer: "An order directing a **third party (debtor of the judgment-debtor) to pay the money directly to the decree-holder**", explanation: "A Garnishee Order is used to attach a debt owed to the judgment-debtor by a third person (the garnishee), compelling the garnishee to pay the money to the decree-holder instead." },
                { q: "The **second rule in Hadley v. Baxendale** allows the innocent party to claim which type of damages?", options: ["Ordinary damages only", "Damages for **losses arising out of special circumstances only if those circumstances were communicated** to the breaching party", "Punitive damages", "Nominal damages only"], answer: "Damages for **losses arising out of special circumstances only if those circumstances were communicated** to the breaching party", explanation: "The second branch of the rule deals with special or consequential damages, which are not recoverable unless the circumstances were explicitly known and contemplated by the parties at the time of contracting." },
                { q: "What is the key objective of the rule regarding **Misjoinder of Parties** (O. I, Rule 9 CPC)?", options: ["To prevent the addition of new parties", "To ensure that a **suit is not dismissed merely because a necessary party was not joined**", "To compel the joinder of all interested parties", "To force the court to add parties"], answer: "To ensure that a **suit is not dismissed merely because a necessary party was not joined**", explanation: "The rule states that no suit shall be defeated by reason of the misjoinder (wrongly joined) or non-joinder (not joined) of parties. The court can deal with the matter in controversy so far as regards the rights and interests of the parties actually before it." },
                { q: "What is the primary legal tool used by courts to control **Unfair Terms** in **Standard Form Contracts**?", options: ["The doctrine of novation", "The principle of **Contra Proferentem** (construing ambiguity against the drafting party)", "The doctrine of merger", "The rule of *lis pendens*"], answer: "The principle of **Contra Proferentem** (construing ambiguity against the drafting party)", explanation: "Standard Form Contracts (Take-It-Or-Leave-It) often contain one-sided terms. The Contra Proferentem rule is a rule of interpretation that construes any ambiguous term against the party that drafted it, typically the stronger party." },
                { q: "What is the purpose of a **Representative Suit** (O. I, Rule 8 CPC)?", options: ["A suit filed by a legal heir", "A suit filed by **one or more persons on behalf of a larger group** with the same interest in the subject matter", "A suit against a government representative", "A suit filed by a lawyer"], answer: "A suit filed by **one or more persons on behalf of a larger group** with the same interest in the subject matter", explanation: "A representative suit (Class Action) allows a few individuals to sue or be sued on behalf of a large body of people having the same interest, preventing a multiplicity of suits." },
                { q: "What is the impact of the **Doctrine of Frustration** (Supervening Impossibility) on a contract?", options: ["The contract is voidable at the option of one party", "The contract becomes **void and is automatically discharged** from the time the event occurred", "The contract remains valid but the parties must pay compensation", "The doctrine is not recognized in Indian law"], answer: "The contract becomes **void and is automatically discharged** from the time the event occurred", explanation: "Section 56 ICA provides that an agreement to do an act that is impossible is void. If an act becomes impossible or unlawful after the contract is made, the contract becomes void and is discharged immediately." },
                { q: "What is the distinction between a **First Appeal** and a **Second Appeal** in CPC?", options: ["First Appeal is on law only; Second Appeal is on fact and law", "First Appeal lies to the immediately superior court on **questions of fact and law**; Second Appeal lies to the High Court only on a **substantial question of law**", "Second Appeal is always to the Supreme Court", "First Appeal is only for monetary decrees"], answer: "First Appeal lies to the immediately superior court on **questions of fact and law**; Second Appeal lies to the High Court only on a **substantial question of law**", explanation: "A Second Appeal (S. 100 CPC) is a restricted right, permitting the High Court to intervene only when a case involves a point of law of general importance, not just a disagreement over factual findings." },
                { q: "What is the key difference in remedy for a breach of a **Condition** versus a **Warranty** in a contract?", options: ["Breach of Condition allows the contract to be **repudiated**; Breach of Warranty only allows for **damages**", "Breach of Warranty allows the contract to be repudiated", "Breach of Condition is a minor term; Breach of Warranty is a major term", "They have the same remedy"], answer: "Breach of Condition allows the contract to be **repudiated**; Breach of Warranty only allows for **damages**", explanation: "A condition is a term essential to the main purpose of the contract. Its breach allows the innocent party to terminate the contract. A warranty is a collateral term, and its breach only entitles the party to claim damages." },
                { q: "What is the difference between a **Set-off** and a **Counter-Claim** in a civil suit (O. VIII, Rule 6 CPC)?", options: ["Set-off is always for a larger amount", "Set-off must be for an **ascertained sum** of money; Counter-Claim can be for **any right or claim** against the plaintiff", "Counter-Claim is a defense; Set-off is a distinct suit", "Set-off is only for torts"], answer: "Set-off must be for an **ascertained sum** of money; Counter-Claim can be for **any right or claim** against the plaintiff", explanation: "A set-off is a defense of payment of a specific, legally recoverable amount. A counter-claim is virtually a cross-suit by the defendant against the plaintiff, allowing for any cause of action to be claimed." }
            ],

          8: [
                { q: "What is the **Rule in Rylands v. Fletcher** (Tort of Strict Liability)?", options: ["A rule about property tax", "Liability for **non-natural use** of land and the **escape of a dangerous thing** causing damage", "Liability only for the escape of animals", "Liability for any damage caused to a neighbor"], answer: "Liability for **non-natural use** of land and the **escape of a dangerous thing** causing damage", explanation: "This rule imposes liability without the need to prove negligence or intention. It applies when a person brings a dangerous thing onto their land for a non-natural purpose and that thing escapes, causing damage." },
                { q: "What is the object of the **Doctrine of Marshalling by Subsequent Purchaser/Mortgagee** (S. 81 TPA)?", options: ["To compel the first mortgagee to sell only the property mortgaged to the second mortgagee", "To compel the first mortgagee (who has security over two properties) to **satisfy their debt from the property not mortgaged to the subsequent mortgagee first**", "To merge all mortgages into one", "To transfer the subsequent mortgage to the first mortgagee"], answer: "To compel the first mortgagee (who has security over two properties) to **satisfy their debt from the property not mortgaged to the subsequent mortgagee first**", explanation: "Marshalling is an equitable right designed to protect the interests of a subsequent mortgagee who has security over fewer properties, ensuring the prior mortgagee doesn't exhaust the common property to the subsequent mortgagee's detriment." },
                { q: "What is the difference between **Strict Liability** and **Absolute Liability** in torts?", options: ["There is no difference", "Absolute Liability is a **more stringent form** of strict liability where **no exceptions or defenses** are available to the defendant", "Strict Liability is for government entities only", "Absolute Liability is only for monetary damages"], answer: "Absolute Liability is a **more stringent form** of strict liability where **no exceptions or defenses** are available to the defendant", explanation: "Absolute Liability (M.C. Mehta v. Union of India) was developed in India to deal with hazardous industries. Unlike strict liability, it allows no exceptions like Act of God or Act of a Stranger." },
                { q: "The **Doctrine of Subrogation** (TPA/Contract) generally applies to which scenario?", options: ["The creation of a new debt", "The **substitution of one person into the rights and claims of another** (e.g., an insurer stepping into the shoes of the insured)", "The transfer of a contract to a third party", "The payment of tax on property"], answer: "The **substitution of one person into the rights and claims of another** (e.g., an insurer stepping into the shoes of the insured)", explanation: "Subrogation allows the substituted party (subrogee) to enforce the original rights and claims of the party whose debt/claim they settled (subrogor). It is common in insurance and subsequent mortgage payments." },
                { q: "What is the general rule in India regarding the **Vicarious Liability of the State** for its employees' torts?", options: ["The State is always liable for all torts", "The State is **only liable for torts committed in the exercise of non-sovereign functions** (e.g., commercial/administrative acts)", "The State is never liable for torts", "The State is liable only for the torts of its highest officers"], answer: "The State is **only liable for torts committed in the exercise of non-sovereign functions** (e.g., commercial/administrative acts)", explanation: "The traditional distinction holds that the State is immune from tort liability for sovereign functions (police, defense) but is liable for non-sovereign functions (like running a railway or hospital)." },
                { q: "What is the difference between **Sale** and **Exchange** in property law (TPA)?", options: ["Sale is for movable property; Exchange is for immovable", "Sale involves the transfer of ownership for a **price (money)**; Exchange involves a **mutual transfer of ownership for another thing** (not money)", "Exchange is always a gift", "Sale does not require registration"], answer: "Sale involves the transfer of ownership for a **price (money)**; Exchange involves a **mutual transfer of ownership for another thing** (not money)", explanation: "The consideration is the key distinction. Sale (S. 54) is for a money consideration. Exchange (S. 118) is for a consideration in kind (one thing for another thing)." },
                { q: "The tort of **Nervous Shock** (psychiatric injury) is actionable only if the injury was:", options: ["Intended by the defendant", "Caused by physical impact", "**Reasonably foreseeable** and resulted in a **recognized psychiatric illness**", "A minor fright or emotional distress"], answer: "**Reasonably foreseeable** and resulted in a **recognized psychiatric illness**", explanation: "The injury must be a recognized illness, not mere grief or emotional distress, and the court must find that the defendant should have reasonably foreseen that their actions could cause psychiatric injury to the plaintiff." },
                { q: "What is the key distinction between a **Lease** and a **License** in property law?", options: ["Lease is always for immovable property; License is for movable", "A Lease transfers an **interest in property**; a License only grants a **personal right** to do something on the property", "A License is always perpetual", "A Lease is always revocable"], answer: "A Lease transfers an **interest in property**; a License only grants a **personal right** to do something on the property", explanation: "A Lease (S. 105 TPA) creates a right *in rem* (against the world) and is generally not revocable. A License (S. 52 Easements Act) creates a right *in personam* (against the grantor) and is generally revocable." },
                { q: "The tort of **Trespass to Land** is actionable **per se** (without proof of damage) because:", options: ["It is a very minor offense", "The law presumes that **every invasion of property is necessarily a damage** to the owner's right to peaceful enjoyment", "The damages are always very high", "It is easy to prove"], answer: "The law presumes that **every invasion of property is necessarily a damage** to the owner's right to peaceful enjoyment", explanation: "Trespass is a direct interference with the possession of land. Since the right to enjoy one's property is fundamental, the mere unauthorized entry is sufficient to establish the tort, regardless of actual loss." },
                { q: "What is the difference between a **Vested Interest** and a **Contingent Interest** in property?", options: ["Vested is for immovable property, Contingent is for movable", "Vested is a **certain interest** (not dependent on a condition); Contingent is an interest **dependent on the happening of an uncertain event**", "Contingent Interest is always transferable", "Vested Interest is always temporary"], answer: "Vested is a **certain interest** (not dependent on a condition); Contingent is an interest **dependent on the happening of an uncertain event**", explanation: "Vested Interest (S. 19 TPA) is created in favor of a person who is certain to get the property at a future time. Contingent Interest (S. 21 TPA) is dependent on the fulfillment of a condition that may or may not happen." }
            ],

           9: [
                { q: "What is the rule regarding **Privity of Consideration** in Indian Contract Law?", options: ["Only the person who gives consideration can sue", "A stranger to the consideration **can sue** on the contract, even though they did not provide the consideration", "Only the third party can sue", "The doctrine is not recognized in India"], answer: "A stranger to the consideration **can sue** on the contract, even though they did not provide the consideration", explanation: "The ICA position differs from English law: Section 2(d) defines consideration broadly ('promisee or any other person'), allowing a party to the contract to sue even if the consideration was furnished by a third party." },
                { q: "When must a court order the **Return of Plaint** (O. VII, Rule 10 CPC)?", options: ["When the evidence is insufficient", "When the suit is **filed in a court that lacks territorial or pecuniary jurisdiction**", "When the suit is against the government", "When the court decides to dismiss the suit"], answer: "When the suit is **filed in a court that lacks territorial or pecuniary jurisdiction**", explanation: "The court, instead of dismissing the suit, returns the plaint to the plaintiff to be presented to the proper court with jurisdiction. This is a technical correction, not a dismissal of the merits." },
                { q: "The defense of **Inevitable Accident** in tort law requires the defendant to prove:", options: ["The victim was at fault", "The accident **could not have been prevented by the exercise of ordinary care, caution, and skill**", "The accident was an Act of God", "The defendant did not intend to cause harm"], answer: "The accident **could not have been prevented by the exercise of ordinary care, caution, and skill**", explanation: "An inevitable accident is one that could not possibly be prevented by the exercise of ordinary diligence. The defendant must show they were not negligent and took all reasonable precautions." },
                { q: "In which of the following cases will the remedy of **Specific Performance** generally **NOT** be granted?", options: ["Sale of a unique painting", "Sale of a piece of land", "A contract for **personal service or employment**", "A contract where damages are an adequate remedy"], answer: "A contract for **personal service or employment**", explanation: "Specific performance is not generally granted for contracts of a personal nature (like employment or artistic performance) because it is difficult for the court to supervise performance and forcing specific individuals to work together is undesirable." },
                { q: "The **Summary Procedure** under Order 37 of the CPC is designed to achieve what?", options: ["A full-fledged trial in all matters", "The **expeditious disposal** of suits where the claim is for a liquidated sum of money, limiting the defendant's right to defend", "A simplified procedure for only family matters", "Mandatory arbitration"], answer: "The **expeditious disposal** of suits where the claim is for a liquidated sum of money, limiting the defendant's right to defend", explanation: "Summary procedure is a specialized mechanism for quickly resolving commercial suits based on documentary evidence where the liability is clear, preventing defendants from using frivolous defenses to delay justice." },
                { q: "What is **Absolute Privilege** in the context of the tort of Defamation?", options: ["A defense for all public servants", "A complete defense where no action for defamation lies, even if the statement was made with **malice**", "A defense only available to the media", "A defense only for true statements"], answer: "A complete defense where no action for defamation lies, even if the statement was made with **malice**", explanation: "Absolute privilege applies to statements made in certain contexts (e.g., judicial proceedings, parliamentary proceedings) where free speech is deemed so vital that the speaker must be completely immune from liability." },
                { q: "What is the difference between an **Offer** and a **Tender**?", options: ["They are the same", "A Tender (for works/supplies) is generally an **Invitation to Offer**; an Offer is a definite proposal", "A Tender is a type of contract", "An Offer is only for goods"], answer: "A Tender (for works/supplies) is generally an **Invitation to Offer**; an Offer is a definite proposal", explanation: "A tender notice is usually an invitation to all interested parties to submit their offers (proposals), and the acceptance of a submitted tender constitutes the final agreement (offer and acceptance)." },
                { q: "What is the purpose of **Arrest and Attachment before Judgment** (O. XXXVIII CPC)?", options: ["To punish the defendant before the trial", "To **prevent the defendant from defeating the execution of the final decree** by absconding or transferring property", "To start the execution process early", "To compel the defendant to settle the dispute immediately"], answer: "To **prevent the defendant from defeating the execution of the final decree** by absconding or transferring property", explanation: "These are extraordinary interim measures designed to safeguard the plaintiff's interest by ensuring that property will be available to satisfy the decree if the plaintiff succeeds in the suit." },
                { q: "What is the general immunity provided to **Judicial Officers** for acts done judicially (Torts)?", options: ["They are liable for all negligent acts", "They are **immune from civil suit** for acts done or ordered by them in the discharge of their judicial duty, even if in excess of jurisdiction", "They are immune only if the act was legal", "They are never immune"], answer: "They are **immune from civil suit** for acts done or ordered by them in the discharge of their judicial duty, even if in excess of jurisdiction", explanation: "The Judicial Officers Protection Act, 1850 provides broad immunity to judges to ensure they can administer justice fearlessly and independently without the constant threat of civil suits for their decisions." },
                { q: "What is the main restriction on the **Amendment of Pleadings** (O. VI, Rule 17 CPC)?", options: ["Pleadings cannot be amended at all", "Pleadings can be amended at any time, even after the judgment", "Pleadings can be amended only up to the stage of evidence", "An amendment **will generally not be allowed after the trial has commenced** unless the court concludes that the party, after exercising due diligence, could not have raised the matter earlier"], answer: "An amendment **will generally not be allowed after the trial has commenced** unless the court concludes that the party, after exercising due diligence, could not have raised the matter earlier", explanation: "While amendments are liberally allowed to determine the real question in controversy, the CPC discourages late amendments (post-trial commencement) to avoid prejudice to the opposing party and delay the proceedings." }
            ],

             10: [
                { q: "The obligation to return money paid by mistake (S. 72 ICA) falls under which legal category?", options: ["Simple contract", "Contract of guarantee", "Quasi-Contract", "Void contract"], answer: "Quasi-Contract", explanation: "The obligation to return money paid by mistake is an obligation imposed by law, not a true contract, and falls under the chapter of 'Certain relations resembling those created by contract' (Quasi-Contract)." },
                { q: "What is the primary objective of the **Doctrine of Part Performance** (S. 53A TPA)?", options: ["To perfect an oral contract of sale", "To **protect the possession of a transferee** who has taken possession of immovable property under an unregistered sale agreement against eviction by the transferor", "To allow the transfer of property without any document", "To validate all transfers of property"], answer: "To **protect the possession of a transferee** who has taken possession of immovable property under an unregistered sale agreement against eviction by the transferor", explanation: "This equitable doctrine is a shield (not a sword) that prevents a transferor from taking advantage of the lack of formal registration to evict a person who has already acted on the transfer agreement by taking possession." },
                { q: "The defense of **Volenti non fit injuria** is defeated if the plaintiff acts in what capacity?", options: ["For mere adventure", "With full knowledge of the risk", "Under **statutory compulsion or necessity** (e.g., a rescue attempt)", "As a spectator at a sports event"], answer: "Under **statutory compulsion or necessity** (e.g., a rescue attempt)", explanation: "If a person acts out of legal duty (necessity) to rescue another person or property, the court will generally not apply the defense of *volenti non fit injuria* against the rescuer, even if the rescuer knew the risk." },
                { q: "In a **Garnishee Order** (execution of decree), who is the **Garnishee**?", options: ["The decree-holder (the winner)", "The judgment-debtor (the loser)", "The **third party who owes money to the judgment-debtor**", "The court officer who carries out the order"], answer: "The **third party who owes money to the judgment-debtor**", explanation: "The garnishee is the third party from whom the decree-holder seeks to recover the debt owed to them by the judgment-debtor." },
                { q: "What is the difference between **Accord and Satisfaction** and **Waiver**?", options: ["Waiver is a formal contract; Accord and Satisfaction is not", "Accord and Satisfaction is the **discharge of an obligation by a new performed agreement**; Waiver is the **unilateral abandonment of a right**", "They are the same", "Waiver is granted by the court"], answer: "Accord and Satisfaction is the **discharge of an obligation by a new performed agreement**; Waiver is the **unilateral abandonment of a right**", explanation: "Waiver is the intentional relinquishment of a known right and is unilateral. Accord and Satisfaction is a bilateral contract where the old obligation is replaced by a new one that is then performed." },
                { q: "What is the key difference between a **Charge** and a **Mortgage** in property law?", options: ["Charge is for movable property; Mortgage is for immovable", "A Mortgage is a **transfer of an interest** in specific immovable property; a Charge is a **right to payment out of specific property** without transferring any interest", "A Charge is only created by the government", "A Mortgage is always oral"], answer: "A Mortgage is a **transfer of an interest** in specific immovable property; a Charge is a **right to payment out of specific property** without transferring any interest", explanation: "The essential distinction is the transfer of interest: a mortgage is a transfer, while a charge (S. 100 TPA) is merely a right to recover money from a property without transferring ownership interest." },
                { q: "What was the **Doctrine of Last Opportunity** in contributory negligence (now mostly obsolete)?", options: ["The first person to act negligently is liable", "The party who had the **last clear chance to avoid the accident** but failed to do so was held solely liable", "The rule that the victim gets the last chance to appeal", "A rule about who gets the last word in court"], answer: "The party who had the **last clear chance to avoid the accident** but failed to do so was held solely liable", explanation: "This rule was used to mitigate the harshness of contributory negligence. Most jurisdictions now use the rule of **comparative negligence**, which apportions liability based on the degree of fault." },
