            { q: "What is a 'third-party beneficiary' to a contract?", options: ["A person who benefits from a contract they are not a party to", "A person who interferes with a contract", "A lawyer who drafts a contract", "A witness to a contract"], answer: "A person who benefits from a contract they are not a party to", explanation: "A third-party beneficiary is a person who may have the right to sue on a contract, despite not having originally been an active party to the contract. This right arises when the third party is the intended beneficiary of the contract." },
            { q: "What is 'assignment' of a contract?", options: ["Giving a contract a grade", "The transfer of rights or benefits under a contract to a third party", "The cancellation of a contract", "The signing of a contract"], answer: "The transfer of rights or benefits under a contract to a third party", explanation: "Assignment is the process whereby a person, the assignor, transfers rights or benefits to another, the assignee. For example, a party to a contract (the assignor) may assign its right to receive the contract payments to a bank." },
            { q: "What is 'delegation' of duties under a contract?", options: ["The same as assignment", "The transfer of duties or obligations under a a contract to a third party", "Refusing to perform duties", "A meeting of delegates"], answer: "The transfer of duties or obligations under a contract to a third party", explanation: "Delegation is the act of giving another person the responsibility of carrying out the performance of a duty. While duties can be delegated, the original party (the delegator) remains liable for performance if the third party (the delegatee) fails to perform." },
            { q: "What is the 'mirror image rule' in contract formation?", options: ["The offer and acceptance must be identical", "The contract must be a reflection of the parties' intentions", "The parties must look at each other when signing", "A rule about using mirrors in negotiations"], answer: "The offer and acceptance must be identical", explanation: "The mirror image rule states that an offer must be accepted exactly without modifications. An attempt to accept an offer on different terms is a rejection of the original offer and constitutes a counter-offer." }
          ],
          4: [
            { q: "What is the doctrine of 'lis pendens'?", options: ["A pending license", "A doctrine that prohibits the transfer of property that is the subject matter of a pending lawsuit", "A type of legal fee", "A final judgment"], answer: "A doctrine that prohibits the transfer of property that is the subject matter of a pending lawsuit", explanation: "'Lis pendens' means 'suit pending'. The doctrine, codified in Section 52 of the Transfer of Property Act, states that property under litigation cannot be transferred or otherwise dealt with by any party to the suit so as to affect the rights of any other party thereto under any decree which may be made therein." },
            { q: "What is the principle of 'res sub judice'?", options: ["The matter is under judgment", "A rule that prevents a court from trying a suit in which the matter in issue is also pending in a prior suit between the same parties", "A type of appeal", "A rule about evidence"], answer: "A rule that prevents a court from trying a suit in which the matter in issue is also pending in a prior suit between the same parties", explanation: "Section 10 of the CPC embodies this principle. Its purpose is to prevent courts of concurrent jurisdiction from simultaneously trying two parallel suits in respect of the same matter in issue, to avoid conflicting decisions." },
            { q: "What is the difference between 'review' and 'revision' in the CPC?", options: ["Review is by a higher court, revision by the same court", "Review is by the same court on limited grounds; revision is by a higher court on jurisdictional errors", "They are the same", "Review is for civil cases, revision for criminal"], answer: "Review is by the same court on limited grounds; revision is by a higher court on jurisdictional errors", explanation: "A review (Section 114) is a plea to the same court that passed the decree to reconsider it. A revision (Section 115) is the power of a High Court to examine the record of a subordinate court's case to correct a jurisdictional error." },
            { q: "What is the concept of 'adverse possession'?", options: ["Illegally occupying property for a short time", "A method of acquiring title to property by possessing it for a statutory period in a manner that is hostile, actual, open, and exclusive", "A type of rental agreement", "A dispute over property boundaries"], answer: "A method of acquiring title to property by possessing it for a statutory period in a manner that is hostile, actual, open, and exclusive", explanation: "Adverse possession is a controversial legal doctrine. If a person occupies another's land for a continuous period (usually 12 years in India) without the owner's permission, they can potentially acquire legal title to it, provided their possession meets specific legal criteria." },
            { q: "What is the 'parol evidence rule'?", options: ["A rule about parole for prisoners", "A rule that prevents parties from using prior oral or written statements to contradict the terms of a complete and final written contract", "A rule about evidence from parrots", "A rule about verbal testimony in court"], answer: "A rule that prevents parties from using prior oral or written statements to contradict the terms of a complete and final written contract", explanation: "Section 91 and 92 of the Indian Evidence Act contain this rule. It presumes that a written contract contains the entire agreement between the parties, and extrinsic evidence is generally not allowed to alter its terms." },
            { q: "What is the difference between a 'mortgage' and a 'charge'?", options: ["A mortgage is for a larger amount than a charge", "A mortgage is a transfer of an interest in property as security; a charge only makes the property a security without transferring any interest", "A mortgage is for immovable property, a charge for movable", "There is no difference"], answer: "A mortgage is a transfer of an interest in property as security; a charge only makes the property a security without transferring any interest", explanation: "A mortgage is created by the act of the parties, whereas a charge can be created either by an act of parties or by operation of law. A mortgage always involves a transfer of interest, which is not the case in a charge." },
            { q: "What is the role of a 'Lok Adalat'?", options: ["A traditional village court", "A forum where disputes are settled amicably through compromise, as an alternative dispute resolution (ADR) mechanism", "A special court for family matters", "A mobile court"], answer: "A forum where disputes are settled amicably through compromise, as an alternative dispute resolution (ADR) mechanism", explanation: "Lok Adalats have been given statutory status under the Legal Services Authorities Act, 1987. Their decision (award) is deemed to be a decree of a civil court and is final and binding on all parties with no appeal against it." },
            { q: "What is a 'representative suit' or 'class action suit'?", options: ["A suit filed by a legal representative", "A suit filed by one or more persons on behalf of a larger group with the same interest", "A suit against a government representative", "A private lawsuit"], answer: "A suit filed by one or more persons on behalf of a larger group with the same interest", explanation: "Order 1, Rule 8 of the CPC allows for representative suits. It enables a few individuals to sue or be sued on behalf of a numerous group of people who share a common interest, thus avoiding a multiplicity of suits." },
            { q: "What is the doctrine of 'subrogation'?", options: ["The act of submitting a case to a lower court", "The substitution of one person for another, giving the substitute the same legal rights as the original party", "A type of legal document", "The process of questioning a witness"], answer: "The substitution of one person for another, giving the substitute the same legal rights as the original party", explanation: "Subrogation is common in insurance. If an insurance company pays a policyholder for a loss caused by a third party, the company is subrogated to the policyholder's rights and can sue the third party to recover the amount it paid." },
            { q: "What is the difference between 'res judicata' and 'estoppel'?", options: ["Res judicata is a rule of procedure, estoppel is a rule of evidence", "Res judicata bars a suit, estoppel bars a party from saying something", "They are the same", "Res judicata is for civil cases, estoppel for criminal"], answer: "Res judicata bars a suit, estoppel bars a party from saying something", explanation: "Res judicata (a matter already decided) prevents the re-litigation of a decided issue between the same parties. Estoppel prevents a person from denying the truth of a statement they previously made, if another person has acted upon that statement to their detriment." }
          ],
          5: [
            { q: "What is the doctrine of 'election' in property law?", options: ["The right to vote on property matters", "A principle where a person must choose between two inconsistent rights, often in the context of a will or deed", "A method of electing a property manager", "A political doctrine"], answer: "A principle where a person must choose between two inconsistent rights, often in the context of a will or deed", explanation: "The doctrine of election (Section 35, Transfer of Property Act) states that when a person professes to transfer property which he has no right to transfer, and as part of the same transaction confers any benefit on the owner of the property, such owner must elect either to confirm such transfer or to dissent from it." },
            { q: "What is a 'contingent interest' in property?", options: ["An interest that is guaranteed", "An interest which is to take effect only on the happening or non-happening of a specified uncertain event", "An interest in a contingent fund", "A temporary interest"], answer: "An interest which is to take effect only on the happening or non-happening of a specified uncertain event", explanation: "A contingent interest is dependent on a condition that may or may not be fulfilled. For example, if property is transferred to A for life and then to B if B gets married, B's interest is contingent until he marries. This is different from a 'vested interest', which is not dependent on a condition." },
            { q: "What is the 'rule against perpetuity'?", options: ["A rule that property can be tied up forever", "A rule that prevents the indefinite tying up of property, requiring that interests must vest within a certain period", "A rule about perpetual leases", "A rule that property must be sold periodically"], answer: "A rule that prevents the indefinite tying up of property, requiring that interests must vest within a certain period", explanation: "The rule against perpetuity (Section 14, Transfer of Property Act) provides that no transfer of property can operate to create an interest which is to take effect after the life-time of one or more persons living at the date of such transfer, and the minority of some person who shall be in existence at the expiration of that period." },
            { q: "What is the tort of 'malicious prosecution'?", options: ["Any unsuccessful prosecution", "Initiating a baseless criminal proceeding against someone with malice and without reasonable cause, which terminates in their favor", "A prosecution that is very aggressive", "A prosecution by a malicious person"], answer: "Initiating a baseless criminal proceeding against someone with malice and without reasonable cause, which terminates in their favor", explanation: "To succeed in a suit for malicious prosecution, the plaintiff must prove that there was a prosecution by the defendant, it terminated in the plaintiff's favor, it was without reasonable and probable cause, and it was initiated with malice." },
            { q: "What is the 'last opportunity rule' in contributory negligence?", options: ["The last chance to settle a case", "A doctrine (now largely obsolete) that the party who had the last opportunity to avoid the accident is held solely responsible", "The last chance to submit evidence", "A rule of criminal procedure"], answer: "A doctrine (now largely obsolete) that the party who had the last opportunity to avoid the accident is held solely responsible", explanation: "This rule was a modification to the harsh common law doctrine of contributory negligence. It held that even if the plaintiff was negligent, they could recover in full if the defendant had the last clear chance to avoid the accident but failed to do so. Most jurisdictions now use a 'comparative negligence' approach." },
            { q: "What is the difference between 'judicial separation' and 'divorce'?", options: ["They are the same", "Judicial separation allows parties to live apart without dissolving the marriage; divorce legally ends the marriage", "Judicial separation is temporary, divorce is permanent", "Judicial separation is for civil marriages, divorce for religious ones"], answer: "Judicial separation allows parties to live apart without dissolving the marriage; divorce legally ends the marriage", explanation: "A decree of judicial separation does not dissolve the marital bond but allows the parties to live separately. The rights and obligations of the marriage continue to subsist, except for the duty of cohabitation. It is often a step before divorce." },
            { q: "What is the 'doctrine of part performance'?", options: ["A doctrine for partial contract completion", "Where a person has taken possession of property under a contract for transfer, they cannot be evicted on the ground that the transfer was not completed as required by law", "A doctrine about actors' performances", "A rule for paying for partial work"], answer: "Where a person has taken possession of property under a contract for transfer, they cannot be evicted on the ground that the transfer was not completed as required by law", explanation: "Section 53A of the Transfer of Property Act provides this equitable relief. If a buyer has paid part of the price and taken possession under an unregistered sale agreement, the seller cannot later use the lack of registration to evict the buyer." },
            { q: "What is a 'garnishee order'?", options: ["An order to garnish wages", "A court order directing a third party who owes money to the judgment debtor to pay the money directly to the decree holder", "An order to seize property", "A type of injunction"], answer: "A court order directing a third party who owes money to the a judgment debtor to pay the money directly to the decree holder", explanation: "A garnishee order is a common method of enforcing a judgment. For example, if a judgment debtor has money in a bank account, the court can order the bank (the garnishee) to pay the money to the person who won the judgment (the decree holder)." },
            { q: "What is the 'cy-près' doctrine?", options: ["A doctrine about Cyprus", "A legal doctrine which allows a court to amend the terms of a charitable trust when the original purpose becomes impossible or impractical", "A doctrine of contract law", "A rule of evidence"], answer: "A legal doctrine which allows a court to amend the terms of a charitable trust when the original purpose becomes impossible or impractical", explanation: "The cy-près doctrine (meaning 'as near as possible') is applied by courts to charitable trusts. If the original objective of the charity cannot be fulfilled, the court can redirect the trust funds to a new charitable purpose that is as close as possible to the original one." },
            { q: "What is the difference between a 'public nuisance' and a 'private nuisance'?", options: ["Public nuisance is outdoors, private is indoors", "Public nuisance affects the public at large and is a crime; private nuisance affects an individual's use of their land and is a tort", "Public nuisance is more serious", "There is no difference"], answer: "Public nuisance affects the public at large and is a crime; private nuisance affects an individual's use of their land and is a tort", explanation: "A public nuisance is an unreasonable interference with a right common to the general public (e.g., obstructing a highway). A private nuisance is a substantial and unreasonable interference with an individual's use or enjoyment of their land." }
          ],
          6: [
            { q: "What is the 'doctrine of marshalling' under the Transfer of Property Act?", options: ["A doctrine for military property", "A right of a subsequent mortgagee to require a prior mortgagee, who also has a claim on other properties, to satisfy their debt from the other properties first", "A method of organizing evidence", "A rule for public auctions"], answer: "A right of a subsequent mortgagee to require a prior mortgagee, who also has a claim on other properties, to satisfy their debt from the other properties first", explanation: "Section 81 of the TPA provides this equitable right. If a prior mortgagee has security over two properties, and a subsequent mortgagee has security over only one of them, the subsequent mortgagee can compel the prior one to 'marshal' his securities and proceed first against the property not mortgaged to the subsequent mortgagee." },
            { q: "What is the legal significance of a 'lis pendens' notice?", options: ["It creates a charge on the property", "It serves as constructive notice to the world that the property is subject to a lawsuit, making any subsequent purchaser bound by the outcome of the suit", "It prevents the owner from using the property", "It is a form of injunction"], answer: "It serves as constructive notice to the world that the property is subject to a lawsuit, making any subsequent purchaser bound by the outcome of the suit", explanation: "The doctrine of lis pendens (Section 52, TPA) ensures that the ultimate decision of the court is not frustrated by transfers of property during the pendency of the suit. A person who buys property subject to a lis pendens notice takes it subject to the rights of the parties as finally determined by the court." },
            { q: "What is the difference between 'fraud' and 'misrepresentation' in contract law?", options: ["Fraud is a crime, misrepresentation is a tort", "Fraud involves an intention to deceive, while misrepresentation is an innocent false statement", "Fraud makes a contract void, misrepresentation makes it voidable", "There is no practical difference in remedies"], answer: "Fraud involves an intention to deceive, while misrepresentation is an innocent false statement", explanation: "The key difference is intent. Fraud (S. 17, ICA) is a deliberate deception. Misrepresentation (S. 18, ICA) is a false statement made without intent to deceive. While both make the contract voidable, a claim for fraud can also support an action for damages in tort for deceit." },
            { q: "What is the 'ubi jus ibi remedium' maxim?", options: ["'Where there is a right, there is a remedy'", "'The law does not concern itself with trifles'", "'No one can be a judge in his own cause'", "'Hear the other side'"], answer: "'Where there is a right, there is a remedy'", explanation: "This is a fundamental legal principle which means that for every legal wrong, the law provides a remedy. It is the foundation of the law of torts. If a person's legal right is violated, they must have a means to vindicate that right in a court of law." },
            { q: "What is the 'thin skull rule' or 'eggshell skull rule' in tort law?", options: ["A rule that you are not liable for unforeseeable harm", "A rule that you must take your victim as you find them; you are liable for all consequences of your negligence, even if the victim had a pre-existing vulnerability", "A rule about injuries to the skull", "A defense for the defendant"], answer: "A rule that you must take your victim as you find them; you are liable for all consequences of your negligence, even if the victim had a pre-existing vulnerability", explanation: "This rule states that the frailty of the injured person is not a defense in a tort case. The tortfeasor is liable for the full extent of the damage caused, even if the amount of damage is greater than a 'normal' person would have suffered." },
            { q: "What is the difference between a 'sub-lease' and an 'assignment' of a lease?", options: ["They are the same", "In a sub-lease, the original tenant creates a new lease with a third party but retains some interest; in an assignment, the tenant transfers their entire interest", "A sub-lease is for a shorter term than an assignment", "A sub-lease is illegal, an assignment is legal"], answer: "In a sub-lease, the original tenant creates a new lease with a third party but retains some interest; in an assignment, the tenant transfers their entire interest", explanation: "In an assignment, the original tenant (assignor) transfers their entire leasehold interest to the new tenant (assignee), and the assignee comes into a direct relationship (privity of estate) with the landlord. In a sub-lease, the original tenant becomes a landlord to the sub-tenant, and the original lease remains intact." },
            { q: "What is the 'doctrine of frustration' in contract law?", options: ["When a party is frustrated with the contract", "When a supervening event makes the performance of a contract impossible or radically different from what was contemplated, discharging the contract", "A deliberate breach of contract", "A minor inconvenience in performance"], answer: "When a supervening event makes the performance of a contract impossible or radically different from what was contemplated, discharging the contract", explanation: "Section 56 of the Indian Contract Act embodies this doctrine. If an unforeseen event, which is not the fault of either party, makes the contract impossible to perform (e.g., destruction of the subject matter), the contract is discharged." },
            { q: "What is a 'Mareva injunction'?", options: ["An injunction related to maritime law", "A pre-trial freezing order that prevents a defendant from dissipating their assets to frustrate a potential judgment", "An injunction to stop a publication", "A final injunction after trial"], answer: "A pre-trial freezing order that prevents a defendant from dissipating their assets to frustrate a potential judgment", explanation: "A Mareva injunction is a powerful interlocutory remedy that freezes the defendant's assets worldwide to ensure that if the plaintiff wins the case, there will be property available to satisfy the judgment. It is granted if there is a real risk of asset dissipation." },
            { q: "What is the 'doctrine of restitution' in the context of a void contract?", options: ["The duty to pay damages", "The principle that a party who has received a benefit under a contract that becomes void must restore it to the other party", "The right to rest during a trial", "A rule of evidence"], answer: "The principle that a party who has received a benefit under a contract that becomes void must restore it to the other party", explanation: "Section 65 of the Indian Contract Act provides for the obligation of a person who has received an advantage under a void agreement or a contract that becomes void. The principle is to prevent unjust enrichment by restoring the parties to their original position." },
            { q: "What is the difference between 'joint tenancy' and 'tenancy in common'?", options: ["Joint tenancy is for families, tenancy in common for friends", "In joint tenancy, there is a right of survivorship; in tenancy in common, each owner's share passes to their heirs", "Joint tenancy has unequal shares, tenancy in common has equal shares", "There is no difference in India"], answer: "In joint tenancy, there is a right of survivorship; in tenancy in common, each owner's share passes to their heirs", explanation: "These are two ways for multiple people to own property. The key difference is the 'right of survivorship'. In a joint tenancy, when one owner dies, their share automatically passes to the surviving joint tenants. In a tenancy in common, each owner has a distinct share that can be willed or inherited." }
          ],
          7: [
            { q: "What is the 'rule in Rylands v Fletcher' and what are its exceptions?", options: ["A rule about water rights", "A principle of strict liability for the escape of dangerous things from one's land; exceptions include Act of God and plaintiff's own fault", "A rule of contract law", "A rule of criminal procedure"], answer: "A principle of strict liability for the escape of dangerous things from one's land; exceptions include Act of God and plaintiff's own fault", explanation: "This rule imposes strict liability on a person who, for their own purposes, brings on their land and collects and keeps there anything likely to do mischief if it escapes. They are prima facie answerable for all the damage which is the natural consequence of its escape. Exceptions include the plaintiff's consent, Act of God, and statutory authority." },
            { q: "What is the 'doctrine of contribution' among joint tortfeasors?", options: ["A rule that only one tortfeasor is liable", "The principle that joint wrongdoers can be required to contribute to the damages paid to the victim, sharing the liability among themselves", "A rule for charitable contributions", "A rule of evidence"], answer: "The principle that joint wrongdoers can be required to contribute to the damages paid to the victim, sharing the liability among themselves", explanation: "At common law, there was no right of contribution between joint tortfeasors. However, legislation in most jurisdictions now allows a tortfeasor who has paid more than their share of the damages to claim a contribution from the other tortfeasors, with the amount being what is found by the court to be just and equitable." },
            { q: "What is the difference between a 'charge' and a 'lien'?", options: ["A charge is on immovable property, a lien on movable property", "A charge is created by act of parties or law as security; a lien is a right to retain possession of goods until a debt is paid", "A charge gives a right to sell, a lien does not", "They are the same"], answer: "A charge is created by act of parties or law as security; a lien is a right to retain possession of goods until a debt is paid", explanation: "A charge (on property) is a form of security for a debt, but it does not involve a transfer of interest. A lien is a possessory right; it is the right to hold onto another's property as security for the performance of an obligation. For example, a mechanic has a lien on a car they have repaired until the bill is paid." },
            { q: "What is an 'Anton Piller' order?", options: ["An order to arrest someone", "A civil search warrant that allows a plaintiff to enter the defendant's premises to inspect and seize evidence, typically in intellectual property cases", "A type of injunction", "An order to pay damages"], answer: "A civil search warrant that allows a plaintiff to enter the defendant's premises to inspect and seize evidence, typically in intellectual property cases", explanation: "This is a special court order, granted without prior notice, that allows a plaintiff to enter a defendant's premises to search for and seize evidence. It's used when there's a grave danger that the defendant might destroy incriminating materials if they were warned of a lawsuit, which is common in piracy and IP theft cases." },
            { q: "What is the 'doctrine of feeding the grant by estoppel'?", options: ["A doctrine about feeding animals", "If a person without title transfers property and later acquires title, the transfer becomes valid and the transferee gets the benefit of the subsequent acquisition", "A doctrine of evidence", "A rule of contract law"], answer: "If a person without title transfers property and later acquires title, the transfer becomes valid and the transferee gets the benefit of the subsequent acquisition", explanation: "This doctrine, found in Section 43 of the Transfer of Property Act, is based on the principle of estoppel. It prevents a transferor from denying the validity of a transfer they made when they did not have the right to do so, if they subsequently acquire that right." },
            { q: "What is the difference between 'recession' and 'repudiation' of a contract?", options: ["Recession is by mutual agreement, repudiation is by one party", "Recession is a remedy to set aside a contract (e.g., for misrepresentation), while repudiation is a breach of contract by refusing to perform", "Recession is for minor breaches, repudiation for major ones", "They are the same"], answer: "Recession is a remedy to set aside a contract (e.g., for misrepresentation), while repudiation is a breach of contract by refusing to perform", explanation: "Recession is an equitable remedy that unwinds the contract, aiming to restore the parties to their pre-contractual position. It is available for vitiating factors like misrepresentation or undue influence. Repudiation is a clear indication by one party that they will not perform their obligations, which constitutes a serious breach of contract." },
            { q: "What is the 'parri passu' principle in insolvency law?", options: ["A principle of paying secured creditors first", "The principle that all unsecured creditors in an insolvency proceeding must be treated equally and share available assets proportionately", "A principle of giving priority to government debts", "A rule for distributing assets to shareholders"], answer: "The principle that all unsecured creditors in an insolvency proceeding must be treated equally and share available assets proportionately", explanation: "'Parri passu' means 'on an equal footing'. This principle is fundamental to corporate insolvency. It ensures that once the assets are collected and secured creditors are paid, the remaining assets are distributed among the unsecured creditors in proportion to the debts owed to them, without giving preference to any one creditor." },
            { q: "What is the 'doctrine of public trust' in environmental law?", options: ["A doctrine that the public must trust the government", "A principle that certain natural resources (like air, water, forests) are held in trust by the state for the benefit of the public", "A doctrine about public charities", "A rule of international law"], answer: "A principle that certain natural resources (like air, water, forests) are held in trust by the state for the benefit of the public", explanation: "The Supreme Court of India has applied this doctrine to hold that the state, as a trustee, has a legal duty to protect natural resources for public use. These resources cannot be easily privatized or used in a way that harms the public interest. It is a key principle for environmental litigation." },
            { q: "What is a 'John Doe' order in civil litigation?", options: ["An order against a specific person named John Doe", "An ex-parte injunction against unknown defendants who are infringing on the plaintiff's rights, commonly used in copyright cases", "An order to protect witnesses", "A type of search warrant"], answer: "An ex-parte injunction against unknown defendants who are infringing on the plaintiff's rights, commonly used in copyright cases", explanation: "A John Doe order (or Ashok Kumar order in India) is a powerful tool for plaintiffs, especially in copyright and trademark law. It allows them to get an injunction against anonymous infringers, such as people illegally broadcasting a movie, without having to name them individually in the lawsuit." },
            { q: "What is the difference between 'substantive ultra vires' and 'procedural ultra vires'?", options: ["Substantive is about content, procedural is about process", "Substantive ultra vires is when a body acts beyond its powers; procedural ultra vires is when it fails to follow a mandatory procedure", "Substantive is for laws, procedural for rules", "There is no difference"], answer: "Substantive ultra vires is when a body acts beyond its powers; procedural ultra vires is when it fails to follow a mandatory procedure", explanation: "'Ultra vires' means 'beyond the powers'. In administrative law, an action can be challenged as substantively ultra vires if the authority had no power to do it at all. It is procedurally ultra vires if the authority had the power, but exercised it without following the prescribed legal procedure." }
          ],
          8: [
            { q: "What is the 'corporate veil' and when can it be lifted?", options: ["A piece of clothing for executives", "The legal concept that a company is a separate entity from its shareholders; it can be lifted in cases of fraud or improper conduct", "A type of business secret", "A rule that protects directors from all liability"], answer: "The legal concept that a company is a separate entity from its shareholders; it can be lifted in cases of fraud or improper conduct", explanation: "The 'veil of incorporation' separates the company's legal personality from its members. However, courts can 'lift' or 'pierce' this veil to look at the reality behind it, for example, to determine the true character of the company, to prevent tax evasion, or when the company is used as a sham to commit fraud." },
            { q: "What is the 'doctrine of indoor management' or the 'Turquand's rule'?", options: ["A rule for managing the company's indoor facilities", "A principle that protects outsiders dealing with a company from irregularities in its internal management", "A rule that all management must be done indoors", "A rule that makes outsiders responsible for internal procedures"], answer: "A principle that protects outsiders dealing with a company from irregularities in its internal management", explanation: "This doctrine protects innocent third parties who are dealing with a company in good faith. They are entitled to assume that the internal procedures of the company have been complied with and are not bound to inquire into the regularity of internal proceedings. It is an exception to the doctrine of constructive notice." },
            { q: "What is the difference between 'oppression' and 'mismanagement' under the Companies Act?", options: ["Oppression is by majority, mismanagement by minority", "Oppression is a burdensome and wrongful conduct against minority shareholders; mismanagement is gross negligence in the company's affairs affecting all members", "They are the same offense", "Oppression is a crime, mismanagement is a civil wrong"], answer: "Oppression is a burdensome and wrongful conduct against minority shareholders; mismanagement is gross negligence in the company's affairs affecting all members", explanation: "Oppression (S. 241, Companies Act 2013) relates to the violation of a shareholder's rights in their capacity as a member. Mismanagement relates to conduct that is prejudicial to the interests of the company or the public interest. Both provide grounds for minority shareholders to approach the National Company Law Tribunal (NCLT)." },
            { q: "What is a 'derivative action'?", options: ["A lawsuit based on a mathematical derivative", "A lawsuit brought by a shareholder on behalf of the company against its directors or other wrongdoers", "A secondary lawsuit", "A lawsuit against a company's derivatives"], answer: "A lawsuit brought by a shareholder on behalf of the company against its directors or other wrongdoers", explanation: "A derivative action is an exception to the rule that the company itself is the proper plaintiff to sue for a wrong done to it. It allows a minority shareholder to 'step into the shoes' of the company and bring an action when the people in control of the company (the wrongdoers) refuse to do so." },
            { q: "What is the 'doctrine of constructive notice' in company law?", options: ["A notice about construction", "A principle that all persons dealing with a company are deemed to have knowledge of its public documents like the Memorandum and Articles of Association", "A notice that is not real", "A notice sent to the company's architect"], answer: "A principle that all persons dealing with a company are deemed to have knowledge of its public documents like the Memorandum and Articles of Association", explanation: "Since the Memorandum and Articles of Association are public documents registered with the Registrar of Companies, anyone dealing with the company is presumed to have read and understood them. They cannot later claim they were unaware of the powers or limitations of the company as stated in these documents." },
            { q: "What is the 'polluter pays' principle?", options: ["A principle that polluters should be paid", "An environmental law principle that the party responsible for producing pollution should be responsible for paying for the damage done to the natural environment", "A principle of tax law", "A voluntary code of conduct"], answer: "An environmental law principle that the party responsible for producing pollution should be responsible for paying for the damage done to the natural environment", explanation: "The 'polluter pays' principle is a cornerstone of environmental jurisprudence, adopted by the Indian Supreme Court. It holds that the financial costs of preventing or remedying damage caused by pollution should lie with the undertakings which cause the pollution." },
            { q: "What is the 'precautionary principle' in environmental law?", options: ["A principle to take precautions in daily life", "The principle that lack of scientific certainty should not be used as a reason to postpone cost-effective measures to prevent environmental degradation", "A principle of contract law", "A principle for financial investments"], answer: "The principle that lack of scientific certainty should not be used as a reason to postpone cost-effective measures to prevent environmental degradation", explanation: "This principle, also adopted by the Indian Supreme Court, advocates for taking preventive action in the face of uncertainty. It shifts the burden of proof to the proponent of an activity to show that their action will not cause harm to the environment." },
            { q: "What is the difference between a 'patent' and a 'trade secret'?", options: ["A patent is for inventions, a trade secret for recipes", "A patent provides a limited-term monopoly in exchange for public disclosure; a trade secret is protected by keeping it confidential and has no time limit", "A patent is harder to get than a trade secret", "A patent is a secret, a trade secret is public"], answer: "A patent provides a limited-term monopoly in exchange for public disclosure; a trade secret is protected by keeping it confidential and has no time limit", explanation: "These are two different ways to protect intellectual property. A patent gives a strong, exclusive right for about 20 years, but requires you to disclose your invention. A trade secret (like the formula for Coca-Cola) can last forever, but only as long as it remains a secret. If someone independently discovers it, you have no protection." },
            { q: "What is 'passing off' in trademark law?", options: ["Passing a product to someone else", "A common law tort of misrepresenting one's goods or services as being those of another, causing damage to their goodwill", "Failing an exam", "A type of traffic violation"], answer: "A common law tort of misrepresenting one's goods or services as being those of another, causing damage to their goodwill", explanation: "Passing off protects the goodwill of a trader from misrepresentation. It is available even for unregistered trademarks. The plaintiff must prove goodwill, misrepresentation by the defendant, and resulting damage." },
            { q: "What is the 'doctrine of severability' in arbitration law?", options: ["The arbitration clause in a contract is considered separate from the main contract", "The ability to sever an arbitrator from the panel", "A rule to sever the award into parts", "A doctrine that the entire contract is void if the arbitration clause is bad"], answer: "The arbitration clause in a contract is considered separate from the main contract", explanation: "This doctrine holds that an arbitration agreement is a separate and autonomous contract. Therefore, even if the main contract is found to be invalid or terminated, the arbitration clause can survive and the arbitral tribunal can still have jurisdiction to decide the dispute, including disputes about the validity of the main contract itself." }
          ],

          9: [
    { q: "What is the legal principle of 'novation' in the discharge of a contract?", options: ["The cancellation of a contract by one party", "The substitution of a new contract in place of the old one, either between the same or different parties", "The agreement to waive a specific term", "The transfer of contractual duties to a third party"], answer: "The substitution of a new contract in place of the old one, either between the same or different parties", explanation: "Novation requires mutual consent and results in the complete discharge of the original contract and the creation of a new one. It essentially replaces the old legal obligations with entirely new ones." },
    { q: "What is the primary distinction between a 'contract of indemnity' and a 'contract of guarantee'?", options: ["Indemnity must be written; Guarantee can be oral", "Indemnity is for property; Guarantee is for debt", "Indemnity protects against loss in two parties; Guarantee secures the debt of a third party to a creditor", "There is no legal difference"], answer: "Indemnity protects against loss in two parties; Guarantee secures the debt of a third party to a creditor", explanation: "A contract of indemnity involves two parties (promisor/indemnifier and promisee/indemnified). A contract of guarantee involves three parties (principal debtor, creditor, and surety/guarantor) where the surety promises to pay the debt of the principal debtor." },
    { q: "In tort law, what does the defense of 'volenti non fit injuria' mean?", options: ["The fault of the claimant defeats the claim", "No injury is done to a willing person, meaning the plaintiff consented to the risk", "The law does not concern itself with trifles", "The defendant was acting in self-defense"], answer: "No injury is done to a willing person, meaning the plaintiff consented to the risk", explanation: "This defense is based on the principle that a person cannot complain of an injury that they voluntarily and knowingly consented to undergo, often by assuming an inherent risk." },
    { q: "What is the legal position of 'past consideration' in Indian Contract Law?", options: ["It is always a valid form of consideration", "It is only valid if it was requested by the promisor", "It is generally no consideration at all, with specific exceptions", "It is valid consideration if given at the desire of the promisor"], answer: "It is valid consideration if given at the desire of the promisor", explanation: "Unlike English Law, Section 2(d) of the Indian Contract Act defines consideration broadly, allowing an act done 'at the desire of the promisor' to be valid consideration, even if performed before the promise was made." },
    { q: "What is the tort of 'conversion'?", options: ["Unlawful use of another person's land", "Taking a person's goods by force", "Wrongful interference with the goods of another, inconsistent with the owner's right of possession", "Slander of a person's title to property"], answer: "Wrongful interference with the goods of another, inconsistent with the owner's right of possession", explanation: "Conversion is a civil wrong where a person treats the goods of another as his own, depriving the true owner of their right to possess the goods, such as an unauthorized sale or destruction of the property." },
    { q: "What is the purpose of a 'Writ of Mandamus'?", options: ["To quash an illegal order of a court or tribunal", "To compel a lower court to send its record to a higher court", "To command a public authority to perform a specific legal public duty", "To restrain a person from holding a public office they are not entitled to"], answer: "To command a public authority to perform a specific legal public duty", explanation: "Mandamus (meaning 'we command') is a writ issued by a superior court to compel a public body or official to perform a duty belonging to their office, provided the duty is public in nature and the right of the applicant has been infringed." },
    { q: "What is the difference between 'liquidated damages' and 'penalty' in a contract?", options: ["Liquidated damages are for a major breach, a penalty is for a minor breach", "Liquidated damages are a genuine pre-estimate of loss, a penalty is an extravagant amount to terrorize the party into performance", "They are the same, but for different legal jurisdictions", "Liquidated damages are decided by a court, a penalty is set by the parties"], answer: "Liquidated damages are a genuine pre-estimate of loss, a penalty is an extravagant amount to terrorize the party into performance", explanation: "Liquidated damages (S. 74, ICA) are enforceable if they are a reasonable forecast of the potential damages. A penalty clause, being a threat, is not enforceable, and the injured party can only claim actual damages, capped by the penalty amount." },
    { q: "What is the concept of 'contributory negligence'?", options: ["When the defendant contributes to the plaintiff's damage", "When the plaintiff's own negligence contributed to their injury", "When two defendants are both negligent", "When a third party is also negligent"], answer: "When the plaintiff's own negligence contributed to their injury", explanation: "Contributory negligence is a defense where the defendant argues that the plaintiff's own failure to exercise reasonable care was a partial cause of their injuries, which may reduce the compensation amount under the principle of comparative negligence." },
    { q: "What is the significance of the maxim 'damnum sine injuria'?", options: ["Damage suffered without legal injury is actionable in court", "Violation of a legal right without actual damage is actionable", "Damage suffered without the violation of a legal right is not actionable in tort law", "Every wrong must have a remedy"], answer: "Damage suffered without the violation of a legal right is not actionable in tort law", explanation: "This maxim means that if a person suffers actual harm or loss (damnum) but no legal right has been infringed (sine injuria), they have no cause of action in the law of torts, as no wrong has been committed." },
    { q: "What is the purpose of a 'notice' under Section 80 of the Code of Civil Procedure (CPC)?", options: ["To notify the court of the suit filing", "To allow the Government or a public officer two months to consider the claim and settle the dispute before a suit is filed against them", "To serve notice to the defendant through registered post", "To publicly announce the filing of the suit"], answer: "To allow the Government or a public officer two months to consider the claim and settle the dispute before a suit is filed against them", explanation: "Section 80 mandates that no suit can be instituted against the Government or a public officer in respect of any act done in his official capacity until two months after a notice in writing has been delivered, giving them a chance to review the claim." }
],

10: [
    { q: "What are the three essential conditions for the application of the doctrine of 'res judicata'?", options: ["The suits must be in the same court, on the same day, and with the same facts", "The matter must be directly and substantially in issue, between the same parties, and decided by a competent court", "The claim must be for property, the parties must be related, and the suit must be a fresh one", "The judgment must be in the defendant's favor, the claim must be for money, and the court must be a High Court"], answer: "The matter must be directly and substantially in issue, between the same parties, and decided by a competent court", explanation: "Res judicata (S. 11, CPC) prevents the re-litigation of an issue. The three main conditions are: the matter was in issue in the former suit, it was between the same parties, and it was heard and finally decided by a court of competent jurisdiction." },
    { q: "What is the purpose of an 'interpleader suit' under the Code of Civil Procedure (CPC)?", options: ["To allow two parties to sue each other simultaneously", "To allow a person in possession of property to compel two or more claimants to the property to litigate the matter between themselves", "To stop a judgment debtor from alienating their property", "To seek a declaration of rights against a party"], answer: "To allow a person in possession of property to compel two or more claimants to the property to litigate the matter between themselves", explanation: "An interpleader suit is filed by a neutral party who holds property that is subject to conflicting claims by two or more other parties, asking the court to decide who the property belongs to so they can safely deliver it." },
    { q: "Under the Transfer of Property Act, what is an 'onerous gift'?", options: ["A gift that is very valuable", "A gift given with the intention of causing loss", "A single gift that imposes an obligation or burden on the donee", "A gift that must be returned if the donee dies first"], answer: "A single gift that imposes an obligation or burden on the donee", explanation: "An onerous gift is one where the donor attaches a liability (like a mortgage or debt) to the transfer. If the donee accepts the gift, they must also accept the burden. If they accept a gift, they are deemed to have accepted the whole transaction." },
    { q: "In the law of evidence, what is the meaning of the phrase 'may presume'?", options: ["The court must consider it proved unless disproved", "The court shall consider it proved unless disproved", "The court has the discretion to either regard a fact as proved or call for proof", "The court is not allowed to take the fact into account"], answer: "The court has the discretion to either regard a fact as proved or call for proof", explanation: "'May presume' is a discretionary power (a rebuttable presumption of fact). The court can assume a fact exists unless it is disproved, or it can demand proper proof of the fact." },
    { q: "What is a 'temporary injunction' in a civil suit?", options: ["A final decree of the court", "An order compelling a party to perform a positive act", "A preventive order of the court restraining a party from doing a specified act, effective until further orders of the court", "An order to pay compensation"], answer: "A preventive order of the court restraining a party from doing a specified act, effective until further orders of the court", explanation: "Temporary injunctions (Order 39, CPC) are interlocutory orders granted by the court during the pendency of a suit to preserve the subject matter of the suit in its existing condition until final disposal." },
    { q: "What is the nature of an 'actionable claim' under the Transfer of Property Act (TPA)?", options: ["A claim to physical possession of a movable property", "A claim to any tangible, movable property in the possession of the claimant", "A claim to any debt, other than a debt secured by a mortgage of immovable property", "A claim for unliquidated damages arising out of a tort"], answer: "A claim to any debt, other than a debt secured by a mortgage of immovable property", explanation: "An actionable claim (S. 3, TPA) is a claim that can be enforced by a civil court, primarily relating to unsecured debts or a beneficial interest in movable property not in the claimant's possession." },
    { q: "What is a 'caveat' in the context of civil procedure?", options: ["A final warning from the court to a party", "A notice given by an interested party to a court that no order should be passed against them without giving them a hearing", "A detailed statement of facts presented by the plaintiff", "A document for challenging a judge's jurisdiction"], answer: "A notice given by an interested party to a court that no order should be passed against them without giving them a hearing", explanation: "A caveat (S. 148A, CPC) is a formal notice that allows the caveator (the person filing it) to be heard before any order is passed in an application expected to be filed in that suit or proceeding, protecting their right to be heard." },
    { q: "What is a 'usufructuary mortgage' under the Transfer of Property Act?", options: ["A mortgage where the mortgagor retains possession", "A mortgage where the mortgagee is put into possession and is entitled to receive the rents and profits of the property in lieu of interest or principal", "A simple mortgage with a power of sale", "A mortgage created by depositing title deeds"], answer: "A mortgage where the mortgagee is put into possession and is entitled to receive the rents and profits of the property in lieu of interest or principal", explanation: "In this type of mortgage, the property is delivered to the mortgagee, who enjoys the income (usufruct) from the property. The rents and profits are used to repay the interest, the principal, or both." },
    { q: "What is the rule regarding the admissibility of an 'admission' in the Indian Evidence Act?", options: ["Admissions are conclusive proof of the matter admitted", "Admissions are irrelevant and cannot be proved", "Admissions are relevant and may be proved against the person who makes them", "Admissions can only be made in the presence of a judge"], answer: "Admissions are relevant and may be proved against the person who makes them", explanation: "An admission (S. 17-23, IEA) is a statement that suggests an inference to a relevant fact. While they are highly relevant against the person who makes them, they are not conclusive proof but can operate as an estoppel." },
    { q: "What is the difference between a 'Sale' and an 'Exchange' under the Transfer of Property Act (TPA)?", options: ["Sale is for movable property, Exchange is for immovable property", "Sale is a transfer of ownership for a price (money); Exchange is a mutual transfer of ownership of one thing for the ownership of another thing, neither thing being money only", "Sale is a gift, Exchange is a lease", "Sale requires registration, Exchange does not"], answer: "Sale is a transfer of ownership for a price (money); Exchange is a mutual transfer of ownership of one thing for the ownership of another thing, neither thing being money only", explanation: "The key distinction under the TPA is the consideration. A Sale (S. 54) involves a price (money). An Exchange (S. 118) involves the transfer of one property for another property, not for money alone." }
]
        }
      },
      cyber: {
        easy: {
          1: [
            { q: "What is 'phishing' in the context of cybercrime?", options: ["A type of fishing sport", "A method to illegally obtain sensitive information", "A computer virus", "A social media trend"], answer: "A method to illegally obtain sensitive information", explanation: "Phishing is a type of social engineering where an attacker sends a fraudulent message designed to trick a human victim into revealing sensitive information." },
            { q: "What does the IT Act, 2000 primarily deal with?", options: ["Hardware manufacturing standards", "Cybercrime and electronic commerce", "Telecommunication tariffs", "Software exports"], answer: "Cybercrime and electronic commerce", explanation: "The Information Technology (IT) Act, 2000 is the primary law in India dealing with cybercrime and electronic commerce. It provides legal recognition for transactions carried out by means of electronic data interchange." },
            { q: "What is 'malware'?", options: ["A type of computer hardware", "Software designed to cause harm to a computer or network", "A secure software", "An internet service provider"], answer: "Software designed to cause harm to a computer or network", explanation: "Malware, short for 'malicious software,' is any software intentionally designed to cause disruption to a computer, server, client, or computer network." },
            { q: "What is a 'digital signature'?", options: ["A scanned image of a handwritten signature", "An electronic method of signing a document to ensure its authenticity", "A password for a website", "A username"], answer: "An electronic method of signing a document to ensure its authenticity", explanation: "A digital signature is a mathematical scheme for verifying the authenticity of digital messages or documents. It provides assurance of evidence of origin, identity and status of an electronic document." },
            { q: "What is 'cyberbullying'?", options: ["A type of online game", "Using electronic communication to bully a person", "Hacking a website", "Sending spam emails"], answer: "Using electronic communication to bully a person", explanation: "Cyberbullying is bullying that takes place over digital devices like cell phones, computers, and tablets. It can occur through SMS, Text, and apps, or online in social media, forums, or gaming." },
            { q: "What is a 'firewall' in computer security?", options: ["A physical wall that stops fires", "A network security system that monitors and controls incoming and outgoing traffic", "An antivirus software", "A type of computer virus"], answer: "A network security system that monitors and controls incoming and outgoing traffic", explanation: "A firewall is a network security device that monitors traffic to or from your network. It allows or blocks traffic based on a defined set of security rules." },
            { q: "What does 'hacking' mean?", options: ["Fixing a computer", "Gaining unauthorized access to data in a system or computer", "Building a computer", "Deleting files"], answer: "Gaining unauthorized access to data in a system or computer", explanation: "Hacking refers to activities that seek to compromise digital devices, such as computers, smartphones, tablets, and even entire networks." },
            { q: "What is 'spam'?", options: ["A type of canned meat", "Unsolicited and unwanted electronic messages", "A secure email service", "A computer error message"], answer: "Unsolicited and unwanted electronic messages", explanation: "Spam is any kind of unwanted, unsolicited digital communication that gets sent out in bulk. It is often sent for commercial purposes." },
            { q: "What is 'two-factor authentication' (2FA)?", options: ["Using two different computers", "A security process requiring two different methods of identification", "Logging in twice", "A type of password"], answer: "A security process requiring two different methods of identification", explanation: "2FA is a security method that requires two forms of identification to access an account or system, such as a password and a code sent to your phone." },
            { q: "What is a 'cookie' in the context of websites?", options: ["A small snack", "A small piece of data stored on the user's computer by the web browser", "A type of online advertisement", "A computer virus"], answer: "A small piece of data stored on the user's computer by the web browser", explanation: "Cookies are small files which are stored on a user's computer. They are designed to hold a modest amount of data specific to a particular client and website, and can be accessed either by the web server or the client computer." }
          ],
          2: [
            { q: "What is a 'virus' in computing?", options: ["A biological organism", "A type of malware that replicates itself by modifying other computer programs", "A hardware malfunction", "A slow internet connection"], answer: "A type of malware that replicates itself by modifying other computer programs", explanation: "A computer virus is a type of malicious code or program written to alter the way a computer operates and is designed to spread from one computer to another." },
            { q: "What is a 'Trojan horse'?", options: ["A historical artifact", "Malware disguised as legitimate software", "A type of computer hardware", "A secure file sharing program"], answer: "Malware disguised as legitimate software", explanation: "A Trojan horse, or Trojan, is a type of malware that is often disguised as legitimate software. Trojans can be employed by cyber-thieves and hackers trying to gain access to users' systems." },
            { q: "What is an 'IP address'?", options: ["A postal address for computers", "A unique address that identifies a device on the internet or a local network", "A type of computer name", "A security code"], answer: "A unique address that identifies a device on the internet or a local network", explanation: "An Internet Protocol (IP) address is a numerical label assigned to each device connected to a computer network that uses the Internet Protocol for communication." },
            { q: "What is 'social engineering' in cybersecurity?", options: ["An engineering discipline", "The psychological manipulation of people into performing actions or divulging confidential information", "A type of social media platform", "A method for building communities online"], answer: "The psychological manipulation of people into performing actions or divulging confidential information", explanation: "Social engineering is a manipulation technique that exploits human error to gain private information, access, or valuables. Phishing is a common type of social engineering." },
            { q: "What is a 'botnet'?", options: ["A network for robots", "A network of private computers infected with malicious software and controlled as a group", "A type of social network", "A secure computer network"], answer: "A network of private computers infected with malicious software and controlled as a group", explanation: "A botnet is a number of Internet-connected devices, each of which is running one or more bots. Botnets can be used to perform Distributed Denial-of-Service (DDoS) attacks, steal data, send spam, and allows the attacker to access the device and its connection." },
            { q: "What is 'clickjacking'?", options: ["A type of online game", "A malicious technique of tricking a user into clicking on something different from what the user perceives", "A method to increase website clicks", "A type of online advertisement"], answer: "A malicious technique of tricking a user into clicking on something different from what the user perceives", explanation: "Clickjacking is a technique where an attacker uses multiple transparent or opaque layers to trick a user into clicking on a button or link on another page when they were intending to click on the top-level page. Thus, the attacker is 'hijacking' clicks meant for their page and routing them to another page." },
            { q: "What is 'doxing'?", options: ["A type of boxing", "The act of publicly revealing previously private personal information about an individual or organization", "A method of data backup", "A secure messaging app"], answer: "The act of publicly revealing previously private personal information about an individual or organization", explanation: "Doxing is the act of broadcasting private or identifying information about an individual or organization to the public. This information is then circulated to the public without the victim's permission." },
            { q: "What is a 'keylogger'?", options: ["A person who logs keys", "A type of software that records the keystrokes made by a user", "A secure keyboard", "A password manager"], answer: "A type of software that records the keystrokes made by a user", explanation: "A keylogger is a type of monitoring software designed to record keystrokes made by a user. It can be used by cybercriminals to steal personal information, login credentials, and sensitive enterprise data." },
            { q: "What is 'spyware'?", options: ["Software for spies", "Malware that secretly observes the user's activities on their computer", "A type of security camera", "A secure web browser"], answer: "Malware that secretly observes the user's activities on their computer", explanation: "Spyware is unwanted software that infiltrates your computing device, stealing your internet usage data and sensitive information. Spyware is classified as a type of malware." },
            { q: "What is the 'dark web'?", options: ["A website with a dark theme", "A part of the World Wide Web that requires special software to access and is not indexed by search engines", "A secret government network", "A type of social media"], answer: "A part of the World Wide Web that requires special software to access and is not indexed by search engines", explanation: "The dark web is the part of the World Wide Web that is only accessible by means of special software, allowing users and website operators to remain anonymous or untraceable. It is often associated with illegal activities." }
          ],
          3: [
            { q: "What is 'SQL injection'?", options: ["Injecting SQL databases into a website", "A code injection technique used to attack data-driven applications", "A type of database software", "A method to speed up database queries"], answer: "A code injection technique used to attack data-driven applications", explanation: "SQL injection is a web security vulnerability that allows an attacker to interfere with the queries that an application makes to its database. It generally allows an attacker to view data that they are not normally able to retrieve." },
            { q: "What is 'cross-site scripting' (XSS)?", options: ["A type of website design", "A security vulnerability where an attacker injects malicious scripts into trusted websites", "A method to link different websites", "A scripting language"], answer: "A security vulnerability where an attacker injects malicious scripts into trusted websites", explanation: "XSS attacks occur when an attacker uses a web application to send malicious code, generally in the form of a browser side script, to a different end user. The end user’s browser has no way to know that the script should not be trusted, and will execute the script." },
            { q: "What is a 'rootkit'?", options: ["A toolkit for fixing computer roots", "A collection of software designed to enable access to a computer while masking its existence", "A type of hardware", "A secure operating system"], answer: "A collection of software designed to enable access to a computer while masking its existence", explanation: "A rootkit is a clandestine computer program designed to provide continued privileged access to a computer while actively hiding its presence. They are difficult to detect and remove." },
            { q: "What is 'cryptocurrency'?", options: ["A secret currency", "A digital or virtual currency that uses cryptography for security", "A type of physical coin", "A government-issued digital currency"], answer: "A digital or virtual currency that uses cryptography for security", explanation: "A cryptocurrency is a digital asset designed to work as a medium of exchange wherein individual coin ownership records are stored in a ledger existing in a form of a computerized database using strong cryptography to secure transaction records." },
            { q: "What is 'blockchain'?", options: ["A chain of blocks", "A distributed, immutable ledger that is used to record transactions", "A type of database server", "A secure messaging system"], answer: "A distributed, immutable ledger that is used to record transactions", explanation: "A blockchain is a decentralized, distributed, and oftentimes public, digital ledger consisting of records called blocks that is used to record transactions across many computers so that any involved block cannot be altered retroactively, without the alteration of all subsequent blocks." },
            { q: "What is a 'smishing' attack?", options: ["A phishing attack using email", "A phishing attack using SMS (text messages)", "A type of fishing", "An attack on a smart device"], answer: "A phishing attack using SMS (text messages)", explanation: "Smishing is a form of phishing in which an attacker uses a compelling text message to trick targeted recipients into clicking a link and sending the attacker private information or downloading malicious programs to a smartphone." },
            { q: "What is a 'vishing' attack?", options: ["A phishing attack using video calls", "A phishing attack using voice calls (phone calls)", "A type of visual illusion", "An attack on a virtual machine"], answer: "A phishing attack using voice calls (phone calls)", explanation: "Vishing, or voice phishing, is the fraudulent practice of making phone calls or leaving voice messages purporting to be from reputable companies in order to induce individuals to reveal personal information, such as bank details and credit card numbers." },
            { q: "What is 'spear phishing'?", options: ["A broad phishing attack sent to many users", "A targeted phishing attack aimed at a specific individual or organization", "A type of fishing sport", "An attack using a spear"], answer: "A targeted phishing attack aimed at a specific individual or organization", explanation: "Spear phishing is an email or electronic communications scam targeted towards a specific individual, organization or business. Although often intended to steal data for malicious purposes, cybercriminals may also intend to install malware on a targeted user’s computer." },
            { q: "What is 'whaling' in the context of cybersecurity?", options: ["A type of fishing", "A spear phishing attack directed specifically at high-profile senior executives", "An attack on a large company", "A type of online game"], answer: "A spear phishing attack directed specifically at high-profile senior executives", explanation: "A whaling attack is a specific type of phishing attack that targets high-profile employees, such as the CEO or CFO, in order to steal sensitive information from a company, as these individuals have access to a great deal of valuable data." },
            { q: "What is 'credential stuffing'?", options: ["A method to create strong passwords", "An automated attack where stolen account credentials are used to gain unauthorized access to user accounts", "A way to store passwords securely", "A type of social engineering"], answer: "An automated attack where stolen account credentials are used to gain unauthorized access to user accounts", explanation: "Credential stuffing is a type of cyberattack in which stolen account credentials, typically consisting of lists of usernames and/or email addresses and the corresponding passwords, are used to gain unauthorized access to user accounts through large-scale automated login requests directed against a web application." }
          ]
          ,
          4: [
            { q: "What is 'adware'?", options: ["A type of computer hardware", "Software that automatically displays or downloads advertising material", "A secure web browser", "A tool for creating ads"], answer: "Software that automatically displays or downloads advertising material", explanation: "Adware is software that generates revenue for its developer by automatically generating online advertisements in the user interface of the software or on a screen presented to the user during the installation process." },
            { q: "What is a 'VPN' (Virtual Private Network)?", options: ["A very public network", "A tool that creates a secure, encrypted internet connection", "A type of antivirus", "A physical network cable"], answer: "A tool that creates a secure, encrypted internet connection", explanation: "A VPN creates a private network from a public internet connection, masking your IP address so your online actions are virtually untraceable and securing your data." },
            { q: "Why is it important to use strong passwords?", options: ["They are easier to remember", "To make it harder for hackers to guess or crack them", "They are required by all websites", "They make your computer faster"], answer: "To make it harder for hackers to guess or crack them", explanation: "Strong passwords, typically a mix of upper and lower case letters, numbers, and symbols, are essential for protecting your online accounts from unauthorized access." },
            { q: "What is 'data backup'?", options: ["Deleting old data", "Making a copy of your data to protect it from loss", "Sharing data with friends", "Encrypting data"], answer: "Making a copy of your data to protect it from loss", explanation: "Backing up your data means creating a copy of your important files so that if the original data is lost or damaged (due to hardware failure, theft, or ransomware), you can restore it from the backup." },
            { q: "What is an 'antivirus' software?", options: ["A program that speeds up your computer", "A program that detects and removes malware from a computer", "A program for creating viruses", "A type of firewall"], answer: "A program that detects and removes malware from a computer", explanation: "Antivirus software is a critical security tool that scans your computer for viruses, worms, trojans, and other malicious software and removes or quarantines them." },
