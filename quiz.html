            { q: "What is the 'chain of custody' in digital evidence?", options: ["A chain used to secure computers", "The chronological documentation or paper trail, showing the seizure, custody, control, transfer, analysis, and disposition of physical or electronic evidence", "A type of network cable", "A list of all computer users"], answer: "The chronological documentation or paper trail, showing the seizure, custody, control, transfer, analysis, and disposition of physical or electronic evidence", explanation: "Maintaining the chain of custody is crucial to ensure that the digital evidence presented in court is authentic and has not been tampered with. Any break in the chain can render the evidence inadmissible." },
            { q: "What is a 'Distributed Denial-of-Service' (DDoS) attack?", options: ["A DoS attack from one computer", "A DoS attack from multiple, coordinated sources (a botnet)", "A type of server maintenance", "A method to improve network speed"], answer: "A DoS attack from multiple, coordinated sources (a botnet)", explanation: "A DDoS attack is a malicious attempt to disrupt the normal traffic of a targeted server, service or network by overwhelming the target or its surrounding infrastructure with a flood of Internet traffic from multiple sources." },
            { q: "What is the 'Internet of Things' (IoT) and what are its security risks?", options: ["A new version of the internet", "A network of physical devices embedded with sensors and software; risks include privacy breaches and hacking", "A social media platform for things", "A secure network for devices"], answer: "A network of physical devices embedded with sensors and software; risks include privacy breaches and hacking", explanation: "The IoT is the network of physical objects—'things'—that are embedded with sensors, software, and other technologies for the purpose of connecting and exchanging data. The security risks are significant, as many IoT devices have weak security, making them vulnerable to hacking and misuse." },
            { q: "What is 'cloud computing'?", options: ["Computing in the sky", "The delivery of computing services—including servers, storage, databases, networking, software—over the Internet ('the cloud')", "A type of weather forecasting", "A personal computer"], answer: "The delivery of computing services—including servers, storage, databases, networking, software—over the Internet ('the cloud')", explanation: "Cloud computing offers faster innovation, flexible resources, and economies of scale. You typically pay only for cloud services you use, helping lower your operating costs." },
            { q: "What is 'intellectual property' in the digital world?", options: ["Property that is very smart", "Creations of the mind, such as inventions, literary and artistic works, symbols, names, and images used in commerce", "A type of physical property", "A government-owned idea"], answer: "Creations of the mind, such as inventions, literary and artistic works, symbols, names, and images used in commerce", explanation: "In the digital world, intellectual property includes software code, website content, digital music and videos, and online brand names. It is protected by laws such as copyright, patents, and trademarks." },
            { q: "What is 'copyright infringement' online?", options: ["Copying a text for personal study", "Using someone else's copyrighted work (e.g., music, images, software) without permission", "Liking a copyrighted image on social media", "Sharing a link to a copyrighted work"], answer: "Using someone else's copyrighted work (e.g., music, images, software) without permission", explanation: "Copyright infringement is the use or production of copyright-protected material without the permission of the copyright holder, thereby infringing certain exclusive rights granted to the copyright holder, such as the right to reproduce, distribute, display or perform the protected work." },
            { q: "What is a 'trademark'?", options: ["A mark on a trade route", "A symbol, design, or phrase legally registered to represent a company or product", "A type of copyright", "A quality standard"], answer: "A symbol, design, or phrase legally registered to represent a company or product", explanation: "A trademark is a sign capable of distinguishing the goods or services of one enterprise from those of other enterprises. Trademarks are protected by intellectual property rights." },
            { q: "What is a 'patent'?", options: ["A patient in a hospital", "An exclusive right granted for an invention", "A type of business license", "A scientific discovery"], answer: "An exclusive right granted for an invention", explanation: "A patent is an exclusive right granted for an invention, which is a product or a process that provides, in general, a new way of doing something, or offers a new technical solution to a problem. To get a patent, technical information about the invention must be disclosed to the public in a patent application." },
            { q: "What is 'fair use' or 'fair dealing' in copyright law?", options: ["A rule that all use of copyrighted material is fair", "A legal doctrine that permits limited use of copyrighted material without permission for purposes like criticism, comment, news reporting, and research", "A type of license", "A rule for fair business practices"], answer: "A legal doctrine that permits limited use of copyrighted material without permission for purposes like criticism, comment, news reporting, and research", explanation: "Fair use (in the US) or fair dealing (in India and other jurisdictions) is a limitation and exception to the exclusive right granted by copyright law to the author of a creative work. It allows for limited use of copyrighted material without acquiring permission from the rights holders." }
          ],
          3: [
            { q: "What is 'ethical hacking'?", options: ["Hacking for a good cause", "The authorized practice of testing a computer system or network to find security vulnerabilities that a malicious hacker could exploit", "A type of charity work", "Hacking that is not illegal"], answer: "The authorized practice of testing a computer system or network to find security vulnerabilities that a malicious hacker could exploit", explanation: "Ethical hackers, also known as 'white hat' hackers, use the same methods as malicious hackers but with the permission of the system owner to identify and fix security flaws before they can be exploited." },
            { q: "What is a 'deepfake'?", options: ["A very deep fake story", "Synthetic media in which a person in an existing image or video is replaced with someone else's likeness", "A type of online illusion", "A secure video format"], answer: "Synthetic media in which a person in an existing image or video is replaced with someone else's likeness", explanation: "Deepfakes are created using artificial intelligence techniques, such as deep learning and generative adversarial networks (GANs). They can be used to create convincing fake videos and audio, posing significant risks for misinformation and fraud." },
            { q: "What is the 'General Data Protection Regulation' (GDPR)?", options: ["A data protection law in India", "A regulation in EU law on data protection and privacy for all individuals within the European Union", "A global data sharing treaty", "A type of software"], answer: "A regulation in EU law on data protection and privacy for all individuals within the European Union", explanation: "The GDPR is a landmark regulation that has had a major impact on data protection laws worldwide. It gives individuals greater control over their personal data and imposes strict rules on those hosting and 'processing' this data anywhere in the world." },
            { q: "What is 'data localization'?", options: ["Finding the location of data", "A requirement for companies to store and process data within the borders of a specific country", "A type of GPS for data", "A method of data compression"], answer: "A requirement for companies to store and process data within the borders of a specific country", explanation: "Data localization is the practice of storing data on any device that is physically present within the borders of a particular country. It is often a legal requirement aimed at protecting citizen data and giving local law enforcement access." },
            { q: "What is a 'smart contract'?", options: ["A very intelligent contract", "A self-executing contract with the terms of the agreement directly written into code", "A contract written by an AI", "A template for a contract"], answer: "A self-executing contract with the terms of the agreement directly written into code", explanation: "Smart contracts are computer programs or transaction protocols which are intended to automatically execute, control or document legally relevant events and actions according to the terms of a contract or an agreement. They are often associated with blockchain technology." },
            { q: "What is a 'cybersquatting'?", options: ["Squatting in cyberspace", "Registering, trafficking in, or using a domain name with bad faith intent to profit from the goodwill of a trademark belonging to someone else", "A type of online protest", "Creating a parody website"], answer: "Registering, trafficking in, or using a domain name with bad faith intent to profit from the goodwill of a trademark belonging to someone else", explanation: "The cybersquatter then offers to sell the domain to the person or company who owns a trademark contained within the name at an inflated price." },
            { q: "What is the 'Internet Corporation for Assigned Names and Numbers' (ICANN)?", options: ["A government agency", "A non-profit organization responsible for coordinating the maintenance and procedures of several databases related to the namespaces of the Internet", "An internet service provider", "A company that sells domain names"], answer: "A non-profit organization responsible for coordinating the maintenance and procedures of several databases related to the namespaces of the Internet", explanation: "ICANN's primary purpose is to help ensure the stable and secure operation of the Internet's unique identifier systems. It coordinates the allocation and assignment of the top-level domain names (such as .com, .info, etc.)." },
            { q: "What is 'e-discovery' or 'electronic discovery'?", options: ["Discovering new websites", "The process of identifying, collecting and producing electronically stored information (ESI) in response to a request in a law suit or investigation", "A type of online research", "A feature of a web browser"], answer: "The process of identifying, collecting and producing electronically stored information (ESI) in response to a request in a law suit or investigation", explanation: "E-discovery is the process in which electronic data is sought, located, secured, and searched with the intent of using it as evidence in a civil or criminal legal case." },
            { q: "What is the 'intermediary liability' debate?", options: ["A debate about who is in the middle", "The legal debate over the extent to which online platforms (like social media) should be held responsible for the content posted by their users", "A debate about contract law", "A debate about international trade"], answer: "The legal debate over the extent to which online platforms (like social media) should be held responsible for the content posted by their users", explanation: "This is a complex issue globally. 'Safe harbor' provisions protect intermediaries from liability, but there is ongoing debate about whether they should do more to moderate illegal or harmful content, and whether that protection should be conditional." },
            { q: "What is a 'digital inheritance'?", options: ["Inheriting a digital device", "The process of passing on digital assets (like online accounts, files, cryptocurrency) to beneficiaries after death", "A type of software", "A government record"], answer: "The process of passing on digital assets (like online accounts, files, cryptocurrency) to beneficiaries after death", explanation: "Digital inheritance is a growing area of law that deals with the complex issue of who has the right to access and manage a deceased person's digital life. It often requires specific instructions in a will or trust." }
          ]
          ,
          4: [
            { q: "What is the offense of 'identity theft' under the IT Act?", options: ["Stealing someone's ID card", "Fraudulently using another person's electronic signature, password, or other unique identification feature", "Creating a fake profile on social media", "Forgetting your own identity"], answer: "Fraudulently using another person's electronic signature, password, or other unique identification feature", explanation: "Section 66C of the IT Act specifically penalizes identity theft, which involves dishonestly or fraudulently using the unique identification features of another person." },
            { q: "What is 'cyber terrorism' under Section 66F of the IT Act?", options: ["Sending threatening emails", "An act committed with intent to threaten the unity, integrity, security or sovereignty of India by attacking critical information infrastructure", "Hacking a government website", "Spreading rumors online"], answer: "An act committed with intent to threaten the unity, integrity, security or sovereignty of India by attacking critical information infrastructure", explanation: "Section 66F defines the serious offense of cyber terrorism. It involves acts like denying access to critical infrastructure or contaminating it, with the intent to strike terror or threaten the nation's security." },
            { q: "What is the role of the 'Adjudicating Officer' under the IT Act?", options: ["A judge in a regular court", "An officer appointed to adjudicate on claims for compensation for damages to a computer or computer system", "A police officer in a cyber cell", "An expert witness"], answer: "An officer appointed to adjudicate on claims for compensation for damages to a computer or computer system", explanation: "The IT Act empowers the central government to appoint Adjudicating Officers (not below the rank of a Director to the Government of India) to hold inquiries and award compensation for damages up to a certain limit for various contraventions." },
            { q: "What is the difference between an 'electronic signature' and a 'digital signature' in India?", options: ["There is no difference", "A digital signature is a specific type of electronic signature that uses a cryptographic method (hash function and public key cryptography)", "Electronic signatures are for emails, digital signatures are for documents", "Digital signatures are more secure but not legally valid"], answer: "A digital signature is a specific type of electronic signature that uses a cryptographic method (hash function and public key cryptography)", explanation: "The IT Act recognizes 'electronic signature' as the broader, technology-neutral term. A 'digital signature' is a specific, technology-based implementation of an electronic signature that is legally recognized and presumed to be secure." },
            { q: "What is the 'safe harbor' principle for intermediaries?", options: ["A rule that makes platforms always liable", "A legal principle that provides platforms (like social media sites) immunity from liability for third-party content, provided they follow certain due diligence", "A safe place for servers", "A type of data encryption"], answer: "A legal principle that provides platforms (like social media sites) immunity from liability for third-party content, provided they follow certain due diligence", explanation: "Section 79 of the IT Act grants 'safe harbor' to intermediaries. This protection is crucial for the functioning of the internet, but it is conditional on the platform following government rules and removing unlawful content upon receiving actual knowledge." },
            { q: "What is the offense of publishing or transmitting 'obscene material' in electronic form?", options: ["Sharing any adult content", "Publishing material which is lascivious or appeals to the prurient interest and tends to deprave and corrupt persons", "Sharing movie clips", "Creating memes"], answer: "Publishing material which is lascivious or appeals to the prurient interest and tends to deprave and corrupt persons", explanation: "Section 67 of the IT Act penalizes the publication or transmission of obscene material. The test for obscenity is based on whether the material, taken as a whole, has a tendency to corrupt the minds of those open to such influences." },
            { q: "What is the procedure for blocking public access to a website or information under the IT Act?", options: ["Any police officer can block a site", "It is done through a court order", "It is done by a designated government committee under Section 69A, following a specific procedure", "Internet Service Providers decide what to block"], answer: "It is done by a designated government committee under Section 69A, following a specific procedure", explanation: "Section 69A of the IT Act and the associated 'Blocking Rules' lay down a confidential procedure for the government to issue directions to block access to online information in the interest of sovereignty, security, public order, etc." },
            { q: "How are 'domain name disputes' typically resolved?", options: ["Through a regular court case", "Through the Uniform Domain-Name Dispute-Resolution Policy (UDRP) or the .IN Domain Name Dispute Resolution Policy (INDRP)", "By contacting the domain registrar directly", "By hacking the domain back"], answer: "Through the Uniform Domain-Name Dispute-Resolution Policy (UDRP) or the .IN Domain Name Dispute Resolution Policy (INDRP)", explanation: "These are quasi-judicial, administrative processes that provide a faster and cheaper alternative to litigation for resolving disputes related to 'cybersquatting' (registering a domain name that infringes on a trademark)." },
            { q: "What is the legal status of 'cryptocurrency' in India?", options: ["It is legal tender", "It is completely banned", "It is unregulated but not illegal; transactions are subject to income tax and other laws", "It is recognized as a security"], answer: "It is unregulated but not illegal; transactions are subject to income tax and other laws", explanation: "As of now, India does not have a specific law regulating cryptocurrencies. They are not banned, but they are not recognized as legal tender. The government has introduced taxation on gains from crypto assets, indicating a move towards regulation rather than an outright ban." },
            { q: "What is the 'Digital Personal Data Protection Act, 2023' (DPDP Act)?", options: ["An old law that has been replaced", "India's comprehensive new law for the protection of personal digital data", "A set of guidelines with no legal force", "A law that applies only to government data"], answer: "India's comprehensive new law for the protection of personal digital data", explanation: "The DPDP Act, 2023 is India's first standalone data protection law. It establishes the rights of individuals (Data Principals) and the obligations of entities (Data Fiduciaries) that process personal data, and sets up a Data Protection Board for enforcement." }
          ],
          5: [
            { q: "What is the 'right to be forgotten' in the Indian legal context?", options: ["It is an absolute right to delete all online information", "A right, emerging from the Right to Privacy, to have personal information removed from the public domain under certain conditions", "It is not recognized in India", "It only applies to celebrities"], answer: "A right, emerging from the Right to Privacy, to have personal information removed from the public domain under certain conditions", explanation: "While not an absolute right, Indian courts have recognized the 'right to be forgotten' as part of the fundamental Right to Privacy. It allows individuals to seek the removal of personal information from the internet, especially if it is irrelevant, outdated, or infringes on their privacy." },
            { q: "What are the key principles of the Digital Personal Data Protection (DPDP) Act, 2023?", options: ["Data minimization, purpose limitation, and consent-based processing", "Data maximization and free sharing", "Government ownership of all data", "Data can be used for any purpose"], answer: "Data minimization, purpose limitation, and consent-based processing", explanation: "The DPDP Act is built on several core principles, including collecting only necessary data (minimization), using it only for the specified purpose (limitation), and obtaining clear, informed consent from the individual before processing their data." },
            { q: "What is the legal debate around 'intermediary liability' and the IT Rules, 2021?", options: ["The rules make platforms stronger", "The rules impose greater due diligence and traceability requirements on intermediaries, which critics argue could undermine encryption and free speech", "The rules have been struck down by the courts", "The rules only apply to news websites"], answer: "The rules impose greater due diligence and traceability requirements on intermediaries, which critics argue could undermine encryption and free speech", explanation: "The IT Rules, 2021 have been controversial. They require significant social media platforms to enable the identification of the 'first originator' of information, which could break end-to-end encryption. The validity of these rules is under challenge in various courts." },
            { q: "How is 'electronic evidence' made admissible in Indian courts?", options: ["It is not admissible", "It is admissible if accompanied by a certificate under Section 65B of the Indian Evidence Act", "It is admissible only if it is printed out", "It is always considered primary evidence"], answer: "It is admissible if accompanied by a certificate under Section 65B of the Indian Evidence Act", explanation: "For electronic records to be treated as primary evidence, they must be accompanied by a certificate under Section 65B. This certificate authenticates the computer output by confirming the integrity of the computer system from which it was generated. This has been a subject of several key Supreme Court judgments." },
            { q: "What are the legal challenges posed by 'AI-generated content' like deepfakes?", options: ["They are easy to detect", "They pose challenges related to defamation, intellectual property rights, and the spread of misinformation", "They are protected as free speech", "There are no legal challenges"], answer: "They pose challenges related to defamation, intellectual property rights, and the spread of misinformation", explanation: "Deepfakes create significant legal and ethical problems. They can be used to create fake pornographic content, spread political disinformation, commit fraud, and infringe on personality rights and copyrights, challenging existing legal frameworks." },
            { q: "What is 'data sovereignty'?", options: ["Data is owned by the government", "The concept that data is subject to the laws and governance structures of the nation where it is collected or processed", "Data can be moved freely across borders", "Data is a sovereign entity"], answer: "The concept that data is subject to the laws and governance structures of the nation where it is collected or processed", explanation: "Data sovereignty is a key principle in the global data governance debate. Many countries, including India, are moving towards data localization laws, which require certain types of data to be stored within the country's borders to ensure national security and give law enforcement access." },
            { q: "What is the legal framework governing 'e-commerce' in India?", options: ["Only the IT Act", "A combination of the IT Act, the Consumer Protection Act, and specific e-commerce rules", "The Contract Act only", "There is no specific framework"], answer: "A combination of the IT Act, the Consumer Protection Act, and specific e-commerce rules", explanation: "E-commerce is regulated by multiple laws. The IT Act provides validity to electronic transactions, the Contract Act governs the agreements, and the Consumer Protection Act (along with its e-commerce rules) protects consumer rights, mandating disclosures and grievance redressal mechanisms for online platforms." },
            { q: "What is 'net neutrality' and what is its status in India?", options: ["A principle that all internet traffic should be treated equally; it is strongly supported by Indian regulations", "A principle that ISPs can charge different prices for different services; it is the law in India", "It is not a relevant concept for India", "A principle that the internet should be neutral in political debates"], answer: "A principle that all internet traffic should be treated equally; it is strongly supported by Indian regulations", explanation: "Net neutrality ensures that Internet Service Providers (ISPs) do not block, slow down, or charge money for specific online content. India's telecom regulator, TRAI, has passed strong regulations in favor of net neutrality, prohibiting discriminatory pricing for data services." },
            { q: "What are the legal issues related to 'cloud computing' agreements?", options: ["They are simple and risk-free", "Issues include data ownership, security, jurisdiction, and liability for breaches", "The cloud provider is always liable for everything", "The user is always liable for everything"], answer: "Issues include data ownership, security, jurisdiction, and liability for breaches", explanation: "Cloud computing contracts are complex. Key legal issues include determining who owns the data stored on the cloud, which country's laws apply, how the provider ensures data security, and who is liable if a data breach occurs." },
            { q: "What is the legal distinction between a 'game of skill' and a 'game of chance'?", options: ["There is no distinction", "Games of skill are generally legal, while games of chance (gambling) are heavily restricted or illegal", "Games of skill are played by skilled players, games of chance by anyone", "Games of skill are online, games of chance are offline"], answer: "Games of skill are generally legal, while games of chance (gambling) are heavily restricted or illegal", explanation: "This distinction is crucial for the online gaming industry in India. The Supreme Court has held that competitions where success depends on a substantial degree of skill are not considered gambling. However, the line between skill and chance is often blurry and subject to litigation." }
          ],

          6: [
                { q: "What is the key objective of the **'Data Minimisation'** principle under the Digital Personal Data Protection (DPDP) Act, 2023?", options: ["To ensure data is only collected in a minimal format", "To mandate that **only the minimum amount of personal data necessary** for the specified purpose is collected", "To reduce the physical size of data centers", "To ensure data is deleted after 30 days"], answer: "To mandate that **only the minimum amount of personal data necessary** for the specified purpose is collected", explanation: "Data minimisation is a core principle of modern data protection laws, ensuring Data Fiduciaries collect only the personal data that is strictly required for the purpose for which it is processed." },
                { q: "What is the **Doctrine of Proximate Cause** in the context of cyber liability?", options: ["A doctrine that liability ends at the national border", "A doctrine that the defendant is only liable for damage that is the **direct, immediate, and foreseeable result** of their cyber act", "A doctrine that only the person closest to the computer is liable", "A doctrine that applies only to data breaches"], answer: "A doctrine that the defendant is only liable for damage that is the **direct, immediate, and foreseeable result** of their cyber act", explanation: "In determining liability for cyber harm (especially financial loss), courts apply this common law doctrine to ensure the chain of causation between the wrongful cyber act and the resulting damage is not too remote or indirect." },
                { q: "What is the significance of the **'reasonable security practices'** standard for a Body Corporate holding Sensitive Personal Data (S. 43A IT Act)?", options: ["It is a mandatory standard that **limits the liability** of the Body Corporate only if followed", "It is only a guideline with no legal consequence", "It is a standard set by the United Nations", "It requires the use of quantum encryption only"], answer: "It is a mandatory standard that **limits the liability** of the Body Corporate only if followed", explanation: "Section 43A imposes civil liability (compensation) on a Body Corporate for negligent failure to protect sensitive personal data. Compliance with 'reasonable security practices' (as specified in the rules) acts as a defense against such liability." },
                { q: "What is a **'Logic Bomb'**?", options: ["A type of anti-virus software", "A piece of code intentionally inserted into a software system that will **execute a malicious function when specified conditions are met**", "A hardware failure in a server", "A method for secure login"], answer: "A piece of code intentionally inserted into a software system that will **execute a malicious function when specified conditions are met**", explanation: "A logic bomb is triggered by a specific event, such as a date, time, or the expiration of a job contract, and is often used by disgruntled employees to cause damage after their employment ends." },
                { q: "The offense of **'Voyeurism'** (S. 354C IPC) applies in the cyber context when a person captures or shares the image of a woman engaged in a **private act** where she has an expectation of:", options: ["Absolute privacy", "Public view", "**Privacy** (e.g., changing room, washroom, or any private activity)", "Social media sharing"], answer: "**Privacy** (e.g., changing room, washroom, or any private activity)", explanation: "Voyeurism was made a specific offense to protect a woman's bodily and digital privacy. The key is the act being private and the victim having a reasonable expectation that she would not be observed or recorded." },
                { q: "What is **'Pharming'** and how does it work?", options: ["A type of hacking using farms", "A cyberattack that **redirects users to a fraudulent website** by corrupting the Domain Name System (DNS) or the host file", "An attack that only uses email", "A method of securing DNS servers"], answer: "A cyberattack that **redirects users to a fraudulent website** by corrupting the Domain Name System (DNS) or the host file", explanation: "Pharming is more insidious than phishing because it requires no deception on the user's part; the attacker simply poisons the website-to-IP address translation, sending the user to a fake site even if they type the correct URL." },
                { q: "What is the purpose of **'Digital Rights Management' (DRM)** technologies?", options: ["To promote free sharing of content", "To **control the access, copying, and usage** of digital copyrighted works by rights holders", "To simplify the process of copyright registration", "To regulate online sales"], answer: "To **control the access, copying, and usage** of digital copyrighted works by rights holders", explanation: "DRM technologies are technical measures (like encryption or license keys) implemented by copyright holders to enforce limitations on the use of their digital content (music, movies, software)." },
                { q: "What is the legal challenge in applying **Vicarious Liability** to companies for cybercrimes committed by employees?", options: ["Companies cannot be punished", "The challenge lies in proving that the employee committed the crime **in the course of their employment** and not for personal reasons", "Only the CEO is liable for all crimes", "Vicarious liability is absolute in all cybercrimes"], answer: "The challenge lies in proving that the employee committed the crime **in the course of their employment** and not for personal reasons", explanation: "For a company to be held vicariously liable for an employee's criminal act (as opposed to civil wrong), it must be shown that the act was committed within the scope of employment or for the benefit of the company, which is often difficult to prove." },
                { q: "What does the offense of **'tampering with computer source documents'** (S. 65 IT Act) aim to protect?", options: ["The computer hardware", "The **integrity and confidentiality of the source code** of any computer program/resource", "The user's personal data", "The final output of a computer program"], answer: "The **integrity and confidentiality of the source code** of any computer program/resource", explanation: "Section 65 criminalizes the intentional concealment, destruction, or alteration of the source code (the blueprint of a software) used for any computer resource, protecting the intellectual property behind the program." },
                { q: "In the execution of electronic evidence, what is the significance of a **'hash value'**?", options: ["It determines the file's size", "It acts as a **unique, fixed-length digital fingerprint** to prove that the evidence has not been tampered with since seizure", "It is the electronic signature of the police officer", "It is only used for image files"], answer: "It acts as a **unique, fixed-length digital fingerprint** to prove that the evidence has not been tampered with since seizure", explanation: "A hash function generates a hash value. Even a single bit change in the original electronic file will result in a completely different hash, making it an indispensable tool for establishing the **integrity** of digital evidence." }
            ],

             7: [
                { q: "What is **'Data Fiduciary'** under the DPDP Act, 2023?", options: ["The individual to whom the personal data relates", "The **entity (person, company, or government body) that determines the purpose and means** of processing personal data", "A law enforcement agency", "A data storage server"], answer: "The **entity (person, company, or government body) that determines the purpose and means** of processing personal data", explanation: "The Data Fiduciary is the principal entity responsible for the lawful collection and processing of personal data, similar to the 'data controller' in the GDPR." },
                { q: "What is the distinction between **symmetric** and **asymmetric** encryption?", options: ["Symmetric is only for text, Asymmetric is for files", "Symmetric uses a **single, shared secret key** for both encryption and decryption; Asymmetric uses a **public and a private key** pair", "Asymmetric is older and less secure", "Symmetric is banned by the government"], answer: "Symmetric uses a **single, shared secret key** for both encryption and decryption; Asymmetric uses a **public and a private key** pair", explanation: "Asymmetric (or public-key) encryption is slower but solves the key distribution problem, while symmetric encryption is faster and used for bulk data encryption once a secure channel is established." },
                { q: "What is the offense of **'Destroying or Altering Computer Source Code'** (S. 65 IT Act)?", options: ["Any act of writing a computer program", "Intentionally **concealing, destroying, or altering** any computer source code used for a computer resource with knowledge of its illegality", "Sharing the source code with others", "Hacking into a computer"], answer: "Intentionally **concealing, destroying, or altering** any computer source code used for a computer resource with knowledge of its illegality", explanation: "This section is designed to protect the integrity of the original program code, which is a company's valuable intellectual property." },
                { q: "What is the primary role of the **Controller of Certifying Authorities (CCA)** under the IT Act?", options: ["To regulate social media platforms", "To **license and regulate** the working of Certifying Authorities (CAs) who issue Digital Signature Certificates", "To manage the national cyber security policy", "To monitor all internet traffic"], answer: "To **license and regulate** the working of Certifying Authorities (CAs) who issue Digital Signature Certificates", explanation: "The CCA is the government's regulatory body for the Public Key Infrastructure (PKI) in India, ensuring the trustworthiness and security of the digital signature ecosystem." },
                { q: "What is a **'blockchain oracle'**?", options: ["A type of cryptocurrency", "A third-party service that **connects smart contracts with external, real-world data**", "A security flaw in a blockchain", "A person who predicts blockchain prices"], answer: "A third-party service that **connects smart contracts with external, real-world data**", explanation: "Since smart contracts on a blockchain are isolated, an oracle acts as a trusted data feed, providing the external information (like a stock price or temperature reading) necessary to trigger the contract's self-execution." },
                { q: "What is the **Doctrine of Extra-Territoriality** of the IT Act?", options: ["The Act is only applicable within India", "The Act applies to **any person or company** outside India if the commission of the offense involves a computer resource located in India", "The Act applies only to Indian citizens abroad", "The Act only applies to government computers"], answer: "The Act applies to **any person or company** outside India if the commission of the offense involves a computer resource located in India", explanation: "Section 1(2) read with Section 75 provides this broad jurisdiction, meaning that if a hacker in a foreign country attacks a server or data in India, they can be prosecuted under Indian law." },
                { q: "What is **'e-discovery'** in the context of civil litigation?", options: ["Finding a new website", "The process of identifying, collecting, and producing **electronically stored information (ESI)** as evidence in a lawsuit", "A method for data deletion", "A type of online research"], answer: "The process of identifying, collecting, and producing **electronically stored information (ESI)** as evidence in a lawsuit", explanation: "E-discovery deals with the procedural aspects of handling electronic data (emails, documents, metadata) that must be secured and presented as evidence in legal proceedings." },
                { q: "What is the **Rule of Non-Repudiation** in electronic transactions?", options: ["The ability of a party to deny a transaction", "The inability of a party to **deny the authenticity or source** of an electronic communication or transaction after the fact", "A method of securing a digital signature", "A rule that requires all transactions to be in writing"], answer: "The inability of a party to **deny the authenticity or source** of an electronic communication or transaction after the fact", explanation: "Non-repudiation is a key legal and technical goal, usually achieved via digital signatures, that provides verifiable proof of the integrity and origin of the data to prevent the sender from later denying their involvement." },
                { q: "What is **'typosquatting'**?", options: ["A form of cyber-trespass", "A form of cybersquatting that relies on **mistakes made by internet users when typing a website address**", "A type of malicious code", "A method for securing a domain name"], answer: "A form of cybersquatting that relies on **mistakes made by internet users when typing a website address**", explanation: "Typosquatters register domain names that are common misspellings of popular websites to lure traffic and profit from users' typing errors." },
                { q: "What is the legal effect of a **'digital inheritance'** provision in a will?", options: ["It is automatically void", "It is legally binding, though execution can be difficult due to platform Terms of Service (ToS)", "It is only a suggestion", "It is only valid for physical devices"], answer: "It is legally binding, though execution can be difficult due to platform Terms of Service (ToS)", explanation: "Digital assets can be legally bequeathed in a will. However, platforms often have their own ToS that govern account access post-mortem, which can create legal friction with the instructions in the will." }

            8: [

                { q: "The offense of **'Cyber Defamation'** is typically established by which element?", options: ["Mere criticism of a public figure", "The **publication of a false imputation** concerning any person by electronic means with intent to harm their reputation", "The sharing of a true fact about a person", "Only direct threats against a person"], answer: "The **publication of a false imputation** concerning any person by electronic means with intent to harm their reputation", explanation: "Cyber defamation applies the principles of traditional defamation (Section 499 IPC) to the digital world, requiring a false statement published online that harms reputation." },
                { q: "What is the security concept of **'zero-trust'** architecture?", options: ["Trust all internal users but not external", "An IT security model that requires **strict verification for every person and device** attempting to access resources on a private network, regardless of location", "A model where no one is allowed to access any resources", "A model that trusts all internal network activity implicitly"], answer: "An IT security model that requires **strict verification for every person and device** attempting to access resources on a private network, regardless of location", explanation: "Zero-trust operates on the principle: 'Never trust, always verify.' It assumes that any user or device, even those inside the network, could be a threat, requiring continuous, strict authentication and authorization." },
                { q: "What is the legal distinction between **'hacking'** and **'cracking'**?", options: ["Hacking is always illegal; Cracking is not", "Hacking is a **neutral term** often used for ethical system exploration; Cracking refers to **breaking into a system with malicious intent**", "Cracking is only for software", "There is no legal distinction"], answer: "Hacking is a **neutral term** often used for ethical system exploration; Cracking refers to **breaking into a system with malicious intent**", explanation: "While the IT Act primarily uses the term 'hacking' to define the criminal act of gaining unauthorized access (S. 66), the term 'cracking' is often used by security professionals to denote the malicious and illegal breaking of codes or security systems." },
                { q: "What is the **Doctrine of Estoppel**'s relevance in electronic commerce?", options: ["A party can always deny their electronic signature", "A party who has induced another to enter an electronic contract by their actions **cannot later deny the validity of that contract**", "Estoppel is irrelevant in cyber law", "Estoppel applies only to money payments"], answer: "A party who has induced another to enter an electronic contract by their actions **cannot later deny the validity of that contract**", explanation: "The general principle of estoppel applies: if a party leads another to reasonably believe in the existence of a fact (like the authenticity of an electronic signature) and the other party acts upon it, the first party is prevented from denying that fact later." },
                { q: "What is **'Data Portability'** under the DPDP Act?", options: ["The right to move your server to a new country", "The right to **obtain personal data from a Data Fiduciary** in a structured, machine-readable format to transmit it to another Data Fiduciary", "The right to delete your personal data", "The right to access your personal data"], answer: "The right to **obtain personal data from a Data Fiduciary** in a structured, machine-readable format to transmit it to another Data Fiduciary", explanation: "This right empowers the individual (Data Principal) to easily switch service providers by demanding their data from the current provider in a usable format for transfer to a competitor." },
                { q: "What is **'Salami Slicing'** as a form of cybercrime?", options: ["Stealing large amounts of data", "A technique where **tiny amounts of assets are stolen** from a large number of sources, making the theft hard to notice", "A type of data encryption", "A method for securing online payments"], answer: "A technique where **tiny amounts of assets are stolen** from a large number of sources, making the theft hard to notice", explanation: "Salami slicing is a type of financial cybercrime that involves stealing fractions of money (e.g., rounding errors) from many transactions, which collectively amount to a substantial sum for the criminal without triggering alarms." },
                { q: "What is the **'Admissibility of Electronic Evidence'** rule under Section 65B of the Indian Evidence Act designed to ensure?", options: ["That the evidence is from a reputable source", "That the evidence's **source, generation process, and integrity** are authenticated", "That the evidence is printed out and signed", "That the evidence is stored in the cloud"], answer: "That the evidence's **source, generation process, and integrity** are authenticated", explanation: "Section 65B imposes a mandatory requirement for a certificate that validates the chain of custody and the reliability of the computer system that produced the electronic record, addressing the ease with which digital data can be altered." },
                { q: "What is the primary function of the **National Cyber Security Policy, 2013**?", options: ["To create new laws for the internet", "To **build a resilient and secure cyberspace** for citizens, businesses, and government", "To regulate the price of internet data", "To promote the use of social media"], answer: "To **build a resilient and secure cyberspace** for citizens, businesses, and government", explanation: "The policy's objective is to protect information and infrastructure in cyberspace, prevent cyberattacks, and encourage the development of a strong security culture and indigenous capabilities." },
                { q: "What are the legal implications of **'Biometric Data'** under the DPDP Act?", options: ["It is treated the same as a person's name", "It is considered **Sensitive Personal Data** and requires higher standards of consent and protection", "It is not considered personal data", "It is treated the same as a photo"], answer: "It is considered **Sensitive Personal Data** and requires higher standards of consent and protection", explanation: "Biometric data (like fingerprints, retina scans) is a form of sensitive personal data that, due to its unique and permanent nature, requires enhanced security measures and more rigorous consent before processing." }
